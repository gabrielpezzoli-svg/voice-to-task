      "6-23": { nom: "Sainte Audrey", texte: ["Audrey, en latin Étheldrède, naquit vers 636 en Angleterre, fille du roi d'Est-Anglie.", "Mariée deux fois contre sa volonté, elle maintint sa résolution de vivre dans la chasteté.", "Son second mari, le roi Egfrid de Northumbrie, finit par lui accorder la séparation.", "Elle fonda le double monastère d'Ely, en 673, qui devint l'un des plus importants d'Angleterre.", "Elle gouverna cette communauté avec sagesse et sainteté pendant de nombreuses années.", "Elle mourut d'une tumeur au cou en 679, qu'elle accepta comme punition de ses colliers de jeunesse.", "Son corps fut retrouvé incorruptible lors de la translation de ses reliques.", "Sa translation donna naissance au mot anglais tawdry, désignant les dentelles bon marché vendues à sa fête.", "La cathédrale d'Ely, magnifique édifice roman et gothique, est élevée sur le site de son monastère.", "Elle est la patronne des femmes souffrant de maladies du cou et de la gorge."] },
      "6-24": { nom: "Nativité de saint Jean-Baptiste", texte: ["La naissance de Jean-Baptiste est l'une des rares nativités célébrées par l'Église.", "Il naquit six mois avant Jésus, fils de Zacharie et d'Élisabeth, cousine de Marie.", "Sa naissance miraculeuse à des parents âgés fut annoncée par l'ange Gabriel au Temple.", "Son père Zacharie fut frappé de mutisme pour avoir douté, et retrouva la parole à la naissance.", "Le cantique Benedictus, prononcé par Zacharie, est chanté chaque matin aux Laudes.", "Jean vécut en ermite dans le désert, vêtu de poils de chameau, se nourrissant de sauterelles.", "Il baptisa Jésus dans le Jourdain et proclama qu'il n'était pas digne de délier ses sandales.", "Il fut emprisonné par Hérode Antipas pour avoir condamné son mariage adultère.", "Il fut décapité sur la demande de Salomé, fille d'Hérodiade.", "Il est le plus grand des prophètes, selon les paroles de Jésus lui-même."] },
      "6-25": { nom: "Saint Guillaume de Verceil", texte: ["Guillaume naquit en 1085 à Verceil, en Piémont, dans une famille noble.", "Orphelin dès l'enfance, il fut élevé par un parent et reçut une éducation soignée.", "À quatorze ans, il entreprit un pèlerinage à Compostelle en solitaire.", "De retour en Italie, il vécut en ermite sur le mont Vergine, en Campanie.", "Des disciples attirés par sa sainteté lui demandèrent de les diriger.", "Il fonda en 1119 la congrégation des Guillelmites sur le mont Vergine.", "Cette congrégation bénédictine contemplative est encore présente aujourd'hui.", "Il refusa l'épiscopat qui lui fut proposé à plusieurs reprises.", "Il mourut en 1142 à Goleto, après avoir fondé plusieurs monastères dans le sud de l'Italie.", "Le sanctuaire du mont Vergine est l'un des lieux de pèlerinage les plus fréquentés du sud de l'Italie."] },
      "6-26": { nom: "Saint Josémaria Escrivá", texte: ["Josémaria Escrivá naquit en 1902 à Barbastro, en Aragon, dans une famille chrétienne.", "Ordonné prêtre en 1925, il reçut le 2 octobre 1928 l'inspiration de fonder l'Opus Dei.", "L'Opus Dei propose aux laïcs de sanctifier leur vie professionnelle et familiale ordinaire.", "Sa conviction était que tous les chrétiens sont appelés à la sainteté dans leur vie quotidienne.", "Il vécut la Guerre Civile espagnole dans des conditions périlleuses, se réfugiant dans des ambassades.", "Il s'installa à Rome en 1946 et dirigea l'Opus Dei depuis le siège mondial.", "Son œuvre Chemin, recueil de maximes spirituelles, a été traduite en quarante langues.", "Il fonda en 1952 l'Université de Navarre, à Pampelune, centre d'excellence académique.", "Il mourut à Rome en 1975, après avoir vu son œuvre se répandre dans les cinq continents.", "Canonisé par Jean-Paul II en 2002, il est le fondateur de l'Opus Dei."] },
      "6-27": { nom: "Saint Cyrille d'Alexandrie", texte: ["Cyrille naquit vers 376 à Alexandrie, neveu du patriarche Théophile d'Alexandrie.", "Il lui succéda comme patriarche d'Alexandrie en 412, dans des circonstances controversées.", "Son patriarcat de trente-deux ans fut marqué par des conflits avec les autorités civiles.", "Il lutta avec énergie contre les nestoriens, qui niaient la maternité divine de Marie.", "Il convoqua le Concile d'Éphèse en 431, qui proclama Marie Theotokos, Mère de Dieu.", "Ce concile est l'un des plus importants de l'histoire de l'Église pour la foi mariale.", "Ses écrits exégétiques et théologiques sont d'une richesse et d'une précision remarquables.", "Son traité Sur l'incarnation du Fils unique est un chef-d'œuvre de la théologie patristique.", "Il mourut en 444, après un épiscopat long et combatif.", "Déclaré Docteur de l'Église en 1882 par Léon XIII, il est le Docteur de l'Incarnation."] },
      "6-28": { nom: "Saint Irénée de Lyon", texte: ["Irénée naquit vers 130 en Asie Mineure, probablement à Smyrne.", "Dans sa jeunesse, il connut saint Polycarpe, disciple direct de l'apôtre Jean.", "Il vint à Lyon où il devint prêtre puis évêque vers 177.", "Son épiscopat fut marqué par la lutte contre les sectes gnostiques qui proliféraient à Lyon.", "Son traité Contre les hérésies est le premier grand ouvrage de théologie systématique.", "Il y expose et réfute point par point les doctrines des différentes sectes gnostiques.", "Il est le père de la théologie catholique et un témoin de la tradition apostolique.", "Il joua un rôle de médiateur entre Rome et les chrétiens d'Asie lors de la controverse pascale.", "Il mourut probablement en martyr vers 202, lors de la persécution de Septime Sévère.", "Déclaré Docteur de l'Église par François en 2022, il est le premier Docteur de la Gaule."] },
      "6-29": { nom: "Saints Pierre et Paul", texte: ["La fête des saints Pierre et Paul, le 29 juin, est l'une des plus solennelles du calendrier.", "Pierre, le pêcheur de Galilée, fut choisi par Jésus comme chef des apôtres.", "Il fut le premier à confesser la messianité de Jésus à Césarée de Philippe.", "Après la Pentecôte, il dirigea la communauté de Jérusalem puis fonda l'Église de Rome.", "Il fut crucifié la tête en bas sous Néron, vers 64, ne se jugeant pas digne de mourir comme son Maître.", "Paul, le persécuteur converti, devint le plus grand missionnaire de l'histoire chrétienne.", "Il parcourut tout le bassin méditerranéen en trois grands voyages apostoliques.", "Ses Épîtres constituent une part majeure du Nouveau Testament et de la théologie chrétienne.", "Il fut décapité à Rome, vers 67, comme citoyen romain.", "Ces deux colonnes de l'Église donnèrent à Rome sa vocation de siège de la chrétienté."] },
      "6-30": { nom: "Les Premiers Martyrs de l'Église Romaine", texte: ["Le 30 juin, l'Église commémore les premiers martyrs qui souffrirent à Rome sous Néron.", "En 64, un incendie dévastateur ravagea Rome pendant neuf jours.", "L'empereur Néron accusa les chrétiens d'avoir allumé cet incendie pour détourner les soupçons.", "Une grande persécution s'abattit alors sur la communauté chrétienne de Rome.", "Des centaines de chrétiens furent arrêtés et mis à mort de manière atroce.", "Certains furent revêtus de peaux de bêtes et livrés aux chiens.", "D'autres furent crucifiés ou brûlés vifs pour servir de torches nocturnes dans les jardins de Néron.", "Tacite, historien romain, rapporte ces événements avec émotion dans ses Annales.", "Ce fut la première grande persécution systématique des chrétiens dans l'Empire romain.", "Ces martyrs anonymes sont les fondements invisibles de l'Église de Rome."] },
      "7-1": { nom: "Saint Théobald d'Arles", texte: ["Théobald naquit vers 1017 dans une famille noble du midi de la France.", "Refusant la vie mondaine et les avantages de sa naissance, il choisit la vie érémitique.", "Il parcourut de nombreux lieux saints en pèlerin, visitant Rome, Compostelle et la Terre Sainte.", "Il s'établit finalement en ermite dans la forêt de Salanques, en Catalogne.", "Des disciples attirés par sa réputation de sainteté vinrent le rejoindre.", "Il fonda ainsi une petite communauté érémitique selon la tradition des pères du désert.", "Ses miracles nombreux et sa sagesse lui valurent une grande réputation dans toute la région.", "Il mourut vers 1066, entouré de ses disciples dans sa chère forêt.", "Son tombeau devint rapidement un lieu de pèlerinage fréquenté.", "Il est vénéré en Catalogne et dans le midi de la France comme modèle de vie érémitique."] },
      "7-2": { nom: "Saint Processus et saint Martinien", texte: ["Processus et Martinien furent des martyrs romains vénérés depuis les premiers siècles.", "Selon la tradition, ils étaient gardiens de la prison Mamertine où furent enfermés Pierre et Paul.", "Convertis au christianisme par les deux apôtres, ils leur auraient permis de baptiser des codétenus.", "Arrêtés pour leur foi, ils furent soumis à de nombreux supplices avant d'être décapités.", "Leurs corps furent ensevelis sur la voie Aurélienne, à Rome.", "L'impératrice Symmacha fit construire une basilique sur leur tombeau au IVe siècle.", "Leurs reliques furent ensuite transférées dans la basilique Saint-Pierre du Vatican.", "Ils figurent parmi les plus anciens martyrs vénérés dans la liturgie romaine.", "Leurs noms apparaissent dans les plus anciens martyrologes de l'Église de Rome.", "Ils illustrent le lien entre l'apostolat de Pierre et Paul et la naissance de l'Église romaine."] },
      "7-3": { nom: "Saint Thomas, apôtre", texte: ["Thomas, surnommé Didyme ce qui signifie jumeau, était l'un des douze apôtres.", "Sa question lors du dernier Repas amena une réponse fondamentale de Jésus sur le chemin vers le Père.", "Son doute après la Résurrection est devenu universel : l'incrédulité de Thomas est entrée dans le langage courant.", "Jésus lui offrit de toucher ses plaies, et Thomas s'écria : Mon Seigneur et mon Dieu !", "La tradition l'envoie en mission en Perse, en Inde et en Chine.", "Il aurait évangélisé le sud de l'Inde, où la communauté chrétienne de saint Thomas existe toujours.", "Il fut martyrisé à Mylapore, près de l'actuelle Chennai, vers 72.", "Sa tombe fut vénérée dès l'Antiquité et une grande cathédrale lui est dédiée à Chennai.", "Les chrétiens de saint Thomas forment l'une des plus anciennes communautés chrétiennes du monde.", "Il est le patron du Portugal, de l'Inde et des architectes."] },
      "7-4": { nom: "Sainte Élisabeth du Portugal", texte: ["Élisabeth naquit en 1271 à Saragosse, fille du roi Pierre III d'Aragon.", "Elle fut nommée Isabelle en espagnol et Élisabeth en portugais, en hommage à sainte Élisabeth de Hongrie.", "Elle épousa à douze ans le roi Denis Ier du Portugal, avec qui elle eut deux enfants.", "Malgré les infidélités de son mari, elle l'aima fidèlement et intercéda pour ses enfants illégitimes.", "Sa charité envers les pauvres, les malades et les pèlerins était inépuisable.", "La légende des roses lui est attribuée, comme à sainte Élisabeth de Hongrie.", "Elle joua un rôle de médiatrice dans de nombreux conflits entre rois chrétiens.", "Veuve en 1325, elle voulut entrer au couvent mais on lui demanda de rester dans le monde.", "Elle mourut en 1336 à Estremoz, en revenant d'une mission de médiation.", "Canonisée en 1625 par Urbain VIII, elle est la patronne du Portugal avec saint Antoine."] },
      "7-5": { nom: "Saint Antoine Zaccaria", texte: ["Antoine Zaccaria naquit en 1502 à Crémone, dans une famille noble lombarde.", "Médecin de formation, il ressentit un appel à soigner les âmes plutôt que les corps.", "Il fut ordonné prêtre en 1528 et se consacra à la prédication et à la réforme morale.", "Il fonda en 1530 les Barnabites, congrégation dédiée à la réforme du clergé et du peuple.", "Leur règle insistait sur la prédication fréquente et la fréquentation des sacrements.", "Il contribua à rétablir la pratique du carillon des cloches le jeudi à trois heures, pour rappeler la Passion.", "Il fonda également une congrégation féminine, les Angelines de Saint Paul.", "Sa santé fragile fut épuisée par ses travaux et ses pénitences.", "Il mourut en 1539 à Crémone, à l'âge de seulement trente-six ans.", "Canonisé par Léon XIII en 1897, il est le fondateur des Barnabites."] },
      "7-6": { nom: "Sainte Maria Goretti", texte: ["Maria Goretti naquit en 1890 à Corinaldo, dans les Marches, dans une famille de paysans pauvres.", "Sa famille s'établit dans les marais Pontins, région insalubre où son père mourut du paludisme.", "À onze ans, elle gérait la maison tandis que sa mère travaillait aux champs.", "Alessandro Serenelli, fils du patron de la ferme, tenta de la violer en juillet 1902.", "Elle résista en disant qu'elle préférait mourir plutôt que de commettre ce péché.", "Alessandro la poignarda de quatorze coups de couteau.", "Avant de mourir le lendemain, elle pardonna à son agresseur avec une sérénité étonnante.", "Alessandro, condamné à trente ans de prison, fut converti par une vision de Maria.", "Il témoigna à sa canonisation et devint frère lai franciscain.", "Canonisée en 1950 par Pie XII, elle est la patronne des jeunes filles et des victimes de viol."] },
      "7-7": { nom: "Bienheureuse Marie-Thérèse de Soubiran", texte: ["Marie-Thérèse de Soubiran naquit en 1834 à Castelnaudary, dans l'Aude.", "Profondément pieuse dès l'enfance, elle fonda en 1864 la Société de Notre-Dame du Cénacle.", "Cette congrégation se consacre aux retraites spirituelles selon la méthode ignacienne.", "Elle fut injustement dépossédée de sa charge de supérieure par une compagne envieuse.", "Elle vécut cette humiliation dans un total abandon à la volonté divine, sans se plaindre.", "Elle passa les dernières années de sa vie comme simple sœur dans une autre communauté.", "Sa foi inébranlable et sa charité héroïque ne se démentaient jamais dans l'épreuve.", "Elle mourut en 1889, ayant été réhabilitée peu avant sa mort.", "Béatifiée par Paul VI en 1982, elle est le modèle de la fidélité dans l'épreuve.", "Sa congrégation est présente dans de nombreux pays et gère des maisons de retraites spirituelles."] },
      "7-8": { nom: "Saint Thibaut de Marly", texte: ["Thibaut de Marly naquit vers 1130 dans une famille noble de l'Île-de-France.", "Il était apparenté aux rois de France et avait une brillante carrière devant lui.", "Touché par la grâce, il abandonna le monde et entra dans l'ordre cistercien.", "Il fut moine à l'abbaye des Vaux-de-Cernay, dans la forêt de Rambouillet.", "Sa réputation de sainteté lui valut d'être élu abbé de ce monastère.", "Il fut le confesseur et le directeur spirituel de Blanche de Castille, mère de saint Louis.", "Sa douceur et sa profondeur spirituelle attiraient les grands de ce monde à sa cellule.", "Il mourut en 1247, entouré de la vénération de toute la cour de France.", "Son tombeau fut longtemps un lieu de pèlerinage pour les Capétiens.", "Il est vénéré comme l'un des saints les plus importants de l'Île-de-France médiévale."] },
      "7-9": { nom: "Saints martyrs de Gorkum", texte: ["Les Martyrs de Gorkum sont dix-neuf catholiques tués en Hollande en 1572.", "La ville de Brielle fut prise par les Gueux de mer, calvinistes flamands opposés à l'Espagne.", "Le 9 juillet 1572, dix-neuf clercs, dont onze franciscains, furent pendus à Brielle.", "Ils refusèrent de renier le pape et la présence réelle du Christ dans l'Eucharistie.", "Parmi eux se trouvaient des prêtres, des religieux et des laïcs de différentes congrégations.", "Ils furent pendus dans une grange, sans jugement régulier, par pure haine religieuse.", "Leur courage et leur sérénité face à la mort impressionnèrent même leurs bourreaux.", "Ils furent béatifiés en 1675 par Clément X et canonisés en 1867 par Pie IX.", "Ils sont les premiers martyrs canonisés de la Réforme en Europe du Nord.", "Ils illustrent la violence des guerres de religion du XVIe siècle aux Pays-Bas."] },
      "7-10": { nom: "Sainte Amalie", texte: ["Amalie, ou Amalberge, était une noble franque du VIIIe siècle, dont la vie est entourée de légendes.", "Selon la tradition, le roi Charlemagne lui-même voulut l'épouser, mais elle refusa par amour de Dieu.", "Elle avait consacré sa virginité au Seigneur et refusait tout prétendant, même royal.", "Charlemagne, irrité, lui brisa le bras lors d'une rencontre, dit la légende.", "Elle fut miraculeusement guérie et put fuir à Tamise, en Belgique.", "Elle y fonda un monastère et y vécut dans la prière et la pénitence.", "Ses miracles nombreux lui valurent une grande réputation de sainteté dans la région.", "Elle mourut vers 772, entourée de ses religieuses.", "Ses reliques furent transférées à Gand, où elles furent l'objet d'une grande vénération.", "Elle est invoquée contre les fractures et les maladies des bras."] },
      "7-11": { nom: "Saint Benoît", texte: ["Benoît de Nursie naquit vers 480 à Nursie, en Ombrie, dans une famille noble romaine.", "Étudiant à Rome, il fut dégoûté par la corruption de la cité et se retira dans la solitude.", "Il vécut trois ans dans une grotte à Subiaco, nourri par un moine du voisinage.", "Sa sainteté lui attira des disciples, pour lesquels il fonda douze monastères à Subiaco.", "Il s'établit ensuite au Mont-Cassin, fondant le monastère qui devint le berceau du monachisme occidental.", "Sa Règle, brève et équilibrée, organise la vie des moines autour du travail et de la prière.", "Ora et Labora, prie et travaille, est la devise résumant son idéal monastique.", "Son œuvre monastique préserva la civilisation et la foi pendant les invasions barbares.", "Il mourut vers 547 au Mont-Cassin, les bras levés vers le ciel selon saint Grégoire.", "Déclaré patron de l'Europe par Paul VI en 1964, il est le père du monachisme occidental."] },
      "7-12": { nom: "Saint Jean Gualbert", texte: ["Jean Gualbert naquit vers 995 à Florence, dans une famille noble toscane.", "Son frère Hugo ayant été assassiné, Jean se rendit armé pour venger sa mort.", "Il rencontra le meurtrier seul dans un défilé, mais, touché par sa grâce, lui pardonna au nom du Christ.", "Entré dans une église, il vit le Christ incliner la tête pour le remercier de son pardon.", "Cette expérience le décida à entrer dans la vie religieuse.", "Il refusa l'abbatiat qu'on voulait lui imposer et chercha une forme de vie plus austère.", "En 1038, il fonda à Vallombreuse, en Toscane, une congrégation bénédictine très réformée.", "Il lutta avec énergie contre la simonie, achat et vente des charges ecclésiastiques.", "Il mourut en 1073, et sa congrégation était déjà présente dans tout le centre de l'Italie.", "Canonisé en 1193, il est le fondateur de l'ordre de Vallombreuse."] },
      "7-13": { nom: "Saint Henri II, empereur", texte: ["Henri II naquit en 973, fils du duc Henri II de Bavière et petit-neveu de l'empereur Othon le Grand.", "Il devint duc de Bavière en 995, roi de Germanie en 1002 et empereur romain germanique en 1014.", "Son règne fut marqué par une politique de réforme de l'Église en étroite collaboration avec Rome.", "Il restaura et enrichit de nombreuses cathédrales et monastères à travers tout l'empire.", "Il fonda le diocèse de Bamberg en 1007, dotant magnifiquement sa cathédrale.", "Il était en contact constant avec les grands réformateurs monastiques de son époque.", "Son mariage avec Cunégonde, elle aussi vénérée comme sainte, fut marqué selon la tradition par la chasteté.", "Il mourut en 1024 à Göttingen, sans héritier, laissant l'empire dans une relative stabilité.", "Canonisé en 1146 par Eugène III, il est l'un des rares empereurs honorés comme saint.", "Il est le patron des rois, des ducs et de la ville de Bamberg."] },
      "7-14": { nom: "Saint Camille de Lellis", texte: ["Camille de Lellis naquit en 1550 à Bucchianico, dans les Abruzzes, dans une famille de soldats.", "Il mena une vie agitée de soldat et de joueur invétéré avant sa conversion.", "En 1575, travaillant sur un chantier franciscain, il se convertit profondément.", "Une blessure chronique à la jambe le fit fréquenter l'hôpital de Rome, où il découvrit sa vocation.", "Il se consacra au service des malades et fonda en 1582 les Servites des Infirmes, les Camilliens.", "Ses frères portaient une croix rouge sur leur habit, premier symbole de la Croix-Rouge.", "Il fut ordonné prêtre à trente-six ans et développa ses œuvres dans toute l'Italie.", "Il envoya des infirmiers sur les champs de bataille, créant les premiers secours militaires.", "Il mourut en 1614 à Rome, après une vie entière au chevet des malades.", "Canonisé en 1746, il est le patron des malades, des médecins et des infirmiers."] },
      "7-15": { nom: "Saint Bonaventure", texte: ["Bonaventure naquit en 1221 à Bagnoregio, en Toscane, dans une famille pieuse.", "Guéri miraculeusement dans son enfance par saint François d'Assise, il lui voua une dévotion particulière.", "Il entra dans l'ordre franciscain et étudia à Paris sous Alexandre de Halès.", "Il devint le plus grand théologien franciscain et enseigna à Paris en même temps que Thomas d'Aquin.", "Élu ministre général des Franciscains en 1257, il réforma et unifia l'ordre divisé.", "Il écrivit la Légende de saint François, biographie officielle du fondateur.", "Son Itinéraire de l'esprit vers Dieu est un chef-d'œuvre de la mystique médiévale.", "Nommé cardinal-évêque d'Albano en 1273 par Grégoire X, il mourut au Concile de Lyon en 1274.", "Déclaré Docteur de l'Église en 1588, il est le Docteur Séraphique.", "Il est le patron des théologiens franciscains et de la ville de Bagnoregio."] },
      "7-16": { nom: "Notre-Dame du Carmel", texte: ["La fête de Notre-Dame du Mont Carmel est célébrée le 16 juillet depuis le Moyen Âge.", "Le mont Carmel, en Palestine, était un lieu de prière dédié à Dieu depuis l'Antiquité.", "Élie le prophète y vécut et y opéra de grands prodiges au IXe siècle avant J.-C.", "Des moines y vécurent à partir du XIIe siècle, formant la communauté des Carmes.", "La Vierge Marie apparut au général de l'ordre Simon Stock le 16 juillet 1251.", "Elle lui remit le scapulaire, deux morceaux d'étoffe brun foncé unis par deux cordons.", "Elle promit son assistance spéciale à ceux qui le porteraient avec dévotion.", "Le scapulaire du Carmel est encore très répandu comme signe de dévotion mariale.", "Sainte Thérèse d'Avila et saint Jean de la Croix réformèrent l'ordre carmélitain au XVIe siècle.", "Notre-Dame du Carmel est la patronne de l'ordre du Carmel et de nombreuses nations."] },
      "7-17": { nom: "Bienheureuse Marie-Clémentine Anuarite Nengapeta", texte: ["Marie-Clémentine Anuarite naquit en 1939 à Wamba, au Congo belge, dans une famille chrétienne.", "Elle entra chez les Sœurs de la Sainte Famille et fit ses vœux religieux en 1959.", "Elle enseigna comme institutrice dans les écoles de sa congrégation.", "En novembre 1964, des rebelles Simbas envahirent la région et arrêtèrent les sœurs.", "Un colonel rebel tenta de la forcer à devenir sa compagne.", "Elle refusa catégoriquement, disant qu'elle avait voué sa virginité à Dieu.", "Après avoir subi des violences, elle fut poignardée et achevée d'une balle le 1er décembre 1964.", "Ses dernières paroles furent un pardon accordé à ses bourreaux.", "Béatifiée par Jean-Paul II en 1985 lors de son premier voyage en Afrique, elle est la première bienheureuse d'Afrique centrale.", "Elle est le symbole du martyre de la pureté et de la fidélité à la vie consacrée."] },
      "7-18": { nom: "Saint Frédéric d'Utrecht", texte: ["Frédéric naquit vers 780 aux Pays-Bas, dans une famille noble de la région d'Utrecht.", "Il fut ordonné prêtre et se distingua par son zèle apostolique et sa charité.", "Il fut nommé archidiacre de la cathédrale d'Utrecht, puis élu évêque vers 820.", "Son épiscopat fut marqué par une activité missionnaire intense auprès des populations frisones.", "Il osa reprendre l'empereur Louis le Pieux pour ses mariages illégaux, ce qui lui valut de l'hostilité.", "Il fut assassiné à Walcheren, en Zélande, en 838, probablement en raison de ses reproches à la cour.", "Ses meurtriers lui enfoncèrent des stylets dans le corps pendant qu'il célébrait la messe.", "Il est vénéré comme martyr par l'Église catholique.", "Ses reliques sont conservées dans la cathédrale d'Utrecht.", "Il est le patron du diocèse d'Utrecht et des missionnaires des Pays-Bas."] },
      "7-19": { nom: "Saint Arsène le Grand", texte: ["Arsène naquit vers 354 à Rome, dans une famille noble et cultivée.", "Précepteur des fils de l'empereur Théodose, il vécut à la cour de Constantinople dans le luxe.", "Une voix intérieure lui dit un jour : Fuis les hommes et tu seras sauvé.", "Il abandonna la cour en 394 et se retira dans le désert d'Égypte, à Scété.", "Il devint moine sous la direction de Jean le Nain et vécut dans une solitude absolue.", "Sa pénitence était si rigoureuse qu'il passait les nuits à veiller, les bras en croix.", "Les pères du désert admiraient sa combativité spirituelle malgré son origine aristocratique.", "Ses larmes perpétuelles de componction lui avaient creusé deux sillons sur les joues.", "Il mourut vers 450, après cinquante-cinq ans de vie érémitique dans le désert.", "Il est le modèle de la conversion radicale des grands du monde à la vie contemplative."] },
      "7-20": { nom: "Sainte Marguerite d'Antioche", texte: ["Marguerite est une martyre dont le culte est très ancien, bien que sa vie soit entourée de légendes.", "Selon la tradition, elle était fille d'un prêtre païen d'Antioche de Pisidie.", "Convertie au christianisme par sa nourrice, elle fut chassée par son père.", "Le préfet Olybrius, séduit par sa beauté, voulut l'épouser ou en faire sa concubine.", "Elle refusa et fut dénoncée comme chrétienne et soumise à de nombreux supplices.", "La légende dit qu'elle fut avalée par un dragon, dont elle sortit indemne grâce à la croix.", "Elle fut finalement décapitée vers 304, lors de la persécution de Dioclétien.", "Elle est l'une des Quatorze Saints Auxiliateurs et patronne des femmes en couches.", "La chevalier Jeanne d'Arc entendait sa voix parmi ses saintes messagères.", "Elle est la patronne des femmes enceintes, des accouchées et des sages-femmes."] },
      "7-21": { nom: "Saint Laurent de Brindisi", texte: ["Laurent de Brindisi naquit en 1559 à Brindisi, dans le royaume de Naples.", "Il entra dans l'ordre des Capucins à seize ans et fut ordonné prêtre en 1582.", "Sa connaissance extraordinaire des langues, dont l'hébreu, en faisait un prédicateur exceptionnel.", "Il fut envoyé en mission en Allemagne pour combattre le protestantisme.", "Il fonda de nombreux couvents capucins en Allemagne, en Bohême et en Autriche.", "Lors de la bataille de Albareale en 1601, il conduisit l'armée chrétienne à cheval, crucifix en main.", "Sa prédication en hébreu aux Juifs lui valut d'importantes conversions.", "Il mourut en 1619 à Lisbonne, épuisé par ses incessants voyages apostoliques.", "Canonisé en 1881 par Léon XIII, il fut déclaré Docteur de l'Église par Jean XXIII en 1959.", "Il est le patron des États-majors et des chefs militaires."] },
      "7-22": { nom: "Sainte Marie-Madeleine", texte: ["Marie-Madeleine est l'une des figures féminines les plus importantes des Évangiles.", "Jésus la délivra de sept démons et elle devint l'une de ses disciples les plus fidèles.", "Elle suivit Jésus depuis la Galilée jusqu'à Jérusalem, pourvoyant à ses besoins.", "Elle était présente au pied de la Croix quand les apôtres s'étaient enfuis.", "Elle fut la première à découvrir le tombeau vide au matin de Pâques.", "Jésus ressuscité lui apparut le premier, la prenant d'abord pour le jardinier.", "Il lui dit Rabboni, maître, et lui confia la mission d'annoncer la résurrection aux apôtres.", "Saint Jean-Paul II lui donna le titre d'Apôtre des Apôtres.", "La tradition provençale dit qu'elle finit sa vie en ermite dans la grotte de la Sainte-Baume.", "Élevée au rang de fête par le pape François en 2016, elle est patronne des contemplatives."] },
      "7-23": { nom: "Sainte Brigitte de Suède", texte: ["Brigitte naquit en 1303 en Suède, dans une famille royale très chrétienne.", "Mariée à dix-huit ans au noble Ulf Gudmarsson, elle eut huit enfants dont sainte Catherine de Suède.", "Elle vécut un mariage chrétien exemplaire, consacrant une partie de son temps à la prière et à la pénitence.", "Veuve en 1344, elle se consacra entièrement à Dieu et aux révélations mystiques qu'elle recevait.", "Elle fonda l'ordre du Très-Saint-Sauveur, les Brigittines, à Vadstena en Suède.", "Ses révélations, dictées à ses confesseurs, sont célèbres sous le nom de Révélations célestes.", "Elle se rendit à Rome en 1349 et y demeura jusqu'à sa mort, vivant dans la plus grande pauvreté.", "Elle interpella papes et rois pour les exhorter à la réforme et au retour du pape à Rome.", "Elle mourut à Rome en 1373, au retour d'un pèlerinage en Terre Sainte.", "Canonisée en 1391, elle est co-patronne de l'Europe avec Catherine de Sienne et Thérèse Bénédicte de la Croix."] },
      "7-24": { nom: "Saint Charbel Makhlouf", texte: ["Charbel Makhlouf naquit en 1828 à Beqa-Kafra, au Liban, dans une famille paysanne maronite.", "À vingt-trois ans, il quitta secrètement sa famille pour entrer dans la vie monastique.", "Il entra dans l'ordre libanais maronite et fut ordonné prêtre en 1859.", "Il vécut d'abord dans son monastère, puis demanda et obtint de vivre en ermite.", "Il passa les vingt-trois dernières années de sa vie dans l'ermitage de Saint-Pierre-et-Saint-Paul.", "Sa vie était d'une austérité extraordinaire : jeûnes, privations, longues nuits en prière.", "Il mourut en 1898, terrassé par une attaque pendant la célébration de la messe.", "Après sa mort, son corps se mit à transpirer et exsuder du sang, phénomène observé pendant des mois.", "Béatifié en 1965, il fut canonisé par Paul VI en 1977 lors du Concile Vatican II.", "Il est le saint le plus populaire du Liban et de tout le Moyen-Orient chrétien."] },
      "7-25": { nom: "Saint Jacques, apôtre", texte: ["Jacques le Majeur était le fils de Zébédée et de Salomé, frère de l'évangéliste Jean.", "Avec son frère, il quitta ses filets sur la mer de Galilée pour suivre Jésus.", "Jésus les surnomma Boanerges, fils du tonnerre, pour leur caractère fougueux.", "Il fut l'un des trois apôtres privilégiés, témoins de la Transfiguration et de l'Agonie.", "Il fut le premier des Douze à subir le martyre, décapité par Hérode Agrippa vers 44.", "La tradition hispanique dit que ses reliques furent transportées en Galice, en Espagne.", "Le sanctuaire de Saint-Jacques-de-Compostelle devint l'un des grands lieux de pèlerinage médiévaux.", "Le chemin de Saint-Jacques traverse toute l'Europe et reste très fréquenté de nos jours.", "Sa fête, le 25 juillet, est solennellement célébrée à Compostelle avec de grandes réjouissances.", "Il est le patron de l'Espagne et des pèlerins."] },
      "7-26": { nom: "Saints Joachim et Anne", texte: ["Joachim et Anne sont les parents de la Vierge Marie et grands-parents de Jésus.", "Leurs noms ne figurent pas dans les Évangiles canoniques mais dans les évangiles apocryphes.", "Ils étaient, selon la tradition, de la tribu de Juda et de la maison de David.", "Mariés depuis longtemps sans enfant, ils souffrirent de cette épreuve avec foi.", "Un ange apparut à Anne pour lui annoncer qu'elle concevrait une fille bénie.", "De leur union naquit Marie, la Mère de Dieu, fruit de leur prière et de leur patience.", "Anne est invoquée depuis le Moyen Âge pour les femmes désirant avoir des enfants.", "Joachim représente le juste de l'Ancien Testament attendant patiemment le Salut.", "La dévotion à sainte Anne est particulièrement forte en Bretagne, au Québec et en Alsace.", "Ils sont les patrons des grands-parents et des familles chrétiennes."] },
      "7-27": { nom: "Saint Pantaléon", texte: ["Pantaléon naquit vers 275 à Nicomédie, en Bithynie, fils d'un père riche et d'une mère chrétienne.", "Sa mère lui transmit la foi chrétienne avant de mourir alors qu'il était encore enfant.", "Il étudia la médecine et devint l'un des médecins les plus réputés de la région.", "La fréquentation d'un prêtre chrétien le ramena à sa foi initiale après quelques années d'éloignement.", "Il soignait les malades gratuitement, sans distinction de religion ou de condition.", "Arrêté lors de la persécution de Dioclétien, il subit de nombreux supplices.", "Il fut attaché à un olivier, percé de clous et décapité vers 305.", "Il est l'un des Quatorze Saints Auxiliateurs, patron des médecins.", "Sa fête est très populaire dans le sud de l'Italie, notamment à Naples.", "Il est le saint patron des médecins dans les Églises d'Orient."] },
      "7-28": { nom: "Saints Nazaire et Celse", texte: ["Nazaire et Celse furent des martyrs des premiers siècles, vénérés à Milan depuis l'Antiquité.", "Nazaire était romain, fils d'un officier de l'armée de César, converti au christianisme.", "Il évangélisa le Milanais et plusieurs régions de la Gaule avec un grand zèle apostolique.", "Celse était un jeune garçon milanais qui demanda le baptême à Nazaire lors d'un voyage.", "Ils furent arrêtés ensemble à Gênes, puis conduits à Milan pour y être exécutés.", "Ils furent décapités vers 68, sous le règne de Néron.", "Saint Ambroise découvrit leurs corps dans un jardin hors de Milan en 395.", "Il les fit transférer avec solennité dans la basilique des Apôtres à Milan.", "Cette basilique prit alors le nom de basilique des Saints-Nazaire-et-Celse.", "Ils sont des patrons de la ville de Milan et de l'Église ambrosienne."] },
      "7-29": { nom: "Sainte Marthe", texte: ["Marthe était la sœur de Marie et de Lazare, amis intimes de Jésus à Béthanie.", "C'est dans sa maison que Jésus aimait se reposer lors de ses passages à Jérusalem.", "L'Évangile de Luc rapporte qu'elle s'affairait aux préparatifs pendant que sa sœur écoutait Jésus.", "Jésus lui dit doucement que Marie avait choisi la meilleure part, qui ne lui serait pas enlevée.", "Lors de la mort de Lazare, elle alla à la rencontre de Jésus avec une foi admirable.", "Elle proclama : Je crois que tu es le Christ, le Fils de Dieu, qui vient dans le monde.", "Elle fut ainsi la première à confesser la messianité de Jésus avec ces mots solennels.", "La tradition provençale dit qu'elle aborda en Provence et évangélisa la région de Tarascon.", "Elle aurait terrassé la Tarasque, monstre légendaire qui terrorisait la région.", "Elle est la patronne des cuisinières, des hôtelières et de la ville de Tarascon."] },
      "7-30": { nom: "Sainte Juliette de Césarée", texte: ["Juliette fut une martyre des premiers siècles, probablement au IVe siècle.", "Selon la tradition, elle était une femme noble de Césarée de Cappadoce.", "Accusée par un adversaire dans un litige judiciaire d'être chrétienne, elle fut traînée devant le juge.", "Loin de chercher à dissimuler sa foi, elle la confessa ouvertement au tribunal.", "Elle endura de nombreux supplices avec une constance et une sérénité admirables.", "Elle fut finalement mise à mort, probablement par décapitation.", "Son culte fut associé très tôt à celui de saint Quirice, enfant martyr.", "La légende dit que Quirice était un tout jeune enfant qui confessa sa foi en voyant sa mère souffrir.", "Cette paire mère-fils devint très populaire au Moyen Âge dans toute l'Europe.", "De nombreuses églises leur sont dédiées en France, notamment l'église Saint-Cyr-et-Sainte-Julitte à Paris."] },
      "7-31": { nom: "Saint Ignace de Loyola", texte: ["Ignace de Loyola naquit en 1491 au château de Loyola, dans le Pays basque espagnol.", "Officier ambitieux et mondain, il fut grièvement blessé à la jambe lors du siège de Pampelune en 1521.", "Pendant sa longue convalescence, la lecture de vies de saints le transforma profondément.", "Il se rendit en pèlerinage à Montserrat, déposa ses armes et devint un nouveau chevalier du Christ.", "Il vécut une expérience mystique intense à Manrèse, où il rédigea les Exercices Spirituels.", "Ces exercices, méthode de discernement et de prière, sont un chef-d'œuvre de la pédagogie spirituelle.", "Il fonda en 1540 la Compagnie de Jésus, les Jésuites, avec six compagnons dont François Xavier.", "L'ordre se consacra à l'éducation, aux missions et à la défense du catholicisme contre la Réforme.", "Il mourut à Rome en 1556, laissant une congrégation déjà présente sur cinq continents.", "Canonisé en 1622 avec François Xavier, il est le patron des retraites spirituelles et des jésuites."] },
      "8-1": { nom: "Saint Alphonse de Liguori", texte: ["Alphonse de Liguori naquit en 1696 à Marianella, près de Naples, dans une famille noble.", "Brillant avocat, il abandonna le barreau à vingt-six ans après avoir perdu un procès important.", "Ordonné prêtre en 1726, il se consacra à l'évangélisation des paysans pauvres du royaume de Naples.", "Il fonda en 1732 la Congrégation du Très Saint Rédempteur, les Rédemptoristes.", "Cette congrégation se spécialisa dans les missions populaires auprès des plus démunis.", "Sa Théologie morale, œuvre immense, révolutionna la pratique du sacrement de pénitence.", "Il fut nommé évêque de Sant'Agata dei Goti en 1762, charge qu'il assuma malgré sa santé fragile.", "Il mourut en 1787 à Nocera, après des années de maladies et d'épreuves intérieures.", "Canonisé en 1839 et déclaré Docteur de l'Église en 1871, il est le patron des moralistes.", "Il est aussi le compositeur du célèbre cantique de Noël Tu scendi dalle stelle."] },
      "8-2": { nom: "Saint Éusèbe de Verceil", texte: ["Éusèbe naquit en Sardaigne vers 283, dans une famille chrétienne.", "Il fut éduqué à Rome et devint lecteur de l'Église romaine.", "Élu évêque de Verceil en Piémont vers 340, il fut le premier évêque occidental à imposer la vie commune au clergé.", "Il défendit avec énergie l'orthodoxie nicéenne contre l'arianisme.", "L'empereur Constance II, favorable aux ariens, le contraignit à signer une formule hérétique.", "Refusant de la signer, il fut exilé en Orient, à Scythopolis, puis en Cappadoce.", "Il vécut son exil dans des conditions très dures, maltraité par ses geôliers ariens.", "L'avènement de Julien l'Apostat lui permit de rentrer en Occident en 361.", "Il consacra ses dernières années à combattre l'arianisme résiduel dans son diocèse.", "Il mourut en 371, vénéré comme confesseur de la foi orthodoxe."] },
      "8-3": { nom: "Saint Lydie de Thyatire", texte: ["Lydie est une figure du Nouveau Testament, mentionnée dans les Actes des Apôtres.", "Elle était marchande de pourpre originaire de Thyatire, en Lydie, établie à Philippes en Macédoine.", "C'était une femme pieuse, adoratrice du Dieu d'Israël, sans être juive de naissance.", "Elle rencontra saint Paul lors de sa prédication au bord d'une rivière près de Philippes.", "Paul lui annonça l'Évangile et le Seigneur ouvrit son cœur pour qu'elle accueille la Parole.", "Elle fut baptisée avec toute sa maison, première convertie d'Europe par Paul.", "Elle offrit généreusement son hospitalité à Paul et à ses compagnons.", "Sa maison devint ainsi le premier foyer chrétien sur le sol européen.", "Elle est vénérée comme la première chrétienne d'Europe et figure dans le martyrologe romain.", "Elle est la patronne des teinturiers et des marchands de tissus."] },
      "8-4": { nom: "Saint Jean-Marie Vianney", texte: ["Jean-Marie Vianney naquit en 1786 à Dardilly, près de Lyon, dans une famille paysanne.", "Sa formation sacerdotale fut longue et difficile en raison de ses faibles capacités scolaires.", "Ordonné prêtre en 1815, il fut nommé curé d'Ars, minuscule village de l'Ain.", "Sa sainteté et ses prédications transformèrent ce village en lieu de pèlerinage international.", "Il passait jusqu'à seize heures par jour au confessionnal, guidant des milliers d'âmes.", "Sa lucidité sur les péchés de ses pénitents, qu'il connaissait sans qu'ils les aient dits, le rendit célèbre.", "Il fut harcelé pendant des années par le diable qui lui faisait des visites nocturnes terrifiantes.", "Il dormait moins de deux heures par nuit et vivait de quelques pommes de terre.", "Il mourut en 1859 à Ars, épuisé, après quarante ans de ministère héroïque.", "Canonisé en 1925, il est le patron de tous les curés du monde."] },
      "8-5": { nom: "Notre-Dame des Neiges", texte: ["La fête de Notre-Dame des Neiges commémore la dédicace de la basilique Sainte-Marie-Majeure à Rome.", "Selon une tradition du VIIe siècle, la Vierge apparut en 352 à un riche patricien romain et au pape Libère.", "Elle leur demanda de construire une église à l'endroit où de la neige tomberait le lendemain matin.", "Miraculeusement, de la neige tomba sur l'Esquilin en plein mois d'août.", "Le pape traça lui-même le plan de la basilique dans la neige fraîche.", "La basilique Sainte-Marie-Majeure, construite sur ce site, est l'une des quatre basiliques majeures de Rome.", "Elle est la plus grande église mariale de Rome et conserve des reliques de la crèche de Bethléem.", "Chaque année, lors de la messe solennelle du 5 août, des pétales de rose blanche tombent du plafond.", "Cette pluie de roses blanches symbolise la chute miraculeuse de neige estivale.", "La basilique est l'une des plus belles et des plus riches d'art chrétien dans le monde entier."] },
      "8-6": { nom: "Transfiguration du Seigneur", texte: ["La Transfiguration du Seigneur est fêtée le 6 août depuis le IXe siècle.", "Jésus monta sur le mont Thabor avec Pierre, Jacques et Jean.", "Sa face devint brillante comme le soleil et ses vêtements blancs comme la lumière.", "Moïse et Élie apparurent et conversèrent avec lui de son départ à accomplir à Jérusalem.", "Une nuée lumineuse les couvrit et une voix dit : Celui-ci est mon Fils bien-aimé.", "Les apôtres tombèrent face contre terre, saisis de crainte, puis Jésus les toucha.", "Cette vision les fortifiait en vue des épreuves à venir, notamment la Passion.", "La Transfiguration anticipe la gloire de la Résurrection et révèle la divinité du Christ.", "Elle est l'une des douze grandes fêtes de l'Église orthodoxe et une fête importante en Occident.", "Elle invite les chrétiens à contempler la gloire cachée qui transfigure le monde."] },
      "8-7": { nom: "Saint Sixte II et compagnons", texte: ["Sixte II fut pape de 257 à 258, pendant la persécution de l'empereur Valérien.", "L'édit de Valérien interdisait aux chrétiens toute assemblée et condamnait à mort les évêques.", "Sixte II fut arrêté le 6 août 258 alors qu'il présidait une assemblée liturgique au cimetière de Prétextat.", "Il fut décapité sur-le-champ avec quatre de ses diacres, sans même avoir le temps d'être jugé.", "Son diacre Laurent, qui l'accompagnait, lui demanda pourquoi il partait sans lui.", "Sixte lui répondit qu'il le suivrait dans trois jours, prophétie qui s'accomplit.", "Son nom figure dans le Canon romain de la messe depuis les origines.", "Il est l'un des papes martyrs les plus vénérés de l'Église primitive.", "Ses compagnons martyrs, dont les diacres Félicissime et Agapit, partagèrent son sort.", "Leur martyre collectif est un témoignage éloquent de la solidarité fraternelle dans l'Église."] },
      "8-8": { nom: "Saint Dominique", texte: ["Dominique naquit en 1170 à Caleruega, en Castille, dans une famille noble espagnole.", "Prêtre et chanoine à Osma, il accompagna son évêque en mission diplomatique en Europe du Nord.", "La rencontre avec les hérétiques cathares en Languedoc lui révéla sa vocation.", "Il comprit que la prédication itinérante, dans la pauvreté, était le seul moyen efficace.", "Il fonda en 1215 l'Ordre des Frères Prêcheurs, les Dominicains, pour prêcher et enseigner.", "Sa règle combinait la rigueur de la vie monastique et l'apostolat actif de la prédication.", "Il envoya ses frères dans toutes les universités d'Europe pour y enseigner et étudier.", "Sa devise Laudare, Benedicere, Praedicare résume l'idéal dominicain : louer, bénir, prêcher.", "Il mourut à Bologne en 1221, épuisé par ses incessants voyages apostoliques.", "Canonisé en 1234, il est le fondateur de l'ordre dominicain et le patron des astronomes."] },
      "8-9": { nom: "Sainte Thérèse Bénédicte de la Croix", texte: ["Edith Stein naquit en 1891 à Breslau, en Silésie, dans une famille juive pratiquante.", "Brillante philosophe, elle fut l'assistante du philosophe Edmund Husserl à Fribourg.", "La lecture de la Vie de sainte Thérèse d'Avila la convertit au catholicisme en 1921.", "Elle fut baptisée en 1922 et entra au Carmel de Cologne en 1933 sous le nom de Thérèse Bénédicte.", "La montée du nazisme et les persécutions contre les juifs la plongèrent dans l'angoisse.", "Transférée au Carmel d'Echt aux Pays-Bas pour sa sécurité, elle fut arrêtée en 1942.", "Les évêques néerlandais avaient protesté contre les déportations, provoquant des représailles.", "Elle fut déportée à Auschwitz et gazée le 9 août 1942, avec sa sœur Rosa.", "Canonisée par Jean-Paul II en 1998, elle est co-patronne de l'Europe.", "Elle est le symbole de la rencontre entre le judaïsme, la philosophie et le mysticisme chrétien."] },
      "8-10": { nom: "Saint Laurent", texte: ["Laurent fut archidiacre de l'Église de Rome sous le pape Sixte II.", "En 258, lors de la persécution de l'empereur Valérien, le pape fut arrêté.", "Laurent l'accompagna jusqu'au lieu de son exécution, pleurant de ne pouvoir partager son martyre.", "Sixte lui dit : Ne pleure pas, tu me suivras dans trois jours.", "Il lui confia les trésors de l'Église à distribuer aux pauvres avant son arrestation.", "Arrêté trois jours plus tard, il fut sommé de remettre les trésors de l'Église.", "Il se présenta devant le préfet avec un groupe de pauvres, d'infirmes et de miséreux.", "Condamné à être grillé sur un gril ardent, il aurait dit : Retourne-moi, je suis assez cuit d'un côté.", "Ce mot célèbre a fait de lui le patron des rôtisseurs et cuisiniers.", "Il est le patron des pauvres, des bibliothécaires et de la ville de Rotterdam."] },
      "8-11": { nom: "Sainte Claire d'Assise", texte: ["Claire naquit en 1193 à Assise, dans une riche famille noble de la ville.", "À dix-huit ans, touchée par la prédication de François d'Assise, elle s'enfuit de chez elle.", "Elle reçut l'habit franciscain des mains de François et fonda l'ordre des Dames Pauvres.", "Son monastère de San Damiano à Assise devint le modèle de toutes les maisons de Clarisses.", "Elle combattit toute sa vie pour obtenir le privilège de la pauvreté absolue, sans revenus.", "Ce privilège lui fut accordé peu avant sa mort par le pape Innocent IV.", "Elle gouverna sa communauté quarante ans depuis son lit de douleur, malade depuis l'âge de vingt-huit ans.", "Selon la tradition, elle repoussa les soldats sarrasins qui attaquaient Assise en portant le Saint-Sacrement.", "Elle mourut en 1253, entendant une voix céleste lui parler doucement.", "Canonisée deux ans après sa mort, elle est la fondatrice de la branche féminine de l'ordre franciscain."] },
      "8-12": { nom: "Sainte Jeanne de Chantal", texte: ["Jeanne de Chantal naquit en 1572 à Dijon, dans une famille noble bourguignonne.", "Mariée heureusement au baron de Chantal, elle eut six enfants et forma un foyer chrétien exemplaire.", "Veuve à vingt-huit ans, elle consacra sa vie à Dieu tout en élevant ses enfants.", "Elle rencontra saint François de Sales en 1604, qui devint son directeur spirituel pour la vie.", "Ensemble, ils fondèrent en 1610 la Congrégation de la Visitation de Sainte-Marie à Annecy.", "Cet ordre accueillait des femmes de santé fragile, exclues des ordres plus austères.", "Elle fonda quatre-vingt-six monastères de la Visitation à travers toute la France.", "Elle traversa de nombreuses épreuves : mort de son fils, de ses proches, nuit spirituelle.", "Elle mourut en 1641 à Moulins, après une vie entière au service de Dieu et des âmes.", "Canonisée en 1767 par Clément XIII, elle est la co-fondatrice de l'ordre de la Visitation."] },
      "8-13": { nom: "Saints Pontien et Hippolyte", texte: ["Pontien fut pape de 230 à 235, dans une période de relative tranquillité pour l'Église.", "L'avènement de l'empereur Maximin le Thrace en 235 provoqua une persécution contre les chefs chrétiens.", "Pontien et l'antipape Hippolyte furent tous deux déportés dans les mines de Sardaigne.", "Conscient de son état précaire, Pontien abdiqua pour qu'un successeur puisse être élu.", "Ce geste fut le premier exemple d'abdication pontificale dans l'histoire de l'Église.", "Hippolyte, réconcilié avec l'Église légitime avant sa mort, mourut en martyr lui aussi.", "Leurs corps furent rapatriés à Rome par le pape Fabien et inhumés avec honneur.", "Pontien fut déposé dans la crypte des papes au cimetière de Calliste.", "Hippolyte, théologien brillant malgré son schisme, est le premier auteur ecclésiastique latin.", "Leur réconciliation dans le martyre est un exemple de la grâce qui surmonte les divisions."] },
      "8-14": { nom: "Saint Maximilien Kolbe", texte: ["Maximilien Kolbe naquit en 1894 à Zdunska-Wola, en Pologne.", "Frère franciscain, il fonda la Milice de l'Immaculée et un immense centre éditorial catholique.", "Son œuvre apostolique par la presse atteignit des millions de lecteurs en Pologne et au Japon.", "Arrêté par la Gestapo en 1941, il fut déporté à Auschwitz.", "Quand un prisonnier fut condamné à mourir de faim, Maximilien se proposa à sa place.", "François Gajowniczek, père de famille, fut ainsi sauvé par le sacrifice du Père Kolbe.", "Maximilien encouragea ses compagnons de cellule par des prières et des chants pendant leur agonie.", "Survivant après quinze jours de jeûne, il fut achevé par une injection d'acide phénique.", "Il fut canonisé par Jean-Paul II en 1982 qui le proclama martyr de la charité.", "Il est le symbole de l'amour héroïque qui se donne jusqu'au bout."] },
      "8-15": { nom: "Assomption de la Vierge Marie", texte: ["L'Assomption de la Vierge Marie est la plus grande fête mariale de l'année chrétienne.", "Elle célèbre la prise au ciel, corps et âme, de la Vierge Marie à la fin de sa vie terrestre.", "Ce dogme fut défini solennellement par le pape Pie XII le 1er novembre 1950.", "Marie est ainsi la première créature humaine à partager pleinement la résurrection du Christ.", "La tradition situe la dormition de Marie à Jérusalem ou à Éphèse.", "La fête de l'Assomption est attestée en Orient dès le VIe siècle, en Occident dès le VIIe.", "Elle est jour de fête légale en France, pays de tradition catholique.", "Elle marque aussi la bénédiction des herbes dans de nombreuses traditions populaires.", "En ce jour, de nombreux pèlerinages marials rassemblent des foules dans toute l'Europe.", "L'Assomption exprime la vocation ultime de tout être humain à la résurrection glorieuse."] },
      "8-16": { nom: "Saint Étienne de Hongrie", texte: ["Étienne naquit vers 975, fils de Géza, chef magyar, et d'une princesse de Bavière.", "Baptisé à l'âge adulte, il se convertit sincèrement et voulut christianiser toute la Hongrie.", "Il épousa Gisèle de Bavière, sœur du futur saint Henri II, renforçant son ancrage chrétien.", "Couronné roi de Hongrie le jour de Noël de l'an 1000 par le pape Sylvestre II.", "Il fit de la Hongrie un royaume chrétien, fondant évêchés, monastères et écoles.", "Il lutta sans merci contre les résistances païennes de certains chefs magyars.", "Son fils Émeric mourut avant lui dans un accident de chasse, brisant son cœur.", "Il mourut en 1038, laissant un royaume chrétien organisé et prospère.", "Canonisé en 1083 avec son fils Émeric, il est le saint patron de la Hongrie.", "La Sainte Couronne de Hongrie, liée à son couronnement, est le symbole de la nation hongroise."] },
      "8-17": { nom: "Saint Hyacinthe", texte: ["Hyacinthe naquit vers 1185 en Silésie, dans une famille noble polonaise.", "Il étudia à Cracovie, à Prague et à Bologne, où il obtint des grades en droit et théologie.", "À Rome, il rencontra saint Dominique et entra dans l'ordre des Frères Prêcheurs.", "Revenu en Pologne en 1221, il fonda le premier couvent dominicain à Cracovie.", "Il évangélisa la Pologne, la Prusse, la Poméranie, la Lithuanie et même la Russie.", "Ses voyages missionnaires lui valurent le surnom d'Apôtre du Nord.", "Lors de l'invasion des Mongols en 1241, il dut fuir Kiev avec ses frères.", "La tradition raconte qu'il emporta avec lui le ciboire et une statue de la Vierge.", "Il mourut à Cracovie en 1257, après trente-six ans d'apostolat inlassable.", "Canonisé en 1594 par Clément VIII, il est le saint patron de la Pologne avec saint Stanislas."] },
      "8-18": { nom: "Sainte Hélène", texte: ["Hélène naquit vers 250, probablement en Bithynie, dans une famille modeste.", "Elle fut l'épouse ou la concubine de l'empereur Constance Chlore, qui la répudia pour une alliance politique.", "Elle était la mère de l'empereur Constantin, qui lui rendit honneur après sa victoire.", "Convertie au christianisme vers 312, elle utilisa sa position pour servir l'Église.", "Elle entreprit vers 326, à plus de soixante-dix ans, un pèlerinage en Terre Sainte.", "Elle fit construire la basilique de la Nativité à Bethléem et celle de l'Ascension à Jérusalem.", "Selon la tradition, elle découvrit la Vraie Croix du Christ lors de fouilles à Jérusalem.", "Elle mourut vers 330, entourée de son fils Constantin qui lui tenait la main.", "Ses reliques sont vénérées à Rome dans la basilique Sainte-Croix-en-Jérusalem.", "Elle est la patronne des archéologues, des convertis et des femmes divorcées."] },
      "8-19": { nom: "Saint Jean Eudes", texte: ["Jean Eudes naquit en 1601 à Ri, en Normandie, dans une famille paysanne chrétienne.", "Il entra dans la Congrégation de l'Oratoire fondée par le cardinal de Bérulle.", "Il se consacra aux missions populaires en Normandie pendant vingt ans avec un grand zèle.", "Lors de plusieurs épidémies de peste, il resta auprès des malades au péril de sa vie.", "Il fonda en 1643 la Congrégation de Jésus et Marie, les Eudistes, pour former le clergé.", "Il fonda également les Sœurs de Notre-Dame de Charité pour accueillir les femmes en difficulté.", "Il est à l'origine de la dévotion liturgique aux Cœurs de Jésus et de Marie.", "Ses écrits sur les Cœurs de Jésus et Marie préfigurent les révélations de sainte Marguerite-Marie.", "Il mourut à Caen en 1680, après une vie entière au service des âmes.", "Canonisé par Pie XI en 1925, il est le père de la dévotion aux Sacrés-Cœurs."] },
      "8-20": { nom: "Saint Bernard de Clairvaux", texte: ["Bernard naquit en 1090 à Fontaine-lès-Dijon, dans une famille noble bourguignonne.", "À vingt-deux ans, il entra à Cîteaux avec trente compagnons qu'il avait lui-même recrutés.", "En 1115, il fonda l'abbaye de Clairvaux dont il fut abbé pendant trente-huit ans.", "Son éloquence et son rayonnement personnel en firent l'homme le plus influent de son siècle.", "Il recruta personnellement des milliers de moines pour les monastères cisterciens.", "Il combattit les hérésies et prêcha la deuxième Croisade, avec des résultats décevants.", "Ses écrits, notamment les Sermons sur le Cantique, sont des chefs-d'œuvre de la mystique médiévale.", "Sa dévotion ardente à la Vierge Marie lui valut le titre de chantre de Marie.", "Il mourut en 1153 à Clairvaux, après avoir fondé soixante-huit monastères cisterciens.", "Docteur de l'Église, il est le Docteur Melliflue, dont la parole coule comme le miel."] },
      "8-21": { nom: "Saint Pie X, pape", texte: ["Giuseppe Sarto naquit en 1835 à Riese, dans la Vénétie, dans une famille très pauvre.", "Ordonné prêtre en 1858, il gravit tous les échelons de la hiérarchie ecclésiastique.", "Élu pape en 1903, il prit la devise Restaurer toutes choses dans le Christ.", "Il combattit avec énergie le modernisme théologique qui menaçait la foi catholique.", "Il abaissa l'âge de la première communion de douze à sept ans, réforme majeure.", "Il encouragea la communion fréquente pour tous les fidèles, renversant une pratique janséniste.", "Il réforma la liturgie, le bréviaire et le code de droit canonique.", "Sa lutte contre la loi de séparation de l'Église et de l'État en France fut douloureuse mais ferme.", "Il mourut en 1914, au début de la Première Guerre mondiale, brisé par la douleur.", "Canonisé en 1954 par Pie XII, il est le dernier pape canonisé avant Jean-Paul II."] },
      "8-22": { nom: "Marie Reine", texte: ["La fête de Marie Reine fut instituée par Pie XII en 1955, à la fin de l'Année Mariale.", "Elle célèbre la royauté de Marie, Mère du Roi des rois.", "Cette royauté n'est pas de domination mais de service et d'intercession.", "Elle découle de sa divine maternité et de son association à la Rédemption du Christ.", "L'Écriture évoque la Reine assise à la droite du Roi dans le Psaume 44.", "L'Apocalypse décrit la femme couronnée de douze étoiles, image de Marie et de l'Église.", "La tradition de couronner les statues de Marie dans les sanctuaires exprime cette royauté.", "Cette fête couronne le mois d'août, riche en fêtes mariales de l'Assomption et de la Reine.", "Elle invite les chrétiens à confier toute leur vie à celle que Dieu a comblée de grâces.", "Marie Reine est la consolatrice et l'avocate des pécheurs devant son Fils."] },
      "8-23": { nom: "Sainte Rose de Lima", texte: ["Rose naquit en 1586 à Lima, au Pérou, dans une famille d'origine espagnole.", "Sa beauté exceptionnelle lui valut le surnom de Rose, nom qu'elle garda toute sa vie.", "Pour ne pas être un objet de tentation, elle se coupa les cheveux et se frotta le visage avec du poivre.", "Elle entra dans le tiers-ordre dominicain et vécut en recluse dans un ermitage au fond du jardin.", "Ses pénitences corporelles étaient extrêmes, imitant la couronne d'épines du Christ.", "Ses extases et ses visions mystiques lui valurent d'abord la méfiance des autorités ecclésiastiques.", "Elle fut examinée par des théologiens et des médecins qui attestèrent l'authenticité de ses expériences.", "Elle soignait les Indiens, les esclaves et les malades dans un infirmerie aménagée chez elle.", "Elle mourut en 1617 à trente et un ans, pleurée par toute la ville de Lima.", "Canonisée en 1671 par Clément X, elle est la première sainte des Amériques."] },
      "8-24": { nom: "Saint Barthélemy, apôtre", texte: ["Barthélemy est l'un des douze apôtres, identifié généralement à Nathanaël dans l'Évangile de Jean.", "C'est Philippe qui l'amena à Jésus, lui disant qu'il avait trouvé celui de qui parlaient les Prophètes.", "Jésus, le voyant venir, dit de lui : Voici vraiment un Israélite en qui il n'y a pas de ruse.", "Après la Pentecôte, il aurait évangélisé l'Arabie, l'Inde, la Perse et l'Arménie.", "En Arménie, il convertit le roi Polymius, ce qui irrita le frère du roi.", "Il fut condamné à être écorché vif puis décapité à Albanopolis, en Arménie, vers 70.", "Son supplice particulier fait de lui le patron des tanneurs et des relieurs.", "Ses reliques furent transportées à Rome et vénérées dans la basilique qui lui est dédiée sur l'île Tibérine.", "Cette île avait autrefois accueilli le temple d'Esculape, dieu de la médecine.", "Il est le patron de l'Arménie et de nombreuses confréries artisanales."] },
      "8-25": { nom: "Saint Louis IX, roi de France", texte: ["Louis naquit en 1214 à Poissy, fils du roi Louis VIII et de Blanche de Castille.", "Couronné roi de France à douze ans, il fut formé par sa mère dans la foi et la piété.", "Son règne de quarante-quatre ans fut l'un des plus prospères et des plus justes de l'histoire de France.", "Il rendit la justice sous son chêne à Vincennes, accessible à tous ses sujets.", "Il fonda la Sainte-Chapelle à Paris pour abriter la couronne d'épines du Christ.", "Il participa à deux croisades, la septième en Égypte et la huitième en Tunisie.", "Il mourut de la dysenterie en 1270 devant Tunis, les lèvres sur la poussière.", "Sa charité envers les pauvres, les lépreux et les malades était exemplaire et quotidienne.", "Canonisé en 1297 par Boniface VIII, il est le seul roi de France honoré comme saint.", "Il est le patron de la France, des rois et de la Troisième Ordre franciscain."] },
      "8-26": { nom: "Sainte Élisabeth Bichier des Ages", texte: ["Élisabeth Bichier des Ages naquit en 1773 à Le Blanc, en Berry, dans une famille noble.", "La Révolution française bouleversa sa vie, ruinant sa famille et supprimant les couvents.", "Elle rencontra le curé André Fournet et comprit sa vocation à fonder une œuvre éducative.", "Ensemble, ils fondèrent en 1806 la Congrégation des Filles de la Croix, les Sœurs de Saint-André.", "Cette congrégation se consacra à l'enseignement des enfants pauvres dans les campagnes dévastées.", "Elle parcourut infatigablement le Poitou et les provinces voisines pour fonder des écoles.", "Sa vie fut marquée par de nombreuses épreuves, dont la mort prématurée de son co-fondateur.", "Elle mourut en 1838 à la Puye, dans le Poitou, entourée de ses filles spirituelles.", "Canonisée par Jean-Paul II en 1947, elle est une figure de la renaissance catholique post-révolutionnaire.", "Elle illustre la capacité de l'Église à reconstruire après les catastrophes historiques."] },
      "8-27": { nom: "Sainte Monique", texte: ["Monique naquit vers 333 à Thagaste, en Numidie, dans l'actuelle Algérie.", "Elle épousa un officier romain, Patricius, homme violent et peu vertueux.", "Sa douceur et ses prières constants convertirent finalement son mari, qui mourut chrétien.", "Sa plus grande épreuve fut son fils Augustin, brillant mais menant une vie dissolue.", "Elle pleura et pria pendant dix-sept ans pour sa conversion, sans désespérer jamais.", "Un évêque lui dit pour la consoler : Il est impossible que le fils de tant de larmes périsse.", "Elle suivit Augustin jusqu'à Milan, où saint Ambroise l'instruisit et le baptisa en 387.", "Elle mourut peu après à Ostie, dans une conversation mystique avec Augustin sur les biens éternels.", "Saint Augustin décrit cette ultime conversation dans ses Confessions avec une émotion bouleversante.", "Elle est la patronne des mères chrétiennes et des femmes qui souffrent dans leur mariage."] },
      "8-28": { nom: "Saint Augustin d'Hippone", texte: ["Augustin naquit en 354 à Thagaste, en Numidie, fils de la sainte Monique.", "Brillant rhéteur, il mena une vie dissolue et fut plusieurs années manichéen.", "À Milan, les sermons de saint Ambroise ébranlèrent ses résistances intellectuelles.", "Il entendit dans un jardin une voix enfantine lui dire : Prends et lis, et ouvrit l'Épître aux Romains.", "Il fut baptisé par Ambroise en 387 et retourna en Afrique.", "Contre sa volonté, il fut ordonné prêtre puis élu évêque d'Hippone en 396.", "Son œuvre immense comprend La Cité de Dieu, les Confessions et le traité Sur la Trinité.", "Il combattit les hérésies donatiste et pélagienne qui divisaient l'Église d'Afrique.", "Il mourut en 430 pendant le siège d'Hippone par les Vandales.", "Docteur de l'Église, il est le plus grand théologien de l'Occident chrétien."] },
      "8-29": { nom: "Martyre de saint Jean-Baptiste", texte: ["Le 29 août commémore le martyre de saint Jean-Baptiste, décapité par ordre d'Hérode Antipas.", "Jean avait osé dire publiquement à Hérode qu'il ne lui était pas permis d'avoir la femme de son frère.", "Hérodiade, l'épouse adultère, nourrissait une haine mortelle contre Jean-Baptiste.", "Lors d'un banquet d'anniversaire, la fille d'Hérodiade dansa et plut à Hérode.", "Hérode promit à la jeune fille de lui accorder ce qu'elle demanderait, jusqu'à la moitié de son royaume.", "Conseillée par sa mère, la jeune fille demanda la tête de Jean-Baptiste sur un plateau.", "Hérode, contristé mais lié par son serment public, envoya un garde décapiter Jean en prison.", "La tête fut apportée sur un plateau et remise à la jeune fille, qui la donna à sa mère.", "Ce récit évangélique illustre la puissance de la haine contre la vérité prophétique.", "Jean-Baptiste est le modèle de tous ceux qui souffrent pour avoir dit la vérité aux puissants."] },
      "8-30": { nom: "Sainte Marguerite Ward", texte: ["Marguerite Ward fut une martyre anglaise de la période élisabéthaine, exécutée en 1588.", "Elle était dame de compagnie d'une noble famille catholique anglaise.", "Elle aida le prêtre William Watson à s'évader de la prison de Bridewell à Londres.", "Elle lui apporta des cordes pour descendre de sa fenêtre, mais fut elle-même arrêtée.", "Soumise à la torture, elle refusa de révéler l'endroit où se cachait le prêtre.", "On lui offrit la liberté si elle abjurait sa foi catholique et assistait aux offices anglicans.", "Elle refusa avec fermeté, déclarant qu'elle ne pouvait abandonner sa conscience.", "Elle fut pendue à Tyburn le 30 août 1588, avec d'autres martyrs catholiques anglais.", "Canonisée par Paul VI en 1970 parmi les Quarante Martyrs d'Angleterre et du Pays de Galles.", "Elle est le symbole de la fidélité à la conscience et à la foi sous la persécution."] },
      "8-31": { nom: "Saint Aidan de Lindisfarne", texte: ["Aidan fut un moine irlandais de l'île d'Iona, envoyé évangéliser la Northumbrie en 635.", "Le roi Oswald de Northumbrie avait demandé à Iona des missionnaires pour son royaume.", "Aidan s'établit sur l'île de Lindisfarne, qu'on appela l'île sainte, au large de la côte northumbrienne.", "Il fonda là un monastère qui devint le centre de l'évangélisation du nord de l'Angleterre.", "Il parcourait à pied les campagnes pour rencontrer les populations et les évangéliser.", "Sa charité envers les pauvres était légendaire : il donnait tout ce qu'il recevait.", "Il forma de nombreux disciples anglais qui poursuivirent son œuvre missionnaire.", "Bède le Vénérable lui consacra des pages admiratives dans son Histoire ecclésiastique.", "Il mourut en 651, appuyé contre le mur de son église à Bamburgh.", "Il est le père de l'Église chrétienne dans le nord de l'Angleterre."] },
      "9-1": { nom: "Saint Gilles", texte: ["Gilles fut un ermite du VIIe ou VIIIe siècle, dont la vie est entourée de légendes.", "Selon la tradition, il était un noble grec ou athénien qui quitta sa patrie pour vivre en ermite.", "Il s'établit dans une forêt en Provence, puis en Languedoc, près du Rhône.", "Une biche le nourrissait de son lait dans sa solitude sylvestre.", "Un roi wisigoth, chassant, blessa la biche d'une flèche qui atteignit aussi Gilles.", "Impressionné par la sainteté de l'ermite, le roi lui offrit de fonder un monastère.", "L'abbaye de Saint-Gilles, fondée sur ce site, devint un grand centre de pèlerinage.", "Elle était sur la route de Compostelle et accueillait des milliers de pèlerins chaque année.", "Gilles est l'un des Quatorze Saints Auxiliateurs, invoqués pour des besoins particuliers.", "Il est le patron des forêts, des mendiants, des estropiés et des personnes atteintes du cancer."] },
      "9-2": { nom: "Bienheureuse Ingrid de Suède", texte: ["Ingrid de Suède naquit vers 1220 dans une famille noble suédoise.", "Elle accomplit plusieurs pèlerinages en Terre Sainte, à Rome et à Compostelle.", "Après ces pèlerinages, elle se consacra à la vie religieuse sous la règle dominicaine.", "Elle fonda le premier couvent dominicain de Suède à Skänninge en 1281.", "Ce couvent devint un important centre de vie spirituelle en Scandinavie.", "Elle y vécut dans une grande austérité et une dévotion intense jusqu'à sa mort.", "Ses dons mystiques et ses miracles lui valurent une grande réputation de sainteté.", "Elle mourut vers 1282, entourée de ses religieuses.", "Béatifiée en 1405, son culte est resté vivant en Suède malgré la Réforme.", "Elle est la première bienheureuse de Suède et le modèle de la vie consacrée scandinave."] },
      "9-3": { nom: "Saint Grégoire le Grand", texte: ["Grégoire naquit vers 540 à Rome, dans une famille patricienne très chrétienne.", "Il abandonna une brillante carrière de préfet de Rome pour entrer dans la vie monastique.", "Il fonda sept monastères de ses propres biens et entra lui-même dans l'un d'eux.", "Élu pape en 590 malgré ses réticences, il gouverna l'Église durant quatorze ans.", "Il organisa l'évangélisation de l'Angleterre en envoyant saint Augustin de Cantorbéry.", "Il réforma la liturgie romaine et le chant d'église porte son nom, grégorien.", "Ses œuvres, notamment les Morales sur Job et les Dialogues, furent très lues au Moyen Âge.", "Il négocia avec les Lombards pour protéger Rome et les populations italiennes.", "Docteur de l'Église, il est l'un des quatre grands Pères de l'Église occidentale.", "Il mourut en 604, épuisé par ses travaux et ses pénitences."] },
      "9-4": { nom: "Sainte Rosalie de Palerme", texte: ["Rosalie naquit vers 1130 à Palerme, en Sicile, dans une famille noble normande.", "Elle était la fille du duc Sinibald, cousin du roi Roger II de Sicile.", "Malgré sa naissance illustre, elle ressentit un appel irrésistible à la solitude.", "Elle vécut en ermite, d'abord dans une grotte près de Bivona, puis dans une grotte du mont Pellegrino.", "Elle mourut seule dans sa grotte vers 1166, et fut rapidement oubliée.", "En 1625, lors d'une terrible épidémie de peste à Palerme, elle apparut à une malade.", "Elle lui révéla l'emplacement de ses reliques et promit de délivrer la ville de la peste.", "Les reliques furent retrouvées, portées en procession, et la peste cessa miraculeusement.", "Elle est depuis ce jour la sainte patronne et la protectrice de Palerme.", "Son sanctuaire sur le mont Pellegrino est l'un des lieux de pèlerinage les plus fréquentés de Sicile."] },
      "9-5": { nom: "Sainte Mère Teresa de Calcutta", texte: ["Agnes Gonxha Bojaxhiu naquit en 1910 à Skopje, en Macédoine, dans une famille catholique albanaise.", "À dix-huit ans, elle rejoignit les Sœurs de Lorette à Dublin, puis partit pour l'Inde.", "Elle enseigna dans une école de Calcutta pendant dix-sept ans.", "En 1946, dans le train vers Darjeeling, elle reçut l'appel dans l'appel à servir les plus pauvres des pauvres.", "Elle fonda en 1950 les Missionnaires de la Charité, congrégation dédiée aux mourants et aux démunis.", "Sa maison de Nirmal Hriday à Calcutta accueillit des milliers de mourants abandonnés.", "Sa congrégation se répandit dans cent trente-trois pays à travers le monde.", "Elle reçut le Prix Nobel de la Paix en 1979, qu'elle dédia aux pauvres du monde.", "Elle mourut à Calcutta en 1997, pleurée par des milliards de personnes.", "Canonisée par François en 2016, elle est le symbole de la charité chrétienne au XXe siècle."] },
      "9-6": { nom: "Saint Bé de Cros", texte: ["Bé de Cros est un saint irlandais du VIe siècle, disciple de saint Colomba d'Iona.", "Il accompagna saint Colomba lors de son départ d'Irlande en 563, quittant tout pour Dieu.", "Il partagea la vie monastique austère de la communauté d'Iona sur cette petite île écossaise.", "Sa fidélité et son dévouement à la communauté lui valurent l'estime de tous ses frères.", "Il participa à l'effort d'évangélisation des Pictes en Écosse.", "Sa vie de prière et de travail manuel illustrait l'idéal monastique celtique.", "Il mourut vers 600, entouré de ses frères dans le monastère d'Iona.", "Son souvenir est conservé dans la tradition hagiographique irlandaise et écossaise.", "Les saints moines d'Iona ont transformé l'Écosse et une grande partie de l'Europe du Nord.", "Ils sont les témoins de la vitalité extraordinaire du monachisme celtique irlandais."] },
      "9-7": { nom: "Saint Cloud", texte: ["Cloud, en latin Clodoaldus, naquit vers 522, petit-fils du roi Clovis et de sainte Clotilde.", "Ses oncles Childebert et Clotaire assassinèrent ses frères pour s'emparer du trône.", "Il fut miraculeusement soustrait au massacre et caché par des fidèles.", "Renonçant à ses droits royaux, il distribua ses biens aux pauvres et embrassa la vie monastique.", "Il vécut quelques temps comme ermite, puis fonda un monastère près de Paris.", "Ce monastère donna son nom à la ville de Saint-Cloud, dans les Hauts-de-Seine.", "Sa sainteté rayonnante lui valut d'être ordonné prêtre par saint Médard de Noyon.", "Il vécut dans une grande pauvreté et une prière intense jusqu'à sa mort vers 560.", "Son tombeau attira de nombreux pèlerins et la ville de Saint-Cloud se développa autour.", "Il est le saint patron de la ville de Saint-Cloud et des cloutiers."] },
      "9-8": { nom: "Nativité de la Vierge Marie", texte: ["La Nativité de Marie est célébrée le 8 septembre, neuf mois après la fête de son Immaculée Conception.", "Comme pour Jean-Baptiste, l'Église célèbre la naissance de Marie, et non seulement sa mort.", "Sa naissance est l'aurore du salut, annonçant le lever du Soleil de justice.", "Elle naquit de Joachim et Anne, libérée par la grâce divine du péché originel dès sa conception.", "Sa naissance apporta la joie à ses parents âgés et à tout Israël dans l'attente du Messie.", "Elle fut présentée au Temple de Jérusalem selon la tradition juive.", "Cette fête est l'une des douze grandes fêtes de l'Église orthodoxe.", "De nombreux sanctuaires marials célèbrent leur fête patronale en ce jour.", "Sa naissance est le début de l'histoire de notre Rédemption, accomplie dans le Christ son Fils.", "Elle est fêtée le même jour que Notre-Dame de Lorette et de nombreux sanctuaires mariaux locaux."] },
      "9-9": { nom: "Saint Pierre Claver", texte: ["Pierre Claver naquit en 1581 à Verdú, en Catalogne, dans une famille de paysans.", "Entré dans la Compagnie de Jésus, il fut envoyé à Carthagène des Indes, en Colombie.", "Carthagène était alors le principal port de débarquement des esclaves africains en Amérique.", "Pierre se consacra entièrement à leur service, se proclamant esclave des esclaves pour toujours.", "Il accueillait les nouveaux arrivants dans les cales des bateaux, leur apportant nourriture et soins.", "Il baptisa plus de trois cent mille esclaves et les instruisit dans la foi.", "Il soignait les malades, visitait les prisonniers et se faisait l'avocat des opprimés.", "Ses dernières années furent marquées par la maladie et la solitude.", "Il mourut en 1654 à Carthagène, pleuré par toute la ville, noirs et blancs confondus.", "Canonisé en 1888, il est le patron des missions africaines et de la justice sociale."] },
      "9-10": { nom: "Saint Nicolas de Tolentino", texte: ["Nicolas naquit en 1245 à Sant'Angelo in Pontano, dans les Marches, dans une famille pieuse.", "Ses parents, longtemps sans enfants, l'avaient confié à saint Nicolas de Bari avant sa naissance.", "Il entra dans l'ordre des Augustins et fut ordonné prêtre en 1270.", "Il se consacra à la prédication et au service des pauvres, des malades et des prisonniers.", "Établi à Tolentino, il y passa trente ans de ministère pastoral intense.", "Ses miracles nombreux lui valurent une grande réputation dans toute la région.", "Il priait particulièrement pour les âmes du purgatoire et leur offrait ses communions.", "Il mourut en 1305 à Tolentino, après une longue maladie offerte à Dieu.", "Canonisé en 1446 par Eugène IV, il est le patron des âmes du purgatoire.", "Son bras, conservé comme relique, est l'objet d'une grande dévotion à Tolentino."] },
      "9-11": { nom: "Saint Adelphe de Metz", texte: ["Adelphe fut évêque de Metz au Ve siècle, dans une période troublée par les invasions barbares.", "Il succéda à son oncle Rufin comme évêque de Metz.", "Son épiscopat fut marqué par les invasions des Huns et des Vandales.", "Il protégea sa ville et ses habitants avec courage face aux envahisseurs.", "Sa charité envers les réfugiés et les victimes des invasions était exemplaire.", "Il mourut vers 484, laissant une Église organisée malgré les turbulences.", "Son tombeau dans l'abbaye de Neuviller devint un lieu de pèlerinage important en Alsace.", "Sa fête était autrefois célébrée dans tout le diocèse de Metz.", "Il illustre la figure de l'évêque-pasteur protégeant son troupeau dans les temps difficiles.", "Il est vénéré comme protecteur de la ville de Metz et de la région lorraine."] },
      "9-12": { nom: "Saint Nom de Marie", texte: ["La fête du Saint Nom de Marie fut instituée après la victoire de Vienne en 1683.", "Le 12 septembre 1683, les armées chrétiennes commandées par Jean III Sobieski vainquirent les Turcs.", "Cette victoire fut attribuée à l'intercession de Marie, dont le roi polonais était très dévot.", "Le pape Innocent XI étendit cette fête à toute l'Église en reconnaissance de la victoire.", "Le nom de Marie, plein de grâce et de tendresse, est invoqué dans toutes les difficultés.", "Sa signification étymologique hébraïque inclut les notions de maîtresse et de dame.", "L'Église honore ce nom qui fut révélé par l'ange Gabriel lors de l'Annonciation.", "La pratique de prononcer dévotement le nom de Marie est encouragée par les spirituels marials.", "Cette fête renforce la dévotion mariale après la grande fête de la Nativité du 8 septembre.", "Elle rappelle que le nom de Marie est pour les chrétiens un secours et une protection."] },
      "9-13": { nom: "Saint Jean Chrysostome", texte: ["Jean Chrysostome naquit vers 347 à Antioche, fils d'un officier romain.", "Élève du rhéteur Libanius, il était destiné à une brillante carrière d'avocat.", "Converti profondément, il vécut six ans comme ermite dans le désert, ruinant sa santé.", "Revenu à Antioche, il fut ordonné prêtre et devint le prédicateur le plus célèbre de son temps.", "Son surnom Chrysostome signifie Bouche d'or, donné pour son éloquence incomparable.", "Élu patriarche de Constantinople en 398, il réforma le clergé et fit scandale par ses aumônes.", "Il osa critiquer publiquement l'impératrice Eudoxie et fut deux fois exilé.", "Il mourut d'épuisement en 407 lors de sa marche vers un exil lointain.", "Ses homélies sur les Épîtres de Paul et sur les Évangiles sont des trésors de l'exégèse patristique.", "Docteur de l'Église, il est le patron des prédicateurs et des orateurs."] },
      "9-14": { nom: "Exaltation de la Sainte Croix", texte: ["La fête de l'Exaltation de la Sainte Croix commémore plusieurs événements liés à la Croix du Christ.", "En 335, l'église du Saint-Sépulcre de Jérusalem fut consacrée par l'évêque Macaire.", "Cette occasion fut célébrée par une grande procession montrant les reliques de la vraie Croix.", "En 614, les Perses s'emparèrent de Jérusalem et emportèrent la relique de la Croix.", "L'empereur Héraclius la récupéra en 628 après avoir vaincu les Perses.", "Son entrée solennelle à Jérusalem avec la Croix retrouvée est commémorée en ce jour.", "La Croix, signe de mort et de honte pour les Romains, est devenue le signe du salut.", "Saint Paul écrivait que la Croix est folie pour les uns et puissance de Dieu pour les autres.", "L'Exaltation de la Croix célèbre le paradoxe chrétien : la défaite transformée en victoire.", "Cette fête est aussi célébrée en Lorraine comme fête régionale très populaire."] },
      "9-15": { nom: "Notre-Dame des Douleurs", texte: ["La fête de Notre-Dame des Douleurs est célébrée le lendemain de l'Exaltation de la Sainte Croix.", "Elle contemple la compassion de Marie, debout au pied de la Croix de son Fils.", "La prophétie de Syméon s'accomplit : un glaive de douleur transpercera ton âme.", "Les sept douleurs de Marie sont méditées dans la tradition catholique depuis le Moyen Âge.", "Marie est la Mère des douleurs, Mater Dolorosa, compatissante à toutes les souffrances humaines.", "Le Stabat Mater, hymne médiéval attribué à Jacopone da Todi, exprime cette douleur maternelle.", "La mise en musique du Stabat Mater par Pergolèse est un chef-d'œuvre de la musique sacrée.", "Cette fête fut étendue à toute l'Église par Pie VII en 1814, à son retour de captivité.", "Elle invite les chrétiens à s'unir aux souffrances du Christ par celles de sa Mère.", "Marie des Douleurs est la consolatrice de tous ceux qui souffrent dans leur chair et leur cœur."] },
