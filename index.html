      "1-25": { nom: "Conversion de saint Paul", texte: ["Ce jour commémore l'événement fondateur de la vie apostolique de saint Paul.", "Saul de Tarse était un farouche persécuteur des chrétiens au lendemain de la mort du Christ.", "Sur le chemin de Damas où il se rendait pour arrêter des chrétiens, une lumière l'aveugla.", "Il entendit une voix lui dire : Saul, Saul, pourquoi me persécutes-tu ?", "Renversé de sa monture, il demeura aveugle pendant trois jours.", "Conduit à Damas, il recouvra la vue grâce à Ananie, envoyé par Dieu.", "Il fut baptisé et changea son nom de Saul en Paul, le petit.", "Cette conversion radicale fit de lui le plus grand missionnaire de l'histoire chrétienne.", "Il parcourut tout le bassin méditerranéen pour annoncer l'Évangile aux nations.", "Ses Épîtres constituent une part majeure du Nouveau Testament." ] },
      "1-26": { nom: "Saints Timothée et Tite", texte: ["Timothée et Tite furent les deux plus proches collaborateurs de saint Paul.", "Timothée était originaire de Lystre en Lycaonie, né d'une mère juive et d'un père grec.", "Paul l'emmena avec lui lors de son second voyage missionnaire vers 50 après J.-C.", "Il lui confia l'Église d'Éphèse et lui adressa deux lettres conservées dans le Nouveau Testament.", "Tite était un grec de naissance, le premier pagano-chrétien de l'entourage de Paul.", "Paul l'envoya en mission à Corinthe pour régler des conflits communautaires difficiles.", "Il lui confia ensuite l'organisation de l'Église de Crète.", "La lettre de Paul à Tite décrit les qualités requises pour les évêques et les anciens.", "Timothée aurait été martyrisé à Éphèse, Tite serait mort paisiblement en Crète.", "Ils sont les patrons des évêques et des pasteurs." ] },
      "1-27": { nom: "Sainte Angèle Mérici", texte: ["Angèle Mérici naquit vers 1474 à Desenzano del Garda, sur les bords du lac de Garde.", "Orpheline tôt, elle fut profondément marquée par la mort de sa sœur aînée.", "Une vision lui révéla que sa sœur était au ciel malgré sa mort sans sacrements.", "Elle s'engagea dans le tiers-ordre franciscain et se consacra à l'éducation des fillettes pauvres.", "Elle fonda à Brescia, en 1535, la Compagnie de Sainte-Ursule, première congrégation féminine enseignante.", "Cette fondation révolutionnaire permettait aux femmes de vivre dans le monde tout en servant Dieu.", "Elle ne porta pas l'habit religieux, vivant parmi ses contemporains dans la simplicité.", "Elle mourut à Brescia en 1540, entourée de ses filles spirituelles.", "Elle fut canonisée par Pie IX en 1807.", "Elle est la patronne des éducatrices et des jeunes filles." ] },
      "1-28": { nom: "Saint Thomas d'Aquin", texte: ["Thomas d'Aquin naquit vers 1225 au château de Roccasecca, en Italie.", "Docteur de l'Église et prince de la scolastique, il est le plus grand théologien catholique.", "Contre la volonté de sa famille noble, il entra dans l'ordre des Frères Prêcheurs.", "Élève d'Albert le Grand à Cologne et à Paris, il surpassa bientôt son maître.", "Sa Somme Théologique est l'œuvre philosophique et théologique la plus monumentale du Moyen Âge.", "Il réalisa la synthèse entre la philosophie d'Aristote et la théologie chrétienne.", "Il composa aussi l'office du Saint-Sacrement, dont l'admirable Pange lingua.", "Il mourut en 1274 en se rendant au concile de Lyon, à l'âge de quarante-neuf ans.", "Canonisé en 1323, il fut déclaré Docteur de l'Église en 1567.", "Il est le patron des universités, des étudiants et des théologiens." ] },
      "1-29": { nom: "Saint Gildas le Sage", texte: ["Gildas naquit vers 500 en Bretagne du Nord, dans l'actuelle Écosse.", "Il est le premier historien de la Bretagne insulaire et de la résistance celte aux Saxons.", "Son œuvre, De Excidio et Conquestu Britanniae, déplore la décadence morale des rois bretons.", "Il reçut son éducation auprès de saint Illtud au Pays de Galles.", "Après des voyages en Irlande, il s'établit en Armorique, l'actuelle Bretagne française.", "Il fonda le monastère de Rhuys, sur le golfe du Morbihan, vers 540.", "Sa règle monastique influença l'organisation des monastères bretons.", "Son œuvre historique et morale est unique dans l'Occident du VIe siècle.", "Il mourut vers 570 et fut inhumé dans son monastère de Rhuys.", "Il est vénéré en Bretagne et en Irlande comme père du monachisme celtique." ] },
      "1-30": { nom: "Sainte Martine", texte: ["Martine est une martyre romaine dont le culte remonte aux premiers siècles.", "Selon la tradition, elle souffrit le martyre à Rome sous l'empereur Alexandre Sévère vers 226.", "Issue d'une famille noble romaine, elle aurait refusé de sacrifier aux idoles.", "Elle endura de nombreux supplices sans que son corps en garde de traces.", "Elle fut finalement décapitée après avoir converti de nombreux témoins de son martyre.", "Ses reliques furent découvertes en 1634 près du forum de César à Rome.", "Cette découverte provoqua un grand renouveau de son culte sous le pontificat d'Urbain VIII.", "Le pape fit construire en son honneur la belle église baroque des Saints-Luc-et-Martine.", "Son nom figure parmi les martyrs romains les plus anciennement vénérés.", "Elle est la patronne des femmes persécutées pour leur foi." ] },
      "1-31": { nom: "Saint Jean Bosco", texte: ["Jean Bosco naquit en 1815 à Becchi, dans le Piémont, dans une famille paysanne pauvre.", "À neuf ans, un songe prophétique lui montra sa mission auprès des jeunes délinquants.", "Devenu prêtre à Turin en 1841, il se consacra entièrement à la jeunesse défavorisée.", "Il créa à Turin l'Oratoire de Valdocco, refuge et école pour des milliers de jeunes sans abri.", "Sa méthode éducative, le système préventif, privilégiait la raison, la religion et l'affection.", "Il fonda en 1859 la Société de Saint-François de Sales, les Salésiens.", "Avec sainte Marie Mazzarello, il fonda aussi les Filles de Marie Auxiliatrice.", "Ses œuvres éducatives et sociales se répandirent dans le monde entier.", "Il mourut épuisé à Turin en 1888, pleuré par des milliers de jeunes.", "Il est le patron des éducateurs, des apprentis et de la jeunesse." ] },
      "2-1":  { nom: "Sainte Brigitte d'Irlande", texte: ["Brigitte d'Irlande naquit vers 452, fille d'un chef irlandais et d'une esclave chrétienne.", "Elle est avec saint Patrick et saint Columba l'une des trois saints patrons de l'Irlande.", "Sa charité envers les pauvres se manifesta dès son enfance, distribuant les biens de son père.", "Elle fonda vers 470 le monastère de Kildare, devenu l'un des plus importants d'Irlande.", "Son monastère accueillit à la fois des moines et des moniales, phénomène unique à l'époque.", "Une flamme perpétuelle y brûlait, entretenue par ses religieuses, jusqu'à la Réforme.", "Elle est associée à de nombreux miracles de multiplication de nourriture et de guérison.", "Son nom en irlandais, Bríd ou Bride, est encore très répandu dans les pays celtes.", "Elle mourut vers 524 à Kildare, entourée de ses filles spirituelles.", "Sa croix tressée de roseaux, la croix de Brigitte, est un symbole de l'Irlande chrétienne." ] },
      "2-2":  { nom: "Présentation du Seigneur", texte: ["La Présentation du Seigneur, anciennement appelée Chandeleur, est fêtée le 2 février.", "Elle commémore la présentation de l'Enfant Jésus au Temple de Jérusalem, quarante jours après sa naissance.", "Selon la loi de Moïse, tout premier-né mâle devait être présenté à Dieu.", "Le vieillard Syméon reconnut en l'Enfant la lumière pour éclairer les nations.", "Son cantique, le Nunc Dimittis, est chanté chaque soir à Complies.", "La prophétesse Anne rendit aussi grâce à Dieu en voyant l'Enfant.", "La procession des cierges bénits rappelle Jésus, lumière du monde.", "C'est ce jour qu'on bénit les cierges qui serviront tout au long de l'année liturgique.", "La tradition des crêpes à la Chandeleur vient de coutumes populaires liées à cette fête.", "Elle marque également la fin du temps de Noël dans la liturgie." ] },
      "2-3":  { nom: "Saint Blaise", texte: ["Blaise fut évêque de Sébaste en Arménie au IVe siècle.", "Il vécut d'abord en ermite dans une grotte du mont Argée, soignant les animaux malades.", "Arrêté lors de la persécution de Licinius vers 316, il fut martyrisé.", "Sur le chemin de sa prison, il guérit miraculeusement un enfant qui étouffait avec une arête.", "Ce miracle donna naissance à la bénédiction de la gorge le jour de sa fête.", "Il fut mis à mort après avoir enduré de nombreux supplices avec une sérénité exemplaire.", "Son culte se répandit rapidement en Orient puis en Occident.", "Il est l'un des Quatorze Saints Auxiliateurs, invoqués pour des secours particuliers.", "La bénédiction de saint Blaise, avec deux cierges croisés sur la gorge, est encore pratiquée.", "Il est le patron des médecins, des cardeurs de laine et des animaux." ] },
      "2-4":  { nom: "Saint Jean de Britto", texte: ["Jean de Britto naquit en 1647 à Lisbonne, dans une famille noble portugaise.", "Il entra dans la Compagnie de Jésus et demanda à être envoyé en mission en Inde.", "Il arriva dans le Maduré en 1673 et adopta le mode de vie des sannyasi, les ascètes hindous.", "Sa méthode d'inculturation lui permit de toucher des castes élevées jusqu'alors imperméables à l'Évangile.", "Il fut arrêté et torturé à plusieurs reprises pour sa prédication.", "Ayant converti un raja polygame, il lui demanda de renvoyer ses épouses surnuméraires.", "Une de ces femmes, princesse, porta plainte et Jean fut condamné à mort.", "Il fut décapité le 4 février 1693 à Oriyur, dans le Tamil Nadu.", "Il fut canonisé par le pape Pie XII en 1947.", "Il est le saint patron du Portugal et un modèle d'inculturation missionnaire." ] },
      "2-5":  { nom: "Sainte Agathe", texte: ["Agathe est une martyre sicilienne parmi les plus vénérées de l'Église primitive.", "Elle naquit vers 230 à Catane ou à Palerme, dans une famille noble chrétienne.", "Sa beauté attira l'attention du gouverneur Quinctianus qui voulut l'épouser.", "Agathe refusa, étant consacrée à Dieu depuis l'enfance.", "Quinctianus la fit placer dans un lieu de débauche, mais elle résista à toutes les tentatives.", "Elle fut soumise à la torture, notamment l'amputation de ses seins.", "Dans sa prison, elle fut miraculeusement guérie par une vision de saint Pierre.", "Elle mourut en prison vers 251, après de nouvelles tortures.", "Elle est la patronne des Siciliens, des fondeurs de cloches et des infirmières.", "Son intercession est invoquée contre les éruptions de l'Etna et les maladies du sein." ] },
      "2-6":  { nom: "Saint Paul Miki et compagnons", texte: ["Paul Miki et ses compagnons furent les premiers martyrs du Japon.", "Le 5 février 1597, vingt-six chrétiens furent crucifiés à Nagasaki sur ordre du dictateur Toyotomi Hideyoshi.", "Parmi eux se trouvaient six franciscains, trois jésuites et dix-sept laïcs japonais.", "Paul Miki était un jésuite japonais, fils d'un officier de haut rang.", "Du haut de sa croix, il prêcha à la foule rassemblée avec une sérénité admirable.", "Les martyrs furent transportés de Kyoto à Nagasaki, exposés aux moqueries du peuple.", "Leurs oreilles gauches furent coupées en signe d'infamie pendant le trajet.", "Ils chantèrent des psaumes et le Te Deum en montant vers leur supplice.", "Ils furent canonisés par Pie IX en 1862.", "Leur martyre témoigne de l'enracinement profond du christianisme au Japon dès le XVIe siècle." ] },
      "2-7":  { nom: "Sainte Colette", texte: ["Colette naquit en 1381 à Corbie, en Picardie, fille d'un charpentier de l'abbaye.", "Elle fut baptisée Nicole, mais on lui donna le diminutif de Colette.", "Orpheline à dix-sept ans, elle entra dans le tiers-ordre franciscain.", "Elle vécut en recluse pendant plusieurs années dans une cellule attenante à une église.", "En 1406, elle reçut une vision lui ordonnant de réformer l'ordre des Clarisses.", "Le pape Alexandre V lui confia cette mission et elle commença son œuvre réformatrice.", "Elle fonda ou réforma dix-sept monastères de Clarisses à travers la France, la Savoie et les Flandres.", "Sa règle restaurait la pauvreté absolue originelle voulue par sainte Claire.", "Elle mourut à Gand en 1447, entourée de ses filles spirituelles.", "Elle fut canonisée par le pape Pie VI en 1807." ] },
      "2-8":  { nom: "Saint Jérôme Émilien", texte: ["Jérôme Émilien naquit en 1481 à Venise, dans une famille noble.", "Il fut d'abord officier militaire et mena une vie peu édifiante.", "Emprisonné lors d'une campagne militaire, il se convertit profondément à Dieu.", "Il se consacra dès lors au service des orphelins, des malades et des pauvres.", "À Venise, Brescia, Bergame et Milan, il fonda des orphelinats et des hospices.", "Il inventa un catéchisme dialogué pour instruire les enfants dans la foi.", "En 1532, il fonda la Congrégation des Somasques pour perpétuer son œuvre.", "Il mourut en 1537 à Somasca, victime de la peste contractée en soignant les malades.", "Canonisé en 1767 par Clément XIII, il fut déclaré patron des orphelins en 1928.", "Sa vie illustre la conversion radicale au service des plus démunis." ] },
      "2-9":  { nom: "Sainte Apolline", texte: ["Apolline fut martyrisée à Alexandrie en Égypte vers 249, sous le règne de l'empereur Philippe.", "Lors d'une émeute populaire anti-chrétienne, elle fut saisie par la foule.", "Ses dents lui furent arrachées une à une avant qu'on lui brise la mâchoire.", "Elle fut ensuite menacée du bûcher si elle ne reniait pas sa foi.", "Elle obtint un court délai, comme pour délibérer, puis se jeta elle-même dans le feu.", "Saint Denys d'Alexandrie, qui rapporte son martyre, la présente comme une femme âgée.", "Son martyre fut unanimement admiré dans toute l'Église ancienne.", "Elle est la patronne des dentistes et des personnes souffrant de maux de dents.", "Son iconographie la représente habituellement tenant une dent avec une pince.", "Sa fête, le 9 février, est restée populaire dans de nombreuses régions catholiques." ] },
      "2-10": { nom: "Sainte Scholastique", texte: ["Scholastique était la sœur jumelle de saint Benoît de Nursie, fondateur du monachisme occidental.", "Elle naquit vers 480 à Nursie, en Ombrie, dans une famille noble romaine.", "Elle consacra sa vie à Dieu dès l'enfance et fonda un monastère féminin près du Mont-Cassin.", "Une fois par an, elle rencontrait son frère pour partager une journée de prière et de lecture spirituelle.", "Lors de leur dernière rencontre, elle pria Dieu de prolonger leur entretien.", "Une violente tempête éclata soudain, empêchant Benoît de partir, et ils conversèrent toute la nuit.", "Trois jours après cette rencontre, Scholastique mourut.", "Benoît vit son âme monter au ciel sous forme d'une colombe blanche.", "Il fit transporter son corps au Mont-Cassin pour l'ensevelir dans la tombe qu'il s'était préparée.", "Elle est la patronne des Bénédictines et des jeunes filles studieuses." ] },
      "2-11": { nom: "Notre-Dame de Lourdes", texte: ["Le 11 février 1858, la Vierge Marie apparut pour la première fois à Bernadette Soubirous.", "Bernadette avait quatorze ans et ramassait du bois près de la grotte de Massabielle, à Lourdes.", "La Dame vêtue de blanc lui apparut dix-huit fois jusqu'au 16 juillet 1858.", "Le 25 février, la Vierge lui indiqua une source cachée qui jaillit alors de la terre.", "Le 25 mars, la Dame se présenta comme l'Immaculée Conception.", "Les guérisons inexpliquées commencèrent rapidement à Lourdes.", "Le pape Pie IX reconnut officiellement les apparitions en 1862.", "Lourdes est aujourd'hui le plus grand lieu de pèlerinage catholique au monde.", "Plus de deux cents guérisons ont été officiellement reconnues miraculeuses par l'Église.", "Le 11 février est également la Journée mondiale des malades, instituée par saint Jean-Paul II." ] },
      "2-12": { nom: "Sainte Mélèce", texte: ["Mélèce fut un évêque d'Antioche qui vécut au IVe siècle, figure centrale des controverses ariennes.", "Il fut élu évêque d'Antioche en 360 dans un contexte de vives tensions doctrinales.", "Sa position nuancée entre arianisme et orthodoxie nicéenne lui valut l'hostilité des deux camps.", "Il fut exilé à trois reprises par des empereurs favorables à l'arianisme.", "Durant ses exils, son peuple lui demeura fidèle, conservant son nom dans les prières.", "Il joua un rôle essentiel dans la préparation du Concile de Constantinople de 381.", "Ce concile, qu'il présida, confirma définitivement le symbole de Nicée.", "Il mourut pendant le concile, en 381, avant d'en voir les conclusions.", "Saint Grégoire de Nysse prononça son éloge funèbre devant les pères conciliaires.", "Il est vénéré en Orient comme un confesseur de la foi orthodoxe." ] },
      "2-13": { nom: "Saint Bénigne de Dijon", texte: ["Bénigne est le saint évangélisateur de la Bourgogne, martyrisé au IIe ou IIIe siècle.", "Selon la tradition, il fut envoyé en Gaule par saint Polycarpe de Smyrne.", "Il prêcha l'Évangile dans la région de Dijon avec un zèle apostolique remarquable.", "Arrêté lors d'une persécution, il refusa de sacrifier aux idoles.", "Il subit de nombreux supplices avant d'être tué d'un coup de glaive.", "Son tombeau devint rapidement un lieu de pèlerinage important en Bourgogne.", "Une grande abbaye fut élevée sur sa tombe à Dijon au Moyen Âge.", "Cette abbaye bénédictine, Saint-Bénigne de Dijon, devint un foyer de réforme monastique.", "La crypte de l'église abbatiale, remarquable chef-d'œuvre roman, est toujours visible.", "Il est le saint patron de la ville de Dijon et de la Bourgogne." ] },
      "2-14": { nom: "Saint Valentin", texte: ["Valentine fut un prêtre ou évêque martyrisé à Rome vers 269 sous l'empereur Claude II.", "Peu de données historiques certaines nous sont parvenues sur sa vie.", "Une tradition dit qu'il mariait secrètement des soldats chrétiens dont l'empereur interdisait les unions.", "Une autre légende le présente guérissant la fille aveugle de son geôlier.", "Il lui aurait envoyé avant sa mort un billet signé Ton Valentin, origine supposée des messages d'amour.", "Il fut décapité sur la voie Flaminia le 14 février, jour associé depuis au retour des oiseaux.", "Son culte se répandit rapidement et plusieurs saints du même nom sont mentionnés.", "La tradition des valentins, messages d'amour échangés ce jour, est attestée dès le XIVe siècle.", "Chaucer et Shakespeare contribuèrent à populariser cette fête en Angleterre.", "Il est le patron des amoureux, des épileptiques et des apiculteurs." ] },
      "2-15": { nom: "Saints Fauste, Janvier et Martial", texte: ["Fauste, Janvier et Martial furent des martyrs africains de la période des persécutions romaines.", "Ils moururent pour leur foi lors des grandes persécutions du IIIe siècle en Afrique du Nord.", "Saint Augustin, évêque d'Hippone, leur consacra plusieurs sermons qui nous sont parvenus.", "Janvier était diacre de la communauté chrétienne de Carthage ou d'Hippone.", "Fauste et Martial étaient vraisemblablement des laïcs chrétiens de condition modeste.", "Leur courage face aux persécuteurs impressionna profondément les fidèles d'Afrique.", "Leurs tombes devinrent des lieux de pèlerinage dans l'Afrique chrétienne.", "Saint Augustin exhortait ses fidèles à imiter leur foi plutôt qu'à simplement les honorer.", "Leur fête commune témoigne de la richesse du martyrologe africain des premiers siècles.", "Ils illustrent la vitalité exceptionnelle de l'Église d'Afrique du Nord dans l'Antiquité." ] },
      "2-16": { nom: "Sainte Julienne de Nicomédie", texte: ["Julienne de Nicomédie fut martyrisée lors de la persécution de Dioclétien vers 304.", "Elle était fiancée à Eustathe, préfet de la ville, qui la pressait d'épouser des idoles.", "Elle refusa catégoriquement de renier sa foi chrétienne malgré les supplices.", "Son père lui-même la livra aux bourreaux quand elle refusa de sacrifier aux dieux.", "Elle endura avec une fermeté héroïque des tortures particulièrement cruelles.", "Elle fut finalement décapitée après avoir inspiré la conversion de nombreux spectateurs.", "Son culte se répandit rapidement en Orient et en Occident.", "Elle est l'une des saintes féminines les plus populaires des premiers siècles chrétiens.", "Plusieurs églises lui furent dédiées dans l'Empire romain d'Orient.", "Elle est invoquée comme modèle de fidélité à Dieu face aux pressions du monde." ] },
      "2-17": { nom: "Les Sept Fondateurs des Servites de Marie", texte: ["Sept riches marchands florentins fondèrent en 1233 l'ordre des Servites de Marie.", "Ils s'appelaient Buonfiglio Monaldi, Alexis Falconieri, Benoît dell'Antella, Barthélemy Amidei, Ricovero Uguccione, Gherardino Sostegni et Jean Buonagiunta.", "Réunis en confrérie de dévotion mariale, ils reçurent le 15 août 1233 une vision de la Vierge.", "Elle leur montra un habit sombre et leur indiqua de se retirer du monde.", "Ils s'établirent sur le Monte Senario, aux portes de Florence, dans une vie austère.", "Ils adoptèrent la règle de saint Augustin et se vouèrent à la méditation des douleurs de Marie.", "L'ordre se développa rapidement en Italie et dans toute l'Europe.", "Six des sept fondateurs furent canonisés ensemble par Léon XIII en 1888.", "Le septième, Alexis Falconieri, mourut centenaire en 1310 et fut canonisé avec eux.", "Ils sont la seule cause de canonisation collective de plusieurs fondateurs d'un même ordre." ] },
      "2-18": { nom: "Bienheureux Fra Angelico", texte: ["Fra Angelico naquit vers 1395 à Vicchio, en Toscane, sous le nom de Guido di Pietro.", "Il entra dans l'ordre dominicain vers 1418 et prit le nom de Jean de Fiesole.", "Ses contemporains l'appelaient l'Angelico, l'angélique, tant sa peinture semblait inspirée du ciel.", "Il peignit les cellules du couvent San Marco de Florence, chef-d'œuvre de la peinture religieuse.", "Son Annonciation, conservée à San Marco, est l'une des plus belles de l'histoire de l'art.", "Il fut appelé à Rome par le pape Nicolas V pour décorer la chapelle Nicolina au Vatican.", "Sa technique parfaite alliait à la tradition gothique la nouveauté de la Renaissance.", "Il ne peignait jamais sans s'être recueilli en prière, dit la tradition.", "Il mourut à Rome en 1455 dans le couvent de Santa Maria sopra Minerva.", "Béatifié par Jean-Paul II en 1982, il est le patron des artistes." ] },
      "2-19": { nom: "Saint Conrad de Plaisance", texte: ["Conrad naquit vers 1290 à Plaisance, en Lombardie, dans une famille noble.", "Lors d'une partie de chasse, il fit mettre le feu à des broussailles pour débusquer le gibier.", "L'incendie se propagea et dévasta une grande étendue de campagne.", "Pour éviter qu'un innocent ne fût condamné, Conrad se dénonça et dut payer une énorme rançon.", "Il vendit tous ses biens, ruinant ainsi sa fortune.", "Cet événement fut le point de départ de sa conversion radicale.", "Il entra dans le tiers-ordre franciscain avec sa femme, qui elle aussi se fit religieuse.", "Il se retira en ermite en Sicile, dans une grotte près de Noto.", "Ses miracles nombreux attirèrent des foules de pèlerins de toute l'île.", "Il mourut en 1351 et fut canonisé par Jules II en 1625." ] },
      "2-20": { nom: "Saint Eucher de Lyon", texte: ["Eucher de Lyon vécut au Ve siècle et fut l'un des grands évêques de la Gaule.", "Il abandonna une carrière publique brillante pour se retirer avec sa femme à l'île de Lérins.", "L'île de Lérins était alors le principal foyer de vie monastique en Gaule.", "Il y retrouva saint Honorat, fondateur du monastère, et y forma sa vie spirituelle.", "Ses fils Salonius et Véran devinrent également évêques et saints.", "Sa réputation de sainteté et d'érudition lui valut d'être élu évêque de Lyon vers 434.", "Ses écrits spirituels, notamment les Instructiones et les Formulae, étaient très lus au Moyen Âge.", "Il participa aux grands conciles gaulois qui organisèrent l'Église de son époque.", "Il mourut vers 450 et fut inhumé dans le monastère lyonnais qu'il avait fondé.", "Il est vénéré comme l'un des grands évêques de l'Église gallo-romaine." ] },
      "2-21": { nom: "Saint Pierre Damien", texte: ["Pierre Damien naquit en 1007 à Ravenne, dernier enfant d'une famille nombreuse et pauvre.", "Orphelin, il fut d'abord maltraité par un frère avant qu'un autre ne l'adopte et le fasse instruire.", "En reconnaissance, il prit le nom de cet adopteur, Damien.", "Il entra dans le monastère de Fonte Avellana et y mena une vie d'austérité exemplaire.", "Il fut élu prieur de ce monastère dont il devint le réformateur.", "Il combattit avec vigueur la simonie et le nicolaïsme qui corrompaient le clergé.", "Nommé cardinal-évêque d'Ostie par le pape Étienne IX, il fut un ardent réformateur de l'Église.", "Ses écrits abondants sur la réforme de l'Église préparèrent la réforme grégorienne.", "Il mourut à Faenza en 1072 et fut déclaré Docteur de l'Église par Léon XII en 1828.", "Il est une figure centrale de la réforme de l'Église au XIe siècle." ] },
      "2-22": { nom: "Chaire de saint Pierre", texte: ["La fête de la Chaire de saint Pierre célèbre l'autorité spirituelle du premier des apôtres.", "Jésus dit à Pierre : Tu es Pierre, et sur cette pierre je bâtirai mon Église.", "Cette promesse fonde la doctrine de la primauté du pape dans l'Église catholique.", "Pierre exerça cette autorité d'abord à Jérusalem, puis à Antioche, enfin à Rome.", "Son ministère à Rome fonda la tradition du siège apostolique romain.", "La chaire, siège de l'évêque, symbolise son autorité d'enseignement et de gouvernement.", "La Cathedra Petri, conservée au Vatican, est un trône de bois médiéval enchâssé dans une gloire du Bernin.", "Cette fête est attestée à Rome dès le IVe siècle comme célébration de l'autorité de Pierre.", "Elle rappelle que l'unité de l'Église repose sur le ministère pétrinien.", "Le pape est évêque de Rome et successeur de Pierre dans la foi catholique." ] },
      "2-23": { nom: "Saint Polycarpe de Smyrne", texte: ["Polycarpe fut évêque de Smyrne et l'un des derniers témoins directs des apôtres.", "Il avait connu saint Jean l'Évangéliste et d'autres disciples du Christ.", "Son Épître aux Philippiens est un précieux document de la théologie du IIe siècle.", "Il se rendit à Rome pour rencontrer le pape Anicet et discuter de la date de Pâques.", "Il refusa de changer la tradition asiate concernant la date pascale, tout en restant en communion.", "À son retour à Smyrne, une persécution éclata et il fut arrêté.", "Conduit au stade, le proconsul lui demanda de renier le Christ.", "Il répondit : Il y a quatre-vingt-six ans que je le sers, et il ne m'a jamais fait de mal.", "Il fut condamné au bûcher, mais les flammes l'épargnèrent selon les témoins.", "Il fut finalement transpercé d'un glaive vers 155 ou 156." ] },
      "2-24": { nom: "Saint Mathias, apôtre", texte: ["Mathias fut choisi par les apôtres pour remplacer Judas Iscariote après la trahison.", "L'élection eut lieu entre l'Ascension et la Pentecôte, racontée dans les Actes des Apôtres.", "Deux candidats furent proposés : Joseph Barsabbas et Mathias.", "On tira au sort après avoir prié, et le sort tomba sur Mathias.", "Il fut ainsi agrégé aux Onze pour former à nouveau le collège des Douze.", "La tradition situe sa prédication en Judée, en Éthiopie ou en Colchide.", "Il aurait été martyrisé, soit par lapidation, soit par décapitation selon les sources.", "Ses reliques présumées furent apportées à Rome par sainte Hélène et conservées à la basilique Sainte-Marie-Majeure.", "Une partie de ses reliques fut transférée à Trèves, en Allemagne, où un grand pèlerinage lui est dédié.", "Il est le patron des charpentiers et des tailleurs de pierres." ] },
      "2-25": { nom: "Saint Walburge", texte: ["Walburge naquit vers 710 en Angleterre, dans une famille noble saxonne très chrétienne.", "Elle était la sœur de saint Willibald et de saint Wunibald.", "Elle entra dans le monastère de Wimborne dans le Dorset et y reçut une solide formation.", "En 748, l'évêque Boniface l'appela en Germanie pour participer à l'évangélisation.", "Elle dirigea le double monastère d'Heidenheim, fondé par son frère Wunibald.", "Après la mort de celui-ci en 761, elle gouverna seule cet important centre monastique.", "Elle mourut vers 779 et ses reliques furent transférées à Eichstätt en 870.", "Cette translation eut lieu le 1er mai, d'où la tradition de la nuit de Walpurgis.", "De nombreux miracles furent rapportés à son tombeau, notamment la guérison de malades.", "Elle est invoquée contre la rage, les épidémies et les maux des yeux." ] },
      "2-26": { nom: "Saint Porphyre de Gaza", texte: ["Porphyre naquit vers 347 à Thessalonique, en Grèce, dans une famille aisée.", "Il distribua ses biens et se retira en ermite en Égypte puis en Palestine.", "Malgré une grave maladie, il se rendit à Jérusalem pour vénérer le Saint-Sépulcre.", "Guéri miraculeusement lors d'une vision, il fut ordonné prêtre puis évêque de Gaza en 395.", "Gaza était alors une cité presque entièrement païenne, avec un grand temple de Marnas.", "Il obtint de l'impératrice Eudoxie la destruction de ce temple et la construction d'une église.", "Il lutta contre les schismatiques marcionites qui troublaient son diocèse.", "Sa biographie, écrite par son diacre Marc, est un document historique précieux.", "Il mourut en 420, après vingt-cinq ans d'épiscopat dans cette ville difficile.", "Il est vénéré comme l'apôtre et le patron de la ville de Gaza." ] },
      "2-27": { nom: "Saint Gabriel de la Douloureuse Vierge", texte: ["Gabriel de la Douloureuse Vierge naquit en 1838 à Assise, sous le nom de François Possenti.", "Fils d'un magistrat pontifical, il mena une jeunesse mondaine et joyeuse.", "Deux fois gravement malade, il promit d'entrer en religion si Dieu le guérissait.", "Une apparition de la Madone en procession le décida définitivement à entrer en religion.", "Il rejoignit en 1856 la Congrégation de la Passion, les Passionnistes.", "Il prit le nom de Gabriel de la Mère des Douleurs, traduit en français par Douloureuse Vierge.", "Sa vie religieuse de seulement quatre ans fut marquée par une sainteté rayonnante.", "Il mourut de tuberculose en 1862, à l'âge de vingt-trois ans, au scolasticat d'Isola del Gran Sasso.", "Canonisé en 1920 par Benoît XV, il fut déclaré patron de la jeunesse.", "Ses reliques sont conservées dans un grand sanctuaire à Gran Sasso, en Abruzzes." ] },
      "2-28": { nom: "Saint Romain et saint Lupicin", texte: ["Romain et Lupicin étaient deux frères originaires du Jura, au Ve siècle.", "Romain, l'aîné, se retira seul dans la forêt du Jura vers 435, cherchant la solitude.", "Sa réputation de sainteté attira bientôt des disciples désireux de partager sa vie.", "Son frère Lupicin le rejoignit et ils fondèrent ensemble les monastères de Condat et de Leuconne.", "Romain fonda également le monastère de la Balme pour les femmes.", "Ces fondations devinrent les premières grandes communautés monastiques de la Gaule orientale.", "Romain mourut vers 460 et son frère Lupicin lui survécut jusqu'en 480.", "Leurs monastères devinrent des centres spirituels importants pour toute la région.", "Le village de Saint-Claude, ancienne Condat, perpétue leur mémoire en Franche-Comté.", "Ils sont les pères du monachisme jurassien et les patrons du diocèse de Saint-Claude." ] },
      "2-29": { nom: "Saint Oswald d'York", texte: ["Oswald fut archevêque d'York à la fin du Xe siècle, figure de la réforme monastique anglaise.", "D'origine danoise, il fut éduqué à Fleury-sur-Loire, alors grand centre de la réforme bénédictine.", "Il devint évêque de Worcester en 961 et archevêque d'York en 971.", "Avec saint Dunstan et saint Éthelwold, il forma le triumvirat de la réforme de l'Église anglaise.", "Il fonda ou réforma de nombreux monastères en Angleterre selon la stricte règle bénédictine.", "Sa douceur pastorale et sa charité envers les pauvres lui valurent l'amour de son peuple.", "Il avait coutume de laver lui-même les pieds de douze pauvres chaque jour.", "Il mourut en 992, épuisé par ses pénitences, en récitant le Gloria.", "Sa fête tombe normalement le 28 février, ou le 29 les années bissextiles.", "Il est vénéré comme l'un des grands réformateurs de l'Église médiévale en Angleterre." ] },
      "3-1":  { nom: "Saint Aubin d'Angers", texte: ["Aubin naquit vers 469 en Bretagne, dans une famille chrétienne.", "Il entra dans le monastère de Tincillac, où il vécut pendant vingt-cinq ans.", "Sa réputation de sainteté et de sagesse était grande dans tout le pays.", "Il fut nommé évêque d'Angers vers 529, contre sa propre volonté.", "Son épiscopat de trente ans fut marqué par une activité pastorale intense.", "Il lutta contre la simonie, l'inceste et d'autres désordres moraux de son époque.", "Il participa à plusieurs conciles gaulois qui organisèrent l'Église franque.", "Il fonda des monastères et des hospices pour accueillir les pèlerins et les malades.", "Il entretint une correspondance avec le pape Vigile sur des questions théologiques.", "Il mourut vers 550 et ses reliques sont conservées à la cathédrale d'Angers." ] },
      "3-2":  { nom: "Bienheureuse Agnès de Prague", texte: ["Agnès naquit en 1205, fille du roi de Bohême Ottokar Ier.", "Destinée par sa naissance à un mariage royal, elle refusa plusieurs prétendants illustres.", "Elle refusa notamment la main de l'empereur Frédéric II pour se consacrer à Dieu.", "Après avoir correspondu avec sainte Claire d'Assise, elle fonda en 1234 un monastère de Clarisses à Prague.", "Elle y entra elle-même et y vécut dans une grande austérité pendant cinquante ans.", "Sa correspondance avec Claire d'Assise est un précieux document spirituel.", "Elle mourut en 1282, quelques mois après avoir appris la canonisation de sainte Claire.", "Son procès en canonisation traîna pendant sept siècles en raison des guerres hussites.", "Elle fut finalement béatifiée en 1874 et canonisée par Jean-Paul II en 1989.", "Sa canonisation, peu avant la chute du communisme, fut vécue comme un signe providentiel." ] },
      "3-3":  { nom: "Sainte Cunégonde", texte: ["Cunégonde naquit vers 978, fille du prince polonais Miesko Ier et d'une princesse hongroise.", "Elle épousa l'empereur Henri II, futur saint, vers l'an 1000.", "La tradition affirme qu'ils vécurent ensemble dans la chasteté virginale, bien que cela soit controversé.", "Après la mort de Henri II en 1024, elle entra dans l'ordre bénédictin à Kaufungen.", "Elle y vécut dans l'humilité, refusant tout traitement de faveur dû à son rang.", "Elle se soumit aux pénitences communautaires, balayant et nettoyant comme les autres sœurs.", "Elle mourut en 1033 et fut canonisée par Innocent III en 1200.", "Elle est la patronne de la Pologne et du Luxembourg.", "Ses reliques sont vénérées à Kaufungen et à Cracovie.", "Sa vie illustre l'idéal de la sainteté conjugale dans la tradition catholique." ] },
      "3-4":  { nom: "Saint Casimir de Pologne", texte: ["Casimir naquit en 1458 à Cracovie, second fils du roi Casimir IV de Pologne.", "Il était prince héritier mais refusa toute ambition politique au profit d'une vie pieuse.", "Envoyé en Hongrie pour y revendiquer le trône, il s'y refusa par conscience de la justice.", "Il revint en Pologne et assista son père dans le gouvernement du royaume avec sagesse.", "Sa santé fragile ne l'empêchait pas de passer des nuits entières en prière.", "Il était d'une chasteté absolue malgré les instances de sa famille pour qu'il se marie.", "Il mourut de tuberculose en 1484, à l'âge de vingt-cinq ans, à Vilnius.", "Il est canonisé en 1521 par Léon X, seul prince canonisé de la maison des Jagellons.", "Il est le saint patron de la Pologne et de la Lituanie.", "L'hymne marial Omni die dic Mariae lui est attribué traditionnellement." ] },
      "3-5":  { nom: "Saint Jean-Joseph de la Croix", texte: ["Jean-Joseph de la Croix naquit en 1654 à Ischia, dans le royaume de Naples.", "À seize ans, il entra dans l'ordre franciscain de l'Alcantara, réputé pour son austérité.", "Il pratiqua des pénitences corporelles exceptionnelles tout en maintenant une grande paix intérieure.", "Il fut ordonné prêtre en 1677 et exerça un apostolat fécond à Naples.", "Sa direction spirituelle attirait des personnes de toutes conditions sociales.", "Il fut nommé provincial de son ordre malgré ses résistances à toute charge.", "Il avait le don des miracles et de la prophétie selon de nombreux témoignages.", "Il mourut en 1734 à Naples, entouré d'une grande vénération populaire.", "Béatifié en 1789 par Pie VI, il fut canonisé en 1839 par Grégoire XVI.", "Il est le saint patron de l'île d'Ischia et d'une grande partie du sud de l'Italie." ] },
      "3-6":  { nom: "Sainte Colette", texte: ["Colette est fêtée une seconde fois ce jour dans certains diocèses.", "Née à Corbie en Picardie en 1381, fille d'un charpentier de l'abbaye bénédictine.", "Sa vie fut marquée dès l'enfance par une dévotion intense à saint François d'Assise.", "Elle reçut la mission de réformer l'ordre des Clarisses lors d'une vision.", "Sa réforme visait à restaurer la pauvreté absolue et la clôture stricte.", "Elle parcourut toute l'Europe pour fonder ou réformer des monastères.", "Sa ténacité et son humilité lui permirent de surmonter toutes les oppositions.", "Elle fut l'amie de sainte Jeanne d'Arc qu'elle rencontra à plusieurs reprises.", "Elle mourut à Gand en 1447, entourée de ses filles spirituelles.", "Elle est la patronne des femmes enceintes et des enfants à naître." ] },
      "3-7":  { nom: "Saints Perpétue et Félicité", texte: ["Perpétue et Félicité furent martyrisées à Carthage en Afrique du Nord, le 7 mars 203.", "Perpétue était une jeune femme noble d'environ vingt-deux ans, récemment baptisée.", "Félicité était une esclave de condition servile, enceinte au moment de son arrestation.", "Elles furent arrêtées avec plusieurs compagnons lors de la persécution de Septime Sévère.", "Félicité accoucha en prison deux jours avant le martyre, et laissa son enfant à d'autres chrétiens.", "Le récit du martyre, en partie rédigé par Perpétue elle-même, est l'un des plus anciens documents féminins chrétiens.", "Elles furent exposées aux bêtes dans l'amphithéâtre de Carthage.", "N'étant pas mortes des attaques des animaux, elles furent achevées par le glaive.", "Leurs noms sont mentionnés dans le Canon romain de la messe.", "Elles sont les patrones des mères et des femmes courageuses." ] },
      "3-8":  { nom: "Saint Jean de Dieu", texte: ["Jean de Dieu naquit en 1495 à Montemor-o-Novo, au Portugal.", "Sa vie fut longtemps agitée : soldat, berger, colporteur de livres, il chercha sa voie.", "À quarante ans, un sermon de saint Jean d'Avila le bouleversa si profondément qu'il perdit la raison.", "Interné à l'hôpital de Grenade, il prit conscience de la misère des malades.", "Il se consacra dès lors entièrement au service des pauvres et des malades.", "Il fonda à Grenade un hôpital qui devint le modèle des hôpitaux modernes en Espagne.", "Sa charité héroïque l'amenait à porter lui-même les malades sur son dos.", "Il mourut en 1550 en essayant de sauver un noyé dans le fleuve Genil.", "Ses disciples fondèrent après sa mort les Frères Hospitaliers de Saint-Jean-de-Dieu.", "Il est le patron des malades, des hôpitaux et du personnel soignant." ] },
      "3-9":  { nom: "Sainte Françoise Romaine", texte: ["Françoise Romaine naquit en 1384 à Rome, dans une famille noble.", "À douze ans, elle souhaitait entrer en religion, mais ses parents l'avaient promise en mariage.", "Elle épousa obéissamment Lorenzo de Ponziani et vécut quarante ans de mariage chrétien exemplaire.", "Elle eut trois enfants et partagea sa vie entre les devoirs familiaux et la prière.", "Avec sa belle-sœur Vannozza, elle se consacrait chaque jour au service des pauvres de Rome.", "Elle traversa de nombreuses épreuves : guerre, epidémies, mort de deux de ses enfants.", "Après la mort de son mari en 1436, elle fonda une communauté de femmes oblates bénédictines.", "Elle jouissait du don de voir son ange gardien en permanence.", "Elle mourut en 1440 et fut canonisée par Paul V en 1608.", "Elle est la patronne des automobilistes et des mères de famille chrétiennes." ] },
      "3-10": { nom: "Saint Macaire de Jérusalem", texte: ["Macaire fut évêque de Jérusalem de 314 à 335, figure de premier plan de l'Église ancienne.", "Il participa au Concile de Nicée en 325 et défendit avec fermeté le dogme de la consubstantialité.", "Il obtint de l'empereur Constantin l'autorisation de construire des basiliques sur les lieux saints.", "Il contribua ainsi à l'édification de la basilique du Saint-Sépulcre à Jérusalem.", "La tradition lui attribue la découverte de la Vraie Croix, faite avec sainte Hélène.", "Il résista aux pressions ariennes qui cherchaient à imposer leur doctrine à son Église.", "Son épiscopat vit la transformation de Jérusalem en grande cité chrétienne de pèlerinage.", "Il mourut vers 335, peu après la consécration de la basilique du Saint-Sépulcre.", "Son rôle dans la christianisation des lieux saints est fondamental pour l'histoire du christianisme.", "Il est vénéré en Orient comme confesseur de la foi nicéenne." ] },
      "3-11": { nom: "Saint Sophrone de Jérusalem", texte: ["Sophrone naquit vers 560 à Damas, en Syrie, dans une famille cultivée.", "Il fut d'abord moine en Palestine, puis entreprit de longs voyages en Orient et en Occident.", "Il connut à Alexandrie Jean le Miséricordieux dont il rédigea la biographie.", "Il combattit avec énergie l'hérésie monothélite, qui niait la double volonté du Christ.", "Élu patriarche de Jérusalem en 634, il trouva la ville assiégée par les armées arabes.", "Il dut négocier la reddition de Jérusalem au calife Omar en 637.", "Il obtint des garanties pour la protection des lieux saints chrétiens.", "Il mourut vers 638, peu après l'entrée des Arabes dans la ville.", "Ses œuvres théologiques et ses homélies sur les fêtes liturgiques sont précieuses.", "Il est vénéré en Orient comme confesseur et défenseur de l'orthodoxie." ] },
      "3-12": { nom: "Saint Grégoire le Grand", texte: ["Grégoire naquit vers 540 à Rome, dans une famille patricienne très chrétienne.", "Il abandonna une brillante carrière de préfet de Rome pour entrer dans la vie monastique.", "Il fonda sept monastères de ses propres biens et entra lui-même dans l'un d'eux.", "Élu pape en 590 malgré ses réticences, il gouverna l'Église durant quatorze ans.", "Il organisa l'évangélisation de l'Angleterre en envoyant saint Augustin de Cantorbéry.", "Il réforma la liturgie romaine et le chant d'église porte son nom, grégorien.", "Ses œuvres, notamment les Morales sur Job et les Dialogues, furent très lues au Moyen Âge.", "Il négocia avec les Lombards pour protéger Rome et les populations italiennes.", "Docteur de l'Église, il est l'un des quatre grands Pères de l'Église occidentale.", "Il mourut en 604, épuisé par ses travaux et ses pénitences." ] },
      "3-13": { nom: "Saint Rodrigue", texte: ["Rodrigue fut un prêtre espagnol martyrisé à Cordoue en 857, sous la domination arabe.", "Il vivait paisiblement comme prêtre dans sa ville natale lorsque le drame éclata.", "L'un de ses frères avait apostasié et s'était converti à l'islam.", "Lors d'une querelle entre ses deux frères, l'un musulman et l'autre chrétien, Rodrigue tenta de les séparer.", "Le frère musulman profita de sa faiblesse pour le traîner dans les rues en proclamant qu'il s'était converti.", "Rodrigue, ayant refusé de confirmer cette conversion forcée, fut arrêté.", "Il fut présenté au cadi qui lui demanda de confirmer sa conversion à l'islam.", "Il refusa catégoriquement, confesant sa foi chrétienne avec fermeté.", "Il fut décapité le 13 mars 857, avec son ami Salomon, lui aussi prisonnier pour sa foi.", "Il est vénéré comme martyr par l'Église catholique et figure dans le martyrologe romain." ] },
      "3-14": { nom: "Sainte Mathilde", texte: ["Mathilde naquit vers 895 en Saxe, dans une famille noble saxonne.", "Elle fut éduquée dans le monastère de Herford par sa grand-mère, abbesse du lieu.", "Elle épousa en 909 Henri l'Oiseleur, futur roi de Germanie, avec qui elle eut cinq enfants.", "Devenue reine, elle se distingua par sa charité envers les pauvres et les prisonniers.", "Après la mort de son mari en 936, ses fils lui reprochèrent de dilapider le trésor royal en aumônes.", "Elle s'y soumit humblement mais fut bientôt rappelée à la cour par son fils repentant.", "Elle fonda plusieurs monastères, dont Quedlinburg et Nordhausen.", "Sa vie fut marquée par les épreuves familiales qu'elle supporta avec une grande paix.", "Elle mourut en 968 à Quedlinburg, entourée de ses petits-enfants.", "Elle est la patronne des parents victimes de leurs enfants." ] },
      "3-15": { nom: "Saint Zacharie, pape", texte: ["Zacharie fut pape de 741 à 752, successeur de Grégoire III.", "D'origine grecque, il fut le dernier pape à demander confirmation à l'empire byzantin.", "Il traduisit en grec les Dialogues de saint Grégoire le Grand, les rendant accessibles à l'Orient.", "Il entretint d'excellentes relations avec le roi des Lombards Liutprand.", "Grâce à sa diplomatie, il obtint la restitution de territoires pris à Rome sans effusion de sang.", "Il apporta son soutien à saint Boniface dans sa mission d'évangélisation de la Germanie.", "Il autorisa la déposition du dernier roi mérovingien, ouvrant la voie à Pépin le Bref.", "Cette décision eut des conséquences historiques considérables pour l'Europe médiévale.", "Il mourut en 752, après un pontificat remarquable par sa sagesse diplomatique.", "Il est vénéré comme un grand administrateur et pacificateur de l'Église du VIIIe siècle." ] },
      "3-16": { nom: "Sainte Hilda de Whitby", texte: ["Hilda naquit en 614 dans la famille royale de Northumbrie, en Angleterre.", "Elle fut baptisée à treize ans par saint Paulin d'York.", "Elle entra dans la vie religieuse vers 649, sous la direction de saint Aidan de Lindisfarne.", "Elle fonda en 657 le double monastère de Whitby, pour moines et moniales.", "Ce monastère devint l'un des plus importants centres d'éducation de l'Angleterre chrétienne.", "Cinq des évêques formés à Whitby devinrent saints.", "Elle accueillit le berger Cædmon dont elle reconnut le talent poétique, premier poète anglais connu.", "Elle présida le synode de Whitby en 664 qui établit la date de Pâques dans l'Église anglaise.", "Elle mourut en 680, après six ans de maladie qu'elle supporta dans la paix.", "Elle est la patronne des femmes dans la vie consacrée en Angleterre." ] },
      "3-17": { nom: "Saint Patrick", texte: ["Patrick naquit vers 385 en Bretagne romaine, fils d'un diacre-décurion.", "À seize ans, il fut capturé par des pirates irlandais et réduit en esclavage en Irlande.", "Pendant six ans, il garda des troupeaux, développant une profonde vie de prière.", "Une voix dans un songe lui dit de fuir ; il marcha deux cents miles jusqu'au bateau qui le rapatria.", "Il étudia la théologie en Gaule puis retourna en Irlande comme évêque missionnaire.", "En quelques décennies, il évangélisa presque entièrement ce pays qui ne connaissait pas le Christ.", "Sa Confession est l'un des premiers textes autobiographiques chrétiens d'Occident.", "Il utilisa le trèfle à trois feuilles pour expliquer le mystère de la Trinité.", "Il mourut vers 461, ayant transformé l'Irlande en île des saints et des savants.", "Il est le saint patron de l'Irlande, fêté dans le monde entier." ] },
      "3-18": { nom: "Saint Cyrille de Jérusalem", texte: ["Cyrille naquit vers 315 à Jérusalem ou dans ses environs.", "Il devint évêque de Jérusalem vers 349, dans une période troublée par les controverses ariennes.", "Il fut exilé trois fois par des empereurs favorables à l'arianisme.", "Ses exils représentèrent au total une durée de seize ans sur les trente-cinq de son épiscopat.", "Ses célèbres Catéchèses mystagogiques sont un document unique sur la liturgie baptismale du IVe siècle.", "Il décrit avec précision les rites du baptême, de la confirmation et de l'eucharistie.", "Il participa au Concile de Constantinople de 381 qui confirma le dogme de la Trinité.", "Il mourut en 386, après un épiscopat marqué par la persévérance dans l'orthodoxie.", "Déclaré Docteur de l'Église par Léon XIII en 1882, il est une source précieuse pour la liturgie ancienne.", "Ses écrits sont fondamentaux pour comprendre la foi et la liturgie de l'Église primitive." ] },
      "3-19": { nom: "Saint Joseph, époux de Marie", texte: ["Joseph est l'époux de la Vierge Marie et le père nourricier de Jésus-Christ.", "Descendant de la maison royale de David, il était charpentier à Nazareth.", "Il accepta, sur la foi d'un songe, d'accueillir Marie enceinte de l'Esprit-Saint.", "Il conduisit Marie à Bethléem, accueillit la naissance de Jésus dans la pauvreté.", "Il protégea l'Enfant en fuyant en Égypte lors de la persécution d'Hérode.", "Il ramena la Sainte Famille à Nazareth et éleva Jésus dans les traditions juives.", "Il est le modèle du père de famille, du travailleur et de l'homme juste.", "Sa mort, non relatée dans les Évangiles, fut probablement douce, assisté de Jésus et de Marie.", "Le pape Pie IX le proclama patron de l'Église universelle en 1870.", "Sa fête du 19 mars est l'une des plus importantes du calendrier catholique." ] },
      "3-20": { nom: "Saint Cuthbert de Lindisfarne", texte: ["Cuthbert naquit vers 634 en Northumbrie, en Angleterre.", "Berger dans sa jeunesse, il vit un songe dans lequel il aperçut l'âme de saint Aidan montant au ciel.", "Il entra au monastère de Melrose, attiré par la vie monastique irlandaise.", "Son zèle missionnaire le poussa à évangéliser les populations des collines et des campagnes.", "Il devint prieur de Lindisfarne, la grande île monastique du nord-est de l'Angleterre.", "Après douze ans, il se retira en ermite sur l'île de Farne.", "Il fut élu évêque de Lindisfarne en 685, charge qu'il accepta difficilement.", "Il mourut en 687 sur son île de Farne, entouré de quelques disciples.", "Son corps, incorruptible selon les chroniqueurs, fut vénéré pendant des siècles.", "Il est le grand saint du nord de l'Angleterre et patron du diocèse de Durham." ] },
      "3-21": { nom: "Saint Clément Marie Hofbauer", texte: ["Clément Marie Hofbauer naquit en 1751 à Tasswitz en Moravie, dans une famille pauvre.", "D'origine tchèque, son vrai nom était Jan Dvořák, traduit en Hofbauer en allemand.", "Boulanger de formation, il aspirait depuis l'enfance à la vie religieuse.", "Il entra dans la Congrégation du Très Saint Rédempteur, les Rédemptoristes, en 1784.", "Il fut envoyé à Varsovie où il se consacra pendant vingt ans au service des pauvres et des enfants.", "Expulsé de Pologne par Napoléon en 1808, il s'établit à Vienne.", "À Vienne, il devint le centre du renouveau catholique contre l'influence des Lumières.", "Son salon spirituel rassembla les grands intellectuels et artistes catholiques de son époque.", "Il mourut en 1820 à Vienne, vénéré de toute la ville.", "Canonisé en 1909, il est le patron de Vienne et de l'Autriche." ] },
      "3-22": { nom: "Saint Léa de Rome", texte: ["Léa fut une noble romaine du IVe siècle, amie de saint Jérôme.", "Veuve, elle entra dans un monastère romain et en devint la supérieure.", "Elle rendit sa dignité contre les vêtements les plus grossiers, se mettant au service de toutes.", "Elle dormait sur la terre nue et passait ses nuits en prière plutôt qu'en bavardages.", "Sa mortification volontaire contrastait avec le luxe de ses anciennes compagnes mondaines.", "Saint Jérôme fit son éloge dans une lettre célèbre comparant sa vie à celle d'une riche mondaine.", "Cette lettre est un document précieux sur la vie des vierges consacrées à Rome au IVe siècle.", "Elle mourut vers 384, pleurée par Jérôme qui la présenta comme habitante des cieux.", "Son exemple illustre la conversion des riches aristocrates romains au christianisme rigoriste.", "Elle est vénérée comme modèle de pénitence et d'humilité." ] },
      "3-23": { nom: "Saint Turibe de Mogrovejo", texte: ["Turibe de Mogrovejo naquit en 1538 à Mayorga, en Castille.", "Brillant juriste, il était professeur à l'université de Salamanque quand Philippe II le nomma à Lima.", "Il fut ordonné évêque et devint archevêque de Lima en 1581, alors capitale du Pérou.", "Il apprit aussitôt les langues indigènes quechua et aymara pour évangéliser les populations.", "Il parcourut à pied son immense diocèse qui couvrait une grande partie de l'Amérique du Sud.", "Il défendit avec vigueur les droits des Indiens contre les abus des colonisateurs.", "Il organisa l'Église d'Amérique latine lors de trois conciles provinciaux importants.", "Il baptisa de nombreux saints futurs, dont saint Martin de Porrès et sainte Rose de Lima.", "Il mourut en 1606 à Santa, au Pérou, épuisé par ses incessants voyages apostoliques.", "Canonisé en 1726, il est le patron principal des évêques d'Amérique latine." ] },
      "3-24": { nom: "Saint Oscar Romero", texte: ["Oscar Arnulfo Romero naquit en 1917 à Ciudad Barrios, au Salvador.", "Ordonné prêtre en 1942, il devint archevêque de San Salvador en 1977.", "Sa nomination fut d'abord accueillie avec méfiance par les milieux progressistes de l'Église.", "Mais l'assassinat de son ami le père Rutilio Grande le transforma profondément.", "Il devint la voix des sans-voix, dénonçant les violences de l'État contre les pauvres.", "Ses homélies du dimanche, diffusées à la radio, touchaient des millions de Salvadoriens.", "Il dénonça les atrocités de la junte militaire et réclama la fin de la répression.", "Il fut assassiné d'une balle dans le cœur le 24 mars 1980, pendant la célébration de la messe.", "Béatifié en 2015 par le pape François, il fut canonisé en 2018.", "Il est le martyr de la justice et le symbole de la théologie de la libération." ] },
      "3-25": { nom: "Annonciation du Seigneur", texte: ["L'Annonciation célèbre la visite de l'ange Gabriel à la Vierge Marie à Nazareth.", "L'ange lui annonça qu'elle concevrait et enfanterait le Fils du Très-Haut.", "Marie demanda comment cela se ferait puisqu'elle ne connaissait pas d'homme.", "L'ange lui répondit que le Saint-Esprit viendrait sur elle et que la puissance du Très-Haut la couvrirait.", "Marie dit alors son Fiat : qu'il me soit fait selon ta parole.", "Cette réponse marque le début de l'Incarnation du Verbe de Dieu.", "La fête tombe exactement neuf mois avant Noël, le 25 décembre.", "Elle est l'une des fêtes mariales les plus anciennes du calendrier chrétien.", "Le peintre Fra Angelico en a laissé plusieurs représentations parmi les plus belles de l'histoire de l'art.", "L'Annonciation est le fondement de la foi chrétienne dans l'Incarnation du Fils de Dieu." ] },
      "3-26": { nom: "Saint Ludger", texte: ["Ludger naquit vers 742 en Frise, dans l'actuelle région des Pays-Bas.", "Il étudia à Utrecht sous la direction de saint Grégoire d'Utrecht, puis à York en Angleterre.", "Il fut ordonné prêtre et commença l'évangélisation de la Frise avec un zèle apostolique remarquable.", "L'invasion des Saxons de Widukind l'obligea à se réfugier temporairement à Rome et au Mont-Cassin.", "Il y approfondit sa vie monastique avant de retourner à sa mission.", "Charlemagne lui confia l'évangélisation de la Westphalie et de la Saxe orientale.", "Il fut nommé premier évêque de Münster en 804, qu'il avait lui-même fondée.", "Il allia son activité missionnaire à une vie monastique intense.", "Il mourut en 809, en célébrant la messe, après avoir prêché jusqu'au dernier moment.", "Il est le saint patron du diocèse de Münster et de la région de Westphalie." ] },
      "3-27": { nom: "Saint Rupert de Salzbourg", texte: ["Rupert était évêque de Worms à la fin du VIIe siècle, d'origine irlandaise ou franque.", "À la demande du duc Théodore de Bavière, il se rendit en mission dans le pays.", "Il s'établit à Juvavum, l'antique cité romaine sur la Salzach, et la rebâtit.", "Cette ville devint Salzburg, la ville du sel, grâce à l'exploitation des mines de sel qu'il développa.", "Il fonda le monastère de Saint-Pierre de Salzburg, le plus ancien d'Autriche encore en activité.", "Il fonda aussi le monastère féminin de Nonnberg pour sa nièce Erentrude.", "Son œuvre missionnaire christianisa durablement la Bavière et l'Autriche.", "Il mourut le jour de Pâques, vers 710, selon la tradition, à Salzbourg.", "Il est le saint patron de Salzbourg, dont il est le fondateur et le premier évêque.", "Sa fête est célébrée avec grande solennité dans tout l'archidiocèse de Salzburg." ] },
      "3-28": { nom: "Saint Gontran", texte: ["Gontran naquit vers 532, fils du roi des Francs Clotaire Ier et petit-fils de Clovis.", "Il devint roi de Bourgogne à la mort de son père en 561.", "Dans un monde mérovingien marqué par la violence, il se distingua par sa douceur relative.", "Il fut médiateur dans de nombreux conflits entre les royaumes francs.", "Il protégea son neveu Childebert II et son demi-frère Chilpéric contre les factions violentes.", "Sa piété le poussa à fonder des monastères et des hôpitaux dans son royaume.", "Il lutta contre les épidémies de peste qui ravagèrent son royaume en 585-586.", "Sa charité envers les pauvres et les malades lui valut une grande popularité.", "Il mourut en 592 à Chalon-sur-Saône, roi paisible dans une époque troublée.", "Il est l'un des rares rois mérovingiens à être honoré comme saint dans le martyrologe." ] },
      "3-29": { nom: "Sainte Bertille Boscardin", texte: ["Bertille Boscardin naquit en 1888 à Brendola, dans la province de Vicence, en Italie.", "Issue d'une famille pauvre, elle fut élevée dans un milieu difficile.", "Elle entra dans la Congrégation des Sœurs de Sainte Dorothée en 1905.", "Elle se consacra au service des malades dans les hôpitaux, malgré ses faibles capacités intellectuelles.", "Pendant la Première Guerre mondiale, elle travailla avec un dévouement héroïque dans les hôpitaux militaires.", "Sa bonté et sa douceur envers les blessés étaient remarquées par tous.", "Elle souffrit elle-même longtemps d'une grave maladie avant d'en mourir en 1922.", "Ses supérieures avaient parfois méconnu ses qualités, ce qu'elle supporta humblement.", "Elle fut béatifiée en 1952 et canonisée par Pie XII en 1961.", "Elle est la patronne des malades et du personnel infirmier." ] },
      "3-30": { nom: "Saint Jean Climaque", texte: ["Jean Climaque naquit vers 579, probablement en Palestine ou en Syrie.", "Il entra au monastère du Sinaï à seize ans et y vécut quarante ans comme moine.", "Après la mort de son maître spirituel, il se retira en ermite dans le désert du Sinaï.", "Sa réputation de sagesse attira de nombreux visiteurs malgré sa quête de solitude.", "Il fut élu abbé du monastère du Sinaï vers 600, peu avant sa mort.", "Son œuvre principale, l'Échelle Sainte ou Klimax, lui valut son surnom de Climaque.", "Cette œuvre décrit les trente degrés qui mènent l'âme vers Dieu, à l'image d'une échelle.", "Elle est devenue un classique de la spiritualité orientale, lue dans tous les monastères d'Orient.", "Il mourut vers 649, peu après avoir abdiqué la charge d'abbé.", "Il est vénéré dans toute l'Église orthodoxe et célébrée le quatrième dimanche du Carême." ] },
      "3-31": { nom: "Saint Benjamin", texte: ["Benjamin fut un diacre perse martyrisé en 424 sous le roi sassanide Bahram V.", "Il vivait dans le royaume de Perse où la communauté chrétienne était nombreuse.", "Arrêté lors d'une persécution contre les chrétiens, il fut emprisonné pendant un an.", "Un ambassadeur byzantin obtint sa libération à condition qu'il ne prêche plus l'Évangile.", "Il refusa catégoriquement de tenir cette promesse, affirmant qu'il ne pouvait taire sa foi.", "Réarrêté, il fut soumis à des supplices particulièrement cruels avant d'être mis à mort.", "Son courage face aux bourreaux força l'admiration même de ses ennemis.", "Son martyre est rapporté par Théodoret de Cyr dans son Histoire ecclésiastique.", "Il est vénéré comme un héros de la foi dans l'Église de Perse et dans tout l'Orient chrétien.", "Sa fête est célébrée le 31 mars dans le martyrologe romain." ] },
      "6-1": { nom: "Saint Justin, martyr", texte: ["Justin naquit vers 100 à Flavia Neapolis, en Samarie, dans une famille grecque païenne.", "Philosophe converti au christianisme vers 130, il garda jusqu'à sa mort le manteau du philosophe.", "Il fut le premier grand apologiste chrétien, défendant la foi devant les empereurs romains.", "Ses Apologies adressées à Antonin le Pieux demandaient la justice pour les chrétiens persécutés.", "Son Dialogue avec Tryphon est le premier grand texte de dialogue judéo-chrétien.", "Il enseigna librement la philosophie chrétienne à Rome dans une école renommée.", "Dénoncé par un philosophe rival, il fut arrêté avec six compagnons.", "Interrogé par le préfet Rusticus, il refusa de sacrifier aux idoles.", "Il fut décapité vers 165 à Rome, avec ses compagnons.", "Il est le patron des philosophes et des intellectuels chrétiens."] },
      "6-2": { nom: "Saints Marcellin et Pierre", texte: ["Marcellin était prêtre et Pierre exorciste dans l'Église de Rome, au IVe siècle.", "Ils furent arrêtés lors de la persécution de Dioclétien vers 304.", "Leur courage face aux persécuteurs impressionna même leurs geôliers.", "Selon la tradition, ils convertirent le geôlier et toute sa famille en prison.", "Ils furent conduits dans une forêt hors de Rome pour être décapités discrètement.", "Ils auraient eux-mêmes défriché le lieu de leur exécution en chantant des psaumes.", "Leurs corps furent retrouvés et vénérés sur la voie Labicane à Rome.", "L'empereur Constantin fit construire une basilique sur leurs tombes.", "Leurs noms figurent dans le Canon romain de la messe depuis les origines.", "Ils sont le symbole de la communion entre le prêtre et le serviteur de l'Église."] },
      "6-3": { nom: "Saint Charles Lwanga et compagnons", texte: ["Charles Lwanga et ses compagnons furent martyrisés en Ouganda entre 1885 et 1887.", "Charles était maître de pages du roi Mwanga II du Buganda.", "Le roi, irrité par l'influence chrétienne sur ses pages, ordonna leur mort.", "Vingt-deux jeunes catholiques, âgés de quatorze à trente ans, furent exécutés.", "Charles baptisa lui-même plusieurs de ses compagnons dans la nuit avant leur mort.", "Ils furent enveloppés dans des nattes de roseau et brûlés vifs à Namugongo.", "Leur courage et leur sérénité face à la mort stupéfièrent leurs bourreaux.", "Ces martyrs furent les premiers de l'Afrique noire sub-saharienne.", "Canonisés par Paul VI en 1964, ils sont les patrons de l'Afrique et de la jeunesse africaine.", "Leur sanctuaire de Namugongo est aujourd'hui un lieu de pèlerinage majeur pour toute l'Afrique."] },
      "6-4": { nom: "Sainte Clotilde", texte: ["Clotilde naquit vers 475, fille du roi burgonde Chilpéric Ier.", "Elle fut élevée dans la foi chrétienne malgré la religion arienne dominante chez les Burgondes.", "Elle épousa Clovis Ier, roi des Francs, vers 492, restant fidèle à sa foi.", "Elle entreprit de convertir son mari, ce qu'elle obtint après de longues années de prière.", "La victoire de Tolbiac en 496 décida Clovis à se faire baptiser par saint Remi.", "Ce baptême fut celui de la France et de la civilisation chrétienne occidentale.", "Veuve en 511, elle se retira au monastère de Saint-Martin de Tours.", "Elle y consacra le reste de sa vie à la prière, aux aumônes et aux soins des malades.", "Elle mourut en 545, entourée de la vénération de tout le peuple franc.", "Elle est la patronne des reines, des femmes maltaitées et des veuves."] },
      "6-5": { nom: "Saint Boniface", texte: ["Boniface naquit vers 675 en Wessex, en Angleterre, sous le nom de Winfrid.", "Il consacra sa vie à l'évangélisation de la Germanie, au nom du pape.", "Il abattit le chêne sacré de Geismar, consacré au dieu Thor, sans que rien ne lui arrive.", "Cet acte courageux provoqua de nombreuses conversions parmi les peuples germaniques.", "Il organisa l'Église en Germanie, fondant des diocèses et des monastères.", "Son monastère de Fulda, fondé en 744, devint le centre spirituel de la Germanie.", "Il réforma l'Église franque avec l'appui des papes et de Pépin le Bref.", "Il fut assassiné par des pirates frisons en 754, alors qu'il s'apprêtait à célébrer une confirmation.", "Il est le grand apôtre de l'Allemagne, dont il est le saint patron principal.", "Ses lettres sont une source précieuse sur l'évangélisation de l'Europe du VIIIe siècle."] },
      "6-6": { nom: "Saint Norbert", texte: ["Norbert naquit vers 1080 à Xanten, en Rhénanie, dans une famille noble.", "Il mena d'abord une vie mondaine à la cour de l'empereur Henri V.", "Foudroyé littéralement par la foudre lors d'un orage, il se convertit profondément.", "Il vendit tous ses biens, se fit ordonner prêtre et devint prédicateur itinérant.", "En 1120, il fonda l'ordre des Prémontrés à Prémontré, dans la forêt de l'Aisne.", "Cet ordre combinait la vie contemplative monastique et l'action pastorale.", "Il fut nommé archevêque de Magdebourg en 1126, charge qu'il accepta contre sa volonté.", "Il lutta avec énergie pour la liberté de l'Église contre les prétentions royales.", "Il mourut à Magdebourg en 1134, épuisé par ses travaux et ses pénitences.", "Canonisé en 1582, il est le fondateur de l'ordre des Chanoines Prémontrés."] },
      "6-7": { nom: "Bienheureuse Anne de Saint-Barthélemy", texte: ["Anne de Saint-Barthélemy naquit en 1549 à Almendral, en Castille, dans une famille paysanne.", "À vingt ans, elle entra chez les Carmélites comme sœur converse.", "Elle devint la compagne et l'infirmière de sainte Thérèse d'Avila dans ses dernières années.", "Elle tint la tête de Thérèse mourante dans ses bras lors de sa mort en 1582.", "Après la mort de Thérèse, elle fut autorisée à faire profession comme sœur choriste.", "Elle accompagna le groupe de carmélites qui portèrent la réforme aux Pays-Bas et en France.", "Elle fonda le Carmel d'Anvers en 1612, qui devint un foyer spirituel important.", "Sa sainteté et ses écrits mystiques lui valurent une grande réputation en Europe.", "Elle mourut à Anvers en 1626, après une vie entière consacrée au Carmel.", "Béatifiée en 1917 par Benoît XV, elle est vénérée comme témoin de sainte Thérèse."] },
      "6-8": { nom: "Saint Médard de Noyon", texte: ["Médard naquit vers 456 à Salency, en Picardie, dans une famille noble.", "Il fut ordonné prêtre et se distingua par sa charité et son zèle pastoral.", "Il fut élu évêque de Vermand, puis transféra son siège à Noyon.", "Il évangélisa la région de Noyon avec un zèle apostolique remarquable.", "Il est célèbre pour avoir institué à Salency la fête de la Rosière, récompensant la plus vertueuse des jeunes filles.", "Cette tradition, très populaire en France, fut célébrée pendant des siècles.", "Il baptisa le roi franc Clotaire Ier et joua un rôle important dans la christianisation des Francs.", "Il mourut vers 560 à Noyon, entouré de la vénération de tout le peuple.", "Sa fête, le 8 juin, est associée dans la tradition populaire aux prévisions météorologiques.", "On dit que s'il pleut le jour de la Saint-Médard, il pleuvra quarante jours de suite."] },
      "6-9": { nom: "Saint Éphrem de Nisibe", texte: ["Éphrem naquit vers 306 à Nisibe, en Mésopotamie, dans l'actuelle Turquie du sud-est.", "Il fut diacre et ne devint jamais prêtre, par humilité selon la tradition.", "Son œuvre poétique et théologique en langue syriaque est d'une richesse extraordinaire.", "Il est surnommé la cithare du Saint-Esprit tant ses hymnes sont d'une beauté musicale.", "Ses hymnes et ses sermons en vers furent chantés dans les Églises syriaques pendant des siècles.", "Il combattit les hérésies gnostiques et manichéennes qui menaçaient les chrétiens d'Orient.", "Quand Nisibe fut cédée aux Perses, il se réfugia à Édesse où il continua son œuvre.", "Il mourut en 373, peu après avoir soigné les victimes d'une famine.", "Déclaré Docteur de l'Église en 1920 par Benoît XV, il est le seul père syriaque à avoir ce titre.", "Il est le principal poète de l'Église syrienne et le symbole de la liturgie d'Orient."] },
      "6-10": { nom: "Saint Landericus de Paris", texte: ["Landericus fut évêque de Paris au VIIe siècle, fils de saint Vincent Madelgaire.", "Sa famille entière est vénérée comme sainte, cas exceptionnel dans l'hagiographie médiévale.", "Il fonda en 651 l'Hôtel-Dieu de Paris, le premier hôpital de la capitale.", "Cet établissement, qui existe toujours près de Notre-Dame de Paris, est l'un des plus anciens du monde.", "Il confia la direction de cet hôpital aux religieuses qui le gérèrent pendant des siècles.", "Sa charité envers les malades et les pauvres était exemplaire et sans limite.", "Il distribua sa fortune personnelle pour financer les soins des indigents.", "Il présida plusieurs synodes qui organisèrent l'Église franque de son époque.", "Il mourut vers 661, pleuré par tout le peuple de Paris.", "Il est vénéré comme le fondateur de l'hôpital public en France."] },
      "6-11": { nom: "Saint Barnabé", texte: ["Barnabé était un juif de l'île de Chypre, de la tribu de Lévi.", "Son vrai nom était Joseph, mais les apôtres le surnommèrent Barnabé, fils du réconfort.", "Il vendit son champ et déposa l'argent aux pieds des apôtres, acte de charité exemplaire.", "Il présenta Paul au collège apostolique après sa conversion, levant les méfiances.", "Avec Paul, il accomplit le premier voyage missionnaire en Asie Mineure et à Chypre.", "Ils évangélisèrent ensemble Antioche de Pisidie, Iconium, Lystres et Derbé.", "Il participa au Concile de Jérusalem en 49, qui ouvrit l'Église aux pagano-chrétiens.", "Après une séparation avec Paul, il continua sa mission à Chypre avec Marc.", "Il fut lapidé à Salamine de Chypre vers 61, selon la tradition.", "Il est le saint patron de Chypre et de l'île où il évangélisa toute sa vie."] },
      "6-12": { nom: "Saint Guy de Cortone", texte: ["Guy naquit vers 1185 à Cortone, en Toscane, dans une famille aisée.", "Lors d'un pèlerinage à Saint-Jacques-de-Compostelle, il rencontra François d'Assise.", "Cette rencontre fut décisive : il distribua tous ses biens et suivit François.", "Il fut l'un des premiers compagnons du Poverello d'Assise.", "François l'envoya fonder un couvent à Cortone, sa ville natale.", "Il y vécut dans une grande pauvreté et une prière intense pendant de nombreuses années.", "Ses miracles nombreux lui valurent une grande réputation dans toute la Toscane.", "Sa charité envers les malades et les lépreux était sans limites.", "Il mourut vers 1250 à Cortone, entouré de ses frères franciscains.", "Canonisé en 1583 par Grégoire XIII, il est le patron de Cortone."] },
      "6-13": { nom: "Saint Antoine de Padoue", texte: ["Antoine naquit en 1195 à Lisbonne, Portugal, dans une famille noble.", "Il entra d'abord chez les Augustins, puis rejoignit les Franciscains, touché par le martyre des frères au Maroc.", "Sa prédication contre l'hérésie cathare fut si efficace qu'on le surnomma le marteau des hérétiques.", "François d'Assise lui permit d'enseigner la théologie aux frères, exception unique dans l'ordre.", "Sa prédication populaire attirait des foules si grandes qu'il devait prêcher en plein air.", "Il mourut épuisé à Padoue en 1231, à l'âge de trente-six ans seulement.", "Canonisé en moins d'un an après sa mort, record absolu dans l'histoire de l'Église.", "Son tombeau à Padoue est l'un des lieux de pèlerinage les plus fréquentés du monde.", "Il est invoqué pour retrouver les objets perdus et pour les causes impossibles.", "Il est le patron du Portugal, des pauvres, des opprimés et des amoureux."] },
      "6-14": { nom: "Saint Élisée", texte: ["Élisée fut le disciple et successeur du prophète Élie dans l'Ancien Testament.", "Son nom signifie Mon Dieu est salut en hébreu.", "Il fut appelé par Élie alors qu'il labourait son champ avec douze paires de bœufs.", "Il abandonna tout et suivit Élie, devenant son serviteur et disciple pendant des années.", "Lors de l'enlèvement d'Élie dans le char de feu, il reçut une double part de son esprit.", "Il accomplit de nombreux miracles : multiplication d'huile, résurrection d'un enfant, guérison de Naaman.", "La guérison de Naaman le Syrien lépreux est l'un des récits les plus frappants de la Bible.", "Jésus cite ce miracle pour illustrer l'universalité du salut dès le début de son ministère.", "Il mourut à un âge avancé après avoir exercé le ministère prophétique pendant soixante ans.", "Il est vénéré comme prophète dans les traditions chrétienne, juive et musulmane."] },
      "6-15": { nom: "Saint Vite", texte: ["Vite, ou Guy, fut un martyr sicilien des premiers siècles du christianisme.", "Selon la tradition, il souffrit le martyre vers 303, sous l'empereur Dioclétien.", "Il était un jeune garçon chrétien de Sicile, fils d'un sénateur romain.", "Son précepteur Modeste et sa nourrice Crescence partagèrent son martyre.", "Ils furent plongés dans une chaudière de plomb bouillant, dont ils sortirent indemnes.", "Ils furent finalement mis à mort après de nombreux supplices.", "Saint Guy est l'un des Quatorze Saints Auxiliateurs, invoqués pour des grâces particulières.", "Il est invoqué contre l'épilepsie, la danse de Saint-Guy ou chorée, et les morsures de serpent.", "La danse de Saint-Guy, ou chorée, tire son nom de la croyance qu'il en guérissait.", "Il est le patron des acteurs, des danseurs et des épileptiques."] },
      "6-16": { nom: "Saint Ferréol de Vienne", texte: ["Ferréol fut un tribun militaire romain converti au christianisme au IIIe siècle.", "Il servait à Vienne, en Gaule, sous l'autorité du gouverneur Crispin.", "Accusé d'être chrétien, il fut arrêté et condamné à abjurer sa foi.", "Ayant refusé, il fut soumis à des supplices puis jeté dans le Rhône les pieds liés.", "Il émergea miraculeusement de l'eau et tenta de fuir, mais fut rattrapé.", "Il fut décapité vers 212, après avoir refusé jusqu'au bout de renier le Christ.", "Son corps fut recueilli par des chrétiens et inhumé pieusement à Vienne.", "Saint Irénée de Lyon était contemporain et connaissait sa communauté chrétienne.", "Une basilique lui fut dédiée à Vienne dès l'Antiquité.", "Il est le patron de la ville de Vienne et de plusieurs localités de la région Rhône-Alpes."] },
      "6-17": { nom: "Saint Hervé", texte: ["Hervé est l'un des saints les plus populaires de Bretagne, fils d'un barde gallois.", "Son père Hyvarnion vint s'établir en Armorique, attirés par la réputation de la Bretagne chrétienne.", "Hervé naquit aveugle et le demeura toute sa vie, offrant cette épreuve à Dieu.", "Malgré sa cécité, il fonda le monastère de Lanhourneau, dans le Finistère.", "La légende dit qu'il apprivoisa un loup qui avait dévoré son âne et l'obligea à le remplacer.", "Sa douceur avec les animaux et son union à Dieu lui valurent une grande réputation de sainteté.", "Il parcourait la Bretagne conduit par un jeune garçon, prêchant et chantant des hymnes.", "Il mourut vers 575, et son culte s'étendit rapidement dans toute la Bretagne.", "Plusieurs villages bretons portent son nom, témoignant de sa popularité.", "Il est invoqué contre les maladies des yeux et pour les enfants aveugles."] },
      "6-18": { nom: "Saint Grégoire Barbarigo", texte: ["Grégoire Barbarigo naquit en 1625 à Venise, dans une noble famille patricienne.", "Il accompagna le doge de Venise à Münster lors des négociations de la paix de Westphalie.", "Cette expérience lui révèle l'état déplorable de l'Église dans les pays protestants.", "Entré dans les ordres, il fut nommé évêque de Bergame puis cardinal.", "Élu évêque de Padoue en 1664, il s'y consacra avec un dévouement exemplaire.", "Il fonda un séminaire modèle et une imprimerie polyglotte pour la diffusion de la foi.", "Sa charité envers les malades, les pauvres et les prisonniers était légendaire.", "Il fut plusieurs fois proposé pour le pontificat mais refusa toujours ces avances.", "Il mourut en 1697 à Padoue, vénéré de tout son peuple.", "Canonisé par Jean XXIII en 1960, il est le patron du dialogue œcuménique."] },
      "6-19": { nom: "Saint Romuald", texte: ["Romuald naquit vers 952 à Ravenne, dans une famille noble italienne.", "Témoin d'un duel où son père tua un parent, il se retira en pénitence dans un monastère.", "Il entra ensuite dans l'ordre bénédictin, mais cherchait une vie plus austère.", "Il passa des années à parcourir l'Italie, réformant des monastères et fondant des ermitages.", "En 1012, il fonda à Camaldoli, en Toscane, la congrégation des Camaldules.", "Cette congrégation allie la vie érémitique la plus solitaire et la vie cénobitique communautaire.", "Son idéal était de créer un désert en Occident, à l'image des pères du désert d'Orient.", "Il mourut en 1027 à Val di Castro, seul dans sa cellule, comme il l'avait souhaité.", "Canonisé en 1595 par Clément VIII, il est le fondateur de l'ordre camaldule.", "Il est le modèle de la vie érémitique dans la tradition bénédictine occidentale."] },
      "6-20": { nom: "Saint Silverius, pape", texte: ["Silverius fut pape de juin 536 à novembre 537, pendant un pontificat tragique.", "Fils du pape Hormisdas, il fut élu pape par les Ostrogoths alors que Rome était assiégée.", "L'impératrice Théodora, favorable aux monophysites, cherchait à le déposer.", "Le général byzantin Bélisaire occupa Rome et exila Silverius sur l'île de Ponza.", "Il fut déposé sous de fausses accusations de trahison et contraint à l'abdication.", "Exilé dans des conditions misérables sur l'île de Ponza, il y mourut de faim en 537.", "Son successeur Vigile, imposé par Théodora, ne put empêcher sa mort.", "Il est vénéré comme martyr par l'Église catholique.", "Sa tombe sur l'île de Ponza est encore un lieu de pèlerinage local.", "Il illustre les terribles pressions politiques que subissaient les papes au VIe siècle."] },
      "6-21": { nom: "Saint Louis de Gonzague", texte: ["Louis naquit en 1568 à Castiglione delle Stiviere, dans le Mantouan, fils d'un marquis.", "À neuf ans, après avoir vu les misères de la guerre, il fit vœu de chasteté perpétuelle.", "Contre la volonté de son père, il renonça à ses titres de noblesse pour entrer chez les Jésuites.", "Sa vie religieuse fut marquée par une austérité héroïque et une prière intense.", "Lors de l'épidémie de peste de 1591, il se dévoua au service des malades dans les hôpitaux de Rome.", "Il contracta lui-même la maladie et mourut le 21 juin 1591, à l'âge de vingt-trois ans.", "Ses directeurs spirituels, dont saint Robert Bellarmin, attestèrent sa perfection spirituelle.", "Il fut canonisé en 1726 par Benoît XIII.", "Déclaré patron de la jeunesse chrétienne, il l'est aussi pour les malades du sida.", "Sa pureté angélique et son sacrifice en font le modèle des jeunes chrétiens."] },
      "6-22": { nom: "Saint Thomas More", texte: ["Thomas More naquit en 1478 à Londres, dans une famille de juristes.", "Brillant humaniste et ami d'Érasme, il devint l'un des plus grands hommes d'État anglais.", "Il fut Lord Chancelier d'Angleterre, la plus haute charge du royaume après le roi.", "Il refusa de reconnaître Henri VIII comme chef suprême de l'Église d'Angleterre.", "Emprisonné à la Tour de Londres en 1534, il maintint son refus pendant plus d'un an.", "Il fut condamné pour trahison et décapité le 6 juillet 1535 sur Tower Hill.", "Ses dernières paroles furent : Je meurs bon serviteur du roi, mais d'abord serviteur de Dieu.", "Canonisé avec l'évêque John Fisher en 1935 par Pie XI, il est un martyr de la conscience.", "Son œuvre littéraire, notamment L'Utopie, est un chef-d'œuvre de la pensée humaniste.", "Il est le patron des hommes politiques, des avocats et des hommes de loi."] },
