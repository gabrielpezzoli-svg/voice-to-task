      "6-17": { nom: "Saint Hervé", texte: ["Hervé est l'un des saints les plus populaires de Bretagne, fils d'un barde gallois.", "Son père Hyvarnion vint s'établir en Armorique, attirés par la réputation de la Bretagne chrétienne.", "Hervé naquit aveugle et le demeura toute sa vie, offrant cette épreuve à Dieu.", "Malgré sa cécité, il fonda le monastère de Lanhourneau, dans le Finistère.", "La légende dit qu'il apprivoisa un loup qui avait dévoré son âne et l'obligea à le remplacer.", "Sa douceur avec les animaux et son union à Dieu lui valurent une grande réputation de sainteté.", "Il parcourait la Bretagne conduit par un jeune garçon, prêchant et chantant des hymnes.", "Il mourut vers 575, et son culte s'étendit rapidement dans toute la Bretagne.", "Plusieurs villages bretons portent son nom, témoignant de sa popularité.", "Il est invoqué contre les maladies des yeux et pour les enfants aveugles."] },
      "6-18": { nom: "Saint Grégoire Barbarigo", texte: ["Grégoire Barbarigo naquit en 1625 à Venise, dans une noble famille patricienne.", "Il accompagna le doge de Venise à Münster lors des négociations de la paix de Westphalie.", "Cette expérience lui révèle l'état déplorable de l'Église dans les pays protestants.", "Entré dans les ordres, il fut nommé évêque de Bergame puis cardinal.", "Élu évêque de Padoue en 1664, il s'y consacra avec un dévouement exemplaire.", "Il fonda un séminaire modèle et une imprimerie polyglotte pour la diffusion de la foi.", "Sa charité envers les malades, les pauvres et les prisonniers était légendaire.", "Il fut plusieurs fois proposé pour le pontificat mais refusa toujours ces avances.", "Il mourut en 1697 à Padoue, vénéré de tout son peuple.", "Canonisé par Jean XXIII en 1960, il est le patron du dialogue œcuménique."] },
      "6-19": { nom: "Saint Romuald", texte: ["Romuald naquit vers 952 à Ravenne, dans une famille noble italienne.", "Témoin d'un duel où son père tua un parent, il se retira en pénitence dans un monastère.", "Il entra ensuite dans l'ordre bénédictin, mais cherchait une vie plus austère.", "Il passa des années à parcourir l'Italie, réformant des monastères et fondant des ermitages.", "En 1012, il fonda à Camaldoli, en Toscane, la congrégation des Camaldules.", "Cette congrégation allie la vie érémitique la plus solitaire et la vie cénobitique communautaire.", "Son idéal était de créer un désert en Occident, à l'image des pères du désert d'Orient.", "Il mourut en 1027 à Val di Castro, seul dans sa cellule, comme il l'avait souhaité.", "Canonisé en 1595 par Clément VIII, il est le fondateur de l'ordre camaldule.", "Il est le modèle de la vie érémitique dans la tradition bénédictine occidentale."] },
      "6-20": { nom: "Saint Silverius, pape", texte: ["Silverius fut pape de juin 536 à novembre 537, pendant un pontificat tragique.", "Fils du pape Hormisdas, il fut élu pape par les Ostrogoths alors que Rome était assiégée.", "L'impératrice Théodora, favorable aux monophysites, cherchait à le déposer.", "Le général byzantin Bélisaire occupa Rome et exila Silverius sur l'île de Ponza.", "Il fut déposé sous de fausses accusations de trahison et contraint à l'abdication.", "Exilé dans des conditions misérables sur l'île de Ponza, il y mourut de faim en 537.", "Son successeur Vigile, imposé par Théodora, ne put empêcher sa mort.", "Il est vénéré comme martyr par l'Église catholique.", "Sa tombe sur l'île de Ponza est encore un lieu de pèlerinage local.", "Il illustre les terribles pressions politiques que subissaient les papes au VIe siècle."] },
      "6-21": { nom: "Saint Louis de Gonzague", texte: ["Louis naquit en 1568 à Castiglione delle Stiviere, dans le Mantouan, fils d'un marquis.", "À neuf ans, après avoir vu les misères de la guerre, il fit vœu de chasteté perpétuelle.", "Contre la volonté de son père, il renonça à ses titres de noblesse pour entrer chez les Jésuites.", "Sa vie religieuse fut marquée par une austérité héroïque et une prière intense.", "Lors de l'épidémie de peste de 1591, il se dévoua au service des malades dans les hôpitaux de Rome.", "Il contracta lui-même la maladie et mourut le 21 juin 1591, à l'âge de vingt-trois ans.", "Ses directeurs spirituels, dont saint Robert Bellarmin, attestèrent sa perfection spirituelle.", "Il fut canonisé en 1726 par Benoît XIII.", "Déclaré patron de la jeunesse chrétienne, il l'est aussi pour les malades du sida.", "Sa pureté angélique et son sacrifice en font le modèle des jeunes chrétiens."] },
      "6-22": { nom: "Saint Thomas More", texte: ["Thomas More naquit en 1478 à Londres, dans une famille de juristes.", "Brillant humaniste et ami d'Érasme, il devint l'un des plus grands hommes d'État anglais.", "Il fut Lord Chancelier d'Angleterre, la plus haute charge du royaume après le roi.", "Il refusa de reconnaître Henri VIII comme chef suprême de l'Église d'Angleterre.", "Emprisonné à la Tour de Londres en 1534, il maintint son refus pendant plus d'un an.", "Il fut condamné pour trahison et décapité le 6 juillet 1535 sur Tower Hill.", "Ses dernières paroles furent : Je meurs bon serviteur du roi, mais d'abord serviteur de Dieu.", "Canonisé avec l'évêque John Fisher en 1935 par Pie XI, il est un martyr de la conscience.", "Son œuvre littéraire, notamment L'Utopie, est un chef-d'œuvre de la pensée humaniste.", "Il est le patron des hommes politiques, des avocats et des hommes de loi."] },
      "6-23": { nom: "Sainte Audrey", texte: ["Audrey, en latin Étheldrède, naquit vers 636 en Angleterre, fille du roi d'Est-Anglie.", "Mariée deux fois contre sa volonté, elle maintint sa résolution de vivre dans la chasteté.", "Son second mari, le roi Egfrid de Northumbrie, finit par lui accorder la séparation.", "Elle fonda le double monastère d'Ely, en 673, qui devint l'un des plus importants d'Angleterre.", "Elle gouverna cette communauté avec sagesse et sainteté pendant de nombreuses années.", "Elle mourut d'une tumeur au cou en 679, qu'elle accepta comme punition de ses colliers de jeunesse.", "Son corps fut retrouvé incorruptible lors de la translation de ses reliques.", "Sa translation donna naissance au mot anglais tawdry, désignant les dentelles bon marché vendues à sa fête.", "La cathédrale d'Ely, magnifique édifice roman et gothique, est élevée sur le site de son monastère.", "Elle est la patronne des femmes souffrant de maladies du cou et de la gorge."] },
      "6-24": { nom: "Nativité de saint Jean-Baptiste", texte: ["La naissance de Jean-Baptiste est l'une des rares nativités célébrées par l'Église.", "Il naquit six mois avant Jésus, fils de Zacharie et d'Élisabeth, cousine de Marie.", "Sa naissance miraculeuse à des parents âgés fut annoncée par l'ange Gabriel au Temple.", "Son père Zacharie fut frappé de mutisme pour avoir douté, et retrouva la parole à la naissance.", "Le cantique Benedictus, prononcé par Zacharie, est chanté chaque matin aux Laudes.", "Jean vécut en ermite dans le désert, vêtu de poils de chameau, se nourrissant de sauterelles.", "Il baptisa Jésus dans le Jourdain et proclama qu'il n'était pas digne de délier ses sandales.", "Il fut emprisonné par Hérode Antipas pour avoir condamné son mariage adultère.", "Il fut décapité sur la demande de Salomé, fille d'Hérodiade.", "Il est le plus grand des prophètes, selon les paroles de Jésus lui-même."] },
      "6-25": { nom: "Saint Guillaume de Verceil", texte: ["Guillaume naquit en 1085 à Verceil, en Piémont, dans une famille noble.", "Orphelin dès l'enfance, il fut élevé par un parent et reçut une éducation soignée.", "À quatorze ans, il entreprit un pèlerinage à Compostelle en solitaire.", "De retour en Italie, il vécut en ermite sur le mont Vergine, en Campanie.", "Des disciples attirés par sa sainteté lui demandèrent de les diriger.", "Il fonda en 1119 la congrégation des Guillelmites sur le mont Vergine.", "Cette congrégation bénédictine contemplative est encore présente aujourd'hui.", "Il refusa l'épiscopat qui lui fut proposé à plusieurs reprises.", "Il mourut en 1142 à Goleto, après avoir fondé plusieurs monastères dans le sud de l'Italie.", "Le sanctuaire du mont Vergine est l'un des lieux de pèlerinage les plus fréquentés du sud de l'Italie."] },
      "6-26": { nom: "Saint Josémaria Escrivá", texte: ["Josémaria Escrivá naquit en 1902 à Barbastro, en Aragon, dans une famille chrétienne.", "Ordonné prêtre en 1925, il reçut le 2 octobre 1928 l'inspiration de fonder l'Opus Dei.", "L'Opus Dei propose aux laïcs de sanctifier leur vie professionnelle et familiale ordinaire.", "Sa conviction était que tous les chrétiens sont appelés à la sainteté dans leur vie quotidienne.", "Il vécut la Guerre Civile espagnole dans des conditions périlleuses, se réfugiant dans des ambassades.", "Il s'installa à Rome en 1946 et dirigea l'Opus Dei depuis le siège mondial.", "Son œuvre Chemin, recueil de maximes spirituelles, a été traduite en quarante langues.", "Il fonda en 1952 l'Université de Navarre, à Pampelune, centre d'excellence académique.", "Il mourut à Rome en 1975, après avoir vu son œuvre se répandre dans les cinq continents.", "Canonisé par Jean-Paul II en 2002, il est le fondateur de l'Opus Dei."] },
      "6-27": { nom: "Saint Cyrille d'Alexandrie", texte: ["Cyrille naquit vers 376 à Alexandrie, neveu du patriarche Théophile d'Alexandrie.", "Il lui succéda comme patriarche d'Alexandrie en 412, dans des circonstances controversées.", "Son patriarcat de trente-deux ans fut marqué par des conflits avec les autorités civiles.", "Il lutta avec énergie contre les nestoriens, qui niaient la maternité divine de Marie.", "Il convoqua le Concile d'Éphèse en 431, qui proclama Marie Theotokos, Mère de Dieu.", "Ce concile est l'un des plus importants de l'histoire de l'Église pour la foi mariale.", "Ses écrits exégétiques et théologiques sont d'une richesse et d'une précision remarquables.", "Son traité Sur l'incarnation du Fils unique est un chef-d'œuvre de la théologie patristique.", "Il mourut en 444, après un épiscopat long et combatif.", "Déclaré Docteur de l'Église en 1882 par Léon XIII, il est le Docteur de l'Incarnation."] },
      "6-28": { nom: "Saint Irénée de Lyon", texte: ["Irénée naquit vers 130 en Asie Mineure, probablement à Smyrne.", "Dans sa jeunesse, il connut saint Polycarpe, disciple direct de l'apôtre Jean.", "Il vint à Lyon où il devint prêtre puis évêque vers 177.", "Son épiscopat fut marqué par la lutte contre les sectes gnostiques qui proliféraient à Lyon.", "Son traité Contre les hérésies est le premier grand ouvrage de théologie systématique.", "Il y expose et réfute point par point les doctrines des différentes sectes gnostiques.", "Il est le père de la théologie catholique et un témoin de la tradition apostolique.", "Il joua un rôle de médiateur entre Rome et les chrétiens d'Asie lors de la controverse pascale.", "Il mourut probablement en martyr vers 202, lors de la persécution de Septime Sévère.", "Déclaré Docteur de l'Église par François en 2022, il est le premier Docteur de la Gaule."] },
      "6-29": { nom: "Saints Pierre et Paul", texte: ["La fête des saints Pierre et Paul, le 29 juin, est l'une des plus solennelles du calendrier.", "Pierre, le pêcheur de Galilée, fut choisi par Jésus comme chef des apôtres.", "Il fut le premier à confesser la messianité de Jésus à Césarée de Philippe.", "Après la Pentecôte, il dirigea la communauté de Jérusalem puis fonda l'Église de Rome.", "Il fut crucifié la tête en bas sous Néron, vers 64, ne se jugeant pas digne de mourir comme son Maître.", "Paul, le persécuteur converti, devint le plus grand missionnaire de l'histoire chrétienne.", "Il parcourut tout le bassin méditerranéen en trois grands voyages apostoliques.", "Ses Épîtres constituent une part majeure du Nouveau Testament et de la théologie chrétienne.", "Il fut décapité à Rome, vers 67, comme citoyen romain.", "Ces deux colonnes de l'Église donnèrent à Rome sa vocation de siège de la chrétienté."] },
      "6-30": { nom: "Les Premiers Martyrs de l'Église Romaine", texte: ["Le 30 juin, l'Église commémore les premiers martyrs qui souffrirent à Rome sous Néron.", "En 64, un incendie dévastateur ravagea Rome pendant neuf jours.", "L'empereur Néron accusa les chrétiens d'avoir allumé cet incendie pour détourner les soupçons.", "Une grande persécution s'abattit alors sur la communauté chrétienne de Rome.", "Des centaines de chrétiens furent arrêtés et mis à mort de manière atroce.", "Certains furent revêtus de peaux de bêtes et livrés aux chiens.", "D'autres furent crucifiés ou brûlés vifs pour servir de torches nocturnes dans les jardins de Néron.", "Tacite, historien romain, rapporte ces événements avec émotion dans ses Annales.", "Ce fut la première grande persécution systématique des chrétiens dans l'Empire romain.", "Ces martyrs anonymes sont les fondements invisibles de l'Église de Rome."] },
      "7-1": { nom: "Saint Théobald d'Arles", texte: ["Théobald naquit vers 1017 dans une famille noble du midi de la France.", "Refusant la vie mondaine et les avantages de sa naissance, il choisit la vie érémitique.", "Il parcourut de nombreux lieux saints en pèlerin, visitant Rome, Compostelle et la Terre Sainte.", "Il s'établit finalement en ermite dans la forêt de Salanques, en Catalogne.", "Des disciples attirés par sa réputation de sainteté vinrent le rejoindre.", "Il fonda ainsi une petite communauté érémitique selon la tradition des pères du désert.", "Ses miracles nombreux et sa sagesse lui valurent une grande réputation dans toute la région.", "Il mourut vers 1066, entouré de ses disciples dans sa chère forêt.", "Son tombeau devint rapidement un lieu de pèlerinage fréquenté.", "Il est vénéré en Catalogne et dans le midi de la France comme modèle de vie érémitique."] },
      "7-2": { nom: "Saint Processus et saint Martinien", texte: ["Processus et Martinien furent des martyrs romains vénérés depuis les premiers siècles.", "Selon la tradition, ils étaient gardiens de la prison Mamertine où furent enfermés Pierre et Paul.", "Convertis au christianisme par les deux apôtres, ils leur auraient permis de baptiser des codétenus.", "Arrêtés pour leur foi, ils furent soumis à de nombreux supplices avant d'être décapités.", "Leurs corps furent ensevelis sur la voie Aurélienne, à Rome.", "L'impératrice Symmacha fit construire une basilique sur leur tombeau au IVe siècle.", "Leurs reliques furent ensuite transférées dans la basilique Saint-Pierre du Vatican.", "Ils figurent parmi les plus anciens martyrs vénérés dans la liturgie romaine.", "Leurs noms apparaissent dans les plus anciens martyrologes de l'Église de Rome.", "Ils illustrent le lien entre l'apostolat de Pierre et Paul et la naissance de l'Église romaine."] },
      "7-3": { nom: "Saint Thomas, apôtre", texte: ["Thomas, surnommé Didyme ce qui signifie jumeau, était l'un des douze apôtres.", "Sa question lors du dernier Repas amena une réponse fondamentale de Jésus sur le chemin vers le Père.", "Son doute après la Résurrection est devenu universel : l'incrédulité de Thomas est entrée dans le langage courant.", "Jésus lui offrit de toucher ses plaies, et Thomas s'écria : Mon Seigneur et mon Dieu !", "La tradition l'envoie en mission en Perse, en Inde et en Chine.", "Il aurait évangélisé le sud de l'Inde, où la communauté chrétienne de saint Thomas existe toujours.", "Il fut martyrisé à Mylapore, près de l'actuelle Chennai, vers 72.", "Sa tombe fut vénérée dès l'Antiquité et une grande cathédrale lui est dédiée à Chennai.", "Les chrétiens de saint Thomas forment l'une des plus anciennes communautés chrétiennes du monde.", "Il est le patron du Portugal, de l'Inde et des architectes."] },
      "7-4": { nom: "Sainte Élisabeth du Portugal", texte: ["Élisabeth naquit en 1271 à Saragosse, fille du roi Pierre III d'Aragon.", "Elle fut nommée Isabelle en espagnol et Élisabeth en portugais, en hommage à sainte Élisabeth de Hongrie.", "Elle épousa à douze ans le roi Denis Ier du Portugal, avec qui elle eut deux enfants.", "Malgré les infidélités de son mari, elle l'aima fidèlement et intercéda pour ses enfants illégitimes.", "Sa charité envers les pauvres, les malades et les pèlerins était inépuisable.", "La légende des roses lui est attribuée, comme à sainte Élisabeth de Hongrie.", "Elle joua un rôle de médiatrice dans de nombreux conflits entre rois chrétiens.", "Veuve en 1325, elle voulut entrer au couvent mais on lui demanda de rester dans le monde.", "Elle mourut en 1336 à Estremoz, en revenant d'une mission de médiation.", "Canonisée en 1625 par Urbain VIII, elle est la patronne du Portugal avec saint Antoine."] },
      "7-5": { nom: "Saint Antoine Zaccaria", texte: ["Antoine Zaccaria naquit en 1502 à Crémone, dans une famille noble lombarde.", "Médecin de formation, il ressentit un appel à soigner les âmes plutôt que les corps.", "Il fut ordonné prêtre en 1528 et se consacra à la prédication et à la réforme morale.", "Il fonda en 1530 les Barnabites, congrégation dédiée à la réforme du clergé et du peuple.", "Leur règle insistait sur la prédication fréquente et la fréquentation des sacrements.", "Il contribua à rétablir la pratique du carillon des cloches le jeudi à trois heures, pour rappeler la Passion.", "Il fonda également une congrégation féminine, les Angelines de Saint Paul.", "Sa santé fragile fut épuisée par ses travaux et ses pénitences.", "Il mourut en 1539 à Crémone, à l'âge de seulement trente-six ans.", "Canonisé par Léon XIII en 1897, il est le fondateur des Barnabites."] },
      "7-6": { nom: "Sainte Maria Goretti", texte: ["Maria Goretti naquit en 1890 à Corinaldo, dans les Marches, dans une famille de paysans pauvres.", "Sa famille s'établit dans les marais Pontins, région insalubre où son père mourut du paludisme.", "À onze ans, elle gérait la maison tandis que sa mère travaillait aux champs.", "Alessandro Serenelli, fils du patron de la ferme, tenta de la violer en juillet 1902.", "Elle résista en disant qu'elle préférait mourir plutôt que de commettre ce péché.", "Alessandro la poignarda de quatorze coups de couteau.", "Avant de mourir le lendemain, elle pardonna à son agresseur avec une sérénité étonnante.", "Alessandro, condamné à trente ans de prison, fut converti par une vision de Maria.", "Il témoigna à sa canonisation et devint frère lai franciscain.", "Canonisée en 1950 par Pie XII, elle est la patronne des jeunes filles et des victimes de viol."] },
      "7-7": { nom: "Bienheureuse Marie-Thérèse de Soubiran", texte: ["Marie-Thérèse de Soubiran naquit en 1834 à Castelnaudary, dans l'Aude.", "Profondément pieuse dès l'enfance, elle fonda en 1864 la Société de Notre-Dame du Cénacle.", "Cette congrégation se consacre aux retraites spirituelles selon la méthode ignacienne.", "Elle fut injustement dépossédée de sa charge de supérieure par une compagne envieuse.", "Elle vécut cette humiliation dans un total abandon à la volonté divine, sans se plaindre.", "Elle passa les dernières années de sa vie comme simple sœur dans une autre communauté.", "Sa foi inébranlable et sa charité héroïque ne se démentaient jamais dans l'épreuve.", "Elle mourut en 1889, ayant été réhabilitée peu avant sa mort.", "Béatifiée par Paul VI en 1982, elle est le modèle de la fidélité dans l'épreuve.", "Sa congrégation est présente dans de nombreux pays et gère des maisons de retraites spirituelles."] },
      "7-8": { nom: "Saint Thibaut de Marly", texte: ["Thibaut de Marly naquit vers 1130 dans une famille noble de l'Île-de-France.", "Il était apparenté aux rois de France et avait une brillante carrière devant lui.", "Touché par la grâce, il abandonna le monde et entra dans l'ordre cistercien.", "Il fut moine à l'abbaye des Vaux-de-Cernay, dans la forêt de Rambouillet.", "Sa réputation de sainteté lui valut d'être élu abbé de ce monastère.", "Il fut le confesseur et le directeur spirituel de Blanche de Castille, mère de saint Louis.", "Sa douceur et sa profondeur spirituelle attiraient les grands de ce monde à sa cellule.", "Il mourut en 1247, entouré de la vénération de toute la cour de France.", "Son tombeau fut longtemps un lieu de pèlerinage pour les Capétiens.", "Il est vénéré comme l'un des saints les plus importants de l'Île-de-France médiévale."] },
      "7-9": { nom: "Saints martyrs de Gorkum", texte: ["Les Martyrs de Gorkum sont dix-neuf catholiques tués en Hollande en 1572.", "La ville de Brielle fut prise par les Gueux de mer, calvinistes flamands opposés à l'Espagne.", "Le 9 juillet 1572, dix-neuf clercs, dont onze franciscains, furent pendus à Brielle.", "Ils refusèrent de renier le pape et la présence réelle du Christ dans l'Eucharistie.", "Parmi eux se trouvaient des prêtres, des religieux et des laïcs de différentes congrégations.", "Ils furent pendus dans une grange, sans jugement régulier, par pure haine religieuse.", "Leur courage et leur sérénité face à la mort impressionnèrent même leurs bourreaux.", "Ils furent béatifiés en 1675 par Clément X et canonisés en 1867 par Pie IX.", "Ils sont les premiers martyrs canonisés de la Réforme en Europe du Nord.", "Ils illustrent la violence des guerres de religion du XVIe siècle aux Pays-Bas."] },
      "7-10": { nom: "Sainte Amalie", texte: ["Amalie, ou Amalberge, était une noble franque du VIIIe siècle, dont la vie est entourée de légendes.", "Selon la tradition, le roi Charlemagne lui-même voulut l'épouser, mais elle refusa par amour de Dieu.", "Elle avait consacré sa virginité au Seigneur et refusait tout prétendant, même royal.", "Charlemagne, irrité, lui brisa le bras lors d'une rencontre, dit la légende.", "Elle fut miraculeusement guérie et put fuir à Tamise, en Belgique.", "Elle y fonda un monastère et y vécut dans la prière et la pénitence.", "Ses miracles nombreux lui valurent une grande réputation de sainteté dans la région.", "Elle mourut vers 772, entourée de ses religieuses.", "Ses reliques furent transférées à Gand, où elles furent l'objet d'une grande vénération.", "Elle est invoquée contre les fractures et les maladies des bras."] },
      "7-11": { nom: "Saint Benoît", texte: ["Benoît de Nursie naquit vers 480 à Nursie, en Ombrie, dans une famille noble romaine.", "Étudiant à Rome, il fut dégoûté par la corruption de la cité et se retira dans la solitude.", "Il vécut trois ans dans une grotte à Subiaco, nourri par un moine du voisinage.", "Sa sainteté lui attira des disciples, pour lesquels il fonda douze monastères à Subiaco.", "Il s'établit ensuite au Mont-Cassin, fondant le monastère qui devint le berceau du monachisme occidental.", "Sa Règle, brève et équilibrée, organise la vie des moines autour du travail et de la prière.", "Ora et Labora, prie et travaille, est la devise résumant son idéal monastique.", "Son œuvre monastique préserva la civilisation et la foi pendant les invasions barbares.", "Il mourut vers 547 au Mont-Cassin, les bras levés vers le ciel selon saint Grégoire.", "Déclaré patron de l'Europe par Paul VI en 1964, il est le père du monachisme occidental."] },
      "7-12": { nom: "Saint Jean Gualbert", texte: ["Jean Gualbert naquit vers 995 à Florence, dans une famille noble toscane.", "Son frère Hugo ayant été assassiné, Jean se rendit armé pour venger sa mort.", "Il rencontra le meurtrier seul dans un défilé, mais, touché par sa grâce, lui pardonna au nom du Christ.", "Entré dans une église, il vit le Christ incliner la tête pour le remercier de son pardon.", "Cette expérience le décida à entrer dans la vie religieuse.", "Il refusa l'abbatiat qu'on voulait lui imposer et chercha une forme de vie plus austère.", "En 1038, il fonda à Vallombreuse, en Toscane, une congrégation bénédictine très réformée.", "Il lutta avec énergie contre la simonie, achat et vente des charges ecclésiastiques.", "Il mourut en 1073, et sa congrégation était déjà présente dans tout le centre de l'Italie.", "Canonisé en 1193, il est le fondateur de l'ordre de Vallombreuse."] },
      "7-13": { nom: "Saint Henri II, empereur", texte: ["Henri II naquit en 973, fils du duc Henri II de Bavière et petit-neveu de l'empereur Othon le Grand.", "Il devint duc de Bavière en 995, roi de Germanie en 1002 et empereur romain germanique en 1014.", "Son règne fut marqué par une politique de réforme de l'Église en étroite collaboration avec Rome.", "Il restaura et enrichit de nombreuses cathédrales et monastères à travers tout l'empire.", "Il fonda le diocèse de Bamberg en 1007, dotant magnifiquement sa cathédrale.", "Il était en contact constant avec les grands réformateurs monastiques de son époque.", "Son mariage avec Cunégonde, elle aussi vénérée comme sainte, fut marqué selon la tradition par la chasteté.", "Il mourut en 1024 à Göttingen, sans héritier, laissant l'empire dans une relative stabilité.", "Canonisé en 1146 par Eugène III, il est l'un des rares empereurs honorés comme saint.", "Il est le patron des rois, des ducs et de la ville de Bamberg."] },
      "7-14": { nom: "Saint Camille de Lellis", texte: ["Camille de Lellis naquit en 1550 à Bucchianico, dans les Abruzzes, dans une famille de soldats.", "Il mena une vie agitée de soldat et de joueur invétéré avant sa conversion.", "En 1575, travaillant sur un chantier franciscain, il se convertit profondément.", "Une blessure chronique à la jambe le fit fréquenter l'hôpital de Rome, où il découvrit sa vocation.", "Il se consacra au service des malades et fonda en 1582 les Servites des Infirmes, les Camilliens.", "Ses frères portaient une croix rouge sur leur habit, premier symbole de la Croix-Rouge.", "Il fut ordonné prêtre à trente-six ans et développa ses œuvres dans toute l'Italie.", "Il envoya des infirmiers sur les champs de bataille, créant les premiers secours militaires.", "Il mourut en 1614 à Rome, après une vie entière au chevet des malades.", "Canonisé en 1746, il est le patron des malades, des médecins et des infirmiers."] },
      "7-15": { nom: "Saint Bonaventure", texte: ["Bonaventure naquit en 1221 à Bagnoregio, en Toscane, dans une famille pieuse.", "Guéri miraculeusement dans son enfance par saint François d'Assise, il lui voua une dévotion particulière.", "Il entra dans l'ordre franciscain et étudia à Paris sous Alexandre de Halès.", "Il devint le plus grand théologien franciscain et enseigna à Paris en même temps que Thomas d'Aquin.", "Élu ministre général des Franciscains en 1257, il réforma et unifia l'ordre divisé.", "Il écrivit la Légende de saint François, biographie officielle du fondateur.", "Son Itinéraire de l'esprit vers Dieu est un chef-d'œuvre de la mystique médiévale.", "Nommé cardinal-évêque d'Albano en 1273 par Grégoire X, il mourut au Concile de Lyon en 1274.", "Déclaré Docteur de l'Église en 1588, il est le Docteur Séraphique.", "Il est le patron des théologiens franciscains et de la ville de Bagnoregio."] },
      "7-16": { nom: "Notre-Dame du Carmel", texte: ["La fête de Notre-Dame du Mont Carmel est célébrée le 16 juillet depuis le Moyen Âge.", "Le mont Carmel, en Palestine, était un lieu de prière dédié à Dieu depuis l'Antiquité.", "Élie le prophète y vécut et y opéra de grands prodiges au IXe siècle avant J.-C.", "Des moines y vécurent à partir du XIIe siècle, formant la communauté des Carmes.", "La Vierge Marie apparut au général de l'ordre Simon Stock le 16 juillet 1251.", "Elle lui remit le scapulaire, deux morceaux d'étoffe brun foncé unis par deux cordons.", "Elle promit son assistance spéciale à ceux qui le porteraient avec dévotion.", "Le scapulaire du Carmel est encore très répandu comme signe de dévotion mariale.", "Sainte Thérèse d'Avila et saint Jean de la Croix réformèrent l'ordre carmélitain au XVIe siècle.", "Notre-Dame du Carmel est la patronne de l'ordre du Carmel et de nombreuses nations."] },
      "7-17": { nom: "Bienheureuse Marie-Clémentine Anuarite Nengapeta", texte: ["Marie-Clémentine Anuarite naquit en 1939 à Wamba, au Congo belge, dans une famille chrétienne.", "Elle entra chez les Sœurs de la Sainte Famille et fit ses vœux religieux en 1959.", "Elle enseigna comme institutrice dans les écoles de sa congrégation.", "En novembre 1964, des rebelles Simbas envahirent la région et arrêtèrent les sœurs.", "Un colonel rebel tenta de la forcer à devenir sa compagne.", "Elle refusa catégoriquement, disant qu'elle avait voué sa virginité à Dieu.", "Après avoir subi des violences, elle fut poignardée et achevée d'une balle le 1er décembre 1964.", "Ses dernières paroles furent un pardon accordé à ses bourreaux.", "Béatifiée par Jean-Paul II en 1985 lors de son premier voyage en Afrique, elle est la première bienheureuse d'Afrique centrale.", "Elle est le symbole du martyre de la pureté et de la fidélité à la vie consacrée."] },
      "7-18": { nom: "Saint Frédéric d'Utrecht", texte: ["Frédéric naquit vers 780 aux Pays-Bas, dans une famille noble de la région d'Utrecht.", "Il fut ordonné prêtre et se distingua par son zèle apostolique et sa charité.", "Il fut nommé archidiacre de la cathédrale d'Utrecht, puis élu évêque vers 820.", "Son épiscopat fut marqué par une activité missionnaire intense auprès des populations frisones.", "Il osa reprendre l'empereur Louis le Pieux pour ses mariages illégaux, ce qui lui valut de l'hostilité.", "Il fut assassiné à Walcheren, en Zélande, en 838, probablement en raison de ses reproches à la cour.", "Ses meurtriers lui enfoncèrent des stylets dans le corps pendant qu'il célébrait la messe.", "Il est vénéré comme martyr par l'Église catholique.", "Ses reliques sont conservées dans la cathédrale d'Utrecht.", "Il est le patron du diocèse d'Utrecht et des missionnaires des Pays-Bas."] },
      "7-19": { nom: "Saint Arsène le Grand", texte: ["Arsène naquit vers 354 à Rome, dans une famille noble et cultivée.", "Précepteur des fils de l'empereur Théodose, il vécut à la cour de Constantinople dans le luxe.", "Une voix intérieure lui dit un jour : Fuis les hommes et tu seras sauvé.", "Il abandonna la cour en 394 et se retira dans le désert d'Égypte, à Scété.", "Il devint moine sous la direction de Jean le Nain et vécut dans une solitude absolue.", "Sa pénitence était si rigoureuse qu'il passait les nuits à veiller, les bras en croix.", "Les pères du désert admiraient sa combativité spirituelle malgré son origine aristocratique.", "Ses larmes perpétuelles de componction lui avaient creusé deux sillons sur les joues.", "Il mourut vers 450, après cinquante-cinq ans de vie érémitique dans le désert.", "Il est le modèle de la conversion radicale des grands du monde à la vie contemplative."] },
      "7-20": { nom: "Sainte Marguerite d'Antioche", texte: ["Marguerite est une martyre dont le culte est très ancien, bien que sa vie soit entourée de légendes.", "Selon la tradition, elle était fille d'un prêtre païen d'Antioche de Pisidie.", "Convertie au christianisme par sa nourrice, elle fut chassée par son père.", "Le préfet Olybrius, séduit par sa beauté, voulut l'épouser ou en faire sa concubine.", "Elle refusa et fut dénoncée comme chrétienne et soumise à de nombreux supplices.", "La légende dit qu'elle fut avalée par un dragon, dont elle sortit indemne grâce à la croix.", "Elle fut finalement décapitée vers 304, lors de la persécution de Dioclétien.", "Elle est l'une des Quatorze Saints Auxiliateurs et patronne des femmes en couches.", "La chevalier Jeanne d'Arc entendait sa voix parmi ses saintes messagères.", "Elle est la patronne des femmes enceintes, des accouchées et des sages-femmes."] },
      "7-21": { nom: "Saint Laurent de Brindisi", texte: ["Laurent de Brindisi naquit en 1559 à Brindisi, dans le royaume de Naples.", "Il entra dans l'ordre des Capucins à seize ans et fut ordonné prêtre en 1582.", "Sa connaissance extraordinaire des langues, dont l'hébreu, en faisait un prédicateur exceptionnel.", "Il fut envoyé en mission en Allemagne pour combattre le protestantisme.", "Il fonda de nombreux couvents capucins en Allemagne, en Bohême et en Autriche.", "Lors de la bataille de Albareale en 1601, il conduisit l'armée chrétienne à cheval, crucifix en main.", "Sa prédication en hébreu aux Juifs lui valut d'importantes conversions.", "Il mourut en 1619 à Lisbonne, épuisé par ses incessants voyages apostoliques.", "Canonisé en 1881 par Léon XIII, il fut déclaré Docteur de l'Église par Jean XXIII en 1959.", "Il est le patron des États-majors et des chefs militaires."] },
      "7-22": { nom: "Sainte Marie-Madeleine", texte: ["Marie-Madeleine est l'une des figures féminines les plus importantes des Évangiles.", "Jésus la délivra de sept démons et elle devint l'une de ses disciples les plus fidèles.", "Elle suivit Jésus depuis la Galilée jusqu'à Jérusalem, pourvoyant à ses besoins.", "Elle était présente au pied de la Croix quand les apôtres s'étaient enfuis.", "Elle fut la première à découvrir le tombeau vide au matin de Pâques.", "Jésus ressuscité lui apparut le premier, la prenant d'abord pour le jardinier.", "Il lui dit Rabboni, maître, et lui confia la mission d'annoncer la résurrection aux apôtres.", "Saint Jean-Paul II lui donna le titre d'Apôtre des Apôtres.", "La tradition provençale dit qu'elle finit sa vie en ermite dans la grotte de la Sainte-Baume.", "Élevée au rang de fête par le pape François en 2016, elle est patronne des contemplatives."] },
      "7-23": { nom: "Sainte Brigitte de Suède", texte: ["Brigitte naquit en 1303 en Suède, dans une famille royale très chrétienne.", "Mariée à dix-huit ans au noble Ulf Gudmarsson, elle eut huit enfants dont sainte Catherine de Suède.", "Elle vécut un mariage chrétien exemplaire, consacrant une partie de son temps à la prière et à la pénitence.", "Veuve en 1344, elle se consacra entièrement à Dieu et aux révélations mystiques qu'elle recevait.", "Elle fonda l'ordre du Très-Saint-Sauveur, les Brigittines, à Vadstena en Suède.", "Ses révélations, dictées à ses confesseurs, sont célèbres sous le nom de Révélations célestes.", "Elle se rendit à Rome en 1349 et y demeura jusqu'à sa mort, vivant dans la plus grande pauvreté.", "Elle interpella papes et rois pour les exhorter à la réforme et au retour du pape à Rome.", "Elle mourut à Rome en 1373, au retour d'un pèlerinage en Terre Sainte.", "Canonisée en 1391, elle est co-patronne de l'Europe avec Catherine de Sienne et Thérèse Bénédicte de la Croix."] },
      "7-24": { nom: "Saint Charbel Makhlouf", texte: ["Charbel Makhlouf naquit en 1828 à Beqa-Kafra, au Liban, dans une famille paysanne maronite.", "À vingt-trois ans, il quitta secrètement sa famille pour entrer dans la vie monastique.", "Il entra dans l'ordre libanais maronite et fut ordonné prêtre en 1859.", "Il vécut d'abord dans son monastère, puis demanda et obtint de vivre en ermite.", "Il passa les vingt-trois dernières années de sa vie dans l'ermitage de Saint-Pierre-et-Saint-Paul.", "Sa vie était d'une austérité extraordinaire : jeûnes, privations, longues nuits en prière.", "Il mourut en 1898, terrassé par une attaque pendant la célébration de la messe.", "Après sa mort, son corps se mit à transpirer et exsuder du sang, phénomène observé pendant des mois.", "Béatifié en 1965, il fut canonisé par Paul VI en 1977 lors du Concile Vatican II.", "Il est le saint le plus populaire du Liban et de tout le Moyen-Orient chrétien."] },
      "7-25": { nom: "Saint Jacques, apôtre", texte: ["Jacques le Majeur était le fils de Zébédée et de Salomé, frère de l'évangéliste Jean.", "Avec son frère, il quitta ses filets sur la mer de Galilée pour suivre Jésus.", "Jésus les surnomma Boanerges, fils du tonnerre, pour leur caractère fougueux.", "Il fut l'un des trois apôtres privilégiés, témoins de la Transfiguration et de l'Agonie.", "Il fut le premier des Douze à subir le martyre, décapité par Hérode Agrippa vers 44.", "La tradition hispanique dit que ses reliques furent transportées en Galice, en Espagne.", "Le sanctuaire de Saint-Jacques-de-Compostelle devint l'un des grands lieux de pèlerinage médiévaux.", "Le chemin de Saint-Jacques traverse toute l'Europe et reste très fréquenté de nos jours.", "Sa fête, le 25 juillet, est solennellement célébrée à Compostelle avec de grandes réjouissances.", "Il est le patron de l'Espagne et des pèlerins."] },
      "7-26": { nom: "Saints Joachim et Anne", texte: ["Joachim et Anne sont les parents de la Vierge Marie et grands-parents de Jésus.", "Leurs noms ne figurent pas dans les Évangiles canoniques mais dans les évangiles apocryphes.", "Ils étaient, selon la tradition, de la tribu de Juda et de la maison de David.", "Mariés depuis longtemps sans enfant, ils souffrirent de cette épreuve avec foi.", "Un ange apparut à Anne pour lui annoncer qu'elle concevrait une fille bénie.", "De leur union naquit Marie, la Mère de Dieu, fruit de leur prière et de leur patience.", "Anne est invoquée depuis le Moyen Âge pour les femmes désirant avoir des enfants.", "Joachim représente le juste de l'Ancien Testament attendant patiemment le Salut.", "La dévotion à sainte Anne est particulièrement forte en Bretagne, au Québec et en Alsace.", "Ils sont les patrons des grands-parents et des familles chrétiennes."] },
      "7-27": { nom: "Saint Pantaléon", texte: ["Pantaléon naquit vers 275 à Nicomédie, en Bithynie, fils d'un père riche et d'une mère chrétienne.", "Sa mère lui transmit la foi chrétienne avant de mourir alors qu'il était encore enfant.", "Il étudia la médecine et devint l'un des médecins les plus réputés de la région.", "La fréquentation d'un prêtre chrétien le ramena à sa foi initiale après quelques années d'éloignement.", "Il soignait les malades gratuitement, sans distinction de religion ou de condition.", "Arrêté lors de la persécution de Dioclétien, il subit de nombreux supplices.", "Il fut attaché à un olivier, percé de clous et décapité vers 305.", "Il est l'un des Quatorze Saints Auxiliateurs, patron des médecins.", "Sa fête est très populaire dans le sud de l'Italie, notamment à Naples.", "Il est le saint patron des médecins dans les Églises d'Orient."] },
      "7-28": { nom: "Saints Nazaire et Celse", texte: ["Nazaire et Celse furent des martyrs des premiers siècles, vénérés à Milan depuis l'Antiquité.", "Nazaire était romain, fils d'un officier de l'armée de César, converti au christianisme.", "Il évangélisa le Milanais et plusieurs régions de la Gaule avec un grand zèle apostolique.", "Celse était un jeune garçon milanais qui demanda le baptême à Nazaire lors d'un voyage.", "Ils furent arrêtés ensemble à Gênes, puis conduits à Milan pour y être exécutés.", "Ils furent décapités vers 68, sous le règne de Néron.", "Saint Ambroise découvrit leurs corps dans un jardin hors de Milan en 395.", "Il les fit transférer avec solennité dans la basilique des Apôtres à Milan.", "Cette basilique prit alors le nom de basilique des Saints-Nazaire-et-Celse.", "Ils sont des patrons de la ville de Milan et de l'Église ambrosienne."] },
      "7-29": { nom: "Sainte Marthe", texte: ["Marthe était la sœur de Marie et de Lazare, amis intimes de Jésus à Béthanie.", "C'est dans sa maison que Jésus aimait se reposer lors de ses passages à Jérusalem.", "L'Évangile de Luc rapporte qu'elle s'affairait aux préparatifs pendant que sa sœur écoutait Jésus.", "Jésus lui dit doucement que Marie avait choisi la meilleure part, qui ne lui serait pas enlevée.", "Lors de la mort de Lazare, elle alla à la rencontre de Jésus avec une foi admirable.", "Elle proclama : Je crois que tu es le Christ, le Fils de Dieu, qui vient dans le monde.", "Elle fut ainsi la première à confesser la messianité de Jésus avec ces mots solennels.", "La tradition provençale dit qu'elle aborda en Provence et évangélisa la région de Tarascon.", "Elle aurait terrassé la Tarasque, monstre légendaire qui terrorisait la région.", "Elle est la patronne des cuisinières, des hôtelières et de la ville de Tarascon."] },
      "7-30": { nom: "Sainte Juliette de Césarée", texte: ["Juliette fut une martyre des premiers siècles, probablement au IVe siècle.", "Selon la tradition, elle était une femme noble de Césarée de Cappadoce.", "Accusée par un adversaire dans un litige judiciaire d'être chrétienne, elle fut traînée devant le juge.", "Loin de chercher à dissimuler sa foi, elle la confessa ouvertement au tribunal.", "Elle endura de nombreux supplices avec une constance et une sérénité admirables.", "Elle fut finalement mise à mort, probablement par décapitation.", "Son culte fut associé très tôt à celui de saint Quirice, enfant martyr.", "La légende dit que Quirice était un tout jeune enfant qui confessa sa foi en voyant sa mère souffrir.", "Cette paire mère-fils devint très populaire au Moyen Âge dans toute l'Europe.", "De nombreuses églises leur sont dédiées en France, notamment l'église Saint-Cyr-et-Sainte-Julitte à Paris."] },
      "7-31": { nom: "Saint Ignace de Loyola", texte: ["Ignace de Loyola naquit en 1491 au château de Loyola, dans le Pays basque espagnol.", "Officier ambitieux et mondain, il fut grièvement blessé à la jambe lors du siège de Pampelune en 1521.", "Pendant sa longue convalescence, la lecture de vies de saints le transforma profondément.", "Il se rendit en pèlerinage à Montserrat, déposa ses armes et devint un nouveau chevalier du Christ.", "Il vécut une expérience mystique intense à Manrèse, où il rédigea les Exercices Spirituels.", "Ces exercices, méthode de discernement et de prière, sont un chef-d'œuvre de la pédagogie spirituelle.", "Il fonda en 1540 la Compagnie de Jésus, les Jésuites, avec six compagnons dont François Xavier.", "L'ordre se consacra à l'éducation, aux missions et à la défense du catholicisme contre la Réforme.", "Il mourut à Rome en 1556, laissant une congrégation déjà présente sur cinq continents.", "Canonisé en 1622 avec François Xavier, il est le patron des retraites spirituelles et des jésuites."] }
    };

    const now = new Date();
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

    function afficherSaint() {
      const key = `${now.getMonth()+1}-${now.getDate()}`;
      const saint = saints[key];
      const card = document.getElementById('card');

      if (!saint) {
        document.getElementById('saintName').textContent = "Saint du jour";
        document.getElementById('saintText').innerHTML = "<p>La fiche de ce saint n'est pas encore disponible.</p>";
      } else {
        document.getElementById('saintName').textContent = saint.nom;
        document.getElementById('saintText').innerHTML = saint.texte.map(l => `<p>${l}</p>`).join('');
      }

      card.classList.remove('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
    }

    // Afficher automatiquement au chargement
    afficherSaint();
  </script>
</body>
</html>
