<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Saint du Jour" />
  <title>Saint du Jour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --ink: #f0e4c0;
      --ink-dim: #a89060;
      --red: #8b1a1a;
      --glow: rgba(201,168,76,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background-color: #0d0b06;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(100,60,10,0.5) 0%, transparent 60%);
      font-family: 'EB Garamond', Georgia, serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
    }
    .header { text-align: center; padding: 32px 16px 16px; }
    .ornament { display: block; color: var(--gold); font-size: 20px; letter-spacing: 12px; opacity: .7; margin-bottom: 8px; }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(18px,5.5vw,26px); color: var(--gold-light); text-shadow: 0 0 30px var(--glow); line-height: 1.3; }
    .date-line { margin-top: 8px; font-size: 14px; color: var(--ink-dim); font-style: italic; }
    .divider { width: 100%; max-width: 360px; display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .divider-icon { color: var(--gold); font-size: 16px; }

    /* API Key */
    .api-section { width: 100%; max-width: 420px; margin-bottom: 20px; }
    .api-label { font-size: 12px; color: var(--ink-dim); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .api-label a { color: var(--gold); text-decoration: none; font-size: 11px; }
    .api-row { display: flex; gap: 8px; }
    .api-input { flex: 1; background: #1a1208; border: 1px solid rgba(201,168,76,.3); border-radius: 4px; color: var(--ink); font-family: monospace; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color .2s; }
    .api-input:focus { border-color: var(--gold); }
    .api-input::placeholder { color: rgba(168,144,96,.4); }
    .api-save { background: rgba(201,168,76,.15); border: 1px solid var(--gold); border-radius: 4px; color: var(--gold); font-size: 12px; padding: 10px 14px; cursor: pointer; letter-spacing: .08em; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .api-save:active { background: rgba(201,168,76,.3); }
    .api-status { font-size: 12px; margin-top: 6px; min-height: 16px; font-style: italic; }
    .api-status.ok  { color: #7ab87a; }
    .api-status.err { color: #c46a6a; }

    /* Button */
    .btn-wrap { margin: 4px 0 24px; }
    .btn { background: linear-gradient(145deg,#2a1f08,#1a1208); border: 1px solid var(--gold); border-radius: 4px; color: var(--gold-light); font-family: 'Cinzel Decorative', serif; font-size: 13px; letter-spacing: .12em; padding: 16px 36px; cursor: pointer; box-shadow: 0 0 20px rgba(201,168,76,.15); transition: transform .1s; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(.96); }
    .btn.loading { pointer-events: none; opacity: .7; }
    .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(201,168,76,.3); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card */
    .card { width: 100%; max-width: 420px; background: linear-gradient(160deg,#1e1608,#120e04); border: 1px solid rgba(201,168,76,.35); border-radius: 6px; padding: 28px 24px; box-shadow: 0 0 40px rgba(201,168,76,.08),0 20px 60px rgba(0,0,0,.6); position: relative; opacity: 0; transform: translateY(16px); transition: opacity .5s,transform .5s; }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card::before { content:'✦'; position:absolute; top:8px; left:12px; color:var(--gold); opacity:.5; font-size:10px; }
    .card::after  { content:'✦'; position:absolute; bottom:8px; right:12px; color:var(--gold); opacity:.5; font-size:10px; }
    .saint-name { font-family: 'Cinzel Decorative', serif; font-size: clamp(20px,6vw,28px); color: var(--gold-light); text-align: center; text-shadow: 0 0 20px var(--glow); line-height: 1.3; margin-bottom: 6px; }
    .saint-fete { text-align: center; font-size: 13px; color: var(--red); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 20px; }
    .inner-divider { width: 60%; height: 1px; background: linear-gradient(to right,transparent,var(--gold),transparent); margin: 0 auto 20px; }
    .saint-text { font-size: clamp(15px,4.2vw,17px); line-height: 1.85; color: var(--ink); text-align: justify; hyphens: auto; }
    .saint-text p { margin-bottom: .6em; }

    /* Error */
    .error-box { width: 100%; max-width: 420px; text-align: center; color: #c46a6a; font-style: italic; font-size: 15px; padding: 16px 20px; border: 1px solid rgba(180,60,60,.3); border-radius: 4px; background: rgba(80,10,10,.3); display: none; line-height: 1.6; }
    .footer { margin-top: 32px; padding-bottom: 16px; text-align: center; font-size: 11px; color: rgba(168,144,96,.35); letter-spacing: .15em; }
  </style>
</head>
<body>
  <div class="header">
    <span class="ornament">✦ ✦ ✦</span>
    <h1>Saint du Jour</h1>
    <div class="date-line" id="dateDisplay"></div>
  </div>

  <div class="divider"><span class="divider-icon">✝</span></div>

  <div class="api-section">
    <div class="api-label">
      🔑 Clé API Anthropic
      <a href="https://console.anthropic.com/account/keys" target="_blank">Obtenir une clé →</a>
    </div>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-api03-…" />
      <button class="api-save" onclick="saveKey()">Sauver</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="mainBtn" onclick="fetchSaint()">
      <span id="btnText">Découvrir le Saint du Jour</span>
    </button>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="card" id="card">
    <div class="saint-name" id="saintName"></div>
    <div class="saint-fete">Fête aujourd'hui</div>
    <div class="inner-divider"></div>
    <div class="saint-text" id="saintText"></div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="footer">✦ Calendrier des saints ✦</div>

  <script>
    const now = new Date();
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

    // Charger la clé sauvegardée
    const saved = localStorage.getItem('anthropic_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('apiStatus').textContent = '✓ Clé chargée';
      document.getElementById('apiStatus').className = 'api-status ok';
    }

    function saveKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      const status = document.getElementById('apiStatus');
      if (!key.startsWith('sk-')) {
        status.textContent = '✗ Format invalide (doit commencer par sk-)';
        status.className = 'api-status err';
        return;
      }
      localStorage.setItem('anthropic_key', key);
      status.textContent = '✓ Clé sauvegardée !';
      status.className = 'api-status ok';
    }

    async function fetchSaint() {
      const apiKey = localStorage.getItem('anthropic_key') || document.getElementById('apiKeyInput').value.trim();
      const btn = document.getElementById('mainBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const card = document.getElementById('card');
      const errorBox = document.getElementById('errorBox');

      if (!apiKey || !apiKey.startsWith('sk-')) {
        errorBox.innerHTML = '⚠️ Entre et sauvegarde ta clé API Anthropic ci-dessus.<br><small>Obtiens-en une sur <a href="https://console.anthropic.com/account/keys" target="_blank" style="color:var(--gold)">console.anthropic.com</a></small>';
        errorBox.style.display = 'block';
        return;
      }

      card.classList.remove('visible');
      errorBox.style.display = 'none';
      btn.classList.add('loading');
      btnText.textContent = '…';
      spinner.style.display = 'block';

      const today = now.toLocaleDateString('fr-FR', {day:'numeric',month:'long'});

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: `Tu es un expert du calendrier catholique des saints. Réponds UNIQUEMENT en JSON valide, sans texte avant ou après, sans balises markdown. Format exact :
{"nom":"Prénom Nom","texte":"Ligne 1.\\nLigne 2.\\nLigne 3.\\nLigne 4.\\nLigne 5.\\nLigne 6.\\nLigne 7.\\nLigne 8.\\nLigne 9.\\nLigne 10."}
Le texte doit avoir exactement 10 lignes séparées par \\n, chacune de 1-2 phrases en français.`,
            messages: [{
              role: "user",
              content: `Aujourd'hui c'est le ${today}. Quel saint est fêté aujourd'hui dans le calendrier catholique ? Donne son nom et un texte de 10 lignes sur lui.`
            }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || `Erreur HTTP ${response.status}`);
        }

        const data = await response.json();
        const raw = data.content.map(b => b.text || '').join('');
        const clean = raw.replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(clean);

        document.getElementById('saintName').textContent = parsed.nom;
        const lines = parsed.texte.split('\n').filter(l => l.trim());
        document.getElementById('saintText').innerHTML = lines.map(l => `<p>${l}</p>`).join('');

        spinner.style.display = 'none';
        btn.classList.remove('loading');
        btnText.textContent = 'Actualiser';
        requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));

      } catch (err) {
        spinner.style.display = 'none';
        btn.classList.remove('loading');
        btnText.textContent = 'Découvrir le Saint du Jour';
        errorBox.innerHTML = `⚠️ ${err.message || 'Une erreur est survenue. Vérifie ta clé API.'}`;
        errorBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
