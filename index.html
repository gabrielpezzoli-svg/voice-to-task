      "12-9": { nom: "Saint Jean Diego", texte: ["Juan Diego Cuauhtlatoatzin naquit en 1474 près de Mexico, dans la civilisation aztèque.", "Converti au christianisme après la conquête espagnole, il était un simple paysan croyant.", "Le 9 décembre 1531, la Vierge Marie lui apparut sur la colline de Tepeyac, près de Mexico.", "Elle se présenta comme la Vierge Marie, mère du vrai Dieu, et lui demanda de construire une chapelle.", "Juan Diego rapporta le message à l'évêque Juan de Zumárraga, qui demanda un signe.", "Le 12 décembre, la Vierge lui remplit son tilma, sa cape, de roses fraîches en plein hiver.", "Quand il déplia sa cape devant l'évêque, une image miraculeuse de la Vierge y était imprimée.", "Cette image, la tilma de Juan Diego, est conservée dans la basilique de Guadalupe à Mexico.", "La basilique est le sanctuaire marial le plus visité au monde avec vingt millions de pèlerins par an.", "Canonisé par Jean-Paul II en 2002, Juan Diego est le patron des indigènes d'Amérique."] },
      "12-10": { nom: "Notre-Dame de Lorette", texte: ["La fête de Notre-Dame de Lorette commémore la translation de la maison de la Vierge à Lorette.", "Selon la tradition, la Sainte Maison de Nazareth fut transportée par des anges en Croatie en 1291.", "Elle fut ensuite transférée à Lorette, dans les Marches italiennes, en 1294.", "La Sainte Maison est la maison où naquit la Vierge Marie et où eut lieu l'Annonciation.", "Des millions de pèlerins visitent le sanctuaire de Lorette depuis le XIVe siècle.", "La basilique construite autour de la Sainte Maison est l'un des plus beaux sanctuaires d'Italie.", "Lorette fut le sanctuaire favori de nombreux papes et saints, dont Thérèse d'Avila.", "Les navigateurs et les aviateurs se confient à Notre-Dame de Lorette pour leur protection.", "Elle fut déclarée patronne des navigateurs aériens par Pie XII en 1920.", "Lorette est l'un des trois grands sanctuaires mariaux de l'Italie avec Pompéi et Padoue."] },
      "12-11": { nom: "Saint Damase Ier, pape", texte: ["Damase naquit vers 305 à Rome ou en Espagne, dans une famille chrétienne.", "Ordonné prêtre, il fut élu pape en 366 dans des circonstances très agitées.", "Son élection fut contestée par Ursin dont les partisans provoquèrent de violentes émeutes.", "Il gouverna l'Église avec autorité pendant dix-huit ans, jusqu'à sa mort en 384.", "Il commanda à saint Jérôme la révision de la traduction latine de la Bible, future Vulgate.", "Il fixa le canon des Écritures Saintes et affirma la primauté du siège romain.", "Il composa de nombreuses épitaphes poétiques pour orner les tombeaux des martyrs.", "Ces inscriptions, gravées sur des pierres précieuses de marbres et calcaires, sont des chefs-d'œuvre.", "Il embellit les catacombes romaines et encouragea le culte des martyrs.", "Il est le patron des archéologues chrétiens et des amateurs d'épigraphie latine."] },
      "12-12": { nom: "Notre-Dame de Guadalupe", texte: ["Notre-Dame de Guadalupe est la patronne de tout le continent américain.", "Elle apparut en décembre 1531 sur la colline de Tepeyac au bienheureux Juan Diego.", "Son image miraculeuse est imprimée sur la tilma, la cape de Juan Diego, à Mexico.", "Cette image représente une jeune femme brune vêtue de rouge et de vert, sur un croissant de lune.", "Les scientifiques ont constaté des caractéristiques inexplicables dans la structure de cette image.", "Les yeux de la Vierge semblent contenir le reflet de plusieurs personnes, comme des yeux vivants.", "Après les apparitions, des millions d'Aztèques se convertirent au christianisme en quelques années.", "La basilique de Guadalupe à Mexico est le sanctuaire le plus visité du monde catholique.", "Le pape Jean-Paul II y pria à plusieurs reprises lors de ses voyages au Mexique.", "Notre-Dame de Guadalupe est la mère du peuple mexicain et de toute l'Amérique latine."] },
      "12-13": { nom: "Sainte Lucie", texte: ["Lucie fut une martyre de Syracuse, en Sicile, dont le culte est très ancien dans l'Église.", "Elle souffrit le martyre vers 304, lors de la persécution de Dioclétien.", "Issue d'une famille noble sicilienne, elle avait consacré sa virginité à Dieu.", "Un prétendant, repoussé, la dénonça comme chrétienne aux autorités romaines.", "Elle fut condamnée à être prostituée, mais miraculeusement, elle resta immobile malgré les efforts.", "On ne put la déplacer même avec des bœufs, tant Dieu la tenait clouée sur place.", "Elle fut finalement décapitée après qu'on lui eut crevé les yeux, selon certaines traditions.", "Son nom signifie lumière en latin, et sa fête coïncide avec le solstice d'hiver dans l'ancien calendrier.", "En Scandinavie, sa fête est très populaire, célébrée par des processions de jeunes filles portant des couronnes lumineuses.", "Elle est la patronne des aveugles, des personnes malvoyantes et des électriciens."] },
      "12-14": { nom: "Saint Jean de la Croix", texte: ["Jean de la Croix naquit en 1542 à Fontiveros, en Castille, dans une famille très pauvre.", "Entré dans l'ordre du Carmel, il rencontra sainte Thérèse d'Avila qui l'associa à sa réforme.", "Il fonda le premier couvent des Carmes déchaux à Duruelo en 1568.", "Sa réforme lui valut l'hostilité des Carmes non réformés qui l'emprisonnèrent à Tolède en 1577.", "Pendant neuf mois de captivité dans des conditions atroces, il composa ses plus beaux poèmes mystiques.", "Il s'évada en 1578 et continua son œuvre de réforme malgré les oppositions.", "Ses grands poèmes, Cantique Spirituel, Nuit Obscure, Vive Flamme d'Amour, sont des chefs-d'œuvre.", "Il mourut en 1591 à Úbeda, abandonné par ses supérieurs mais dans une totale sérénité.", "Canonisé en 1726 et déclaré Docteur de l'Église en 1926, il est le Docteur Mystique.", "Il est le co-fondateur du Carmel réformé et le plus grand poète mystique de la spiritualité chrétienne."] },
      "12-15": { nom: "Sainte Valérie de Limoges", texte: ["Valérie est une sainte vierge et martyre vénérée à Limoges depuis le Moyen Âge.", "Selon la tradition, elle était la fiancée du gouverneur Étienne, mais refusa le mariage pour Dieu.", "Elle avait été convertie et baptisée par saint Martial, premier évêque de Limoges.", "Répudiée par son fiancé qui la fit décapiter pour avoir refusé de renoncer à sa foi.", "Selon la légende, après sa décapitation, elle prit sa tête et la porta à saint Martial.", "Ce miracle de la céphalopagie, saint marchant avec sa propre tête, est caractéristique de certains saints.", "Saint Martial, ébloui par ce prodige, se prosterna et la vénéra.", "Son culte est très vivace à Limoges depuis le Moyen Âge.", "La cathédrale de Limoges lui est dédiée, une des plus belles de France.", "Elle est la patronne de Limoges et de la région du Limousin."] },
      "12-16": { nom: "Sainte Adelaïde", texte: ["Adélaïde naquit en 931, fille du roi Rodolphe II de Bourgogne, dans une famille royale chrétienne.", "Elle épousa le roi Lothaire d'Italie qui mourut empoisonné, la laissant veuve à dix-huit ans.", "Emprisonnée par Bérenger II, elle s'évada et se réfugia auprès d'Othon Ier de Germanie.", "Elle l'épousa et devint impératrice du Saint-Empire, la première à porter ce titre.", "Son influence bénéfique sur son mari et ses fils contribua à la christianisation de l'Empire.", "Veuve en 973, elle exerça la régence avec sagesse pendant la minorité de son petit-fils.", "Après des conflits familiaux douloureux, elle se retira dans le monastère de Seltz en Alsace.", "Elle y mourut en 999, après une vie entière au service de Dieu et de son peuple.", "Canonisée en 1097, elle est la patronne des impératrices et des veuves chrétiennes.", "Sa vie illustre la sainteté possible dans les conditions les plus agitées de la vie politique."] },
      "12-17": { nom: "Saint Lazare", texte: ["Lazare était le frère de Marthe et de Marie, les amis intimes de Jésus à Béthanie.", "Jésus l'aimait particulièrement et pleura à sa mort, seule mention des pleurs de Jésus dans les Évangiles.", "Il était mort et enseveli depuis quatre jours quand Jésus arriva à Béthanie.", "Jésus s'écria : Lazare, sors ! et Lazare sortit du tombeau, enveloppé dans ses linges.", "Ce miracle, le plus grand des signes de Jésus dans l'Évangile de Jean, précipita la décision de le tuer.", "Après la Résurrection du Christ, la tradition dit que Lazare fut chassé de Judée.", "Il aurait abordé en Provence avec ses sœurs Marthe et Marie-Madeleine.", "Il serait devenu le premier évêque de Marseille et aurait subi le martyre.", "La cathédrale de Marseille abrite sa crypte présumée, lieu de pèlerinage.", "Il est le patron de Marseille, des lépreux et des personnes souffrant de maladies graves."] },
      "12-18": { nom: "Sainte Gatien de Tours", texte: ["Gatien fut le premier évêque de Tours, envoyé de Rome pour évangéliser la Gaule au IIIe siècle.", "Il serait arrivé à Tours vers 250, selon les chroniques médiévales.", "Il y fonda la première communauté chrétienne dans des conditions très difficiles.", "Les persécutions romaines l'obligeaient à célébrer les sacrements en secret.", "Il baptisait ses fidèles dans les grottes et dans la nuit pour éviter les persécuteurs.", "Malgré les obstacles, il réussit à établir une communauté chrétienne solide à Tours.", "Il mourut vers 301, ayant exercé son ministère pendant environ cinquante ans.", "Saint Grégoire de Tours le mentionne comme le premier évêque de sa ville au VIe siècle.", "La cathédrale de Tours, chef-d'œuvre du gothique flamboyant, porte son nom.", "Il est le saint patron du diocèse de Tours et de la ville."] },
      "12-19": { nom: "Saint Anastase Ier, pape", texte: ["Anastase Ier fut pape de 399 à 401, pendant un pontificat de seulement deux ans.", "Il fut un ami proche de saint Jérôme, qui fit son éloge dans plusieurs lettres.", "Il condamna les écrits controversés d'Origène qui circulaient en Occident.", "Cette condamnation fut importante pour clarifier les limites de la réflexion théologique.", "Il lutta contre l'hérésie donatiste qui divisait l'Église d'Afrique.", "Sa piété et son humilité étaient reconnues de tous ses contemporains.", "Saint Augustin, dans sa Cité de Dieu, le cite comme exemple de la bonté divine envers Rome.", "Il mourut en 401, après seulement deux ans de pontificat.", "Son successeur Innocent Ier fut son propre fils, chose unique dans l'histoire de la papauté.", "Il est vénéré comme un saint pape de l'Église catholique."] },
      "12-20": { nom: "Saint Dominique de Silos", texte: ["Dominique naquit vers 1000 à Cañas, en Navarre, dans une famille paysanne.", "Il fut d'abord berger, puis entra dans l'ordre bénédictin au monastère de San Millán de la Cogolla.", "Chassé de Navarre par le roi García III, il fut accueilli par le roi de Castille Ferdinand Ier.", "Ce dernier lui confia le vieux monastère de Silos, en décrépitude complète.", "Dominique le restaura et en fit l'un des plus importants foyers de vie monastique d'Espagne.", "Son cloître roman est l'un des plus beaux du monde, orné de chapiteaux sculptés remarquables.", "Les moines de Silos sont célèbres pour leur chant grégorien authentique.", "Une femme stérile, Juana de Aza, pria Dominique et donna naissance à saint Dominique de Guzmán.", "Dominique de Silos mourut en 1073, laissant un monastère rayonnant de sainteté.", "Il est le saint patron des captifs et des femmes désirant avoir des enfants."] },
      "12-21": { nom: "Saint Pierre Canisius", texte: ["Pierre Canisius naquit en 1521 à Nimègue, dans les Pays-Bas, dans une famille aisée.", "Il entra dans la Compagnie de Jésus en 1543, devenant l'un des premiers jésuites allemands.", "Il se consacra à la Contre-Réforme en Allemagne, à une époque où le protestantisme progressait.", "Son Catéchisme, publié en 1555, devint l'instrument principal de l'éducation catholique en Allemagne.", "Ce catéchisme fut réédité des centaines de fois et traduit en quinze langues.", "Il parcourut inlassablement l'Allemagne, la Bohême, l'Autriche et la Pologne pour prêcher et enseigner.", "Il fonda de nombreux collèges jésuites qui formèrent les élites catholiques de l'Empire germanique.", "Il mourut à Fribourg en Suisse en 1597, après cinquante ans d'apostolat incessant.", "Canonisé et déclaré Docteur de l'Église en 1925 par Pie XI, il est le deuxième apôtre de l'Allemagne.", "Il est le patron de l'Allemagne catholique et des catéchistes du monde entier."] },
      "12-22": { nom: "Saint Chéremon d'Alexandrie", texte: ["Chéremon fut évêque de Nile, en Égypte, martyrisé lors de la persécution de Dèce en 250.", "Il était un vieil évêque quand la persécution de Dèce s'abattit sur les chrétiens d'Égypte.", "Avec de nombreux fidèles, il dut fuir dans les montagnes d'Arabie pour échapper aux persécuteurs.", "Selon saint Denys d'Alexandrie, qui rapporte son histoire, il mourut dans ces refuges montagneux.", "Certains de ses compagnons revinrent saufs, mais lui et sa compagnie ne revinrent jamais.", "Leur sort dans les montagnes resta inconnu : morts de froid, de faim ou tués par les barbares.", "Saint Denys les considère comme des martyrs, ayant tout abandonné par amour du Christ.", "Cette histoire illustre la persécution de Dèce qui fut l'une des plus violentes de l'Antiquité.", "Elle rappelle les centaines de martyrs anonymes dont nous ne connaissons pas les détails.", "Ces martyrs inconnus sont commémorés collectivement dans le martyrologe romain."] },
      "12-23": { nom: "Saint Jean de Kenty", texte: ["Jean de Kenty naquit en 1390 à Kenty, en Pologne, dans une famille de bourgeois pieux.", "Il étudia à Cracovie, obtint son doctorat en théologie et devint professeur à l'université.", "Sa vie entière fut consacrée à l'enseignement, à la prière et à la charité.", "Il distribuait tous ses revenus aux pauvres, ne gardant que le strict nécessaire.", "Il accomplit quatre fois le pèlerinage à pied jusqu'à Rome, en traversant les Alpes.", "Il se rendit aussi à Jérusalem pour vénérer les lieux saints.", "Ses élèves se souviennent de lui comme d'un maître exigeant mais d'une bonté exceptionnelle.", "Il mourut en 1473 à Cracovie, debout, en disant qu'il ne voulait pas mourir couché.", "Canonisé en 1767 par Clément XIII, il est le patron des enseignants et des étudiants polonais.", "Il est aussi invoqué par les voyageurs et les pèlerins, en souvenir de ses nombreux pèlerinages."] },
      "12-24": { nom: "Saint Adam et sainte Ève", texte: ["Le 24 décembre, la veille de Noël, l'Église orthodoxe honore Adam et Ève, nos premiers parents.", "Cette tradition rappelle que Noël est la réponse de Dieu au péché originel d'Adam et Ève.", "Adam et Ève furent créés à l'image et à la ressemblance de Dieu, dans un état de grâce et d'amour.", "Le péché originel les priva de cette grâce et introduisit la souffrance et la mort dans le monde.", "Dieu promit cependant une descendance de la femme qui écraserait la tête du serpent.", "Cette promesse, le Protévangile, était l'annonce du Christ qui allait venir sauver l'humanité.", "L'Avent tout entier est l'attente de ce Sauveur promis à Adam et Ève.", "En représentant Adam et Ève à la veille de Noël, l'Église exprime la solidarité de l'humanité.", "Jésus est le nouvel Adam qui répare la faute de l'ancien Adam.", "Marie est la nouvelle Ève dont le oui efface le non de la première femme au paradis."] },
      "12-25": { nom: "Nativité du Seigneur - Noël", texte: ["La Nativité du Seigneur, Noël, est l'une des fêtes les plus importantes de l'année chrétienne.", "Elle célèbre la naissance de Jésus-Christ, Fils de Dieu, à Bethléem en Judée.", "Les Évangiles de Matthieu et de Luc décrivent la naissance dans une étable, faute de place à l'auberge.", "L'ange apparut aux bergers et leur dit : Je vous annonce une grande joie : il vous est né un Sauveur.", "Les mages d'Orient, guidés par une étoile, vinrent l'adorer et lui offrir leurs présents.", "Jésus naquit de la Vierge Marie par l'opération du Saint-Esprit, accomplissant la prophétie d'Isaïe.", "La date du 25 décembre fut choisie pour Noël au IVe siècle, coïncidant avec le solstice d'hiver.", "Elle symbolise la venue de la Lumière du monde dans les ténèbres du monde.", "Les traditions de Noël, crèches, chants, cadeaux, illuminent cette nuit dans le monde entier.", "Noël est le mystère de l'Amour infini qui se fait petit enfant pour nous rejoindre dans notre humanité."] },
      "12-26": { nom: "Saint Étienne, premier martyr", texte: ["Étienne fut le premier martyr de l'Église chrétienne, lapidé à Jérusalem peu après la Pentecôte.", "Il était l'un des sept diacres élus par les apôtres pour le service des veuves et des pauvres.", "Sa sagesse et ses miracles lui valurent d'être très rapidement en opposition avec les autorités juives.", "Il prononça devant le Sanhédrin un long discours retraçant l'histoire du salut.", "Il finit par accuser le Sanhédrin d'avoir livré et tué le Juste, Jésus.", "La foule en fureur le traîna hors de la ville et le lapida.", "Pendant son supplice, il vit les cieux ouverts et le Fils de l'homme debout à la droite de Dieu.", "Il mourut en priant pour ses bourreaux : Seigneur, ne leur impute pas ce péché.", "Parmi ceux qui gardèrent les vêtements des lapideurs se trouvait le jeune Saul, futur saint Paul.", "Étienne est le patron des diacres, des maçons et de nombreuses villes d'Europe."] },
      "12-27": { nom: "Saint Jean, apôtre et évangéliste", texte: ["Jean était le fils de Zébédée et le frère de Jacques le Majeur, pêcheur du lac de Tibériade.", "Avec Pierre et Jacques, il fut l'un des trois apôtres les plus proches de Jésus.", "Il fut témoin de la Transfiguration, de l'Agonie au jardin et de la Résurrection.", "Jésus mourant lui confia sa mère Marie : Femme, voici ton fils ; et à Jean : Voici ta mère.", "Jean est l'auteur du quatrième Évangile, de trois Épîtres et du livre de l'Apocalypse.", "Son Évangile est le plus théologique et le plus mystique des quatre.", "Il ouvre par : Au commencement était le Verbe, et le Verbe était Dieu.", "Il fut exilé à Patmos sous Domitien, où il écrivit l'Apocalypse.", "Seul des douze apôtres, il n'est pas mort en martyr mais de vieillesse à Éphèse.", "Il est le patron des théologiens, des écrivains et des libraires."] },
      "12-28": { nom: "Saints Innocents", texte: ["Les Saints Innocents sont les enfants de Bethléem massacrés par Hérode le Grand.", "Averti par les Mages qu'un roi des Juifs était né, Hérode ordonna de tuer tous les garçons de moins de deux ans.", "La Sainte Famille avait fui en Égypte, avertie par un ange, échappant au massacre.", "Ce massacre accomplit la prophétie de Jérémie : Rachel pleure ses enfants et refuse d'être consolée.", "Ces enfants innocents sont les premiers à mourir pour le Christ, sans pouvoir le confesser.", "L'Église les vénère comme martyrs, témoins du Christ par leur mort sans pouvoir témoigner par leur parole.", "Leur fête, célébrée trois jours après Noël, fait contraste avec la joie de la naissance.", "Elle rappelle que le Sauveur né dans la pauvreté est immédiatement menacé par les puissants du monde.", "Ils sont les patrons des enfants, des pupilles et de ceux qui meurent sans baptême.", "Leur massacre annonce la Passion du Christ qui fut lui aussi condamné à mort par les autorités."] },
      "12-29": { nom: "Saint Thomas Becket", texte: ["Thomas Becket naquit en 1118 à Londres, dans une famille de marchands normands.", "Brillant juriste, il devint le chancelier d'Angleterre et l'ami intime du roi Henri II.", "Nommé archevêque de Cantorbéry en 1162, il changea radicalement de vie.", "Il défendit avec obstination les libertés de l'Église contre les empiètements royaux.", "Le roi promulgua les Constitutions de Clarendon qui soumettaient l'Église à la couronne.", "Thomas refusa de les accepter et s'exila en France pendant six ans.", "De retour en Angleterre en 1170, le conflit reprit immédiatement.", "Quatre chevaliers, entendant le roi s'emporter contre Thomas, le tuèrent dans sa cathédrale.", "Il fut canonisé dès 1173 par Alexandre III et sa tombe à Cantorbéry devint le plus grand pèlerinage d'Angleterre.", "Les Contes de Cantorbéry de Chaucer témoignent de la popularité de ce pèlerinage au Moyen Âge."] },
      "12-30": { nom: "Sainte Anysia de Thessalonique", texte: ["Anysia fut une martyre de Thessalonique, en Grèce, martyrisée vers 304.", "Issue d'une famille noble et chrétienne de Thessalonique, elle avait distribué tous ses biens aux pauvres.", "Elle vivait dans la prière, le jeûne et le service des plus pauvres de sa ville.", "Lors de la persécution de Dioclétien, elle fut arrêtée dans la rue par un soldat.", "Interrogée, elle confessa sa foi chrétienne avec fermeté et courage.", "Le soldat, irrité, la tua sur place d'un coup d'épée.", "Son martyre fut rapporté par saint Jean Chrysostome dans un sermon.", "Elle fut immédiatement vénérée comme martyre par les chrétiens de Thessalonique.", "Son culte s'étendit rapidement dans tout l'Empire romain d'Orient.", "Elle est vénérée comme martyre dans les Églises catholique et orthodoxe."] },
      "12-31": { nom: "Saint Sylvestre Ier, pape", texte: ["Sylvestre Ier fut pape de 314 à 335, pendant le règne de l'empereur Constantin le Grand.", "Son pontificat coïncida avec la fin des persécutions et le triomphe du christianisme dans l'Empire.", "Il reçut de Constantin la donation du Latran, qui devint la résidence des papes.", "Il y fit construire la première grande basilique chrétienne de Rome, la basilique du Latran.", "Il envoya ses légats au Concile de Nicée en 325 qui définit la divinité du Christ.", "Selon la Donation de Constantin, document médiéval apocryphe, il aurait reçu l'Empire d'Occident.", "Ce document, fabriqué au VIIIe siècle, est écarté par l'histoire mais témoigne du prestige de Sylvestre.", "Il mourut en 335, après avoir présidé à la transformation de Rome en capitale chrétienne.", "La veille de l'an Nouveau, la Saint-Sylvestre, est fêtée dans toute l'Europe catholique.", "Il est le saint patron de la ville de Rome et des festivités du Nouvel An."] }
    };

    const now = new Date();
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

    function afficherSaint() {
      const key = `${now.getMonth()+1}-${now.getDate()}`;
      const saint = saints[key];
      const card = document.getElementById('card');

      if (!saint) {
        document.getElementById('saintName').textContent = "Saint du jour";
        document.getElementById('saintText').innerHTML = "<p>La fiche de ce saint n'est pas encore disponible.</p>";
      } else {
        document.getElementById('saintName').textContent = saint.nom;
        document.getElementById('saintText').innerHTML = saint.texte.map(l => `<p>${l}</p>`).join('');
      }

      card.classList.remove('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
    }

    // Afficher automatiquement au chargement
    afficherSaint();
  </script>
</body>
</html>
