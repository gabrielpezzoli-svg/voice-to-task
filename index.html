<!D,
      "4-1": { nom: "Sainte Théodora d'Alexandrie", texte: ["Théodora vécut à Alexandrie au Ve siècle, selon la tradition hagiographique.", "Coupable d'un péché d'adultère, elle fut saisie d'un profond repentir.", "Elle se déguisa en homme et entra dans un monastère masculin sous le nom de Théodore.", "Elle y mena une vie de pénitence exemplaire, connue de Dieu seul.", "Accusée injustement d'avoir séduit une femme, elle supporta cette humiliation en silence.", "Elle mourut sans s'être justifiée, laissant à Dieu le soin de manifester la vérité.", "Après sa mort, sa véritable identité fut découverte et les moines admirèrent son humilité.", "Sa vie illustre la puissance de la pénitence et le courage de supporter l'injustice.", "Elle est vénérée en Orient comme un modèle de contrition et d'humilité.", "Sa fête est célébrée le 1er avril dans le martyrologe romain."] },
      "4-2": { nom: "Saint François de Paule", texte: ["François de Paule naquit en 1416 à Paola, en Calabre, dans une famille pieuse.", "Ses parents l'avaient voué à saint François d'Assise, dont il porta toujours l'habit.", "À quinze ans, il se retira en ermite dans une grotte sur les falaises de Calabre.", "Sa réputation de sainteté attira des disciples qui formèrent l'ordre des Minimes.", "Il pratiquait une abstinence perpétuelle de viande, appelée la grande abstinence.", "Ses miracles nombreux, notamment traverser la mer sur son manteau, le rendirent célèbre.", "Le roi Louis XI de France le fit appeler à son chevet pour obtenir la guérison.", "Il ne put guérir le roi mais l'aida à mourir saintement en 1483.", "Il demeura en France où il mourut en 1507 au château de Plessis-les-Tours.", "Il est le saint patron de la Calabre et des gens de mer."] },
      "4-3": { nom: "Saint Richard de Chichester", texte: ["Richard naquit vers 1197 à Worcester, en Angleterre, dans une famille modeste.", "Il étudia à Oxford, Paris et Bologne, devenant un brillant canoniste.", "Il devint chancelier de l'Université d'Oxford puis conseiller de l'archevêque Edme Rich.", "Élu évêque de Chichester en 1244, le roi Henri III refusa de le reconnaître.", "Pendant deux ans, il exerça son ministère dans la plus grande pauvreté, allant à pied.", "Le pape Innocent IV excommunia le roi, qui finit par reconnaître Richard comme évêque.", "Il se consacra à la réforme du clergé et au service pastoral de son diocèse.", "Sa prière célèbre demandait de mieux connaître, aimer et suivre le Christ.", "Il mourut en 1253 à Douvres, épuisé par ses incessantes activités pastorales.", "Il est le patron des agriculteurs et des conducteurs."] },
      "4-4": { nom: "Saint Isidore de Séville", texte: ["Isidore de Séville naquit vers 560 à Carthagène, en Espagne, dans une famille wisigothique.", "Il succéda à son frère saint Léandre comme archevêque de Séville vers 600.", "Son œuvre encyclopédique, les Étymologies, rassembla tout le savoir de l'Antiquité.", "Cette encyclopédie de vingt volumes fut la référence intellectuelle du Moyen Âge pendant des siècles.", "Il présida le quatrième Concile de Tolède en 633, organisant l'Église d'Espagne.", "Il favorisa la conversion des Wisigoths ariens au catholicisme.", "Ses nombreux écrits couvrent la théologie, l'histoire, les sciences naturelles et la grammaire.", "Il mourut en 636, après avoir distribué tous ses biens aux pauvres.", "Déclaré Docteur de l'Église en 1722, il est vénéré comme le dernier Père de l'Église latine.", "Il est le saint patron d'Internet selon une déclaration de Jean-Paul II en 1997."] },
      "4-5": { nom: "Saint Vincent Ferrier", texte: ["Vincent Ferrier naquit en 1350 à Valence, en Espagne, dans une famille pieuse.", "Il entra dans l'ordre des Frères Prêcheurs, les Dominicains, à dix-huit ans.", "Sa mission de prédication itinérante dura vingt ans à travers l'Europe entière.", "Il prêchait en valencien et était compris miraculeusement par tous ses auditeurs.", "Ses foules étaient si nombreuses qu'il devait prêcher en plein air sur des tribunes.", "Il annonçait partout la fin des temps et le jugement dernier imminent.", "Ses miracles innombrables lui valurent d'être comparé aux apôtres.", "Il contribua à mettre fin au Grand Schisme d'Occident en retirant son soutien à l'antipape.", "Il mourut à Vannes, en Bretagne, en 1419, épuisé par ses travaux.", "Il est le saint patron de la ville de Valence et des constructeurs de canaux."] },
      "4-6": { nom: "Sainte Marcelline", texte: ["Marcelline était la sœur aînée de saint Ambroise de Milan.", "Elle naquit vers 327 à Trèves, dans une famille chrétienne très pieuse.", "À Rome, vers 353, elle reçut le voile des vierges des mains du pape Libère.", "Elle vécut dès lors dans une grande austérité, partageant avec des compagnes consacrées.", "Son frère Ambroise, devenu évêque de Milan, lui adressa des lettres spirituelles précieuses.", "Ces lettres, notamment l'Hexaémeron, témoignent de l'affection et de l'estime mutuelle des deux saints.", "Elle assista à la mort de leur frère Satyrus et partagea la douleur d'Ambroise.", "Elle survécut à son illustre frère, mort en 397, et mourut elle-même peu après.", "Sa vie illustre l'idéal de la vierge consacrée dans l'Église du IVe siècle.", "Elle est vénérée comme modèle de vie consacrée dans la tradition milanaise."] },
      "4-7": { nom: "Saint Jean-Baptiste de la Salle", texte: ["Jean-Baptiste de la Salle naquit en 1651 à Reims, dans une famille noble et aisée.", "Chanoine de la cathédrale de Reims, il renonça à sa fortune pour se consacrer aux pauvres.", "Il fonda les Frères des Écoles Chrétiennes pour instruire gratuitement les enfants pauvres.", "Il inventa l'enseignement simultané de toute une classe, révolution pédagogique majeure.", "Ses frères enseignaient en français et non en latin, innovation considérable pour l'époque.", "Il forma des maîtres d'école dans les premières écoles normales de l'histoire.", "Il créa aussi des écoles pour les délinquants et les enfants difficiles.", "Il mourut à Rouen en 1719, après avoir souffert de nombreuses épreuves et oppositions.", "Canonisé en 1900 par Léon XIII, il fut déclaré patron de tous les éducateurs en 1950.", "Sa congrégation est aujourd'hui présente dans quatre-vingt pays sur tous les continents."] },
      "4-8": { nom: "Saint Albert de Montecorvino", texte: ["Albert de Montecorvino fut évêque dans le sud de l'Italie au XIIe siècle.", "Il naquit à Montecorvino, dans l'actuelle Campanie, d'une famille noble.", "Ordonné prêtre, il se distingua par sa charité envers les pauvres de sa région.", "Il fut élu évêque de Montecorvino, siège aujourd'hui supprimé.", "Son épiscopat dura cinquante ans selon les chroniques locales, ce qui est exceptionnel.", "Il fut réputé pour ses miracles de guérison et pour la conversion des pécheurs.", "Sa douceur pastorale et son humilité lui valurent l'amour de tout son peuple.", "Il mourut centenaire selon la tradition, entouré de la vénération populaire.", "Son culte local fut confirmé par Benoît XVI en 2010 lors d'une béatification équipollente.", "Il est le saint patron du diocèse de Campagna-Satriano."] },
      "4-9": { nom: "Sainte Casilde de Tolède", texte: ["Casilde était la fille du roi mauresque de Tolède, al-Mamun, au XIe siècle.", "Malgré ses origines musulmanes, elle fut touchée par la misère des prisonniers chrétiens.", "Elle leur portait secrètement de la nourriture, au risque de sa vie.", "Selon la légende, lorsque son père l'interrogea sur ce qu'elle portait, le pain se transforma en roses.", "Gravement malade, elle demanda à être conduite aux lacs de San Vicente, en Castille.", "Elle y fut miraculeusement guérie et se convertit au christianisme.", "Elle vécut dès lors en ermite dans ce lieu, dans la prière et la pénitence.", "Elle mourut vers 1050, dans une grande réputation de sainteté.", "Sa tombe devint un lieu de pèlerinage important dans toute la Castille.", "Elle est la patronne de la ville de Briviesca et de la province de Burgos."] },
      "4-10": { nom: "Saint Fulbert de Chartres", texte: ["Fulbert naquit vers 952, probablement en Italie, et fut éduqué à Reims.", "Il devint l'élève du célèbre Gerbert d'Aurillac, futur pape Sylvestre II.", "Il s'établit à Chartres où il dirigea la célèbre école cathédrale.", "Cette école attira des étudiants de toute l'Europe, faisant de Chartres un grand centre intellectuel.", "Il fut élu évêque de Chartres en 1006, charge qu'il exerça jusqu'à sa mort.", "Il supervisa la reconstruction de la cathédrale de Chartres après un incendie dévastateur.", "Sa dévotion envers la Vierge Marie était ardente et ses hymnes marials sont réputés.", "Il maintint des relations épistolaires avec les plus grands personnages de son époque.", "Il mourut en 1028 et fut rapidement vénéré comme saint par le peuple de Chartres.", "Il est le saint patron du diocèse de Chartres."] },
      "4-11": { nom: "Saint Stanislas de Cracovie", texte: ["Stanislas naquit en 1030 à Szczepanów, en Pologne, dans une famille noble.", "Ordonné prêtre, il devint rapidement évêque de Cracovie en 1072.", "Il fut un pasteur zélé, réformateur du clergé et défenseur des pauvres et des opprimés.", "Il osa excommunier le roi Boleslas II pour ses violences et ses injustices.", "Ce geste courageux mit sa vie en danger, mais il ne recula pas devant la menace royale.", "Le roi Boleslas le fit assassiner pendant qu'il célébrait la messe, en 1079.", "Certains récits affirment que le roi lui trancha lui-même la tête de sa propre main.", "Son martyre provoqua un soulèvement qui força le roi à l'exil.", "Canonisé en 1253 par Innocent IV, il devint le saint patron de la Pologne.", "Il est vénéré comme le symbole de la résistance chrétienne face au pouvoir injuste."] },
      "4-12": { nom: "Saint Jules Ier, pape", texte: ["Jules Ier fut pape de 337 à 352, dans une période marquée par la crise arienne.", "Il succéda à saint Marc sur le siège de Rome.", "Il défendit avec énergie les évêques orthodoxes exilés par les empereurs ariens.", "Il accueillit saint Athanase d'Alexandrie lors de son second exil et soutint sa cause.", "Il convoqua le Concile de Sardique en 343 pour régler les conflits liés à l'arianisme.", "Ce concile affirma le droit d'appel des évêques condamnés au pape de Rome.", "Il affirma ainsi la primauté romaine comme instance d'appel pour toute l'Église.", "Ses lettres doctrinales sur l'orthodoxie nicéenne sont précieuses pour l'histoire des dogmes.", "Il mourut en 352, après un pontificat courageux face aux pressions impériales.", "Il est vénéré comme confesseur de la foi orthodoxe dans l'Église catholique."] },
      "4-13": { nom: "Saint Martin Ier, pape", texte: ["Martin Ier fut pape de 649 à 655, dans une période de vives controverses christologiques.", "Il convoqua le Concile du Latran en 649, qui condamna le monothélisme.", "Cette hérésie, soutenue par l'empereur byzantin, niait la double volonté du Christ.", "L'empereur Constant II, furieux de cette condamnation, le fit arrêter en 653.", "Martin fut emmené à Constantinople où il fut humilié publiquement et jugé pour trahison.", "Exilé en Crimée, il y souffrit de la faim, du froid et des mauvais traitements.", "Ses lettres d'exil témoignent de sa souffrance mais aussi de son abandon à Dieu.", "Il mourut à Cherson en 655, épuisé par les privations.", "Il est le dernier pape reconnu comme martyr dans l'histoire de l'Église.", "Sa fidélité à l'orthodoxie face au pouvoir impérial est exemplaire."] },
      "4-14": { nom: "Saint Tiburce", texte: ["Tiburce fut un martyr romain des premiers siècles chrétiens, fils du tribun Chromace.", "Selon la tradition, il fut converti au christianisme par saint Sébastien.", "Il se consacra au service des chrétiens emprisonnés et des martyrs.", "Il recueillait les corps des martyrs et les ensevelissait avec respect.", "Arrêté pour ses activités chrétiennes, il fut condamné à marcher pieds nus sur des charbons ardents.", "Miraculeusement préservé, il déclara ne sentir qu'une brise fraîche sous ses pieds.", "Il fut finalement décapité sur la voie Lavicane, hors de Rome, vers 286.", "Son tombeau sur cette voie fut vénéré dès les premiers temps du christianisme.", "Une basilique lui fut dédiée à Rome, témoignant de l'ancienneté de son culte.", "Il est vénéré avec saint Valérien et saint Maxime, ses compagnons de martyre."] },
      "4-15": { nom: "Sainte Ruine", texte: ["Ruine, ou Hunna, naquit vers 650 en Alsace, dans une famille noble.", "Elle épousa un seigneur alsacien et vécut dans un domaine près de Strasbourg.", "Elle se consacra au service des pauvres et des pèlerins qui traversaient la région.", "Elle lavait elle-même le linge des pauvres dans la rivière voisine, d'où son surnom de Sainte Lavandière.", "Sa charité était si grande qu'elle ne refusait jamais rien à ceux qui se présentaient.", "Elle distribua une grande partie de la fortune de son mari aux nécessiteux.", "Son mari, d'abord irrité par cette générosité, se convertit et l'imita dans ses largesses.", "Elle mourut vers 679, vénérée de toute la région d'Alsace.", "Canonisée par Léon X en 1520, elle est l'une des rares femmes mariées à ce rang.", "Elle est la patronne des blanchisseuses et des lavandières."] },
      "4-16": { nom: "Sainte Bernadette Soubirous", texte: ["Bernadette Soubirous naquit le 7 janvier 1844 à Lourdes, dans une famille très pauvre.", "Elle était la fille aînée d'un meunier ruiné, vivant dans un cachot humide.", "Le 11 février 1858, une Dame lui apparut dans la grotte de Massabielle, sur les bords du Gave.", "Elle eut dix-huit apparitions au total, jusqu'au 16 juillet de la même année.", "La Dame lui confia des secrets et lui demanda de faire construire une chapelle.", "Elle lui révéla être l'Immaculée Conception, titre que Bernadette ne connaissait pas.", "Malgré les interrogatoires et les pressions, Bernadette maintint toujours son témoignage.", "Elle entra chez les Sœurs de Nevers en 1866 et y vécut dans l'humilité et la souffrance.", "Elle mourut en 1879, à trente-cinq ans, après de longues maladies.", "Canonisée en 1933, son corps est incorruptible et exposé à Nevers."] },
      "4-17": { nom: "Saint Benoît-Joseph Labre", texte: ["Benoît-Joseph Labre naquit en 1748 à Amettes, dans l'Artois, dans une famille de paysans.", "Fils aîné de quinze enfants, il fut éduqué par son oncle prêtre.", "Il tenta d'entrer dans plusieurs monastères, mais fut refusé pour raisons de santé.", "Il comprit alors que sa vocation était d'être pèlerin et mendiant pour le Christ.", "Il parcourut l'Europe entière, visitant tous les grands sanctuaires chrétiens.", "À pied, sans argent, souvent malade, il vivait d'aumônes qu'il redistribuait aux plus pauvres.", "Il passait ses nuits en prière dans les églises et ses journées à mendier humblement.", "Sa sainteté rayonnante attirait l'attention malgré sa misère apparente.", "Il mourut à Rome en 1783, épuisé, devant une boucherie du quartier du Colisée.", "Canonisé en 1881 par Léon XIII, il est le patron des sans-abri et des pèlerins."] },
      "4-18": { nom: "Saint Parfait de Cordoue", texte: ["Parfait fut un prêtre de Cordoue martyrisé en 850, sous la domination arabe.", "Il servait comme prêtre dans l'église Saint-Aciscle de Cordoue.", "La ville était alors sous domination arabe et les chrétiens vivaient dans des conditions difficiles.", "Il fut arrêté pour avoir critiqué publiquement le prophète Mahomet.", "Sa franchise courageuse lui valut d'être condamné à mort par les autorités arabes.", "Il fut décapité le Vendredi Saint de l'an 850, devant la grande mosquée de Cordoue.", "Son martyre fut le premier d'une longue série durant ce qu'on appelle le mouvement des martyrs de Cordoue.", "Son exemple inspira de nombreux autres chrétiens à confesser ouvertement leur foi.", "Saint Euloge de Cordoue recueillit les témoignages de ces martyrs dans ses écrits.", "Il est vénéré comme le premier des martyrs de Cordoue au IXe siècle."] },
      "4-19": { nom: "Saint Léon IX, pape", texte: ["Léon IX naquit en 1002 à Egisheim, en Alsace, dans une famille noble apparentée aux empereurs.", "Évêque de Toul à vingt-deux ans, il fut élu pape en 1049.", "Son pontificat de cinq ans fut l'un des plus réformateurs de l'Église médiévale.", "Il lutta énergiquement contre la simonie et le nicolaïsme qui corrompaient le clergé.", "Il voyagea constamment à travers l'Europe pour présider des synodes réformateurs.", "Son pontificat vit malheureusement le grand schisme de 1054 avec l'Église d'Orient.", "Il fut fait prisonnier par les Normands après la bataille de Civitate en 1053.", "Libéré mais mourant, il regagna Rome où il mourut en 1054.", "Son corps fut aussitôt vénéré comme celui d'un saint.", "Il est le principal initiateur de la réforme de l'Église qui aboutit à la réforme grégorienne."] },
      "4-20": { nom: "Sainte Odette", texte: ["Odette est une sainte locale vénérée dans la région de Troyes, en Champagne.", "Selon la tradition, elle vécut au Moyen Âge dans une grande piété et charité.", "Elle est particulièrement invoquée pour les maladies des yeux dans la tradition champenoise.", "Une fontaine miraculeuse lui est dédiée près de Troyes, lieu de pèlerinage local.", "Sa fête le 20 avril était autrefois célébrée dans tout le diocèse de Troyes.", "Elle illustre la richesse du calendrier hagiographique local, propre à chaque région.", "De nombreuses saintes locales comme elle ont été vénérées pendant des siècles par les populations.", "Leur culte, souvent non reconnu officiellement, répond à une vraie dévotion populaire.", "La Champagne conserve ainsi vivante une tradition de sainteté propre à son histoire.", "Elle rappelle que la sainteté s'enracine dans les terroirs et les traditions des peuples."] },
      "4-21": { nom: "Saint Anselme de Cantorbéry", texte: ["Anselme naquit en 1033 à Aoste, en Italie, dans une famille noble.", "Il entra dans le monastère du Bec, en Normandie, où il devint prieur puis abbé.", "Son enseignement philosophique et théologique en fit l'un des plus grands penseurs du Moyen Âge.", "Il est le père de la scolastique, méthode qui applique la raison à la foi.", "Sa preuve ontologique de l'existence de Dieu est restée célèbre dans l'histoire de la philosophie.", "Devenu archevêque de Cantorbéry en 1093, il défendit les droits de l'Église contre les rois.", "Il fut exilé deux fois pour avoir refusé de se soumettre aux prétentions royales.", "Ses œuvres, notamment le Cur Deus Homo, fondent la théologie de la Rédemption.", "Il mourut en 1109 à Cantorbéry, après un épiscopat marqué par les conflits et la fidélité.", "Déclaré Docteur de l'Église en 1720, il est l'un des plus grands théologiens médiévaux."] },
      "4-22": { nom: "Saint Léonide", texte: ["Léonide fut le père d'Origène, le grand théologien alexandrin du IIIe siècle.", "Il vivait à Alexandrie et était un chrétien cultivé et profondément croyant.", "Il donna à son fils Origène une éducation à la fois classique et profondément chrétienne.", "Il lui faisait apprendre chaque jour par cœur des passages des Saintes Écritures.", "Lors de la persécution de Septime Sévère en 202, il fut arrêté pour sa foi.", "Le jeune Origène voulut se livrer lui-même aux autorités pour mourir avec son père.", "Sa mère le retint en cachant ses vêtements, l'empêchant de sortir.", "Origène écrivit à son père en prison pour l'encourager à ne pas apostasier.", "Léonide fut décapité en 202, laissant à son fils le plus bel exemple de fidélité.", "Il est vénéré comme martyr dans l'Église grecque et dans l'Église latine."] },
      "4-23": { nom: "Saint Georges", texte: ["Georges est l'un des martyrs les plus vénérés de la chrétienté orientale et occidentale.", "Officier dans l'armée romaine, il aurait subi le martyre vers 303, sous Dioclétien.", "La légende du dragon, popularisée au Moyen Âge, illustre son courage contre les forces du mal.", "Il terrassa le dragon pour délivrer une princesse et convertit tout un peuple.", "Historiquement, il fut décapité pour avoir refusé de sacrifier aux idoles.", "Son culte se répandit rapidement en Orient, puis en Occident avec les croisés.", "Il est le saint patron de l'Angleterre, de la Géorgie, du Portugal et de la Catalogne.", "Sa croix rouge sur fond blanc est le symbole de l'Angleterre.", "Il est l'un des Quatorze Saints Auxiliateurs, invoqués dans les grandes détresses.", "Il est le patron des soldats, des cavaliers, des armuriers et des scouts."] },
      "4-24": { nom: "Saint Fidèle de Sigmaringen", texte: ["Fidèle de Sigmaringen naquit en 1578 à Sigmaringen, en Souabe.", "Brillant juriste, il exerça quelque temps comme avocat avant d'entrer chez les Capucins.", "Ordonné prêtre, il se consacra à la prédication et au service des malades.", "Il fut envoyé en Suisse pour prêcher parmi les protestants des Grisons.", "Malgré les menaces, il continua courageusement sa mission de reconversion.", "Il fut assassiné à Seewis le 24 avril 1622 par des paysans calvinistes soulevés contre lui.", "Avant de mourir, il pardonna à ses assassins au nom du Christ.", "Il fut le premier martyr canonisé par la Congrégation de la Propagande de la Foi.", "Béatifié en 1729, il fut canonisé par Benoît XIV en 1746.", "Il est le patron des missionnaires et des avocats catholiques."] },
      "4-25": { nom: "Saint Marc, évangéliste", texte: ["Marc est l'auteur du deuxième Évangile, le plus court et le plus ancien des quatre.", "Il était le compagnon de saint Paul et de saint Barnabé lors du premier voyage missionnaire.", "Il fut ensuite l'interprète et le secrétaire de saint Pierre à Rome.", "Son Évangile reflète les catéchèses de Pierre, dont il fixe les souvenirs par écrit.", "Il fonda l'Église d'Alexandrie en Égypte, dont il fut le premier évêque.", "Il subit le martyre à Alexandrie vers 68, traîné sur des pierres par une foule en furie.", "Ses reliques furent transportées à Venise en 828 par deux marchands vénitiens.", "La splendide basilique Saint-Marc de Venise fut construite pour les abriter.", "Son symbole évangélique est le lion ailé, emblème de Venise.", "Il est le patron des notaires et de la ville de Venise."] },
      "4-26": { nom: "Notre-Dame du Bon Conseil", texte: ["La dévotion à Notre-Dame du Bon Conseil est particulièrement liée à Gênes et à Genazzano.", "En 1467, une image de la Vierge apparut miraculeusement sur un mur en ruine à Genazzano.", "Elle était portée par les anges depuis l'Albanie, fuyant la conquête ottomane.", "L'image était si fine qu'elle ne tenait au mur que par une force surnaturelle.", "Elle attira immédiatement des foules de pèlerins de toute l'Italie.", "Les Augustiniens confièrent à leur garde ce sanctuaire qui devint célèbre dans toute l'Europe.", "Le pape Pie II fut le premier pape à se rendre en pèlerinage à Genazzano.", "La Vierge du Bon Conseil est invoquée dans les décisions importantes et les choix difficiles.", "Elle est représentée tenant l'Enfant Jésus joue contre joue, dans une intimité maternelle.", "Elle est la patronne de l'Albanie et des Augustiniens."] },
      "4-27": { nom: "Saint Zite", texte: ["Zite naquit vers 1218 à Monsagrati, près de Lucques, en Toscane, dans une famille pauvre.", "À douze ans, elle entra comme servante dans la famille Fatinelli à Lucques.", "Elle y travailla fidèlement pendant quarante-huit ans, jusqu'à sa mort.", "Sa piété profonde et sa charité envers les pauvres lui créèrent d'abord des ennuis avec ses maîtres.", "Peu à peu, sa sainteté rayonnante gagna le respect et l'admiration de toute la famille.", "Elle distribuait aux pauvres la nourriture de ses maîtres, qui s'en aperçurent et l'excusèrent.", "Plusieurs miracles lui sont attribués, notamment la multiplication du pain.", "Elle mourut en 1278, pleurée par toute la ville de Lucques.", "Canonisée en 1696 par Innocent XII, son corps incorruptible est vénéré à Lucques.", "Elle est la patronne des domestiques, des servantes et des femmes de chambre."] },
      "4-28": { nom: "Saint Louis-Marie Grignion de Montfort", texte: ["Louis-Marie Grignion de Montfort naquit en 1673 à Montfort-sur-Meu, en Bretagne.", "Ordonné prêtre en 1700, il se consacra aux missions populaires dans l'ouest de la France.", "Sa dévotion mariale intense lui fit écrire le Traité de la vraie dévotion à la Vierge Marie.", "Ce traité, resté longtemps inconnu, fut découvert en 1842 et connut un succès mondial.", "Jean-Paul II s'en inspira profondément, choisissant comme devise Totus Tuus, tout à toi.", "Il fonda la Compagnie de Marie et les Filles de la Sagesse pour continuer ses missions.", "Sa méthode apostolique associait les missions populaires à la dévotion au rosaire.", "Il mourut épuisé à Saint-Laurent-sur-Sèvre en 1716, à l'âge de quarante-trois ans.", "Canonisé par Pie XII en 1947, son œuvre spirituelle est mondiale.", "Il est le grand apôtre de la dévotion mariale dans l'Église catholique moderne."] },
      "4-29": { nom: "Sainte Catherine de Sienne", texte: ["Catherine naquit en 1347 à Sienne, vingtième enfant d'un teinturier.", "Elle consacra sa virginité à Dieu à l'âge de sept ans, suite à une vision.", "Elle entra dans le tiers-ordre dominicain et vécut d'abord en récluse dans sa chambre.", "Elle soigna les malades de la peste et les condamnés à mort dans les prisons.", "Sa correspondance, adressée aux plus grands personnages de son époque, témoigne de son autorité spirituelle.", "Elle osa écrire au pape Grégoire XI pour lui ordonner de revenir d'Avignon à Rome.", "Le pape obéit, mettant fin au séjour avignonnais de la papauté en 1377.", "Ses Dialogues, dictés en extase, sont un chef-d'œuvre de la mystique chrétienne.", "Elle mourut à Rome en 1380, à trente-trois ans, épuisée par ses pénitences.", "Déclarée Docteur de l'Église en 1970, elle est la patronne de l'Italie et de l'Europe."] },
      "4-30": { nom: "Saint Pie V, pape", texte: ["Pie V naquit en 1504 à Bosco, dans le Piémont, dans une famille pauvre.", "Il entra dans l'ordre dominicain et se distingua par sa rigueur ascétique.", "Élu pape en 1566, il entreprit une réforme rigoureuse de l'Église après le Concile de Trente.", "Il publia le Catéchisme romain et fixa la forme définitive de la messe latine.", "Cette messe tridentine, dite messe de saint Pie V, fut célébrée jusqu'au concile Vatican II.", "Il organisa la Sainte Ligue chrétienne contre l'avancée ottomane en Méditerranée.", "La bataille de Lépante, en 1571, arrêta l'expansion ottomane grâce à cette coalition.", "Il attribua cette victoire à la Vierge du Rosaire et institua la fête du Rosaire.", "Il mourut en 1572, après un pontificat marqué par la réforme et la défense de l'Église.", "Il fut canonisé en 1712 par Clément XI."] },
      "5-1": { nom: "Saint Joseph Travailleur", texte: ["La fête de saint Joseph Travailleur fut instituée par Pie XII en 1955.", "Elle répond à la fête du Travail du 1er mai, célébrée dans les pays socialistes.", "Joseph de Nazareth est présenté dans les Évangiles comme un artisan du bois.", "Il exerça son métier de charpentier avec soin et honnêteté, subvenant aux besoins de la Sainte Famille.", "Jésus apprit son métier à ses côtés, travaillant lui-même comme artisan jusqu'à trente ans.", "Cette fête rappelle la dignité du travail manuel, sanctifié par les mains de Joseph et de Jésus.", "Elle propose aux travailleurs du monde entier un modèle de travail accompli dans la foi.", "Saint Joseph est invoqué par les ouvriers, les artisans et tous ceux qui peinent de leurs mains.", "Le pape François a ajouté son nom au Canon romain de la messe en 2013.", "Sa fête du 1er mai est l'occasion de réfléchir sur le sens chrétien du travail humain."] },
      "5-2": { nom: "Saint Athanase d'Alexandrie", texte: ["Athanase naquit vers 295 à Alexandrie, en Égypte, dans une famille chrétienne.", "Il fut l'un des plus grands défenseurs de la foi catholique contre l'hérésie arienne.", "Il assista au Concile de Nicée en 325 comme diacre et collaborateur de l'évêque Alexandre.", "Élu évêque d'Alexandrie en 328, il consacra toute sa vie à défendre le symbole de Nicée.", "Il fut exilé cinq fois pour avoir refusé de céder aux empereurs ariens.", "Sa formule: Athanase contre tous le monde et le monde contre Athanase est restée célèbre.", "Durant ses exils, il rédigea de nombreux écrits théologiques fondamentaux.", "Sa biographie de saint Antoine le Grand contribua à l'essor du monachisme en Occident.", "Il mourut en 373 à Alexandrie, après quarante-cinq ans d'épiscopat mouvementé.", "Docteur de l'Église, il est le Père de l'Orthodoxie et le Père de la Trinité."] },
      "5-3": { nom: "Saints Philippe et Jacques", texte: ["Philippe et Jacques le Mineur sont deux apôtres du Christ fêtés ensemble le 3 mai.", "Philippe était originaire de Bethsaïde en Galilée, ville natale de Pierre et André.", "C'est lui qui dit à Nathanaël de venir voir le Christ, ce qui amena sa conversion.", "Dans l'Évangile de Jean, il demanda à Jésus de leur montrer le Père.", "Jacques le Mineur, fils d'Alphée, est appelé frère du Seigneur dans les Épîtres de Paul.", "Il devint le premier évêque de Jérusalem après la résurrection du Christ.", "Son Épître est la plus ancienne du Nouveau Testament selon certains exégètes.", "Il fut martyrisé à Jérusalem en 62, précipité du haut du Temple puis lapidé.", "Leurs reliques sont vénérées dans la basilique des Saints-Apôtres à Rome.", "Ils illustrent deux vocations complémentaires : le missionnaire et le pasteur local."] },
      "5-4": { nom: "Bienheureuse Marie-Léonie Paradis", texte: ["Marie-Léonie Paradis naquit en 1840 à L'Acadie, au Québec, dans une famille canadienne.", "Elle entra dans la Congrégation de Sainte-Croix et fut une religieuse dévouée pendant de longues années.", "Elle discerna un appel particulier : consacrer sa vie au soutien des prêtres et des clercs.", "Elle fonda en 1880 les Petites Sœurs de la Sainte-Famille pour ce service spécifique.", "Cette congrégation se dédie aux tâches ménagères dans les séminaires et les maisons cléricales.", "Elle permit ainsi aux futurs prêtres de se consacrer entièrement à leur formation.", "Sa vie fut marquée par une grande humilité et une totale discrétion.", "Elle mourut à Sherbrooke en 1912, après avoir fondé une congrégation présente dans plusieurs pays.", "Béatifiée par Jean-Paul II en 1984, elle est une figure de la sainteté québécoise.", "Elle est le symbole du service humble et caché au cœur de l'Église."] },
      "5-5": { nom: "Saint Ange de Jérusalem", texte: ["Ange de Jérusalem était un carme du XIIIe siècle, né à Jérusalem de parents juifs convertis.", "Avec son frère Jean, il fut baptisé et reçut une éducation chrétienne.", "Il entra au Carmel, le monastère fondé sur le mont Carmel par saint Berthold.", "Il fut l'un des premiers missionnaires carmes envoyés en Sicile pour propager l'ordre.", "Son ardeur apostolique et sa sainteté attirèrent l'attention de toute la région.", "Il fut assassiné à Licata en Sicile en 1225 par un pécheur qu'il avait repris publiquement.", "Il mourut en pardonnant à son meurtrier, imitant le Christ sur la Croix.", "Il est considéré comme le protomartyr de l'ordre du Carmel.", "Canonisé en 1671 par Clément X, il est vénéré dans tout l'ordre carmélitain.", "Il est le patron de la ville de Licata en Sicile."] },
      "5-6": { nom: "Saint Dominique Savio", texte: ["Dominique Savio naquit en 1842 à Riva di Chieri, dans le Piémont, dans une famille paysanne.", "Dès l'enfance, il se distingua par une piété et une pureté d'une rare intensité.", "À dix ans, il rencontra saint Jean Bosco qui devint son directeur spirituel.", "Il entra à l'Oratoire de Turin où sa sainteté rayonnante impressionna tous ses camarades.", "Il fonda la Compagnie de l'Immaculée Conception pour encourager ses amis à la piété.", "Sa mortification volontaire était si intense que Bosco dut parfois la modérer.", "Il eut plusieurs visions et expériences mystiques remarquables pour son jeune âge.", "Il mourut en 1857, à seulement quinze ans, épuisé par ses pénitences et ses extases.", "Canonisé en 1954 par Pie XII, il est le plus jeune canonisé non martyr.", "Il est le patron des adolescents, des chœurs de jeunes et des enfants servants de messe."] },
      "5-7": { nom: "Saint Jean de Beverley", texte: ["Jean de Beverley naquit vers 640 en Northumbrie, en Angleterre.", "Il fut l'élève de Théodore de Tarse, archevêque de Cantorbéry, et de la sainte abbesse Hilda de Whitby.", "Il devint évêque de Hexham en 687, puis d'York en 705.", "Sa réputation de thaumaturge était immense de son vivant.", "Il guérit de nombreux malades, dont un muet qui se mit à parler après sa prière.", "Bède le Vénérable fut son élève et lui attribue de nombreux miracles dans son Histoire ecclésiastique.", "Il se retira dans le monastère qu'il avait fondé à Beverley, en Angleterre.", "Il mourut en 721 et fut inhumé à Beverley, dont le magnifique prieuré perpétue sa mémoire.", "Il fut canonisé en 1037 par le pape Benoît IX.", "Il est le patron de l'Université de Cambridge et de la ville de Beverley."] },
      "5-8": { nom: "Saint Victor Maurus", texte: ["Victor Maurus fut un martyr milanais des premiers siècles du christianisme.", "Soldat maure dans l'armée romaine à Milan, il était chrétien depuis son enfance.", "Lors de la persécution de Maximien Hercule vers 303, il fut arrêté pour sa foi.", "Il endura courageusement les supplices sans renier le Christ.", "Il fut décapité à Milan, où une basilique fut rapidement élevée sur son tombeau.", "Saint Ambroise honora sa mémoire et le déposa sous l'autel de la basilique qu'il consacra.", "Sa basilique de Milan, Sant'Ambrogio, est l'un des plus beaux exemples de l'art roman lombard.", "Son culte fut très populaire à Milan pendant tout le Moyen Âge.", "Il est l'un des saints patrons de Milan, avec saint Ambroise.", "Sa fête est célébrée avec solennité dans le diocèse de Milan."] },
      "5-9": { nom: "Saint Benoît II, pape", texte: ["Benoît II fut pape de 684 à 685, pendant un bref pontificat d'un peu moins d'un an.", "Romain de naissance, il fut éduqué dès l'enfance dans la tradition ecclésiastique romaine.", "Il obtint de l'empereur Constantin IV une décision importante pour l'Église de Rome.", "L'empereur accepta de supprimer la nécessité de la confirmation impériale pour les papes élus.", "Cette décision renforça l'autonomie de l'Église romaine dans ses choix internes.", "Il fut un homme de grande douceur et charité, aimant les pauvres et les religieux.", "Il mourut en 685, pleuré de tout le peuple de Rome.", "Son pontificat, bien que bref, eut des conséquences importantes pour la liberté de l'Église.", "Il est vénéré comme saint dans le martyrologe romain.", "Il illustre la continuité paisible de la succession apostolique à Rome."] },
      "5-10": { nom: "Saint Jean d'Avila", texte: ["Jean d'Avila naquit en 1499 à Almodóvar del Campo, en Castille.", "Issu d'une famille de convertis juifs, il étudia le droit puis la théologie à Alcalá.", "Ordonné prêtre en 1525, il vendit tous ses biens et se consacra à l'évangélisation de l'Andalousie.", "Ses prédications brûlantes touchèrent des milliers de personnes.", "Arrêté par l'Inquisition pour des sermons sur la pauvreté, il fut acquitté et continua sa mission.", "Sa direction spirituelle forma de nombreux saints, dont François Borgia et sainte Thérèse.", "Ses lettres spirituelles sont un trésor de la mystique espagnole du XVIe siècle.", "Son Audi Filia, commentaire du Psaume 44, est un chef-d'œuvre de la spiritualité nuptiale.", "Il mourut en 1569 à Montilla, vénéré de toute l'Espagne.", "Déclaré Docteur de l'Église par Benoît XVI en 2012, il est le patron du clergé espagnol."] },
      "5-11": { nom: "Saint Mamert de Vienne", texte: ["Mamert fut évêque de Vienne, en Gaule, dans la seconde moitié du Ve siècle.", "Son épiscopat fut marqué par des calamités : tremblements de terre, incendies, invasions.", "Pour apaiser la colère divine et obtenir la protection du Ciel, il institua les Rogations.", "Ces processions de prières et de pénitences se déroulaient les trois jours précédant l'Ascension.", "Pendant ces trois jours, les fidèles parcouraient les champs en procession, priant pour les récoltes.", "Cette pratique se répandit rapidement dans toute l'Église d'Occident.", "Le pape Léon III l'introduisit à Rome au IXe siècle, lui donnant une dimension universelle.", "Les Rogations furent célébrées pendant des siècles comme fête liturgique importante.", "Mamert mourut vers 475, laissant une Église mieux organisée et une pratique liturgique durable.", "Il est le patron des vignerons et des agriculteurs dans certaines régions de France."] },
      "5-12": { nom: "Saints Nérée et Achillée", texte: ["Nérée et Achillée furent des martyrs romains des premiers siècles chrétiens.", "Selon la tradition, ils étaient soldats de la garde prétorienne, au service de Flavia Domitilla.", "Convertis au christianisme, ils refusèrent de continuer à servir dans l'armée.", "Ils furent exilés avec Domitilla sur l'île de Terracine puis martyrisés vers 100.", "Leurs tombes sur la voie Ardéatine, à Rome, furent vénérées dès l'Antiquité.", "Une basilique fut construite sur leurs tombeaux au IVe siècle, encore visible aujourd'hui.", "Le pape Damase composa une inscription poétique en leur honneur.", "Leurs noms figurent dans le plus ancien martyrologe romain.", "L'archéologie a confirmé l'existence de leur tombeau dans les catacombes de Domitille.", "Ils illustrent le courage des premiers soldats chrétiens qui refusèrent le service armé."] },
      "5-13": { nom: "Notre-Dame de Fatima", texte: ["Le 13 mai 1917, la Vierge Marie apparut à trois enfants dans la Cova da Iria, à Fatima au Portugal.", "Les voyants s'appelaient Lucie dos Santos et ses cousins François et Jacinthe Marto.", "La Vierge leur apparut six fois entre mai et octobre 1917, le 13 de chaque mois.", "Elle demanda la prière du chapelet quotidien pour la conversion des pécheurs et la paix.", "Le 13 juillet, elle confia aux enfants trois secrets concernant l'avenir du monde et de l'Église.", "Le 13 octobre, soixante-dix mille personnes assistèrent au miracle du soleil.", "François et Jacinthe moururent respectivement en 1919 et 1920, victimes de la grippe.", "Ils furent béatifiés par Jean-Paul II en 2000, puis canonisés par François en 2017.", "Jean-Paul II fut atteint d'une balle le 13 mai 1981 et attribua sa survie à Notre-Dame de Fatima.", "Fatima est aujourd'hui l'un des principaux lieux de pèlerinage catholique du monde."] },
      "5-14": { nom: "Saint Matthias, apôtre", texte: ["Matthias fut choisi par les apôtres pour remplacer Judas Iscariote après sa mort.", "L'élection eut lieu entre l'Ascension et la Pentecôte, racontée dans les Actes des Apôtres.", "Deux candidats furent proposés : Joseph Barsabbas et Matthias.", "On tira au sort après avoir prié, et le sort tomba sur Matthias.", "Il fut ainsi agrégé aux Onze pour former à nouveau le collège des Douze.", "La tradition situe sa prédication en Judée, en Éthiopie ou en Colchide.", "Il aurait été martyrisé, soit par lapidation, soit par décapitation selon les sources.", "Ses reliques présumées furent apportées à Rome par sainte Hélène.", "Une partie de ses reliques fut transférée à Trèves, en Allemagne, lieu de grand pèlerinage.", "Il est le patron des charpentiers et des tailleurs de pierres."] },
      "5-15": { nom: "Saint Isidore le Laboureur", texte: ["Isidore naquit vers 1070 à Madrid, dans une famille paysanne très pauvre.", "Il travailla toute sa vie comme laboureur au service du même maître, Juan de Vargas.", "Sa piété profonde l'amenait à se rendre chaque matin à la messe avant de commencer son travail.", "Son maître lui reprocha un jour d'arriver en retard aux champs, mais il vit des anges labourer à sa place.", "Il partageait sa nourriture avec les pauvres et les animaux affamés.", "Il multiplia, dit la tradition, son maigre repas pour nourrir de nombreux pauvres.", "Il épousa Marie Torribia, elle aussi vénérée comme sainte, connue sous le nom de sainte Marie de la Tête.", "Il mourut vers 1130 et fut canonisé en 1622 avec Ignace de Loyola et François Xavier.", "Il est le saint patron des agriculteurs, des paysans et de la ville de Madrid.", "Sa fête est célébrée avec de grandes processions dans toute l'Espagne rurale."] },
      "5-16": { nom: "Saint Honorat d'Amiens", texte: ["Honorat naquit au VIe siècle dans une famille noble de la région de Ponthieu, en Picardie.", "Éduqué par l'évêque de Thérouanne, il fut un élève brillant et vertueux.", "Il fut élu évêque d'Amiens, poste qu'il occupa avec un grand dévouement pastoral.", "Sa sainteté est attestée par de nombreux miracles rapportés dans les chroniques médiévales.", "Il mourut vers 600 et fut inhumé dans l'église qu'il avait fait construire à Amiens.", "Son tombeau devint rapidement un lieu de pèlerinage important pour toute la Picardie.", "La rue Saint-Honoré à Paris et les célèbres gâteaux Saint-Honoré portent son nom.", "Il est le patron des boulangers et des pâtissiers depuis le Moyen Âge.", "Sa fête le 16 mai était autrefois chômée par toutes les corporations de boulangers.", "Il est l'un des saints les plus populaires de l'Île-de-France et de la Picardie."] },
      "5-17": { nom: "Saint Pascal Baylon", texte: ["Pascal Baylon naquit en 1540 à Torre Hermosa, en Aragon, dans une famille paysanne.", "Il fut berger pendant sa jeunesse, apprenait à lire seul dans les prés avec un alphabet qu'il portait.", "À vingt-quatre ans, il entra dans l'ordre des Franciscains réformés, les Alcantarins.", "Sa vie était caractérisée par une dévotion eucharistique extraordinaire.", "Il passait des heures en adoration devant le Saint-Sacrement, en extase.", "Il avait le don de discerner les pensées des personnes qu'il dirigeait spirituellement.", "Ses pénitences étaient d'une grande rigueur, conformes à l'esprit de l'Alcantara.", "Il mourut en 1592 à Villarreal, en Espagne, au son de la cloche de l'élévation.", "Canonisé en 1690, il fut déclaré patron des congrès eucharistiques par Léon XIII en 1897.", "Il est le patron des œuvres eucharistiques et des confréries du Saint-Sacrement."] },
      "5-18": { nom: "Saint Jean Ier, pape", texte: ["Jean Ier fut pape de 523 à 526, pendant un pontificat tragique.", "Il était un homme cultivé et pieux, élu dans un contexte politique difficile.", "Le roi Théodoric, roi ostrogoth de l'Italie et arien, le contraignit à se rendre à Constantinople.", "Jean Ier fut le premier pape à se rendre à Constantinople pour traiter avec l'empire d'Orient.", "Il fut reçu avec une grande solennité par l'empereur Justin Ier, qui lui témoigna un grand respect.", "Il couronna lui-même l'empereur selon le rite romain, honneur exceptionnel.", "De retour en Italie, il fut jeté en prison par Théodoric, irrité de son attitude.", "Il mourut en prison à Ravenne en 526, épuisé par son traitement.", "Il est vénéré comme martyr par l'Église catholique.", "Sa mort illustre les tensions entre la papauté et les rois barbares au VIe siècle."] },
      "5-19": { nom: "Saint Yves de Bretagne", texte: ["Yves naquit en 1253 à Minihy-Tréguier, en Bretagne, dans une famille noble bretonne.", "Il étudia le droit canon à Paris et à Orléans, devenant un brillant juriste.", "Ordonné prêtre en 1284, il exerça simultanément comme juge ecclésiastique et avocat des pauvres.", "Il défendait gratuitement les causes des pauvres contre les riches et les puissants.", "Sa rigueur et son impartialité lui valurent le respect de tous, même de ses adversaires.", "Il vivait dans une grande austérité, dormant peu et donnant tout aux pauvres.", "Il mourut en 1303 à Louannec, en Bretagne, épuisé par ses jeûnes et ses travaux.", "Canonisé en 1347 par Clément VI, il devint immédiatement le saint patron de la Bretagne.", "Sa basilique à Tréguier est un lieu de pèlerinage important, notamment pour les gens de loi.", "Il est le patron des avocats, des juges et des hommes de loi dans le monde entier."] },
      "5-20": { nom: "Saint Bernardin de Sienne", texte: ["Bernardin de Sienne naquit en 1380 à Massa Maritima, en Toscane.", "Orphelin à six ans, il fut élevé par des tantes pieuses qui formèrent son caractère.", "Lors de la grande épidémie de 1400, il soigna pendant des mois les malades de Sienne.", "Il entra dans l'ordre franciscain en 1402 et fut ordonné prêtre.", "Ses missions de prédication à travers toute l'Italie attirèrent des foules immenses.", "Il prônait partout la dévotion au saint Nom de Jésus, représenté par les lettres IHS.", "Cette dévotion lui valut des accusations d'hérésie, dont il fut plusieurs fois acquitté.", "Son éloquence et son humour lui permettaient de toucher les esprits les plus endurcis.", "Il mourut en 1444 à Aquila, épuisé par ses incessants voyages de prédication.", "Canonisé en 1450 par Nicolas V, il est le patron des communicateurs et de la publicité."] },
      "5-21": { nom: "Saint Christophe Magallanes", texte: ["Christophe Magallanes naquit en 1869 à Totatiche, au Mexique, dans une famille paysanne.", "Ordonné prêtre en 1899, il se consacra à l'évangélisation des populations indigènes de la région.", "Il fonda de nombreuses écoles et institutions catholiques dans son diocèse.", "Lors de la persécution religieuse des années 1920, il continua courageusement son ministère.", "Il fut arrêté en 1927 alors qu'il se rendait simplement à une ferme voisine.", "Accusé faussement d'avoir organisé une rébellion, il fut condamné à mort sans jugement.", "En marchant vers son exécution, il distribua ses effets personnels aux soldats comme souvenirs.", "Avant d'être fusillé, il cria : Je meurs innocent et je pardonne de tout cœur.", "Il fut canonisé avec vingt-quatre compagnons par Jean-Paul II en 2000.", "Il est le symbole du martyre de l'Église mexicaine pendant la persécution des cristeros."] },
      "5-22": { nom: "Sainte Rita de Cascia", texte: ["Rita naquit vers 1381 à Roccaporena, près de Cascia, en Ombrie.", "Ses parents avaient choisi un mari pour elle, alors qu'elle souhaitait entrer en religion.", "Elle obéit et vécut un mariage difficile avec un homme violent, qu'elle adoucit par sa patience.", "Son mari fut assassiné et elle dut faire face à la vendetta qui menaçait ses fils.", "Elle pria Dieu que ses fils meurent plutôt que de devenir des assassins : ils moururent paisiblement.", "Veuve, elle demanda à entrer au monastère des Augustines, qui la refusèrent trois fois.", "Elle fut miraculeusement transportée dans l'enceinte du monastère par des anges.", "Elle demanda à participer aux souffrances du Christ et reçut une épine de la couronne dans le front.", "Elle mourut en 1457 et fut canonisée en 1900 par Léon XIII.", "Elle est la patronne des causes désespérées et des femmes malheureuses en mariage."] },
      "5-23": { nom: "Saint Jean Baptise Rossi", texte: ["Jean Baptiste Rossi naquit en 1698 à Voltaggio, près de Gênes, dans une famille pauvre.", "Dès l'enfance, il manifesta une piété et une charité remarquables.", "Grâce à des bienfaiteurs, il put faire ses études à Rome et fut ordonné prêtre en 1721.", "Il se consacra au service des malades dans les hôpitaux et des sans-abri dans les marchés.", "Il dormait souvent dans les hospices pour être proche des plus pauvres.", "Il était confesseur au Capitole et dans plusieurs hôpitaux de Rome.", "Son confessionnal était pris d'assaut par des milliers de pénitents qui venaient de toute la ville.", "Ses pénitences et ses privations volontaires étaient d'une grande rigueur.", "Il mourut en 1764, épuisé par ses travaux, vénéré de tout Rome.", "Canonisé par Pie VI en 1881, il est le patron des sans-abri et des travailleurs sociaux."] },
      "5-24": { nom: "Marie, Auxiliatrice des chrétiens", texte: ["La fête de Marie Auxiliatrice des Chrétiens est célébrée le 24 mai depuis 1814.", "Pie VII institua cette fête en action de grâces pour sa libération de la captivité napoléonienne.", "Le titre d'Auxiliatrice, qui signifie celle qui aide ou qui secourt, est ancien dans la tradition chrétienne.", "Il fut popularisé par saint Jean Bosco qui lui dédia sa basilique de Turin en 1868.", "Les Salésiens ont répandu cette dévotion dans le monde entier par leurs missions.", "De nombreux miracles lui sont attribués, notamment pendant les guerres et les épidémies.", "La basilique Marie Auxiliatrice de Turin est un lieu de pèlerinage majeur pour les dévots.", "Jean-Paul II lui attribua sa survie lors de l'attentat du 13 mai 1981.", "Elle est particulièrement invoquée en temps de guerre, de persécution et d'épidémie.", "Sa fête rappelle que Marie est la mère qui secourt ses enfants dans toutes leurs détresses."] },
      "5-25": { nom: "Saint Bède le Vénérable", texte: ["Bède naquit vers 672 en Northumbrie, en Angleterre, et fut confié dès l'enfance à un monastère.", "Il passa toute sa vie au monastère de Jarrow, sans presque en sortir.", "Son œuvre immense couvre la théologie, l'histoire, la grammaire et les sciences naturelles.", "Son Histoire ecclésiastique du peuple anglais est la source principale de l'histoire de l'Angleterre primitive.", "Il établit le comput du calendrier chrétien et popularisa la datation avant et après Jésus-Christ.", "Il mourut en 735, en dictant ses dernières paroles alors qu'il finissait de traduire l'Évangile de Jean.", "Ses dernières heures sont décrites par son disciple Cuthbert dans une lettre émouvante.", "Il fut déclaré Docteur de l'Église par Léon XIII en 1899, premier Anglais à recevoir ce titre.", "Son titre de Vénérable désigne une reconnaissance médiévale de sa sainteté.", "Il est le père de l'historiographie anglaise et le patron des historiens."] },
      "5-26": { nom: "Saint Philippe Néri", texte: ["Philippe Néri naquit en 1515 à Florence dans une famille simple et pieuse.", "À dix-huit ans, il se rendit à Rome où il vécut d'abord dans une grande pauvreté.", "Il passa des nuits entières à prier dans les catacombes des martyrs.", "Il fonda la Confrérie de la Très Sainte Trinité pour soigner les pèlerins et les malades à Rome.", "Ordonné prêtre à trente-six ans, il se distingua par sa joie communicative et son humour.", "Il rassemblait autour de lui des personnes de tous milieux pour prier et méditer ensemble.", "Ce rassemblement devint l'Oratoire, nouvelle forme de vie religieuse non cloîtrée.", "Sa gaieté et ses plaisanteries spirituelles lui valurent le surnom de bouffon de Dieu.", "Il mourut en 1595 à Rome, dans l'allégresse, fêté par toute la ville.", "Canonisé en 1622, il est le patron de Rome et des jeunes."] },
      "5-27": { nom: "Saint Augustin de Cantorbéry", texte: ["Augustin de Cantorbéry naquit en Italie et entra dans la vie monastique à Rome.", "Le pape Grégoire le Grand le choisit pour mener la mission d'évangélisation de l'Angleterre.", "En 596, il parti avec quarante moines bénédictins vers cette île inconnue et redoutée.", "Le roi du Kent, Ethelbert, l'accueillit favorablement et lui permit de prêcher librement.", "Le roi lui-même se convertit et Augustin baptisa des milliers d'Anglais.", "Il fut ordonné premier évêque de Cantorbéry et organisa l'Église en Angleterre.", "Il tenta de dialoguer avec les évêques celtiques pour unifier la liturgie anglaise.", "Il mourut vers 604, peu après saint Grégoire qui avait initié la mission.", "Sa tombe à Cantorbéry devint un lieu de pèlerinage important.", "Il est le patron de l'Angleterre avec saint Georges et le père de l'Église anglaise."] },
      "5-28": { nom: "Saint Germain de Paris", texte: ["Germain naquit vers 496 à Autun, en Bourgogne, dans une famille noble.", "Ordonné prêtre, il devint abbé du monastère de Saint-Symphorien d'Autun.", "En 555, il fut nommé évêque de Paris par le roi Childebert Ier.", "Son épiscopat dura trente ans et fut marqué par une grande activité pastorale et charitable.", "Il dépensa tout son patrimoine au profit des pauvres, des prisonniers et des esclaves.", "Il racheta de nombreux prisonniers de guerre et remit leurs dettes aux indigents.", "Il présida plusieurs conciles importants qui organisèrent l'Église franque.", "Il exerça une influence considérable sur les rois mérovingiens, notamment Chilpéric.", "Il mourut en 576 à Paris et fut inhumé dans l'abbaye qui porte son nom, Saint-Germain-des-Prés.", "Il est le patron de Paris avec sainte Geneviève."] },
      "5-29": { nom: "Bienheureux Urbain V, pape", texte: ["Urbain V naquit en 1310 à Grisac, en Languedoc, dans une famille noble.", "Entré dans l'ordre bénédictin, il fit de brillantes études de droit canonique.", "Élu pape en 1362, il tenta de ramener la papauté d'Avignon à Rome.", "Il séjourna à Rome de 1367 à 1370, mais dut retourner à Avignon devant les troubles italiens.", "Il mourut quelques mois après son retour à Avignon, en 1370.", "Son pontificat fut marqué par la lutte contre la corruption et la promotion des études.", "Il fonda de nombreuses universités et bourses d'études pour les jeunes clercs.", "Sa charité envers les pauvres était remarquable et il refusa tout luxe personnel.", "Béatifié en 1870 par Pie IX, il est le seul pape d'Avignon à être béatifié.", "Il est vénéré comme modèle de l'évêque de Rome épris de réforme et de culture."] },
      "5-30": { nom: "Sainte Jeanne d'Arc", texte: ["Jeanne d'Arc naquit en 1412 à Domrémy, en Lorraine, dans une famille paysanne.", "À treize ans, elle commença à entendre des voix qu'elle identifia comme celles de saint Michel, sainte Catherine et sainte Marguerite.", "Ces voix lui confiaient la mission de bouter les Anglais hors de France et de faire sacrer le roi.", "À dix-sept ans, elle obtint une audience du dauphin Charles VII qu'elle reconnut parmi cent courtisans.", "Elle conduisit l'armée française à la victoire d'Orléans en mai 1429, levant le siège anglais.", "Elle accompagna Charles VII jusqu'à Reims où il fut sacré roi de France le 17 juillet 1429.", "Capturée par les Bourguignons en 1430, elle fut vendue aux Anglais et jugée pour hérésie.", "Elle fut brûlée vive à Rouen le 30 mai 1431, à l'âge de dix-neuf ans.", "Réhabilitée en 1456, elle fut canonisée par Benoît XV en 1920.", "Elle est la patronne de la France, des soldats et des jeunes filles."] },
      "5-31": { nom: "Visitation de la Vierge Marie", texte: ["La fête de la Visitation célèbre la visite de Marie à sa cousine Élisabeth, enceinte de Jean-Baptiste.", "Marie se hâta vers les montagnes de Judée après l'Annonciation, portant Jésus en elle.", "Dès qu'Élisabeth entendit la salutation de Marie, l'enfant tressaillit dans son sein.", "Élisabeth s'écria : Bénie es-tu entre les femmes, et béni le fruit de tes entrailles.", "Marie répondit par le Magnificat, hymne de joie et d'action de grâces.", "Ce cantique est l'un des plus beaux de l'Écriture Sainte et de la liturgie chrétienne.", "Il exprime la joie du salut accompli dans l'humilité des petits.", "Cette rencontre marque aussi la sanctification de Jean-Baptiste dans le sein de sa mère.", "La fête de la Visitation clôt le mois de mai, mois marial par excellence.", "Elle invite les chrétiens à imiter Marie en portant le Christ à leurs frères."] }OCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Saint du Jour" />
  <title>Saint du Jour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --ink: #f0e4c0;
      --ink-dim: #a89060;
      --red: #8b1a1a;
      --glow: rgba(201,168,76,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background-color: #0d0b06;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(100,60,10,0.5) 0%, transparent 60%);
      font-family: 'EB Garamond', Georgia, serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
    }
    .header { text-align: center; padding: 32px 16px 16px; }
    .ornament { display: block; color: var(--gold); font-size: 20px; letter-spacing: 12px; opacity: .7; margin-bottom: 8px; }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(18px,5.5vw,26px); color: var(--gold-light); text-shadow: 0 0 30px var(--glow); line-height: 1.3; }
    .date-line { margin-top: 8px; font-size: 14px; color: var(--ink-dim); font-style: italic; }
    .divider { width: 100%; max-width: 360px; display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .divider-icon { color: var(--gold); font-size: 16px; }
    .btn-wrap { margin: 4px 0 24px; }
    .btn { background: linear-gradient(145deg,#2a1f08,#1a1208); border: 1px solid var(--gold); border-radius: 4px; color: var(--gold-light); font-family: 'Cinzel Decorative', serif; font-size: 13px; letter-spacing: .12em; padding: 16px 36px; cursor: pointer; box-shadow: 0 0 20px rgba(201,168,76,.15); transition: transform .1s; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(.96); }
    .card { width: 100%; max-width: 420px; background: linear-gradient(160deg,#1e1608,#120e04); border: 1px solid rgba(201,168,76,.35); border-radius: 6px; padding: 28px 24px; box-shadow: 0 0 40px rgba(201,168,76,.08),0 20px 60px rgba(0,0,0,.6); position: relative; opacity: 0; transform: translateY(16px); transition: opacity .5s,transform .5s; }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card::before { content:'✦'; position:absolute; top:8px; left:12px; color:var(--gold); opacity:.5; font-size:10px; }
    .card::after  { content:'✦'; position:absolute; bottom:8px; right:12px; color:var(--gold); opacity:.5; font-size:10px; }
    .saint-name { font-family: 'Cinzel Decorative', serif; font-size: clamp(20px,6vw,28px); color: var(--gold-light); text-align: center; text-shadow: 0 0 20px var(--glow); line-height: 1.3; margin-bottom: 6px; }
    .saint-fete { text-align: center; font-size: 13px; color: var(--red); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 20px; }
    .inner-divider { width: 60%; height: 1px; background: linear-gradient(to right,transparent,var(--gold),transparent); margin: 0 auto 20px; }
    .saint-text { font-size: clamp(15px,4.2vw,17px); line-height: 1.85; color: var(--ink); text-align: justify; hyphens: auto; }
    .saint-text p { margin-bottom: .6em; }
    .footer { margin-top: 32px; padding-bottom: 16px; text-align: center; font-size: 11px; color: rgba(168,144,96,.35); letter-spacing: .15em; }
  </style>
</head>
<body>
  <div class="header">
    <span class="ornament">✦ ✦ ✦</span>
    <h1>Saint du Jour</h1>
    <div class="date-line" id="dateDisplay"></div>
  </div>

  <div class="divider"><span class="divider-icon">✝</span></div>

  <div class="btn-wrap">
    <button class="btn" onclick="afficherSaint()">Découvrir le Saint du Jour</button>
  </div>

  <div class="card" id="card">
    <div class="saint-name" id="saintName"></div>
    <div class="saint-fete">Fête aujourd'hui</div>
    <div class="inner-divider"></div>
    <div class="saint-text" id="saintText"></div>
  </div>

  <div class="footer">✦ Calendrier des saints ✦</div>

  <script>
    const saints = {
      "1-1":  { nom: "Marie, Mère de Dieu", texte: ["Le 1er janvier, l'Église catholique célèbre Marie sous le titre de Mère de Dieu.", "Ce titre, Theotokos en grec, fut défini au Concile d'Éphèse en 431.", "Il affirme que Jésus, né de Marie, est vrai Dieu et vrai homme.", "Marie occupe une place unique dans l'histoire du salut chrétien.", "Elle est vénérée comme modèle de foi, d'humilité et de douceur.", "Sa vie entière fut consacrée à l'accueil de la volonté divine.", "Le pape Paul VI lui donna en 1968 le titre de Mère de l'Église.", "Elle intercède pour les fidèles auprès de son fils Jésus-Christ.", "De nombreux sanctuaires dans le monde lui sont dédiés.", "Sa fête en ce jour inaugure l'année sous le signe de la paix." ] },
      "1-2":  { nom: "Saint Basile le Grand", texte: ["Basile le Grand naquit vers 329 à Césarée de Cappadoce, en Turquie actuelle.", "Il fut l'un des plus grands théologiens de l'Église d'Orient.", "Docteur de l'Église, il défendit avec ardeur le dogme de la Trinité.", "Il fonda une règle monastique qui inspira tout le monachisme oriental.", "Sa charité envers les pauvres le poussa à créer hôpitaux et hospices.", "Il lutta contre l'hérésie arienne qui niait la divinité du Christ.", "Ses écrits théologiques, notamment sur le Saint-Esprit, sont fondamentaux.", "Il fut évêque de Césarée de 370 jusqu'à sa mort en 379.", "Son frère Grégoire de Nysse et son ami Grégoire de Nazianze formèrent les Pères cappadociens.", "Il est fêté le 2 janvier, avec saint Grégoire de Nazianze." ] },
      "1-3":  { nom: "Sainte Geneviève", texte: ["Geneviève est la sainte patronne de Paris, née vers 422 à Nanterre.", "Dès l'âge de sept ans, elle rencontra saint Germain d'Auxerre qui pressentit sa sainteté.", "Elle consacra sa vie à Dieu par le vœu de virginité à l'âge de quinze ans.", "Lors de l'avancée d'Attila vers Paris en 451, elle rassura les habitants en priant.", "La ville fut épargnée, ce qui renforça son prestige auprès du peuple.", "Elle intercéda également auprès de Clovis pour libérer des prisonniers.", "Elle fonda une basilique sur le tombeau de saint Denis, premier évêque de Paris.", "Ses reliques furent conservées dans l'abbaye qui porta son nom sur la montagne parisienne.", "Le Panthéon fut érigé sur l'emplacement de cette abbaye à la Révolution.", "Elle est invoquée contre les épidémies, les inondations et les fièvres." ] },
      "1-4":  { nom: "Saint Odilon de Cluny", texte: ["Odilon de Cluny naquit vers 962 en Auvergne, dans une famille noble.", "Il entra au monastère de Cluny et en devint abbé en 994.", "Sous sa direction, Cluny devint le centre spirituel le plus influent d'Europe.", "Il développa le réseau des monastères clunisiens à travers tout le continent.", "On lui attribue l'institution de la fête des défunts le 2 novembre.", "Il fut un artisan de la Paix de Dieu, limitant les guerres féodales.", "Sa douceur et son humilité lui valurent le surnom de doux petit.", "Il mourut en 1049 à Souvigny, après cinquante-cinq ans d'abbatiat.", "Canonisé rapidement après sa mort, il fut vénéré dans tout l'Occident.", "Son œuvre renforça durablement la réforme monastique médiévale." ] },
      "1-5":  { nom: "Saint Édouard le Confesseur", texte: ["Édouard le Confesseur fut roi d'Angleterre de 1042 à 1066.", "Il est considéré comme le dernier roi de la lignée saxonne d'Angleterre.", "Sa piété profonde lui valut le titre de Confesseur, attestant sa sainteté de vie.", "Il fit reconstruire l'abbaye de Westminster, joyau de l'architecture normande.", "Son règne fut marqué par une recherche sincère de paix et de justice.", "Il vécut dans la chasteté conjugale en accord avec son épouse Édith.", "Il mourut le 5 janvier 1066, peu après la consécration de Westminster.", "Sa canonisation fut prononcée par le pape Alexandre III en 1161.", "Son corps, conservé à Westminster, fut l'objet d'un pèlerinage important.", "Il est le saint patron de l'Angleterre avant saint Georges." ] },
      "1-6":  { nom: "L'Épiphanie du Seigneur", texte: ["L'Épiphanie célèbre la manifestation de Jésus aux nations du monde entier.", "Les Mages venus d'Orient symbolisent tous les peuples appelés au salut.", "Guidés par une étoile, ils apportèrent à l'Enfant de l'or, de l'encens et de la myrrhe.", "Ces trois dons symbolisent la royauté, la divinité et la mort sacrificielle du Christ.", "La tradition nomme les Mages Melchior, Gaspard et Balthazar, bien que l'Évangile ne les nomme pas.", "En Orient, l'Épiphanie est la fête principale de la naissance du Christ.", "Ce jour célèbre aussi le baptême de Jésus dans le Jourdain selon certaines traditions.", "La galette des Rois, tradition française, rappelle cette fête populaire.", "Ses reliques présumées sont conservées dans la cathédrale de Cologne depuis le XIIe siècle.", "L'Épiphanie clôt le temps de Noël et ouvre le temps ordinaire." ] },
      "1-7":  { nom: "Saint Raymond de Peñafort", texte: ["Raymond de Peñafort naquit vers 1175 en Catalogne, en Espagne.", "Il fut l'un des grands juristes et théologiens de son époque.", "Entré dans l'ordre des Dominicains en 1222, il se consacra à la prédication.", "Il compila les Décrétales, recueil de droit canonique fondamental pour l'Église.", "Le pape Grégoire IX lui confia cette tâche majeure pour unifier le droit ecclésiastique.", "Il fut élu maître général des Dominicains en 1238, charge qu'il résigna deux ans plus tard.", "Il encouragea saint Thomas d'Aquin à rédiger la Somme contre les Gentils.", "Il fonda des écoles d'arabe et d'hébreu pour évangéliser les musulmans et les juifs.", "Il mourut en 1275 à Barcelone, à l'âge vénérable d'environ cent ans.", "Il est le patron des canonistes et des avocats." ] },
      "1-8":  { nom: "Saint Thorfinn", texte: ["Thorfinn fut évêque de Hamar en Norvège au XIIIe siècle.", "Il vécut à une époque de vifs conflits entre le pouvoir royal et l'Église.", "Contraint à l'exil par le roi norvégien, il se réfugia en Flandre.", "Il mourut en 1285 au monastère cistercien de Ter Doest, près de Bruges.", "Les moines le reconnurent comme un homme d'une grande sainteté.", "Son corps répandit, selon les chroniques, un parfum extraordinaire après sa mort.", "Il fut béatifié et son culte se développa en Scandinavie et en Belgique.", "Sa vie témoigne du courage des évêques médiévaux face aux pouvoirs temporels.", "Il est l'un des rares saints scandinaves du Moyen Âge à être vénéré en dehors de sa région.", "Sa mémoire est honorée le 8 janvier dans le martyrologe romain." ] },
      "1-9":  { nom: "Sainte Alix Le Clerc", texte: ["Alix Le Clerc naquit en 1576 à Remiremont, en Lorraine.", "Issue d'une famille bourgeoise, elle mena d'abord une vie mondaine.", "Sa conversion profonde l'orienta vers une vie de service et d'éducation.", "Avec saint Pierre Fourier, elle fonda la Congrégation de Notre-Dame en 1598.", "Cette congrégation avait pour mission l'instruction gratuite des jeunes filles pauvres.", "Elle ouvrit des écoles dans toute la Lorraine, révolutionnant l'éducation féminine.", "Elle vécut dans une grande austérité, supportant maladies et épreuves spirituelles.", "Ses visions mystiques et son union à Dieu furent reconnues par ses contemporains.", "Elle mourut à Nancy en 1622, épuisée par ses travaux.", "Elle fut canonisée par le pape Jean-Paul II en 1947." ] },
      "1-10": { nom: "Saint Guillaume de Bourges", texte: ["Guillaume de Bourges naquit vers 1150 dans une famille noble de Nevers.", "Il fit ses études à Paris, alors grand centre intellectuel de la chrétienté.", "Il entra dans l'ordre cistercien, attirée par la rigueur de la règle de saint Benoît.", "Contre sa volonté, il fut nommé archevêque de Bourges en 1200.", "Il accepta cette charge par obéissance, conservant sous ses vêtements pontificaux l'habit cistercien.", "Il se consacra à la réforme du clergé et à la défense des pauvres.", "Il mourut en 1209, épuisé par ses pénitences et ses travaux pastoraux.", "De nombreux miracles furent rapportés sur son tombeau après sa mort.", "Il fut canonisé par le pape Honorius III en 1218.", "Sa vie illustre l'idéal de l'évêque médiéval alliant contemplation et action." ] },
      "1-11": { nom: "Saint Théodose le Cénobiarque", texte: ["Théodose naquit vers 423 en Cappadoce, dans l'actuelle Turquie.", "Attiré par la vie monastique, il se rendit en Palestine pour se former auprès de saints moines.", "Il fonda près de Bethléem un grand monastère qui accueillit des moines de toutes nations.", "Il est appelé Cénobiarque, c'est-à-dire chef des moines vivant en communauté.", "Son monastère possédait plusieurs chapelles pour célébrer la liturgie en différentes langues.", "Il créa également des hospices pour les malades, les vieillards et les pèlerins.", "Il combattit avec fermeté l'hérésie monophysite qui divisait alors l'Église d'Orient.", "Sa sainteté attira des milliers de disciples de tout le Proche-Orient.", "Il mourut en 529, à l'âge vénérable de cent cinq ans.", "Il est vénéré comme l'un des pères du monachisme palestinien." ] },
      "1-12": { nom: "Sainte Marguerite Bourgeoys", texte: ["Marguerite Bourgeoys naquit en 1620 à Troyes, en Champagne.", "Touchée par la grâce à vingt ans, elle consacra sa vie à l'éducation des enfants.", "En 1653, elle s'embarqua pour la Nouvelle-France à l'invitation de Paul de Chomedey.", "Elle fonda à Montréal la première école de la colonie, dans une étable.", "Elle créa la Congrégation de Notre-Dame de Montréal, première congrégation non cloîtrée en Amérique.", "Elle forma des maîtresses d'école qui éduquèrent les enfants colons et amérindiens.", "Elle vécut dans une grande pauvreté, partageant la vie difficile des colons.", "Son énergie apostolique la fit traverser l'Atlantique sept fois.", "Elle mourut à Montréal en 1700, à l'âge de soixante-dix-neuf ans.", "Elle fut canonisée par le pape Jean-Paul II en 1982." ] },
      "1-13": { nom: "Saint Hilaire de Poitiers", texte: ["Hilaire de Poitiers naquit vers 315 dans une famille aisée de Poitiers.", "Converti au christianisme à l'âge adulte, il fut élu évêque de Poitiers vers 350.", "Il devint le grand défenseur de l'orthodoxie contre l'arianisme en Occident.", "L'hérésie arienne niait la pleine divinité du Christ, ce qu'Hilaire combattit avec vigueur.", "Il fut exilé par l'empereur arien Constance II en Phrygie de 356 à 360.", "Durant son exil, il rédigea son chef-d'œuvre, le traité De Trinitate en douze livres.", "À son retour en Gaule, il continua la lutte pour la foi nicéenne.", "Saint Jérôme le surnomma le Rhône de l'éloquence latine.", "Il mourut vers 367 et fut déclaré Docteur de l'Église par le pape Pie IX en 1851.", "Il est le patron du diocèse de Poitiers et de la ville." ] },
      "1-14": { nom: "Saint Kentigern", texte: ["Kentigern, aussi appelé Mungo, naquit vers 518 en Écosse.", "Il fut le premier évêque de Glasgow et l'évangélisateur du pays de Galles et du nord de l'Angleterre.", "Sa naissance fut entourée de circonstances dramatiques : sa mère, princesse, fut abandonnée.", "Il fut élevé par saint Servanus, qui l'appela Mungo, signifiant cher ami en gaélique.", "Il fonda un monastère à Glasgow et évangélisa de nombreuses tribus celtes.", "Ses miracles, notamment la résurrection d'un rouge-gorge, sont célèbres dans la tradition écossaise.", "Il fut exilé par un roi païen et continua son œuvre missionnaire au Pays de Galles.", "Il rencontra saint Columba d'Iona, et les deux grands apôtres échangèrent leurs crosses.", "Il mourut vers 603 à Glasgow, entouré de ses disciples.", "Il est le saint patron de Glasgow dont les armoiries rappellent ses miracles." ] },
      "1-15": { nom: "Saint Paul, premier ermite", texte: ["Paul de Thèbes est considéré comme le premier ermite chrétien de l'histoire.", "Né vers 228 en Égypte, il fuit la persécution de l'empereur Dèce vers 250.", "Il se réfugia dans le désert de Thébaïde et y demeura jusqu'à sa mort.", "Selon saint Jérôme, il vécut plus de cent ans dans une solitude absolue.", "Un palmier lui fournissait nourriture et vêtement, et une source d'eau fraîche.", "Saint Antoine le Grand, parti à sa recherche, le trouva peu avant sa mort.", "Deux lions accoururent pour creuser sa tombe, selon la tradition hagiographique.", "Son exemple inspira tout le mouvement érémitique en Égypte et en Orient.", "Saint Jérôme écrivit sa biographie, La Vie de Paul de Thèbes, vers 374.", "Il est invoqué comme modèle de détachement du monde et de prière contemplative." ] },
      "1-16": { nom: "Saint Marcel, pape", texte: ["Marcel fut pape de 308 à 309, dans une période de grande crise pour l'Église.", "Il succéda à saint Marcellin après une vacance du siège apostolique de près de quatre ans.", "La persécution de Dioclétien avait durement éprouvé les chrétiens de Rome.", "Il dut affronter le problème des lapsi, chrétiens ayant apostasié sous la persécution.", "Sa rigueur envers ceux-ci provoqua de vifs troubles dans la communauté romaine.", "L'empereur Maxence l'aurait condamné à travailler comme esclave dans des écuries.", "Il mourut vers 309, épuisé par ses souffrances.", "Il fut rapidement vénéré comme martyr par les chrétiens de Rome.", "Son nom figure dans le Canon romain de la messe.", "Une basilique romaine, San Marcello al Corso, perpétue sa mémoire." ] },
      "1-17": { nom: "Saint Antoine, abbé", texte: ["Antoine le Grand naquit vers 251 en Égypte, dans une famille chrétienne aisée.", "À vingt ans, après avoir entendu l'Évangile sur la richesse, il distribua tous ses biens.", "Il se retira au désert, d'abord près de son village, puis dans une solitude totale.", "Il passa vingt ans seul dans un ancien fort abandonné, luttant contre les démons.", "Sa réputation de sainteté attira de nombreux disciples autour de lui.", "Il organisa des communautés de moines vivant en ermites sous sa direction.", "Il descendit à Alexandrie pour soutenir les martyrs lors de la persécution de Maximin.", "À plus de cent ans, il fit le voyage pour rencontrer saint Paul ermite.", "Il mourut vers 356, âgé d'environ cent cinq ans, selon saint Athanase.", "Il est le père du monachisme chrétien et le patron des animaux domestiques." ] },
      "1-18": { nom: "Sainte Prisca", texte: ["Prisca est une martyre romaine dont le culte est très ancien à Rome.", "Selon la tradition, elle aurait souffert le martyre au IIIe siècle sous l'empereur Claude.", "Elle aurait été convertie par saint Pierre lui-même, selon certaines légendes.", "Arrêtée pour sa foi, elle aurait été jetée aux lions qui refusèrent de la dévorer.", "Elle fut finalement décapitée sur la voie Ostiense, hors des murs de Rome.", "Une basilique lui est dédiée sur l'Aventin, l'une des plus anciennes de Rome.", "Son nom est mentionné dans les plus anciens martyrologes romains.", "Elle est parfois confondue avec Priscille, compagne de saint Paul mentionnée dans les Épîtres.", "Sa fête a été maintenue dans le calendrier romain après la réforme de 1969.", "Elle est invoquée comme protectrice de la jeunesse chrétienne." ] },
      "1-19": { nom: "Saint Canut IV de Danemark", texte: ["Canut IV fut roi du Danemark de 1080 à 1086.", "Il fut un roi chrétien profondément pieux, soucieux d'établir la foi en Scandinavie.", "Il voulut lancer une expédition pour conquérir l'Angleterre et restaurer l'empire nordique.", "Cette entreprise provoqua le mécontentement de ses nobles et de son peuple.", "Une révolte éclata en 1086 et Canut dut se réfugier dans l'église Saint-Alban d'Odense.", "Il fut assassiné devant l'autel, avec son frère et ses compagnons, le 10 juillet 1086.", "Il fut canonisé dès 1101 par le pape Pascal II, en raison de sa mort en état de prière.", "Son corps fut inhumé dans la cathédrale de Saint-Canut à Odense.", "Il est vénéré comme le saint patron du Danemark.", "Sa vie illustre la christianisation difficile des royaumes scandinaves." ] },
      "1-20": { nom: "Saint Sébastien", texte: ["Sébastien est l'un des martyrs les plus populaires de l'Église catholique.", "Né probablement à Narbonne ou à Milan vers 256, il devint officier de la garde impériale.", "Il servit secrètement les chrétiens emprisonnés, leur apportant soutien et foi.", "Découvert, il fut condamné par l'empereur Dioclétien à être percé de flèches.", "Laissé pour mort, il fut recueilli et soigné par la veuve Irène.", "Miraculeusement guéri, il se présenta à nouveau devant l'empereur pour lui reprocher ses crimes.", "Cette fois, il fut battu à mort et son corps jeté aux égouts vers 288.", "Une basilique fut élevée sur sa tombe sur la voie Appienne, à Rome.", "Il est le patron des archers, des soldats et des athlètes.", "Depuis la Renaissance, son image percée de flèches est un chef-d'œuvre de l'iconographie chrétienne." ] },
      "1-21": { nom: "Sainte Agnès", texte: ["Agnès fut martyrisée à Rome vers 304, à l'âge d'à peine douze ou treize ans.", "Fille d'une famille noble romaine, elle avait consacré sa virginité à Dieu.", "Ses charmes attirèrent l'attention du fils du préfet de Rome.", "Ayant refusé le mariage, elle fut dénoncée comme chrétienne et amenée devant le juge.", "Elle résista à toutes les tentatives pour la faire apostasier ou briser sa résolution.", "Condamnée à être exposée dans un lieu de débauche, elle fut miraculeusement protégée.", "Elle fut finalement décapitée ou poignardée dans le cou.", "Une grande basilique fut élevée sur sa tombe, sur la voie Nomentane à Rome.", "Son nom, proche du latin agnus signifiant agneau, inspira son iconographie.", "Elle est la patronne des jeunes filles, de la chasteté et des fiancées." ] },
      "1-22": { nom: "Saint Vincent de Saragosse", texte: ["Vincent de Saragosse fut le premier grand martyr de la péninsule ibérique.", "Diacre de l'évêque Valère à Saragosse, il fut arrêté lors de la persécution de Dioclétien.", "Conduit à Valence devant le gouverneur Dacien, il endura des supplices atroces.", "Il fut étendu sur un gril ardent, mais garda une sérénité parfaite.", "Son courage inébranlable stupéfia ses bourreaux et convertit de nombreux témoins.", "Il mourut vers 304, et son corps fut jeté en mer, mais miraculeusement retrouvé.", "Son culte se répandit rapidement dans tout l'Occident dès le IVe siècle.", "Saint Augustin lui consacra plusieurs sermons admiratifs.", "Il est le patron de la ville de Valence et des vignerons.", "Sa fête, le 22 janvier, est depuis longtemps associée aux prévisions météorologiques populaires." ] },
      "1-23": { nom: "Saint Ildefonse de Tolède", texte: ["Ildefonse naquit vers 607 à Tolède, dans une famille noble wisigothique.", "Il entra au monastère d'Agali, fondé par son oncle saint Eladius.", "Contre sa volonté, il fut élu archevêque de Tolède vers 657.", "Tolède était alors la capitale du royaume wisigoth et le siège primatial d'Espagne.", "Il est célèbre pour sa dévotion ardente envers la Vierge Marie.", "Il écrivit le traité De virginitate perpetua Mariae, défendant la virginité perpétuelle de Marie.", "La légende raconte que la Vierge lui apparut et lui remit une chasuble céleste.", "Il présida plusieurs conciles de Tolède qui organisèrent l'Église wisigothique.", "Il mourut en 667, peu après cette apparition selon la tradition.", "Il est l'un des grands saints de l'Espagne médiévale et un père de la mariologie." ] },
      "1-24": { nom: "Saint François de Sales", texte: ["François de Sales naquit en 1567 au château de Sales, en Savoie.", "Docteur de l'Église et évêque de Genève, il est l'un des grands maîtres spirituels catholiques.", "Il fut envoyé en mission dans le Chablais, région acquise au calvinisme, qu'il reconvertit presque entièrement.", "Il écrivit des traités qu'il glissait sous les portes pour toucher les âmes.", "Son Introduction à la vie dévote, publiée en 1609, révolutionna la spiritualité chrétienne.", "Il y enseignait que la sainteté était accessible à tous, pas seulement aux religieux.", "Avec sainte Jeanne de Chantal, il fonda l'ordre de la Visitation en 1610.", "Sa douceur légendaire lui valut la devise : Avec douceur, on prend plus de mouches qu'avec du vinaigre.", "Il mourut en 1622 et fut canonisé en 1665.", "Il est le patron des journalistes et des écrivains catholiques." ] },
