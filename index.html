      "9-16": { nom: "Saints Corneille et Cyprien", texte: ["Corneille fut pape de 251 à 253, dans une période difficile pour l'Église romaine.", "Il dut affronter le problème des lapsi, chrétiens ayant apostasié sous la persécution de Dèce.", "Il choisit une politique de miséricorde, permettant leur réconciliation après pénitence.", "Il s'opposa ainsi à Novatien, rigoriste qui refusait tout pardon aux lapsi.", "Il mourut en exil à Civitavecchia en 253, épuisé par ses épreuves.", "Cyprien de Carthage, évêque d'Afrique, fut son grand allié dans ce débat sur la pénitence.", "Brillant rhéteur converti au christianisme vers 246, il fut élu évêque de Carthage.", "Il s'était caché pendant la persécution de Dèce, ce qu'il justifia par son devoir de pasteur.", "Il mourut décapité lors de la persécution de Valérien en 258, premier évêque africain martyr.", "Ces deux évêques illustrent la question toujours actuelle de la miséricorde dans l'Église."] },
      "9-17": { nom: "Sainte Hildegarde de Bingen", texte: ["Hildegarde de Bingen naquit en 1098 à Bermersheim, en Rhénanie, dans une famille noble.", "Confiée dès l'enfance à l'ermite Jutta de Sponheim, elle prit le voile bénédictin à quinze ans.", "Elle reçut des visions depuis l'enfance, mais les garda secrètes pendant des années.", "Sur l'ordre de ses supérieurs et du pape Eugène III, elle commença à les dicter vers 1141.", "Son Scivias est un recueil de visions illustrées d'une richesse théologique et artistique extraordinaire.", "Elle composa aussi cent soixante-dix compositions musicales, première femme compositeur identifiée.", "Ses œuvres médicales et scientifiques témoignent d'une curiosité encyclopédique remarquable.", "Elle correspondit avec empereurs, papes et abbés, n'hésitant pas à les reprendre vertement.", "Elle mourut en 1179 à Bingen, après avoir fondé deux monastères féminins.", "Déclarée Docteur de l'Église par Benoît XVI en 2012, elle est la quatrième femme à recevoir ce titre."] },
      "9-18": { nom: "Saint Joseph de Copertino", texte: ["Joseph de Copertino naquit en 1603 à Copertino, dans le royaume de Naples, dans une famille pauvre.", "Ses premières années furent marquées par l'échec scolaire et des expériences mystiques précoces.", "Entré chez les franciscains conventuels, il fut ordonné prêtre en 1628.", "Ses extases fréquentes et ses lévitations lui valurent d'être rapidement célèbre dans toute l'Italie.", "Il lévitait souvent pendant la messe, en prière ou lors de la vue d'une image sainte.", "Ses supérieurs, gênés par l'afflux de curieux, le déplacèrent plusieurs fois.", "Il vécut ses dernières années caché dans des couvents reculés, loin des foules.", "Ses souffrances spirituelles et ses maladies furent offertes à Dieu avec une totale sérénité.", "Il mourut en 1663 à Osimo, dans les Marches, entouré de ses frères.", "Canonisé en 1767, il est le patron des pilotes, des astronautes et des étudiants en examen."] },
      "9-19": { nom: "Saint Janvier de Naples", texte: ["Janvier fut évêque de Bénévent, en Campanie, martyrisé vers 305 lors de la persécution de Dioclétien.", "Il fut arrêté alors qu'il rendait visite aux chrétiens emprisonnés dans les mines.", "Conduit à Pouzzoles, il fut jeté aux lions dans l'amphithéâtre, mais les bêtes ne le touchèrent pas.", "Il fut finalement décapité, avec ses compagnons, sur la voie de Pouzzoles.", "Son sang fut recueilli dans deux ampoules par une pieuse femme et conservé à Naples.", "Depuis le XIVe siècle, ce sang se liquéfie miraculeusement plusieurs fois par an à Naples.", "Ce phénomène, observé devant des foules, n'a pas d'explication scientifique satisfaisante.", "Si le sang ne se liquéfie pas, les Napolitains le considèrent comme un mauvais présage.", "La cathédrale de Naples abrite sa tête et le reliquaire avec les ampoules de son sang.", "Il est le saint patron de Naples et de la Campanie, fêté avec une grande solennité."] },
      "9-20": { nom: "Saints André Kim Taegon et Paul Chong Hasang", texte: ["André Kim Taegon et Paul Chong Hasang sont les principaux représentants des martyrs coréens.", "Le christianisme pénétra en Corée au XVIIIe siècle sans missionnaires, importé par des lettrés.", "André Kim fut le premier prêtre coréen ordonné, en 1845, après des études en Chine.", "Rentré en Corée, il fut arrêté et décapité en 1846, à l'âge de vingt-six ans.", "Paul Chong Hasang était un laïc qui consacra sa vie à l'organisation de la communauté chrétienne.", "Il fut martyrisé en 1839 avec sa mère et de nombreux autres chrétiens.", "Entre 1839 et 1867, des milliers de chrétiens coréens furent martyrisés pour leur foi.", "Cent trois d'entre eux furent canonisés par Jean-Paul II lors de sa visite en Corée en 1984.", "L'Église de Corée est l'une des rares à s'être développée sans missionnaires étrangers.", "Ces martyrs sont le symbole de la vitalité extraordinaire de l'Église catholique en Asie."] },
      "9-21": { nom: "Saint Matthieu, apôtre", texte: ["Matthieu était publicain, collecteur d'impôts au service de Rome à Capharnaüm.", "Cette profession, considérée comme infâme par les Juifs pieux, en faisait un paria de la société.", "Jésus vit Matthieu assis à son bureau et lui dit simplement : Suis-moi.", "Matthieu se leva, abandonna tout et organisa un grand festin en l'honneur de Jésus.", "Les Pharisiens critiquèrent Jésus de manger avec des pécheurs, mais il dit qu'il était venu pour eux.", "Son Évangile, le premier du Nouveau Testament, s'adresse principalement aux judéo-chrétiens.", "Il s'efforce de montrer que Jésus accomplit toutes les prophéties de l'Ancien Testament.", "Son évangile contient le Sermon sur la Montagne et les Béatitudes, charte du Royaume de Dieu.", "Après la Pentecôte, il aurait évangélisé l'Éthiopie et la Perse, où il fut martyrisé.", "Il est le patron des banquiers, des comptables et des fonctionnaires des impôts."] },
      "9-22": { nom: "Saint Maurice et compagnons", texte: ["Maurice et ses compagnons furent des soldats de la légion thébaine martyrisés vers 286.", "La légion thébaine, recrutée en Égypte, était composée en grande partie de chrétiens.", "L'empereurMaximien lui ordonna de participer à la persécution des chrétiens gaulois.", "Maurice, chef de la légion, refusa au nom de la conscience chrétienne.", "L'armée exécuta d'abord un dixième de la légion pour intimider les autres.", "Tous maintinrent leur refus, et toute la légion fut massacrée à Agaune, en Valais.", "Selon la tradition, six mille six cents soldats furent ainsi martyrisés.", "Le nombre exact est incertain, mais le massacre est attesté par des sources historiques.", "L'abbaye de Saint-Maurice-d'Agaune, fondée sur leurs tombes, est toujours en activité.", "Saint Maurice est le patron des soldats, des fantassins et de plusieurs nations africaines."] },
      "9-23": { nom: "Saint Padre Pio", texte: ["Francesco Forgione naquit en 1887 à Pietrelcina, en Campanie, dans une famille paysanne.", "Entré chez les Capucins, il reçut les stigmates du Christ en 1918, qu'il porta pendant cinquante ans.", "Ses stigmates, ses extases et ses dons de guérison attirèrent des foules immenses à San Giovanni Rotondo.", "Il passait jusqu'à dix-neuf heures par jour au confessionnal, venant de toute l'Europe.", "Son charisme de lire les âmes lui permettait de connaître les péchés de ses pénitents.", "Il fonda en 1956 la Casa Sollievo della Sofferenza, grand hôpital moderne en Campanie.", "Il souffrit pendant des années de la méfiance des autorités ecclésiastiques qui restreignirent son ministère.", "Il mourut en 1968 à San Giovanni Rotondo, ses stigmates ayant disparu à la mort.", "Canonisé par Jean-Paul II en 2002, il est l'un des saints les plus populaires du XXe siècle.", "Son tombeau à San Giovanni Rotondo est l'un des lieux de pèlerinage les plus visités au monde."] },
      "9-24": { nom: "Notre-Dame de la Merci", texte: ["La fête de Notre-Dame de la Merci commémore la fondation de l'ordre de la Merci en 1218.", "Pierre Nolasque reçut, selon la tradition, une apparition de la Vierge lui demandant de fonder un ordre.", "Cet ordre aurait pour but de racheter les chrétiens captifs des musulmans en Espagne.", "La Vierge apparut aussi la même nuit à saint Raymond de Peñafort et au roi Jaime Ier d'Aragon.", "L'ordre de la Merci, fondé à Barcelone, se consacra au rachat des prisonniers chrétiens.", "Ses membres s'engageaient à rester en otage si nécessaire pour libérer des captifs.", "Cet ordre fit libérer des dizaines de milliers de prisonniers pendant ses siècles d'activité.", "La Vierge de la Merci est représentée vêtue de blanc avec le scapulaire de l'ordre.", "Elle est la patronne de Barcelone, de l'Espagne et de nombreux pays d'Amérique latine.", "Cette fête rappelle la liberté comme valeur fondamentale du message chrétien."] },
      "9-25": { nom: "Saint Fermin", texte: ["Fermin est le premier évêque de Pampelune et le saint patron de la Navarre, en Espagne.", "Selon la tradition, il naquit à Pampelune de parents nobles et fut converti par saint Saturnin.", "Il fut envoyé à Toulouse pour y être instruit et ordonné prêtre et évêque.", "De retour en Navarre, il évangélisa la région avec un zèle apostolique remarquable.", "Il mourut en martyr, décapité selon une tradition, vers le IIIe ou IVe siècle.", "Ses reliques furent découvertes et vénérées à Pampelune depuis le Moyen Âge.", "La fête de la San Fermín, le 7 juillet, est l'occasion des célèbres courses de taureaux à Pampelune.", "Cette fête attire des millions de visiteurs du monde entier chaque année.", "La célébration du 25 septembre marque l'anniversaire de sa mort selon certaines traditions.", "Il est le symbole de l'identité culturelle et religieuse de la Navarre."] },
      "9-26": { nom: "Saints Côme et Damien", texte: ["Côme et Damien furent deux frères médecins martyrisés en Syrie vers 303.", "Selon la tradition, ils étaient originaires d'Arabie et pratiquaient la médecine gratuitement.", "Leur médecine gratuite leur valut le surnom d'Anargyres, ceux qui ne reçoivent pas d'argent.", "Ils soignaient tous les malades, chrétiens et non-chrétiens, sans distinction.", "Arrêtés lors de la persécution de Dioclétien, ils furent soumis à de nombreux supplices.", "Ni le feu, ni l'eau, ni la croix ne purent les tuer selon les récits hagiographiques.", "Ils furent finalement décapités avec leurs trois frères Anthime, Léonce et Euprepios.", "Leur tombeau à Cyr en Syrie devint un grand lieu de pèlerinage dès l'Antiquité.", "L'empereur Justinien leur attribua sa guérison miraculeuse et fit reconstruire leur église.", "Ils sont les patrons des médecins, des chirurgiens et des pharmaciens."] },
      "9-27": { nom: "Saint Vincent de Paul", texte: ["Vincent de Paul naquit en 1581 à Pouy, dans les Landes, dans une famille paysanne.", "Ordonné prêtre en 1600, il fut capturé par des pirates et vendu comme esclave à Tunis.", "Après sa libération, il se consacra entièrement aux plus pauvres de son temps.", "Il fonda en 1625 la Congrégation de la Mission, les Lazaristes, pour évangéliser les campagnes.", "Avec Louise de Marillac, il fonda en 1633 les Filles de la Charité, première congrégation de soins.", "Son œuvre sociale fut immense : galériens, enfants abandonnés, malades des hôpitaux.", "Il organisa les premières collectes de fonds à grande échelle pour les victimes de la guerre.", "Sa charité pratique ne séparait jamais le secours du corps et l'annonce de l'Évangile.", "Il mourut en 1660 à Paris, entouré de sa double famille spirituelle.", "Canonisé en 1737, il est le patron des œuvres de charité et des associations caritatives."] },
      "9-28": { nom: "Saint Venceslas de Bohême", texte: ["Venceslas naquit vers 907, fils du duc de Bohême Vratislav Ier et de Drahomíra.", "Éduqué dans la foi chrétienne par sa grand-mère sainte Ludmila, il devint duc de Bohême vers 921.", "Il mena une politique de paix, reconnaissant la suzeraineté de l'Allemagne pour éviter les guerres.", "Sa piété profonde le poussait à couper lui-même du bois pour les pauvres en hiver.", "Ses adversaires lui reprochaient sa faiblesse et sa soumission aux Allemands.", "Son frère Boleslav, poussé par une faction hostile, l'assassina le 28 septembre 929.", "La légende dit que Venceslas tomba en priant et en pardonnant à son frère.", "Son martyre fut immédiatement reconnu et il devint le saint patron de la Bohême.", "Sa couronne est conservée à Prague comme le symbole de la nation tchèque.", "Le roi Venceslas dont parle le célèbre chant de Noël anglais Good King Wenceslas est ce saint."] },
      "9-29": { nom: "Saints Michel, Gabriel et Raphaël", texte: ["La fête des archanges Michel, Gabriel et Raphaël est célébrée le 29 septembre.", "Les anges sont des esprits célestes au service de Dieu et messagers de sa volonté.", "Michel, dont le nom signifie Qui est comme Dieu, est le prince des armées célestes.", "Il combattit le démon et ses anges lors de la grande bataille céleste décrite dans l'Apocalypse.", "Il est invoqué comme protecteur de l'Église et guide des âmes vers le paradis.", "Gabriel, dont le nom signifie Force de Dieu, est le messager des grands mystères.", "C'est lui qui annonça à Marie l'Incarnation du Fils de Dieu.", "Raphaël, dont le nom signifie Dieu guérit, accompagna Tobie dans son voyage.", "Il est le compagnon des voyageurs et le guérisseur des maladies.", "Ces trois archanges sont les seuls anges dont les noms sont révélés dans les Écritures canoniques."] },
      "9-30": { nom: "Saint Jérôme", texte: ["Jérôme naquit vers 347 à Stridon, en Dalmatie, dans une famille chrétienne aisée.", "Il étudia à Rome, reçut le baptême et fut formé aux lettres classiques.", "Il séjourna à Antioche, en Syrie et en Palestine, se consacrant à l'étude des langues bibliques.", "Il apprit l'hébreu auprès de rabbins pour lire l'Ancien Testament dans sa langue originale.", "Le pape Damase lui confia la révision de la traduction latine de la Bible.", "Sa Vulgate, traduction latine complète de la Bible, fut la Bible officielle de l'Église pendant des siècles.", "Il fonda un monastère à Bethléem où il vécut trente ans, entouré de disciples.", "Son tempérament fougueux lui attira de nombreuses inimitiés et polémiques.", "Il mourut en 420 à Bethléem, vénéré comme le plus grand bibliste de l'Antiquité chrétienne.", "Docteur de l'Église, il est le patron des traducteurs, des bibliothécaires et des archivistes."] },
      "10-1": { nom: "Sainte Thérèse de l'Enfant-Jésus", texte: ["Thérèse Martin naquit en 1873 à Alençon, dans une famille d'artisans profondément chrétiens.", "À quinze ans, elle obtint du pape Léon XIII la permission d'entrer au Carmel de Lisieux.", "Elle y vécut dans l'humilité, occupant les tâches les plus ordinaires.", "Elle découvrit sa petite voie, chemin de confiance et d'abandon à l'amour miséricordieux de Dieu.", "Atteinte de tuberculose, elle souffrit dans une grande nuit de la foi ses derniers mois.", "Elle mourut en 1897 à vingt-quatre ans, disant : Je vais entrer dans la vie.", "Ses écrits, notamment l'Histoire d'une âme, se répandirent dans le monde entier après sa mort.", "Elle avait promis de passer son paradis à faire du bien sur la terre, envoyant une pluie de roses.", "Canonisée en 1925, elle fut déclarée Docteur de l'Église par Jean-Paul II en 1997.", "Elle est la patronne des missions, de la France et des fleuristes."] },
      "10-2": { nom: "Les Saints Anges Gardiens", texte: ["La fête des Saints Anges Gardiens est célébrée le 2 octobre depuis le XVIe siècle.", "Jésus lui-même affirme que les petits ont des anges qui voient la face du Père céleste.", "Chaque être humain est confié dès sa naissance à un ange particulier pour le garder.", "L'ange gardien accompagne, protège, prie et intercède pour l'âme qui lui est confiée.", "La tradition de prier son ange gardien chaque matin est très ancienne dans la piété catholique.", "Les anges sont des esprits purs, messagers de Dieu et serviteurs de son amour.", "Saint Bernard exhortait à vénérer son ange gardien avec respect, amour et confiance.", "La prière Ange de Dieu, mon gardien précieux est apprise aux enfants dès le plus jeune âge.", "Les anges interviennent dans la vie des hommes selon le témoignage de l'Écriture Sainte.", "Cette fête rappelle que nous ne sommes jamais seuls dans notre chemin vers Dieu."] },
      "10-3": { nom: "Saint François de Borgia", texte: ["François naquit en 1510 à Gandie, en Espagne, dans une des familles les plus puissantes d'Europe.", "Il était l'arrière-petit-fils du pape Alexandre VI et cousin du roi Charles Quint.", "Marquis et grand d'Espagne, il fut vice-roi de Catalogne et l'un des hommes les plus puissants du royaume.", "La mort de l'impératrice Isabelle, dont il devait escorter le corps, le bouleversa profondément.", "Il entra en contact avec saint Ignace de Loyola et rejoignit les Jésuites en secret en 1546.", "Après la mort de sa femme, il entra publiquement dans la Compagnie de Jésus en 1551.", "Il fut élu troisième supérieur général des Jésuites en 1565.", "Sous sa direction, l'ordre se développa considérablement dans le monde entier.", "Il mourut épuisé à Rome en 1572, au retour d'une mission diplomatique pour le pape.", "Canonisé en 1671, il est le saint patron de la noblesse catholique espagnole."] },
      "10-4": { nom: "Saint François d'Assise", texte: ["François naquit en 1181 à Assise, fils d'un riche marchand drapier.", "Après une jeunesse joyeuse, une maladie et la vision d'un crucifix le convertirent profondément.", "Il se dépouilla publiquement de ses vêtements pour signifier sa rupture avec le monde.", "Il restaura de ses mains plusieurs petites églises abandonnées, suivant l'ordre du Christ.", "En 1209, il réunit ses premiers frères et reçut du pape l'approbation orale de sa règle.", "Son idéal de pauvreté absolue, à l'image du Christ pauvre, révolutionna la vie religieuse.", "Il reçut en 1224 les stigmates, plaies du Christ, dans son corps au mont Alverne.", "Il mourut en 1226 à Assise, après avoir loué Dieu pour toutes les créatures dans son Cantique.", "Canonisé dès 1228, il est l'un des saints les plus populaires de toute l'histoire chrétienne.", "Il est le patron de l'Italie, des animaux, des écologistes et de la paix."] },
      "10-5": { nom: "Sainte Faustine Kowalska", texte: ["Hélène Kowalska naquit en 1905 à Glogowiec, en Pologne, dans une famille paysanne très pauvre.", "Elle entra en 1925 dans la Congrégation des Sœurs de Notre-Dame de la Miséricorde.", "Elle prit le nom de Marie Faustine et travailla comme cuisinière, jardinière et portière.", "À partir de 1931, Jésus lui apparut et lui confia le message de la Divine Miséricorde.", "Jésus lui demanda de faire peindre son image avec la devise : Jésus, j'ai confiance en toi.", "Il lui confia également la Chapelet de la Divine Miséricorde et la fête de la Miséricorde.", "Son Journal spirituel, dictée par Jésus selon elle, est un document mystique majeur.", "Elle mourut de tuberculose en 1938 à Cracovie, à l'âge de trente-trois ans.", "Canonisée par Jean-Paul II en 2000, le jour même de l'institution de la fête de la Miséricorde.", "Elle est l'apôtre de la Divine Miséricorde et son message s'est répandu dans le monde entier."] },
      "10-6": { nom: "Saint Bruno", texte: ["Bruno naquit vers 1030 à Cologne, en Allemagne, dans une famille noble.", "Il fut l'un des plus brillants maîtres de l'école cathédrale de Reims, formant de nombreux élèves.", "Sa réputation intellectuelle était immense et il aurait pu prétendre à l'archevêché de Reims.", "Mais il aspira à une vie plus solitaire et plus austère, loin des honneurs ecclésiastiques.", "En 1084, il se retira avec six compagnons dans le désert de Chartreuse, près de Grenoble.", "Là, il fonda la Grande Chartreuse, berceau de l'ordre des Chartreux.", "La règle cartusienne combine la solitude érémitique et la vie en communauté.", "Carthusiense numquam reformata quia numquam deformata : jamais réformée car jamais déformée.", "Il mourut en 1101 dans son ermitage calabrais de Serra San Bruno, en Italie.", "Canonisé en 1514, il est le fondateur de l'ordre contemplatif le plus austère d'Occident."] },
      "10-7": { nom: "Notre-Dame du Rosaire", texte: ["La fête de Notre-Dame du Rosaire fut instituée par Pie V après la victoire de Lépante en 1571.", "La flotte chrétienne défit la flotte ottomane le 7 octobre 1571, à la bataille de Lépante.", "Pie V attribua cette victoire à la prière du rosaire faite en même temps à Rome.", "Le rosaire est une prière médiative sur les mystères de la vie du Christ et de Marie.", "Il se compose de dizaines de Je vous salue Marie entrecoupées du Notre Père.", "Saint Dominique en est le propagateur traditionnel, bien que son invention soit plus complexe.", "Jean-Paul II ajouta en 2002 les mystères lumineux, portant leur nombre à vingt.", "La récitation du chapelet est l'une des prières les plus populaires du catholicisme mondial.", "De nombreuses apparitions mariales, dont Fatima et Lourdes, ont demandé la récitation du rosaire.", "Marie du Rosaire est invoquée pour la paix dans le monde et la conversion des pécheurs."] },
      "10-8": { nom: "Sainte Pélagie", texte: ["Pélagie fut une comédienne et danseuse célèbre à Antioche, au Ve siècle.", "Sa beauté et son talent lui avaient valu une grande fortune et une vie de plaisirs.", "L'évêque Nonnus d'Édesse la vit passer dans la rue et fut frappé de sa beauté.", "Il pria pour sa conversion avec ses frères évêques, puis prêcha sur la beauté de l'âme.", "Pélagie, entendant sa prédication, fut touchée par la grâce et se prosterna à ses pieds.", "Elle se convertit, donna tous ses biens aux pauvres et se fit baptiser.", "Déguisée en homme, elle se retira en ermite sur le mont des Oliviers à Jérusalem.", "Elle y vécut dans une pénitence exemplaire, inconnue de tous, sous le nom de Pélagius.", "Sa véritable identité ne fut découverte qu'à sa mort, vers 457.", "Elle est le symbole de la conversion radicale et de la miséricorde infinie de Dieu."] },
      "10-9": { nom: "Saint Denis de Paris", texte: ["Denis fut le premier évêque de Paris, martyrisé vers 250 lors de la persécution de Dèce.", "Selon Grégoire de Tours, il fut envoyé d'Italie pour évangéliser la Gaule.", "Il s'établit sur l'île de la Cité et évangélisa Paris et ses environs avec un grand zèle.", "Arrêté lors de la persécution, il fut conduit sur la butte Montmartre pour y être décapité.", "La légende dit qu'après sa décapitation, il prit sa tête et marcha jusqu'à l'emplacement actuel de la basilique.", "Cette basilique de Saint-Denis fut la nécropole des rois de France pendant des siècles.", "Son compagnon Rustique prêtre et Éleuthère diacre furent martyrisés avec lui.", "Il est l'un des Quatorze Saints Auxiliateurs, invoqués pour des besoins particuliers.", "Son nom est souvent crié dans les batailles françaises médiévales comme cri de guerre.", "Il est le saint patron de la France avec saint Martin et saint Michel."] },
      "10-10": { nom: "Saint Daniel Comboni", texte: ["Daniel Comboni naquit en 1831 à Limone sul Garda, en Lombardie, dans une famille pauvre.", "Éduqué par le père Mazza à Vérone, il fut ordonné prêtre en 1854.", "Il se rendit en Afrique en 1857 et fut bouleversé par la misère des populations africaines.", "Il élabora son plan pour régénérer l'Afrique par l'Afrique elle-même.", "Ce plan consistait à former des Africains pour évangéliser leurs propres frères.", "Il fonda en 1867 l'Institut des Missions africaines, les Comboniens, à Vérone.", "Nommé vicaire apostolique pour l'Afrique centrale en 1877, il s'installa à Khartoum.", "Il lutta contre la traite des esclaves avec une énergie remarquable.", "Il mourut à Khartoum en 1881, épuisé par la maladie et ses travaux apostoliques.", "Canonisé par Jean-Paul II en 2003, il est le patron des missions africaines."] },
      "10-11": { nom: "Saint Jean XXIII", texte: ["Angelo Giuseppe Roncalli naquit en 1881 à Sotto il Monte, en Lombardie, dans une famille de paysans.", "Ordonné prêtre en 1904, il fut nonce apostolique en Bulgarie, en Turquie et en France.", "Pendant la Seconde Guerre mondiale, il sauva des milliers de Juifs grâce à ses réseaux diplomatiques.", "Élu pape en 1958 à soixante-dix-sept ans, il fut considéré comme un pape de transition.", "Il surprit le monde en convoquant le Concile Vatican II le 11 octobre 1962.", "Ce concile fut une révolution dans la vie de l'Église, ouvrant un dialogue avec le monde moderne.", "Sa bonhomie, son humour et sa chaleur humaine lui valurent le surnom de bon pape Jean.", "Il mourut en 1963, avant la fin du Concile qu'il avait convoqué.", "Béatifié en 2000 et canonisé en 2014 avec Jean-Paul II, il est le saint du Concile.", "Il est le symbole de l'aggiornamento, mise à jour de l'Église pour notre temps."] },
      "10-12": { nom: "Notre-Dame du Pilar", texte: ["Notre-Dame du Pilar est la patronne de l'Espagne et de l'hispanité.", "Selon une tradition très ancienne, la Vierge Marie serait apparue à l'apôtre Jacques à Saragosse.", "Elle lui aurait remis une petite colonne de jaspe, un pilar, comme gage de sa protection.", "Sur ce pilar fut érigée une chapelle, première église mariale du monde selon cette tradition.", "La basilique Notre-Dame du Pilar de Saragosse est aujourd'hui l'un des plus grands sanctuaires mariaux.", "La fête du 12 octobre coïncide avec la Journée de la Hispanité, commémoration de 1492.", "Des millions de pèlerins visitent Saragosse chaque année pour vénérer la Vierge du Pilar.", "Sa statue, habillée de robes somptueuses offertes par les fidèles, est l'une des plus vénérées d'Espagne.", "La Vierge du Pilar est invoquée comme protectrice de l'unité de la foi hispanique.", "Elle est la patronne de la Garde Civile espagnole et de nombreuses corporations."] },
      "10-13": { nom: "Saint Édouard le Confesseur", texte: ["Édouard le Confesseur fut roi d'Angleterre de 1042 à 1066, le dernier roi de la lignée saxonne.", "Sa piété profonde lui valut le titre de Confesseur, attestant sa sainteté de vie sans martyre.", "Il fit reconstruire l'abbaye de Westminster, joyau de l'architecture normande naissante.", "Son règne fut marqué par une recherche sincère de paix et de justice pour son peuple.", "Il vécut dans la chasteté conjugale en accord avec son épouse Édith de Wessex.", "Il assista les pauvres et les malades, notamment les scrofuleux qu'il touchait pour les guérir.", "Ce rite royal du toucher des écrouelles, initié par Édouard, dura jusqu'au XIXe siècle.", "Il mourut le 5 janvier 1066, peu après la consécration de l'abbaye de Westminster.", "Sa canonisation fut prononcée par le pape Alexandre III en 1161.", "Il est le patron de l'Angleterre avant saint Georges et le protecteur des rois."] },
      "10-14": { nom: "Saint Calliste Ier, pape", texte: ["Calliste Ier fut pape de 217 à 222, dans une période de controverses théologiques.", "Son passé était mouvementé : esclave, il fut condamné aux mines de Sardaigne pour des raisons obscures.", "Libéré grâce à l'intercession des chrétiens, il devint diacre de l'Église romaine.", "Il administra le grand cimetière chrétien de la voie Appienne, les fameuses catacombes de Calliste.", "Élu pape en 217, il fut attaqué par Tertullien et Hippolyte qui le jugeaient trop indulgent.", "Il accordait en effet la réconciliation aux chrétiens qui avaient commis de graves péchés.", "Cette politique de miséricorde fut critiquée par les rigoristes de son temps.", "Il fut martyrisé lors d'une émeute populaire en 222, jeté dans un puits selon la tradition.", "Ses reliques sont vénérées dans l'église Sainte-Marie-de-la-Transtévère à Rome.", "Il est un exemple de la politique de miséricorde de l'Église envers les pécheurs repentants."] },
      "10-15": { nom: "Sainte Thérèse d'Avila", texte: ["Thérèse d'Avila naquit en 1515 à Avila, en Castille, dans une famille de vieux chrétiens.", "Entrée au Carmel à vingt et un ans, elle vécut vingt ans dans une tiédeur spirituelle.", "Une profonde conversion vers quarante ans la lança dans la réforme de son ordre.", "Elle fonda en 1562 à Avila le premier monastère de Carmélites réformées, les Déchaussées.", "Avec saint Jean de la Croix, elle porta la réforme dans toute l'Espagne.", "Ses œuvres, notamment Le Château intérieur et Le Chemin de la perfection, sont des chefs-d'œuvre de la mystique.", "Elle décrit avec une précision extraordinaire les différents degrés de l'oraison et de l'union mystique.", "Elle mourut épuisée à Alba de Tormes en 1582, après avoir fondé dix-sept monastères.", "Première femme déclarée Docteur de l'Église par Paul VI en 1970, avec Catherine de Sienne.", "Elle est la patronne des Espagnols et le modèle de la vie contemplative."] },
      "10-16": { nom: "Sainte Marguerite-Marie Alacoque", texte: ["Marguerite-Marie Alacoque naquit en 1647 à Verosvres, en Bourgogne, dans une famille bourgeoise.", "Après une enfance marquée par les épreuves et les maladies, elle entra chez les Visitandines de Paray-le-Monial.", "Entre 1673 et 1675, elle reçut plusieurs apparitions de Jésus lui révélant son Sacré-Cœur.", "Jésus lui montrait son cœur enflammé d'amour et lui demandait de répandre cette dévotion.", "Il lui confia douze promesses pour les dévots du Sacré-Cœur.", "Il lui demanda d'instituer une fête du Sacré-Cœur le vendredi après l'octave de la Fête-Dieu.", "Son directeur spirituel, le père Claude de la Colombière jésuite, reconnut l'authenticité de ses révélations.", "Elle souffrit de l'incompréhension de ses sœurs et de ses supérieures pendant de longues années.", "Elle mourut en 1690 à Paray-le-Monial, dans la paix et l'abandon à Dieu.", "Canonisée en 1920, elle est l'apôtre du Sacré-Cœur et co-patronne de la dévotion réparatrice."] },
      "10-17": { nom: "Saint Ignace d'Antioche", texte: ["Ignace fut le deuxième ou troisième évêque d'Antioche, succédant à saint Pierre ou à Évode.", "Il gouverna l'Église d'Antioche pendant environ quarante ans, aux premiers siècles.", "Condamné à mort par l'empereur Trajan vers 107, il fut conduit à Rome pour y être livré aux lions.", "Durant ce long voyage à travers l'Asie Mineure, il écrivit sept lettres aux Églises d'Occident.", "Ces lettres sont des documents précieux sur la foi, la liturgie et l'organisation de l'Église primitive.", "Il est le premier auteur à employer le terme Église catholique pour désigner l'Église universelle.", "Il supplia les chrétiens de Rome de ne pas intervenir pour empêcher son martyre.", "Il écrivit : je suis le froment de Dieu, et je dois être moulu par les dents des bêtes.", "Il fut effectivement jeté aux lions dans l'amphithéâtre romain vers 107.", "Il est l'un des Pères apostoliques les plus importants pour la connaissance de l'Église primitive."] },
      "10-18": { nom: "Saint Luc, évangéliste", texte: ["Luc est l'auteur du troisième Évangile et du livre des Actes des Apôtres.", "Selon saint Paul, c'était un médecin et son compagnon de voyage et de mission.", "Son Évangile est le plus littéraire des quatre, caractérisé par une langue grecque soignée.", "Il accordait une attention particulière aux femmes, aux pauvres et aux pécheurs pardonnés.", "Il rapporte les paraboles de la miséricorde : le Bon Samaritain, l'Enfant prodigue, la Brebis perdue.", "Son récit de l'Annonciation et de la Nativité s'appuie probablement sur les souvenirs de Marie.", "La tradition lui attribue le premier portrait peint de la Vierge Marie.", "Il accompagna Paul dans ses voyages, dont le naufrage de Malte et l'arrivée à Rome.", "Il mourut vers 80, peut-être en Grèce, selon les traditions anciennes.", "Il est le patron des médecins, des peintres et des écrivains."] },
      "10-19": { nom: "Saints Jogues, Brébeuf et compagnons", texte: ["Isaac Jogues, Jean de Brébeuf et leurs compagnons furent martyrisés au Canada entre 1642 et 1649.", "Ces jésuites français se consacrèrent à l'évangélisation des Hurons et des Iroquois.", "Jean de Brébeuf arriva en Nouvelle-France en 1625 et apprit les langues et les coutumes huronnes.", "Il rédigea la première grammaire huronne et traduisit des textes religieux en langue iroquoise.", "Isaac Jogues fut capturé par les Iroquois en 1642 et torturé, puis libéré par les Hollandais.", "Il retourna courageusement en mission et fut de nouveau capturé et tué par les Iroquois en 1646.", "Jean de Brébeuf fut martyrisé en 1649 avec Gabriel Lalemant dans des conditions atroces.", "Leur courage face à la mort impressionna même leurs bourreaux iroquois.", "Canonisés en 1930 par Pie XI, ils sont les patrons du Canada.", "Ces martyrs illustrent le courage héroïque des missionnaires jésuites en Amérique du Nord."] },
      "10-20": { nom: "Sainte Adélaïde de Bourgogne", texte: ["Adélaïde naquit en 931, fille du roi Rodolphe II de Bourgogne.", "À seize ans, elle épousa Lothaire II, roi d'Italie, qui mourut empoisonné quelques années plus tard.", "Elle fut emprisonnée par Bérenger II qui voulait forcer son fils à l'épouser.", "Elle s'évada du château de Garda et se réfugia auprès d'Othon Ier de Germanie.", "Elle l'épousa en 951 et devint impératrice du Saint-Empire romain germanique.", "Son influence bénéfique sur son mari et ses fils contribua à la christianisation de l'Empire.", "Veuve en 973, elle exerça la régence avec sagesse pendant la minorité de son petit-fils.", "Elle fonda de nombreux monastères et convents, soutenant généreusement les pauvres.", "Elle mourut en 999 au monastère de Seltz, qu'elle avait fondé en Alsace.", "Canonisée en 1097, elle est la patronne des impératrices et des femmes victimes d'abus."] },
      "10-21": { nom: "Sainte Céline de Meaux", texte: ["Céline fut la mère de saint Rémi, évêque de Reims qui baptisa Clovis.", "Elle vécut au Ve siècle dans la région de Meaux, en Seine-et-Marne.", "Sa vie fut marquée par une piété et une charité exemplaires.", "Elle éleva ses enfants dans la foi chrétienne et dans le service du prochain.", "Son fils Rémi devint l'un des plus grands évêques de l'Église gauloise.", "Rémi baptisa le roi Clovis et ses guerriers lors de la grande nuit de Noël 496.", "Ce baptême fut décisif pour la christianisation de la France.", "Céline est ainsi la grand-mère spirituelle de la France chrétienne.", "Son tombeau à Laon fut un lieu de pèlerinage important au Moyen Âge.", "Elle illustre le rôle fondamental des mères chrétiennes dans la transmission de la foi."] },
      "10-22": { nom: "Saint Jean-Paul II", texte: ["Karol Wojtyła naquit le 18 mai 1920 à Wadowice, en Pologne.", "Ordonné prêtre en 1946, il devint évêque, puis archevêque de Cracovie.", "Élu pape le 16 octobre 1978, il fut le premier pape non-italien depuis 1523.", "Son pontificat de vingt-six ans fut l'un des plus longs et des plus importants de l'histoire.", "Il visita cent trente pays, rencontrant des milliards de personnes sur tous les continents.", "Son rôle dans la chute du communisme en Europe de l'Est fut décisif.", "Il béatifia et canonisa plus de saints que tous ses prédécesseurs réunis.", "Il fut victime d'un attentat en 1981 et pardonna publiquement à son agresseur.", "Il mourut le 2 avril 2005, veille du dimanche de la Miséricorde qu'il avait lui-même institué.", "Béatifié en 2011 et canonisé en 2014 par François, il est le grand saint du XXe siècle."] },
      "10-23": { nom: "Saint Jean de Capistran", texte: ["Jean de Capistran naquit en 1386 à Capistran, dans les Abruzzes, dans une famille noble.", "Brillant juriste, il fut gouverneur de Pérouse avant d'entrer dans la vie religieuse.", "Il entra dans l'ordre franciscain en 1416, après avoir été prisonnier des Malatesta.", "Il devint l'un des prédicateurs les plus célèbres d'Europe, parcourant l'Italie, l'Allemagne et la Pologne.", "Ses prédications provoquaient des conversions massives et des réformes des mœurs.", "Quand les Turcs assiégèrent Belgrade en 1456, il prêcha la croisade et mobilisa soixante-dix mille combattants.", "Âgé de soixante-dix ans, il prit lui-même part à la bataille de Belgrade, remportée contre toute attente.", "Cette victoire arrêta l'avancée ottomane vers l'Europe centrale.", "Il mourut épuisé quelques mois après la victoire, en 1456, à Ilok en Slavonie.", "Canonisé en 1724, il est le patron des aumôniers militaires et des juristes."] },
      "10-24": { nom: "Saint Antoine-Marie Claret", texte: ["Antoine-Marie Claret naquit en 1807 à Sallent, en Catalogne, dans une famille de tisserands.", "Ordonné prêtre en 1835, il se consacra aux missions populaires dans toute la Catalogne.", "Il fonda en 1849 la Congrégation des Fils du Cœur Immaculé de Marie, les Claretains.", "Nommé archevêque de Santiago de Cuba en 1850, il réforma profondément cette Église.", "Son énergie missionnaire lui permit de parcourir toute l'île et de toucher des milliers d'âmes.", "De retour en Espagne, il devint confesseur de la reine Isabelle II.", "Il fonda des bibliothèques populaires et des laboratoires pour améliorer les conditions de vie.", "Il fut victime de plusieurs tentatives d'assassinat pour son courage prophétique.", "Il mourut en exil en France en 1870, après avoir suivi la reine dans sa fuite.", "Canonisé en 1950 par Pie XII, il est le fondateur des Claretains et le patron de la presse catholique."] },
      "10-25": { nom: "Saints Crépin et Crépinien", texte: ["Crépin et Crépinien furent des martyrs chrétiens du IIIe siècle, patrons des cordonniers.", "Selon la tradition, ils étaient deux frères nobles de Rome qui se rendirent à Soissons pour évangéliser.", "Ils exerçaient le métier de cordonnier pour subvenir à leurs besoins sans dépendre des chrétiens.", "Leur prédication et leurs miracles convertirent de nombreux habitants de la région.", "Arrêtés lors de la persécution de Dioclétien vers 285, ils furent soumis à de nombreux supplices.", "On leur enfonça des alènes sous les ongles, instruments de leur métier.", "Miraculeusement préservés de plusieurs supplices, ils furent finalement décapités.", "Leurs tombes à Soissons devinrent un important lieu de pèlerinage au Moyen Âge.", "Leur fête, le 25 octobre, fut rendue célèbre par le discours du roi Henri V avant la bataille d'Azincourt.", "Shakespeare immortalisa leur nom dans sa pièce Henri V avec le célèbre discours de la Saint-Crépin."] },
      "10-26": { nom: "Saint Evariste, pape", texte: ["Évariste fut le quatrième ou cinquième évêque de Rome, successeur de saint Clet.", "Son pontificat se situe entre 97 et 107, sous les règnes de Domitien et de Trajan.", "Il aurait été d'origine grecque ou d'origine juive hellénisée, selon les sources.", "Il organisa la communauté chrétienne de Rome en distribuant aux prêtres diverses titres ou paroisses.", "Cette organisation de la communauté romaine en titres est encore visible dans la structure de l'Église de Rome.", "Il aurait également réglementé la liturgie de la messe selon certaines traditions.", "Il mourut martyr sous le règne de Trajan, vers 107, selon le Liber Pontificalis.", "Il est inscrit dans la liste des papes martyrs de l'Église primitive.", "Son tombeau se trouvait au Vatican, à proximité du tombeau de saint Pierre.", "Sa mémoire illustre la continuité de la succession apostolique dans l'Église de Rome."] },
      "10-27": { nom: "Saint Frumentius d'Abyssinie", texte: ["Frumentius fut l'évangélisateur de l'Abyssinie, l'actuelle Éthiopie, au IVe siècle.", "Né à Tyr en Phénicie, il voyageait avec son oncle quand leur navire fut arrêté en Éthiopie.", "Les passagers furent massacrés, mais Frumentius et son compagnon Edesius furent épargnés.", "Le roi les prit à son service, et Frumentius devint tuteur du jeune prince héritier.", "Il profita de cette position pour introduire discrètement le christianisme à la cour éthiopienne.", "Après la mort du roi, il obtint sa liberté et se rendit à Alexandrie.", "Il demanda à saint Athanase d'envoyer un évêque pour l'Éthiopie.", "Athanase l'ordonna lui-même évêque d'Axoum, la capitale éthiopienne.", "Frumentius retourna en Éthiopie et convertit le roi Ézanas qui fit du christianisme la religion du royaume.", "Il est le père de l'Église éthiopienne et vénéré comme l'Abba Salama, père de la paix."] },
      "10-28": { nom: "Saints Simon et Jude", texte: ["Simon et Jude sont deux apôtres fêtés ensemble le 28 octobre.", "Simon est surnommé le Zélote, ce qui indique qu'il appartint au mouvement nationaliste juif.", "Sa rencontre avec Jésus transforma son zèle politique en zèle apostolique.", "Jude, aussi appelé Thaddée, est l'auteur d'une courte épître du Nouveau Testament.", "Il ne faut pas le confondre avec Judas Iscariote, le traître des évangiles.", "Dans son épître, Jude exhorte les chrétiens à défendre la foi transmise par les apôtres.", "La tradition leur attribue une mission commune en Perse, où ils auraient été martyrisés.", "Jude est le patron des causes désespérées et des situations sans espoir.", "De nombreux fidèles lui adressent leurs prières dans les moments les plus difficiles.", "Simon le Zélote est le patron des tanneurs et des scieurs."] },
      "10-29": { nom: "Saint Narcisse de Jérusalem", texte: ["Narcisse fut évêque de Jérusalem à la fin du IIe siècle, figure vénérable de l'Église primitive.", "Son épiscopat fut marqué par des calomnies graves qui le contraignirent à fuir dans le désert.", "Il vécut de longues années en ermite, puis fut retrouvé et ramené à Jérusalem.", "À son retour, des miracles lui furent attribués, notamment la transformation d'eau en huile.", "Il participa à la controverse sur la date de Pâques et soutint la pratique romaine.", "Il mourut vers 213, à un âge très avancé selon les chroniqueurs anciens.", "Son successeur Alexandre lui rendit hommage dans une lettre conservée par Eusèbe de Césarée.", "Il est vénéré comme l'un des premiers évêques de Jérusalem après la destruction du Temple.", "Sa vie illustre la fidélité du pasteur qui revient à son troupeau après l'épreuve.", "Il est vénéré en Orient et en Occident comme confesseur de la foi chrétienne."] },
      "10-30": { nom: "Sainte Dorothée de Montau", texte: ["Dorothée naquit en 1347 à Montau, en Prusse orientale, dans une famille de paysans.", "Elle épousa à dix-sept ans un forgeron de Dantzig, Albert de Montau, avec qui elle eut neuf enfants.", "Sa vie conjugale fut difficile : elle supporta les violences de son mari avec patience.", "Tous ses enfants moururent en bas âge sauf une fille qui entra dans un couvent.", "Son mari, touché par la patience de sa femme, se convertit et devint un chrétien exemplaire.", "Veuve en 1390, elle entreprit de nombreux pèlerinages, notamment à Rome pour le Jubilé de 1390.", "Elle vécut ses dernières années recluse dans une cellule attenante à la cathédrale de Marienwerder.", "Elle y mourut en 1394, après une vie entière consacrée à Dieu dans toutes les états de la vie.", "Elle est la patronne de la Prusse et un modèle de sainteté conjugale et mystique.", "Canonisée en 1976 par Paul VI, elle est vénérée en Pologne et en Allemagne."] },
      "10-31": { nom: "Saint Quentin", texte: ["Quentin fut un martyr chrétien des premiers siècles, dont le culte est très ancien dans le nord de la France.", "Selon la tradition, il était romain de naissance, fils d'un sénateur, et vint évangéliser la Gaule.", "Il s'établit à Augusta Veromanduorum, l'actuelle Saint-Quentin dans l'Aisne.", "Sa prédication et ses miracles convertirent de nombreux habitants de la région.", "Arrêté lors de la persécution de Maximien Hercule vers 287, il fut soumis à des supplices atroces.", "Son corps fut jeté dans la Somme, mais retrouvé miraculeusement selon la tradition.", "Une basilique fut élevée sur son tombeau, qui devint un important lieu de pèlerinage.", "La ville de Saint-Quentin dans l'Aisne tire son nom de ce saint martyr.", "La magnifique basilique gothique de Saint-Quentin est l'une des plus belles du nord de la France.", "Il est le saint patron de la ville de Saint-Quentin et de la région picarde."] },
      "11-1": { nom: "Toussaint", texte: ["La Toussaint, fête de tous les saints, est célébrée le 1er novembre dans toute l'Église catholique.", "Elle honore l'ensemble des bienheureux et des saints qui jouissent de la vision de Dieu.", "Cette fête rappelle que l'Église est composée des vivants et des défunts unis dans la communion des saints.", "La sainteté est la vocation universelle de tous les baptisés, selon le Concile Vatican II.", "Parmi les saints célébrés ce jour se trouvent d'innombrables anonymes connus de Dieu seul.", "L'Apocalypse décrit la foule immense de toutes nations, peuples et langues adorant Dieu.", "La fête de la Toussaint est attestée à Rome depuis le IXe siècle.", "Elle précède le 2 novembre, fête des fidèles défunts instituée par saint Odilon de Cluny.", "Les cimetières fleuris de chrysanthèmes témoignent de l'espérance chrétienne en la résurrection.", "La Toussaint est un jour de fête légale en France, signe de l'enracinement catholique du pays."] },
      "11-2": { nom: "Commémoration des fidèles défunts", texte: ["Le 2 novembre, l'Église catholique commémore tous les fidèles défunts.", "Cette fête fut instituée par saint Odilon de Cluny en 998 pour son monastère.", "Elle se répandit progressivement à toute l'Église et fut universelle au XIIIe siècle.", "Elle exprime la croyance en la communion des vivants et des morts dans le Christ.", "L'Église enseigne l'existence du purgatoire, état de purification avant l'entrée au ciel.", "La prière pour les défunts est une des œuvres de miséricorde spirituelle les plus anciennes.", "Les messes célébrées ce jour pour les défunts ont une signification particulière dans la tradition.", "Les visites aux cimetières et les fleurs déposées expriment la fidélité aux morts.", "Cette fête rappelle la fragilité de la vie et l'espérance de la résurrection.", "La mort chrétienne est un passage, un endormissement dans l'attente du réveil glorieux."] },
      "11-3": { nom: "Saint Martin de Porrès", texte: ["Martin de Porrès naquit en 1579 à Lima, au Pérou, fils naturel d'un noble espagnol et d'une esclave noire.", "Sa naissance illégitime et son teint sombre lui valurent de nombreuses humiliations dans sa vie.", "Il entra comme frère lai dans le couvent dominicain de Lima, refusant d'être ordonné prêtre.", "Il soignait les malades, noirs et blancs, indiens et esclaves, sans aucune distinction.", "Ses dons de guérison miraculeux attirèrent des foules immenses au couvent de Lima.", "Il avait le don de bilocation et pouvait apparaître simultanément en plusieurs endroits.", "Sa douceur envers les animaux était légendaire : il réunissait dans une même pièce chats, chiens et rats.", "Il dormait peu, jeûnait souvent et se mortifiait en secret.", "Il mourut en 1639, pleuré par toute la ville de Lima, noirs et blancs confondus.", "Canonisé en 1962, il est le patron des œuvres de justice sociale et des métis."] },
      "11-4": { nom: "Saint Charles Borromée", texte: ["Charles Borromée naquit en 1538 à Arona, sur les bords du lac Majeur, dans une famille noble.", "Son oncle maternel, Pie IV, l'appela à Rome et le fit cardinal à vingt-deux ans.", "Il fut l'âme du Concile de Trente dont il supervisa la dernière phase et la rédaction des décrets.", "Il fut nommé archevêque de Milan en 1564 et se consacra entièrement à son diocèse.", "Il réforma profondément son clergé, exigeant de lui la résidence et la formation.", "Lors de la grande peste de 1576, il resta à Milan quand tous fuyaient, soignant et réconfortant.", "Il fonda les séminaires pour la formation du clergé, réalisant les décrets tridentins.", "Il vivait dans une grande austérité personnelle, dormant peu et jeûnant souvent.", "Il mourut épuisé en 1584, à quarante-six ans, modèle de l'évêque de la Contre-Réforme.", "Canonisé en 1610, il est le patron des évêques et des séminaires."] },
      "11-5": { nom: "Sainte Bertille de Chelles", texte: ["Bertille naquit vers 630 dans une famille noble de Soissons.", "Désireuse de se consacrer à Dieu, elle entra dans le monastère de Jouarre, en Seine-et-Marne.", "Sa sagesse et sa piété lui valurent d'être choisie pour fonder le monastère de Chelles.", "Elle dirigea ce monastère pendant quarante-six ans avec une grande douceur et une ferme autorité.", "Le monastère de Chelles devint l'un des plus importants foyers de vie religieuse en Gaule.", "La reine d'Angleterre Hilda envoya des vierges s'y former pour ensuite fonder des monastères en Angleterre.", "Bertille accueillit aussi des reines répudiées qui venaient y finir leur vie dans la piété.", "Ses relations avec l'aristocratie franque lui permirent de protéger et enrichir son monastère.", "Elle mourut vers 705, entourée de ses religieuses et vénérée de toute la région.", "Elle est la patronne des abbesses et des supérieures de communautés religieuses féminines."] },
      "11-6": { nom: "Saint Léonard de Noblat", texte: ["Léonard est un saint du VIe siècle dont la vie est entourée de légendes.", "Selon la tradition, il était un noble franc, filleul du roi Clovis.", "Refusant la vie de cour, il se fit baptiser par saint Remi et embrassa la vie ascétique.", "Il vécut comme ermite dans la forêt de Limousin, près de l'actuelle ville de Noblat.", "Sa réputation de sainteté attira des disciples et il fonda un petit monastère.", "Il avait le don de libérer les prisonniers : ses prières brisaient leurs chaînes.", "Les prisonniers libérés apportaient leurs chaînes à son tombeau en signe de gratitude.", "Il mourut vers 559 et sa tombe devint un lieu de pèlerinage majeur au Moyen Âge.", "De nombreux croisés prisonniers l'invoquèrent et furent miraculeusement libérés selon la tradition.", "Il est le patron des prisonniers, des captifs et des femmes en couches difficiles."] },
      "11-7": { nom: "Sainte Carine", texte: ["Carine est une martyre des premiers siècles dont le culte est attesté en Occident.", "Selon la tradition, elle fut martyrisée à Nicée, en Bithynie, lors des persécutions romaines.", "Son témoignage courageux impressionna ses contemporains et donna naissance à un culte précoce.", "Ses reliques furent vénérées dans plusieurs villes d'Europe au Moyen Âge.", "Sa fête, célébrée le 7 novembre dans certains martyrologes, témoigne de l'ancienneté de son culte.", "Elle illustre la multitude de martyres féminines anonymes des premiers siècles chrétiens.", "Leurs noms, souvent méconnus, figurent néanmoins dans les plus anciens martyrologes.", "L'Église les honore collectivement comme témoins de la foi au prix de leur vie.", "Ces femmes courageuses furent les premières à ouvrir la voie de la sainteté féminine.", "Leur exemple continue d'inspirer les femmes chrétiennes à travers les siècles."] },
      "11-8": { nom: "Bienheureux Jean Duns Scot", texte: ["Jean Duns Scot naquit vers 1266 à Duns, en Écosse, dans une famille pieuse.", "Il entra dans l'ordre franciscain et étudia à Oxford et à Paris.", "Il devint l'un des plus grands philosophes et théologiens du Moyen Âge.", "Son surnom, le Docteur Subtil, témoigne de la finesse et de la précision de sa pensée.", "Il soutint avec énergie le dogme de l'Immaculée Conception de Marie, alors très controversé.", "Son argumentation théologique sur l'Immaculée Conception prépara la définition dogmatique de 1854.", "Il enseigna à Paris, Oxford et Cologne, formant des générations de franciscains.", "Il mourut soudainement à Cologne en 1308, à l'âge d'environ quarante-deux ans.", "Il fut béatifié par Jean-Paul II en 1993, reconnaissant ainsi sa sainteté et son génie.", "Il est le patron des philosophes scolastiques et des défenseurs de l'Immaculée Conception."] },
      "11-9": { nom: "Dédicace de la basilique du Latran", texte: ["La basilique du Latran est la cathédrale de l'évêque de Rome, c'est-à-dire du pape.", "Elle porte le titre d'Archi-Basilique et de Mère de toutes les Églises de la ville et du monde.", "Elle fut consacrée par le pape Sylvestre Ier le 9 novembre 324, sous le règne de Constantin.", "C'est la plus ancienne basilique chrétienne du monde et la première église publique de Rome.", "Sa dédicace est célébrée comme fête dans toute l'Église catholique depuis le Moyen Âge.", "Le pape y siège comme évêque de Rome, chef de l'Église universelle.", "Sa chaire cathedrale, trône de l'évêque, donna son nom aux grandes cathédrales.", "Elle est dédiée au Très-Saint Sauveur, à saint Jean-Baptiste et à saint Jean l'Évangéliste.", "Plusieurs conciles œcuméniques importants s'y tinrent au Moyen Âge.", "Cette fête rappelle que l'Église visible, avec ses pierres et ses rites, est signe de l'Église céleste."] },
      "11-10": { nom: "Saint Léon le Grand, pape", texte: ["Léon naquit vers 400 en Toscane, dans une famille noble romaine.", "Il devint pape en 440 et gouverna l'Église pendant vingt et un ans avec une autorité exceptionnelle.", "Son Tome, lettre théologique sur la double nature du Christ, fut adopté au Concile de Chalcédoine en 451.", "Ce concile définit que le Christ est vrai Dieu et vrai homme en une seule personne.", "En 452, il affronta personnellement Attila et ses Huns aux portes de Rome.", "La tradition dit qu'Attila fut effrayé par une vision pendant leur entrevue et se retira.", "En 455, il ne put empêcher le sac de Rome par les Vandales de Genséric, mais limita les massacres.", "Ses sermons et ses lettres sont des chefs-d'œuvre de la prose latine chrétienne.", "Il mourut en 461, laissant une Église dont il avait renforcé l'unité et la doctrine.", "Déclaré Grand par l'histoire et Docteur de l'Église, il est le premier pape de ce titre."] },
      "11-11": { nom: "Saint Martin de Tours", texte: ["Martin naquit vers 316 à Savaria, en Pannonie, dans l'actuelle Hongrie.", "Fils d'un officier romain, il fut enrôlé de force dans l'armée impériale.", "À Amiens, par un froid rigoureux, il partagea son manteau avec un pauvre.", "Dans la nuit suivante, il vit en songe le Christ vêtu de la moitié de son manteau.", "Il se fit baptiser et demanda sa libération de l'armée.", "Il fonda à Ligugé, en 360, le premier monastère de Gaule.", "Élu évêque de Tours malgré ses protestations, il fonda le monastère de Marmoutier.", "Il parcourut son vaste diocèse à pied ou à dos d'âne pour évangéliser les campagnes.", "Il mourut en 397 à Candes et fut inhumé à Tours, dont la basilique devint un grand lieu de pèlerinage.", "Il est le patron de la France, des soldats, des cavaliers et des pauvres."] },
      "11-12": { nom: "Saint Josaphat de Polotsk", texte: ["Josaphat naquit vers 1580 à Vladimir-en-Volhynie, dans l'actuelle Ukraine.", "Il entra dans l'ordre de saint Basile et fut ordonné prêtre dans l'Église grecque-catholique.", "Il se consacra à l'union des Églises d'Orient avec Rome, travaillant à la réconciliation.", "Nommé archevêque de Polotsk en 1617, il réforma son Église avec un zèle remarquable.", "Sa réforme du clergé et son travail d'unification lui valurent l'hostilité des orthodoxes intransigeants.", "Il fut assassiné le 12 novembre 1623 à Vitebsk par une foule hostile à l'union avec Rome.", "Sa mort fit une profonde impression et contribua paradoxalement à l'union des Églises.", "Ses reliques sont conservées à Rome dans la basilique Saint-Pierre.", "Béatifié en 1643, il fut le premier saint de l'Église orientale canonisé par Rome, en 1867.", "Il est le patron de l'Ukraine et le symbole de l'œcuménisme catholique avec l'Orient."] },
      "11-13": { nom: "Saint Brice de Tours", texte: ["Brice était un disciple turbulent de saint Martin de Tours.", "Il fut d'abord moqueur envers Martin, mais celui-ci le garda et le forma malgré tout.", "Il fut élu évêque de Tours à la mort de Martin en 397.", "Son épiscopat commença dans la turbulence : accusé injustement d'immoralité, il fut chassé de son siège.", "Il passa sept ans en exil à Rome, se purifiant par la pénitence et l'humilité.", "Il revint à Tours après la mort de son successeur et gouverna son diocèse pendant trente ans.", "Sa vie illustre la possibilité de la conversion et du recommencement après l'échec.", "Il mourut en 444, transformé par l'épreuve en un véritable saint.", "Sa fête, le 13 novembre, est connue en France comme la Saint-Brice.", "Il est invoqué comme modèle de persévérance et de réconciliation avec Dieu."] },
      "11-14": { nom: "Saint Laurence O'Toole", texte: ["Laurence naquit vers 1128 en Irlande, fils d'un chef de clan de Leinster.", "Pris en otage par un roi rival, il fut confié à l'évêque de Glendalough.", "Cette expérience le marqua et il choisit la vie monastique plutôt que la vie guerrière.", "Il devint abbé de Glendalough, puis archevêque de Dublin en 1162.", "Son épiscopat fut marqué par les invasions normandes qui transformèrent profondément l'Irlande.", "Il tenta de protéger son peuple des violences des envahisseurs normands.", "Il négocia entre les rois irlandais et le roi d'Angleterre Henri II pour la paix.", "Il mourut en 1180 à Eu, en Normandie, alors qu'il se rendait plaider la cause de son peuple.", "Canonisé en 1225 par Honorius III, il est le saint patron de Dublin.", "Il est le symbole de la résistance pacifique du peuple irlandais face à l'oppression."] },
      "11-15": { nom: "Saint Albert le Grand", texte: ["Albert le Grand naquit vers 1200 à Lauingen, en Souabe, dans une famille noble.", "Il entra dans l'ordre dominicain et devint le plus grand savant de son temps.", "Il enseigna à Paris et à Cologne, ayant pour élève le jeune Thomas d'Aquin.", "Il reconnut immédiatement le génie de Thomas, surnommé le bœuf muet par ses condisciples.", "Son œuvre encyclopédique couvre la philosophie, la théologie, les sciences naturelles et la médecine.", "Il fut le premier à systématiser les œuvres d'Aristote dans la tradition chrétienne.", "Il fut évêque de Ratisbonne, charge qu'il résigna pour retourner à l'enseignement.", "Il mourut à Cologne en 1280, après avoir défendu jusqu'au bout la mémoire de Thomas d'Aquin.", "Canonisé en 1931 par Pie XI, il fut déclaré Docteur de l'Église la même année.", "Il est le patron des scientifiques, des naturalistes et des étudiants en sciences."] },
      "11-16": { nom: "Sainte Marguerite d'Écosse", texte: ["Marguerite naquit vers 1045 en Hongrie, petite-fille du roi Edmond d'Angleterre.", "Réfugiée en Écosse après la conquête normande de l'Angleterre, elle y épousa le roi Malcolm III.", "Elle eut huit enfants et exerça une influence considérable sur la culture et la religion écossaises.", "Elle réforma profondément l'Église d'Écosse, la rapprochant des pratiques romaines.", "Sa charité envers les pauvres était légendaire : elle lavait les pieds des pauvres et leur servait à table.", "Elle fonda des hospices pour les pèlerins sur les routes des lieux saints d'Écosse.", "Sa bibliothèque et son goût pour la culture en firent une figure de la renaissance chrétienne.", "Elle mourut en 1093, peu après avoir appris la mort de son mari et de son fils à la guerre.", "Canonisée en 1250 par Innocent IV, elle est la sainte patronne de l'Écosse.", "Elle est aussi la patronne des reines et des femmes qui exercent des responsabilités publiques."] },
      "11-17": { nom: "Sainte Élisabeth de Hongrie", texte: ["Élisabeth naquit en 1207 à Pozsony, fille du roi André II de Hongrie.", "Fiancée dès l'âge de quatre ans au landgrave Louis IV de Thuringe, elle fut élevée à sa cour.", "Son mariage d'amour avec Louis fut un modèle de bonheur conjugal et de charité commune.", "Ils eurent trois enfants et Élisabeth se consacrait chaque jour au service des pauvres.", "Elle fit construire un hôpital au pied du château de Wartburg pour y soigner les malades.", "La légende des roses raconte que le pain qu'elle portait aux pauvres fut transformé en roses.", "Veuve à vingt ans, elle fut chassée du château par son beau-frère et erra dans la misère.", "Elle entra dans le tiers-ordre franciscain et se consacra entièrement aux pauvres à Marburg.", "Elle mourut épuisée en 1231, à vingt-quatre ans, moins de quatre ans après son veuvage.", "Canonisée dès 1235 par Grégoire IX, elle est la patronne des malades, des pauvres et de la Hongrie."] },
      "11-18": { nom: "Dédicace des basiliques Saint-Pierre et Saint-Paul", texte: ["Le 18 novembre, l'Église célèbre la dédicace des deux grandes basiliques de Rome.", "La basilique Saint-Pierre du Vatican fut consacrée en 1626 par le pape Urbain VIII.", "Elle est érigée sur le tombeau de l'apôtre Pierre, premier pape de l'Église.", "Sa coupole, conçue par Michel-Ange, est le symbole de la chrétienté mondiale.", "La basilique Saint-Paul-hors-les-Murs fut consacrée pour la première fois par Constantin au IVe siècle.", "Elle est érigée sur le tombeau de l'apôtre Paul, grand missionnaire de l'Église.", "Cette fête commune rappelle que l'Église de Rome est fondée sur l'apostolat de Pierre et Paul.", "Les deux basiliques accueillent chaque année des millions de pèlerins du monde entier.", "Leur beauté et leur richesse artistique en font deux joyaux inestimables de l'art chrétien.", "Cette fête exprime l'unité de l'Église autour du siège apostolique de Rome."] },
      "11-19": { nom: "Saint Pontien", texte: ["Pontien fut pape de 230 à 235, dans une période de relative paix pour l'Église.", "Il présida le synode romain qui condamna l'hérésie d'Origène sur certains points controversés.", "L'avènement de l'empereur Maximin le Thrace en 235 provoqua une persécution soudaine.", "Pontien fut déporté dans les mines de Sardaigne avec son adversaire Hippolyte.", "Conscient de l'impossibilité de gouverner l'Église depuis les mines, il abdiqua.", "Ce geste historique fut le premier exemple d'abdication d'un pape dans l'Église.", "Il mourut peu après en Sardaigne, épuisé par les conditions de vie dans les mines.", "Son successeur Antère fit rapatrier sa dépouille à Rome pour lui rendre les honneurs.", "Il fut inhumé dans la crypte des papes au cimetière de Calliste.", "Il est vénéré comme martyr et son nom figure dans le martyrologe romain."] },
      "11-20": { nom: "Saint Félix de Valois", texte: ["Félix de Valois naquit en 1127, selon la tradition, dans la famille royale de France.", "Il renonça à ses droits sur le trône et embrassa la vie érémitique dans la forêt de Cerfroid.", "Il y rencontra Jean de Matha, futur fondateur des Trinitaires, avec qui il s'associa.", "Ensemble, ils fondèrent en 1198 l'ordre de la Sainte-Trinité pour le rachat des captifs chrétiens.", "Cet ordre se consacra pendant des siècles à libérer les chrétiens prisonniers des musulmans.", "Les Trinitaires rachetèrent des dizaines de milliers de prisonniers avec leurs aumônes.", "Félix se consacra à la vie contemplative au monastère de Cerfroid pendant de longues années.", "Il mourut en 1212, laissant un ordre bien établi et en pleine expansion.", "Canonisé en 1666 par Alexandre VII, il est le co-fondateur des Trinitaires.", "Il est le patron des prisonniers et des captifs avec saint Jean de Matha."] },
      "11-21": { nom: "Présentation de Marie au Temple", texte: ["La Présentation de Marie au Temple est une fête fondée sur la tradition apocryphe.", "Selon l'Évangile de la Nativité de Marie, ses parents Joachim et Anne la conduisirent au Temple à trois ans.", "Elle y fut accueillie par les prêtres et y vécut jusqu'à ses fiançailles avec Joseph.", "Cette fête, née en Orient, fut introduite en Occident au XIVe siècle.", "Elle symbolise la consécration totale de Marie à Dieu dès ses plus jeunes années.", "Elle est la fête patronale des ordres contemplatifs féminins.", "En ce jour, l'Église célèbre aussi la Journée mondiale de la Vie Consacrée depuis 1997.", "Les religieux et religieuses du monde entier renouvellent leurs vœux dans leurs communautés.", "Cette fête rappelle que la vie consacrée est un don précieux fait à l'Église et au monde.", "Marie est présentée comme le modèle de tout consacré dans sa disponibilité totale à Dieu."] },
      "11-22": { nom: "Sainte Cécile", texte: ["Cécile est une martyre romaine des premiers siècles, l'une des plus vénérées de la chrétienté.", "Selon la tradition, elle souffrit le martyre à Rome sous l'empereur Alexandre Sévère vers 230.", "Issue d'une noble famille romaine, elle avait consacré sa virginité à Dieu malgré un mariage arrangé.", "La nuit de ses noces, elle convertit son époux Valérien en lui révélant son vœu.", "Elle fut condamnée à être étouffée dans les bains de sa maison, mais survécut trois jours.", "Un bourreau tenta de la décapiter mais ne put achever son geste, la laissant agoniante.", "Elle mourut après trois jours de survie, entourée de chrétiens qu'elle bénissait.", "Son corps, retrouvé incorruptible en 1599, est conservé dans la basilique qui lui est dédiée à Rome.", "La tradition de chanter lors de son mariage a fait d'elle la patronne de la musique.", "Elle est la patronne des musiciens, des chanteurs et des facteurs d'instruments."] },
      "11-23": { nom: "Saint Clément Ier, pape", texte: ["Clément Ier fut le troisième ou quatrième évêque de Rome, successeur de saint Pierre.", "Il gouverna l'Église de Rome à la fin du Ier siècle, vers 88-99 après J.-C.", "Il aurait connu personnellement les apôtres Pierre et Paul selon une tradition ancienne.", "Sa Lettre aux Corinthiens, rédigée vers 96, est l'un des documents les plus anciens du christianisme.", "Cette lettre montre la préoccupation de l'Église de Rome pour les autres Églises chrétiennes.", "Elle affirme l'autorité de Rome sur les communautés chrétiennes de l'Empire.", "Clément fut exilé en Crimée sous l'empereur Trajan, selon une tradition médiévale.", "Il y aurait évangélisé des milliers de personnes avant de mourir martyr.", "Son tombeau présumé fut trouvé par saint Cyrille lors de sa mission en Crimée.", "Il est l'un des Pères apostoliques et un témoin précieux de l'Église du premier siècle."] },
      "11-24": { nom: "Saint André Dung-Lac et compagnons", texte: ["André Dung-Lac et ses compagnons sont les cent dix-sept martyrs du Vietnam canonisés en 1988.", "Le christianisme fut introduit au Vietnam au XVIIe siècle par des missionnaires dominicains et jésuites.", "Entre 1625 et 1886, des dizaines de milliers de chrétiens furent martyrisés pour leur foi.", "Ces martyrs étaient européens, prêtres, religieux et laïcs vietnamiens de toutes conditions.", "André Dung-Lac était un prêtre vietnamien qui fut décapité en 1839.", "Parmi les martyrs se trouvaient des évêques, des prêtres, des catéchistes et de simples fidèles.", "Ils furent victimes des persécutions des empereurs de la dynastie Nguyen.", "Leur courage face à la mort et leur pardon accordé aux bourreaux impressionnèrent leurs contemporains.", "Canonisés par Jean-Paul II en 1988, ils sont les patrons du Vietnam.", "Ils témoignent de la vitalité extraordinaire de l'Église catholique en Asie du Sud-Est."] },
      "11-25": { nom: "Sainte Catherine d'Alexandrie", texte: ["Catherine est une martyre alexandrine dont le culte est très ancien mais la vie largement légendaire.", "Selon la tradition, elle était une jeune femme noble et très instruite d'Alexandrie, au IVe siècle.", "Elle se convertit au christianisme à la suite d'une vision et consacra sa virginité à Dieu.", "Elle osa affronter l'empereur Maxence lors d'un débat public pour défendre la foi chrétienne.", "Cinquante philosophes envoyés pour la convaincre furent eux-mêmes convaincus et convertis.", "Emprisonnée, elle convertit l'épouse de l'empereur et deux cents soldats.", "Elle fut condamnée à mourir sur une roue garnie de pointes, mais la roue se brisa miraculeusement.", "Elle fut finalement décapitée vers 305, et les anges transportèrent son corps au mont Sinaï.", "Elle est l'une des Quatorze Saints Auxiliateurs et la patronne des philosophes et des étudiantes.", "Sa roue brisée est son attribut iconographique et a donné son nom aux feux d'artifice en roue."] },
      "11-26": { nom: "Saint Jean Berchmans", texte: ["Jean Berchmans naquit en 1599 à Diest, en Belgique, dans une famille de cordonniers.", "Dès l'enfance, il se distingua par une piété et une douceur remarquables.", "Il entra dans la Compagnie de Jésus en 1616 et fut envoyé à Rome pour ses études.", "Sa vie religieuse de seulement cinq ans fut d'une sainteté rayonnante.", "Sa règle de vie était simple : ne jamais perdre une minute de temps, ne jamais manquer à la règle.", "Il mourut à Rome en 1621, à l'âge de vingt-deux ans, épuisé par ses études et ses mortifications.", "Sa mort déclencha une vague d'émotion dans toute la Compagnie de Jésus et dans Rome.", "Il fut béatifié en 1865 et canonisé en 1888 par Léon XIII.", "Il est le patron des servants de messe et des jeunes étudiants jésuites.", "Son corps est conservé à Rome dans l'église Saint-Ignace, lieu de nombreux pèlerinages."] },
      "11-27": { nom: "Sainte Françoise-Xavière Cabrini", texte: ["Françoise-Xavière Cabrini naquit en 1850 à Sant'Angelo Lodigiano, en Lombardie, dans une famille pieuse.", "Elle rêvait d'aller en Chine comme missionnaire, mais le pape Léon XIII l'envoya en Amérique.", "Elle fonda en 1880 les Missionnaires du Sacré-Cœur pour les missions étrangères.", "Elle traversa l'Atlantique trente-sept fois pour organiser ses missions aux États-Unis.", "Elle fonda des écoles, des hôpitaux et des orphelinats pour les immigrants italiens en Amérique.", "Sa vitalité et son énergie organisatrice forçaient l'admiration de tous ceux qui la côtoyaient.", "Elle obtint la nationalité américaine en 1909, restant profondément italienne de cœur.", "Elle mourut à Chicago en 1917, épuisée par ses incessants voyages et ses travaux.", "Canonisée en 1946 par Pie XII, elle fut la première citoyenne américaine canonisée.", "Elle est la patronne des immigrants, des orphelins et des hôpitaux catholiques américains."] },
      "11-28": { nom: "Saint Jacques de la Marche", texte: ["Jacques naquit en 1394 à Monteprandone, dans les Marches, dans une famille pauvre.", "Il étudia le droit à Pérouse et exerça quelque temps comme avocat.", "La rencontre de saint Bernardin de Sienne le décida à entrer dans l'ordre franciscain.", "Il devint l'un des plus grands prédicateurs populaires de son époque.", "Il parcourut l'Italie, la Hongrie, l'Autriche et la Bosnie avec un zèle apostolique inlassable.", "Ses prédications provoquaient des conversions massives et des réformes des mœurs.", "Il lutta contre les hérétiques hussites en Bohême avec une efficacité remarquable.", "Il fonda des Monts-de-Piété, institutions de crédit pour les pauvres, dans de nombreuses villes.", "Il mourut en 1476 à Naples, après quatre-vingt-deux ans de vie généreuse pour Dieu.", "Canonisé en 1726, il est le patron des Marches et de la lutte contre l'usure."] },
      "11-29": { nom: "Bienheureux Jacques de la Marche", texte: ["Le 29 novembre, l'Église honore plusieurs saints et bienheureux franciscains.", "Parmi eux, Saturnin de Toulouse, premier évêque de Toulouse, martyrisé vers 250.", "Il fut attaché à un taureau et traîné jusqu'à sa mort sur les marches du Capitole de Toulouse.", "La basilique Saint-Sernin de Toulouse, chef-d'œuvre de l'art roman, perpétue sa mémoire.", "Il est le patron de la ville de Toulouse et de l'archidiocèse.", "Ce jour est aussi la fête de nombreux martyrs anonymes des premiers siècles.", "L'Église commémore ainsi la multitude des témoins qui donnèrent leur vie pour la foi.", "Leurs noms sont inscrits dans le livre de vie, même si nous ne les connaissons pas.", "La fête des martyrs rappelle que le sang des martyrs est la semence de l'Église.", "Tertullien écrivit cette vérité qui reste d'actualité dans les pays où l'Église est persécutée."] },
      "11-30": { nom: "Saint André, apôtre", texte: ["André était le frère de Simon-Pierre et un pêcheur du lac de Tibériade.", "Il fut d'abord disciple de Jean-Baptiste avant de suivre Jésus.", "C'est lui qui amena son frère Pierre à Jésus, disant qu'il avait trouvé le Messie.", "Il fut appelé Protoclète, le premier appelé, par la tradition orientale.", "Dans l'Évangile de Jean, il présente à Jésus le jeune garçon aux cinq pains et deux poissons.", "Après la Pentecôte, il évangélisa la Grèce, l'Asie Mineure et la Scythie.", "Il fut martyrisé à Patras en Grèce, crucifié sur une croix en forme de X.", "Depuis lors, cette croix est appelée croix de saint André.", "Ses reliques, conservées à Patras puis à Constantinople, furent en partie transférées à Amalfi.", "Il est le patron de l'Écosse, de la Grèce, de la Russie et de nombreuses nations."] },
      "12-1": { nom: "Saint Éloi", texte: ["Éloi naquit vers 588 à Chaptelat, près de Limoges, dans une famille de paysans gaulois.", "Il apprit le métier d'orfèvre et devint le meilleur artisan de son temps.", "Sa réputation attira l'attention du trésorier royal Bobon, puis du roi Dagobert Ier.", "Il devint l'orfèvre officiel de la cour de France et l'un des conseillers les plus écoutés du roi.", "Sa charité envers les pauvres et les esclaves était légendaire à la cour.", "Ordonné prêtre en 640, il fut nommé évêque de Noyon et de Tournai.", "Il évangélisa la Flandre et la Zélande avec un grand zèle apostolique.", "Ses prédications en français vulgaire, plutôt qu'en latin, lui permirent de toucher le peuple.", "Il mourut en 660, vénéré de tout le royaume comme le saint de la charité.", "Il est le patron des orfèvres, des bijoutiers, des forgerons et des vétérinaires."] },
      "12-2": { nom: "Sainte Bibiane", texte: ["Bibiane, ou Viviane, est une martyre romaine du IVe siècle dont le culte est très ancien.", "Selon la tradition, elle était la fille d'un officier romain converti au christianisme.", "Lors de la persécution de Julien l'Apostat, toute sa famille fut arrêtée.", "Son père mourut en prison, sa mère fut décapitée, et sa sœur Démétria mourut de choc.", "Bibiane, restée seule, fut remise à une femme dépravée pour la corrompre.", "Résistant à toutes les tentatives, elle fut finalement flagellée jusqu'à la mort.", "Son corps fut jeté dans la rue, mais ses compagnes le recueillirent et l'inhumèrent.", "Une basilique lui fut dédiée à Rome, toujours visible aujourd'hui dans le quartier de l'Esquilin.", "Elle est invoquée contre les maux de tête et les crises d'épilepsie.", "Sa fête le 2 décembre ouvre le temps de l'Avent dans les premières semaines de décembre."] },
      "12-3": { nom: "Saint François Xavier", texte: ["François Xavier naquit en 1506 au château de Xavier, en Navarre, dans une famille noble.", "Il étudia à Paris où il rencontra Ignace de Loyola et devint l'un des fondateurs de la Compagnie de Jésus.", "Envoyé aux Indes en 1541, il évangélisa Goa, Ceylan, Malacca et les îles de la Sonde.", "Sa méthode missionnaire associait l'adaptation aux cultures locales et la prédication inlassable.", "Il apprit les langues locales, composa des catéchismes et forma des auxiliaires indigènes.", "Il baptisa des centaines de milliers de personnes en dix ans de mission en Asie.", "Il atteignit le Japon en 1549 et y fonda plusieurs communautés chrétiennes.", "Il mourut en 1552 sur l'île de Sancian, en vue de la Chine qu'il voulait évangéliser.", "Canonisé en 1622 avec Ignace de Loyola, il est l'un des plus grands missionnaires de l'histoire.", "Il est le patron des missions étrangères, de l'Inde et du Japon."] },
      "12-4": { nom: "Sainte Barbe", texte: ["Barbe est une martyre dont le culte est très ancien, mais la vie entourée de légendes.", "Selon la tradition, elle était la fille d'un riche seigneur d'Héliopolis en Phénicie.", "Son père Dioscore, voulant la garder pour lui, l'enferma dans une tour.", "Barbe se convertit au christianisme et fit percer une troisième fenêtre dans sa tour.", "Ce geste symbolisait sa foi en la Trinité, Père, Fils et Saint-Esprit.", "Son père la dénonça aux autorités et elle fut soumise à de nombreux supplices.", "Elle fut finalement décapitée par son propre père, qui fut aussitôt frappé par la foudre.", "Elle est l'une des Quatorze Saints Auxiliateurs, invoqués pour des grâces particulières.", "Elle est la patronne des artilleurs, des pompiers, des mineurs et des architectes.", "Son attribut iconographique est la tour à trois fenêtres qui symbolise sa foi trinitaire."] },
      "12-5": { nom: "Saint Sabas le Sanctifié", texte: ["Sabas naquit en 439 en Cappadoce, dans une famille chrétienne pieuse.", "À huit ans, il entra dans un monastère et refusa d'en sortir malgré les demandes de sa famille.", "Il se rendit en Palestine et vécut dans les grottes du désert de Judée.", "Il fonda vers 483 la Grande Laure de Mar Saba, dans les gorges du Cédron.", "Cette laure, encore habitée de nos jours, est l'un des plus anciens monastères du monde.", "Il organisa la vie de nombreuses communautés monastiques en Palestine.", "Il combattit avec énergie les hérésies christologiques qui divisaient l'Église d'Orient.", "Il se rendit plusieurs fois à Constantinople pour plaider les causes de l'orthodoxie.", "Il mourut en 532, à l'âge de quatre-vingt-treize ans, dans sa chère laure du désert.", "Il est l'un des grands organisateurs du monachisme oriental et le patron des moines de Palestine."] },
      "12-6": { nom: "Saint Nicolas de Myre", texte: ["Nicolas fut évêque de Myre en Lycie, dans l'actuelle Turquie, au IVe siècle.", "Sa vie historique est mal connue, mais son culte est l'un des plus répandus de la chrétienté.", "Il participa au Concile de Nicée en 325 et défendit l'orthodoxie contre l'arianisme.", "Sa charité légendaire envers les pauvres est illustrée par de nombreuses histoires.", "Il aurait sauvé trois jeunes filles de la prostitution en leur offrant anonymement une dot.", "Il aurait ressuscité trois enfants qu'un aubergiste avait découpés et mis en saumure.", "Son culte se répandit en Orient puis en Occident avec les croisés qui rapportèrent ses reliques.", "Ses reliques furent transférées à Bari, en Italie, en 1087, où une basilique lui est dédiée.", "La tradition de Saint Nicolas donnant des cadeaux aux enfants donna naissance au Père Noël.", "Il est le patron des enfants, des marins, des marchands et de nombreuses nations."] },
      "12-7": { nom: "Saint Ambroise de Milan", texte: ["Ambroise naquit vers 340 à Trèves, fils d'un préfet des Gaules, dans une famille noble chrétienne.", "Brillant juriste, il devint gouverneur de Ligurie et d'Émilie, avec siège à Milan.", "Lors de l'élection d'un évêque à Milan, il fut réclamé par le peuple alors qu'il n'était même pas baptisé.", "Il fut baptisé, ordonné prêtre et consacré évêque en une semaine, en 374.", "Ses dons naturels et sa formation juridique firent de lui un évêque exceptionnel.", "Il convertit et baptisa saint Augustin en 387, transformant l'histoire de la théologie.", "Il osa excommunier l'empereur Théodose pour le massacre de Thessalonique.", "Ses hymnes liturgiques sont encore chantés dans l'Église et ont fondé la tradition hymnographique latine.", "Il mourut en 397 à Milan, laissant une Église solide et une théologie de grande envergure.", "Docteur de l'Église, il est l'un des quatre grands Pères de l'Église latine."] },
      "12-8": { nom: "Immaculée Conception de la Vierge Marie", texte: ["L'Immaculée Conception est le dogme selon lequel Marie fut préservée du péché originel dès sa conception.", "Ce dogme fut défini par le pape Pie IX le 8 décembre 1854 dans la bulle Ineffabilis Deus.", "Il affirme que Marie fut préservée par anticipation des mérites de la Rédemption accomplie par son Fils.", "Ce privilège unique la préparait à être la Mère digne du Fils de Dieu.", "La définition dogmatique fut confirmée quatre ans plus tard par les apparitions de Lourdes.", "La Vierge se présenta à Bernadette en disant : Je suis l'Immaculée Conception.", "La fête du 8 décembre était célébrée depuis des siècles en Orient et en Occident.", "En France, Lyon célèbre chaque 8 décembre la Fête des Lumières en l'honneur de Marie.", "Cette fête est jour d'obligation pour les catholiques et commence le temps de l'Avent.", "Elle rappelle que Marie est la créature la plus parfaite sortie des mains de Dieu."] },
